    import:
      type: mcdm
      data: |+
        Dwarf Gunner	Level 1 Platoon Artillery
        Dwarf, Humanoid	EV 6
        <b>Stamina</b> 26
        <b>Speed </b>5	<b>Size</b> 1M / <b>Stability</b> 1
        <b>	Free Strike</b> 4
        Might 0	Agility +2	Reason 0	Intuition +1	Presence 0
        <b>Portable Ballista</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Ranged, Strike, Weapon
        <b>Distance</b> Ranged 10 <b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	6 damage; push 1
        %E2%98%85	<b>12%E2%80%9316</b>	9 damage; push 3
        %E2%9C%B8	<b>17</b>	12 damage; push 5
        <b>Effect</b> If the target is adjacent to a wall or object after the power roll is resolved, they are restrained (EoT). A target restrained by a dwarf can be pushed by this ability.
        <b>5 Malice</b> If the target is pushed into another creature, both the target and the creature are restrained (EoT).

        <b>Ensnaring Chains</b> (Maneuver) %E2%97%86 5 Malice
        <b>Keywords</b> Ranged, Weapon
        <b>Distance</b> Ranged 10	<b>Target</b> 1 restrained, slowed, or prone target
        <b>Effect</b> The gunner makes a free strike against the target. The target loses any restrained, slowed or prone conditions and gains restrained (save ends).

        <b>Split Shot</b>
        Whenever the gunner deals damage to a creature or object, a creature or object within 1 of the recipient takes 3 damage.

