  name: Curse of Punishment
  ctime: 1755513707671
  description: "Through ignorance, fear, spite, or selfishness, you refused to help someone in need. To teach you a lesson, a deity offered you what seemed to be a blessing—extra power to help you heal yourself in times of need, but harsh consequences should your need become excessive. You took the deal, and now benefit from the blessing but also suffer\nfrom a curse. "
  id: 238d11ea-cbc0-469c-9914-57e26ee81fdf
  benefit: You have 1 additional Recovery
c757758a-96bd-4bce-91a9-52d6dafabbcf:
  __typeName: CharacterComplication
  drawback: Having no head, you can’t see, hear, smell, taste, or verbalize except by using the Share Head ability. Additionally, you can’t wear gear that requires a head, such as a helmet or hat.
  mtime: 1767272977563
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Lost Your Head
  ctime: 1755515866339
  description: "A bredbeddle stole your head! Usually, being beheaded by one of those magical giants is fatal (see Draw Steel: Monsters), but your latent psionic ability allows you to survive despite your decapitation."
  id: c757758a-96bd-4bce-91a9-52d6dafabbcf
  benefit: |-
    You have the following ability:
    Share Head
f550c0ed-5286-48d6-8788-15ca3f94f591:
  __typeName: CharacterComplication
  drawback: Whenever you take a respite while your Wealth is higher than 1, some improbable event occurs that causes most of your money to vanish—including money you’ve hidden, loaned to others, or given away. Your Wealth is reduced to 1. For each point of Wealth you lose this way, your number of Recoveries increases by 1. Your Recoveries reset to their usual value the first time you take a respite with fewer Recoveries than your maximum
  mtime: 1765882815014
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Curse of Poverty
  ctime: 1755513660690
  description: A soothsayer once predicted you would have a long life, even as they told you you’d never be rich. But you’re determined to prove them wrong. You’ll get rich or die trying!
  id: f550c0ed-5286-48d6-8788-15ca3f94f591
  benefit: Whenever you take a respite while your Wealth is higher than 1, some improbable event occurs that causes most of your money to vanish—including money you’ve hidden, loaned to others, or given away. Your Wealth is reduced to 1. For each point of Wealth you lose this way, your number of Recoveries increases by 1. Your Recoveries reset to their usual value the first time you take a respite with fewer Recoveries than your maximum.
