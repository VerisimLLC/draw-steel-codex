      data: |+
        Lumbering Egress	Level 6 Leader
        Abyssal, Demon	EV 32
        <b>Stamina</b> 180	<b>Weakness</b> Holy 5
        <b>Speed</b> 6	<b>Size</b> 3 /<b> Stability</b> 3
        <b>Free Strike</b> 7
        Might +4	Agility -1	Reason +1	Intuition +2	Presence +2
        <b>Ensnarer Cannon</b> (Action) %E2%97%86 2d10 + 4%E2%97%86 Signature
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 10<b>	Target</b> Two creature or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	11 corruption damage; A<2 restrained (save ends)
        %E2%98%85	<b>12-16</b>	16 corruption damage; A<3 restrained (save ends)
        %E2%9C%B8	<b>17</b>	19 corruption damage; A<4 restrained (save ends)
        <b>2 Malice</b> Two <b>ensnarers</b> appear adjacent next to each target. Four ensnarers appear on a tier-3 result.

        <b>Demonic Egress</b> (Maneuver) %E2%97%86 2 Malice
        <b>Keywords</b> -
        <b>Distance</b> 3 burst	<b>Target</b> Special
        <b>Effect</b> Four level 1 demon minions (<b>ensnarer</b>, <b>frenzied</b>, <b>pitling</b>) burst forth from the egress and appear in unoccupied squares.
        <b>2 Malice </b>Four level 4 demon minions (<b>orflig, wobalas, grulqin</b>) appear instead.

        <b>Abyssal Protectors</b> (Triggered Action) %E2%97%86 2 Malice
        <b>Keywords</b> Magic
        <b>Distance</b> 5 burst<b>	Target</b> Special
        <b>Trigger</b> The last ally minion on the encounter map dies, or the Egress falls below 25 Stamina.
        <b>Effect</b> Eight <b>ensnarers</b> appear anywhere in range.

        <b>End Effect</b>
        At the end of their turn, the egress can take 10 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Soulsight</b>
        Each creature within 2 of the egress can't be hidden from them.

        <b>Frenzied Deluge </b>(Villain Action 1) %E2%97%86 2d10 + 4
        <b>Keywords</b> Area, Magic, Melee
        <b>Distance</b> 5 burst<b>	Target</b> All enemies
        %E2%9C%A6	<b>%E2%89%A411</b>	7 corruption damage
        %E2%98%85	<b>12-16</b>	12 corruption damage
        %E2%9C%B8	<b>17</b>	15 corruption damage; two frenzieds appear in an unoccupied square adjacent to each target

        <b>Fold Space </b>(Villain Action 2)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 20<b>	Target</b> Self
        <b>Effect</b> The egress folds into their own portal and teleports to an unoccupied space within distance. Four level 4 demon minions (<b>orflig, wobalas, grulqin</b>) appear in the space the egress leaves behind.

        <b>Blood of the Abyss</b> (Villain Action 3) %E2%97%86 2d10 + 4
        <b>Keywords</b> Area, Magic, Melee
        <b>Distance</b> 10 x 3 line within 1<b>	Target</b> All enemies and objects in the line
        %E2%9C%A6	<b>%E2%89%A411</b>	5 corruption damage; R<2 weakened (save ends)
        %E2%98%85	<b>12-16</b>	10 corruption damage; R<3 weakened (save ends)
        %E2%9C%B8	<b>17</b>	13 corruption damage; R<4 weakened (save ends)
        <b>Effect</b> The egress recalls and instantly destroys any ally minions on the encounter map. A torrent of churned up minion bodies and blood erupts from the egress, dealing an additional 1 damage for each minion destroyed this way.
        Demons - 3rd Echelon
        Soulraker Hivemind
        In a plane of chaos, the soulraker demon is notable for fashioning a facsimile of order within themself. The demon's wasps make up a single, chaotic hive mind. They serve the demon's hivequeen, who relies on cannibalizing her children to ingest any souls they've consumed.
        The soulraker utilizes handmaiden parasites to propagate. Handmaidens gestate inside a host until they're ready to emerge from the body, consuming souls until they're strong enough to transform into a new hivequeen.
        Higher Categories of Demons
        The following demons have been identified across categories 7-9:
        <b>Soulraker Scouts</b> are the vile progeny of a hivequeen, demonic wasps emerging from her distended abdomen with an earsplitting buzz.
        <b>Soulraker Soldiers</b> are armored wasps covered in hooked barbs that lock opponents into vicious combat.
        <b>Soulraker Stingers</b> are wasps covered in gnarled, poisonous stingers that launch like quills. Their wings are atrophied, tiny, and unusable.
        <b>Blight phages</b> were once angelic creatures. Corrupted by demonic forces, they're now a cruel, distended mockery of a cherubic form covered in with pustulant boils that seep ruinous blight.
        A horrifying amalgam of multiple demonic forms that have melded into a unique monstrosity. The <b>chimeron </b>feels as unslakable hunger for souls.
        The <b>Styrich's </b>lanky body is covered in a mane of long, razor sharp hair which it whips around the battlefield, shredding its enemies to pieces.
        <b>Soulraker Handmaidens</b> are abyssal parasites that are implanted in victims by Soulraker Hivequeens. They slowly feed on their hosts' souls little by little until they can assume full control of the body.
        <b>Soulraker Praetorians</b> are demonic wasps covered in hard chiton that drips with foul smelling ichors. The elite guard of the hivequeens.
        <b>Soulraker Hivequeen</b> is a wasp-like demon whose abdomen houses its own soulraker wasp hive and a vicious stinging ovipositor capable of implanting its victims with handmaiden parasites

