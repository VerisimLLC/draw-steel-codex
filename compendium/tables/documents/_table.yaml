  parentFolder: 506cad1a-578e-4662-ad33-7902ebd3e52c
  updateid: 5f271a53-8239-40e1-b3af-b47b6fe47684
  annotations: []
  id: cdf41c33-a65c-417a-851b-d73ae4e0335a
  mtime: 1762868014898
  content: |-
    # Wolf Den


    [Saera], a werewolf who considers her curse a gift, came to the Silver Wood hoping to join the Forsaken Wraiths bandits after she was chased out of the settlement of Wend. When the brigands discovered what she truly was, they exiled her. She’s now taken refuge in a cave on the banks of the Dunn River that shares a connection with Quintessence, a manifold of chaotic elemental energy.

    [Saera] has been hunting on the banks of the river at night. She bit and cursed Broadhurst’s carpenter, [Mikael] (see [B10. Carpenter]), and steals meat from the traps set by furrier [Tansy] (see [B11. Furrier]). It’s likely that through talking to [Mikael] or [Tansy], the heroes find themselves on the banks of the Dunn River, about to enter the den of a werewolf.



    ## A Worried Brother
    When the heroes arrive at the den, an itinerant shepherd has been just been captured by Saera. His shocked brother stands outside the cave, gathering the courage to face the beast within.

    > * “Several slaughtered sheep, their entrails strewn about the ground, lie on the bank of the Dunn River in front of the entrance to a gaping cave.”
    > * “A middle-aged human stands outside the entrance, staring in with a look of worry and fear, a wood crook grasped tightly in his fists.” 


    ## Yerris

    [Yerris], an itinerant shepherd and civilian, follows his sheep and lives off the land with his brother. He’s startled when the heroes approach, wheeling around on them and holding his crook in a shaky defensive stance with no sign of combat proficiency. 

    If the heroes speak with him, Yerris immediately realizes they could help him and starts speaking quickly:
    > * “Me younger brother, [Oleq], and I was bringing our sheep through the area when a wolf—a big’un—came charging out of the cave and tore up a few. The rest scattered.”
    > * “I froze and then the beast grabbed [Oleq]! Screaming for help he was as the thing carried him … in there.”
    > * “I want to go in … but I can’t make me legs move. Please! You gotta save him.”


    If the heroes offer to help, [Yerris] thanks them. If they tell him to wait outside the cave, he does so. He also does whatever he’s told to do in any combat encounters. If not given any direction, he is the last to act on the heroes’ side; he runs at the nearest creature and makes a free strike against them—a tactic that the heroes should notice will get him killed if they don’t intervene.

    This quest uses the [Wolf's Den Map].
