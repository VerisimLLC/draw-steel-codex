  name: Crash Landed
  ctime: 1755513424854
  description: You used to flit around the stars in your own ship. But an ugly run-in with a pirate (or a pirate hunter) has left you marooned on this backwater world. You’re prepared to carve out a life here—at least until you can hitch a ride somewhere else.
  id: 6079b4e5-95ca-4fec-8bb6-2338231ee2a8
  benefit: You have the Timescape skill (from the lore skill group). Additionally, you have a power pack that you can activate or deactivate as a maneuver. When you activate the power pack, choose an energy type from cold, fire, lightning, or sonic. Until you deactivate the power pack, your damage-dealing abilities deal that damage type.
a50800b5-6945-4509-9575-3846d0762de2:
  __typeName: CharacterComplication
  drawback: The faction you wronged hates you, and its members would love to see you pay for your transgression.
  mtime: 1755518356511
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: War of Assassins
  ctime: 1755518356511
  description: Being in the wrong place at the wrong time saw you caught in the middle of a conflict between two warring assassins’ guilds. Whether by choice or by accident, you wound up helping one faction at the expense of the other.
  id: a50800b5-6945-4509-9575-3846d0762de2
  benefit: |-
    Having gained the favor of the faction you helped, you can call on its members three times for favors. If a favor is reasonable and within the faction’s power to grant, its members do it, no
    questions asked.
