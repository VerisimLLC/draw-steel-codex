name: Secret Identity
ctime: 1755516860424
description: You’re secretly important—but it’s not safe for your true identity to be known. Perhaps you’re the witness to a crime or a member of a royal family on the run from a usurper. Until you are no longer at risk of being hunted, you’ll maintain the guise of an ordinary adventurer.
id: 909d4869-385b-4d34-aca7-d90ff3348dea
benefit: You have a skill of your choice from the intrigue skill group. Additionally, you can resume your true identity temporarily. While in your true identity, your Renown and Wealth are treated as 2 higher than usual, and you might gain other benefits in consultation with the Director.
