  ## Thurston’s Plot

   Thurston’s plan to betray Aldiva involves telling her that he’s going to take most of the Forsaken Wraiths to raid Broadhurst that evening. His followers will ambush hers in the darkness once away from the island. Aldiva stays away from raids, so the only people left in the camp during that time are herself and her bodyguard Laesi (see 

  F2. Aldiva’s Quarters), and Berrick and Kora (see Guard Post). If Brune is in the fort, he also remains here during the raid.

  ## Aldiva’s Done

   If the heroes already took care of Aldiva, Thurston thanks them and then proposes a deal—he’ll flee the region with any remaining bandits as long as he gets the goods in the storage room (see F3. Storage). If the heroes don’t agree to these terms, he attacks them.

  # Combat

  The heroes fight Thurston of the Forsaken Wraiths.

  ## F1 Groups

  Group 1: One **Human Knave** (Thurston; captain)
  Group 1: Four **Human Raiders** (Minion Squad)

  ## Reinforcements

  At the start of the third round of combat, **Aldiva** and **Laesi** (see Encounter F2) arrive to help if they're alive.

  ## Combat

  Allow easy adjustment of the number of heroes to balance for:

  [[setting:Number of Heroes]]

