  content: "# Encounter D12\n\nThe heroes face oozes in a diabolic room of traps.\n\n[[encounter: D12]]\n\n**D12 Groups**\n|Group	|Creatures|\n|1|Two gummy balls|\n|2|One creeping sludge (captain), Four black ichors (minion squad)|\n|3|One creeping sludge (captain), Four black ichors (minion squad)|\n|4|One crawling claw|\n\n \n**Encounter Adjustments**\nIf this encounter has more or fewer than five heroes, make the following adjustments:\n* For six heroes, add two creeping sludges as their own group.\n* For four heroes, remove one creeping sludge and four black ichors.\n* For three heroes, remove one creeping sludge, four black ichors, and both gummy balls.\n\n\n## Pushed Into the Gauntlet\n\nIt's possible to force move a creature into the gauntlet (see [D11. The Gauntlet] in the Adventure Book. When a creature starts their turn in the gauntlet, or enters it for the first time on their turn, they take 5 damage.\n\n\n## Hand on the Reins\n\nThe crawling claw was created for the sole purpose of working the control panel. On their turn, the claw triggers dart traps in the room, targeting two creatures in the main room of this area. Each target must make an Agility test:\n\n|Dart Trap: Agility Test\n|{#9 poison damage, m<3] weakened (save ends) }\n|{#7 poison damage, m<2] weakened (EoT) }\n|{#5 poison damage}\n\nThe tunnel to reach the control panel is a tight squeeze, and the position of the control panel makes ranged attacks against the hand nearly impossible. A creature of size 1S or larger trying to get through it must make an Agility test when they enter or start their turn in the tunnel:\n\n|Tunnel Squeeze: Agility Test\n|{#The creature takes 2 damage per space they move through the tunnel and can move at half speed down the tunnel this turn.}\n|{#The creature can move at half speed down the tunnel this turn.}\n|{#The creature can move at full speed down the tunnel this turn.}\n\nWhile a creature is squeezing down the corridor, strikes against them gain a double edge.\nIf the crawling claw is removed from the controls, a hero adjacent to the controls can use an action to use them against the monsters. They can also turn off the gauntlet from here.\n\n\n## Tactics\n\nThe oozes aim to force heroes back into the gauntlet to dispatch them more ably. However, they're otherwise not especially tactical. Thanks to their Amorphous trait, they pursue heroes down the narrow tunnel to the south with ease, and the creeping sludges can pull creatures out of that tunnel, reverting some of their progress toward the control panel.\n\n\n## Ending the Encounter\n\nOnce the heroes secure the control room, the oozes flee and the heroes earn 1 Victory each.\n[[/awardvp 1|Award Heroes 1 Victory]]\n\n"
  description: Encounter D12
