        Wodenelg	Level 1 Platoon Mount
        Plant, Wode Elf	EV 6
        <b>Stamina</b> 30
        <b>Speed</b> 10	<b>Size</b> 2 / <b>Stability</b> 1
        <b>Free Strike</b> 3
        Might +2	Agility +1	Reason -1	Intuition 0	Presence -1
        <b>Gore</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Charge, Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	5 damage
        %E2%98%85	<b>12%E2%80%9316</b>	7 damage
        %E2%9C%B8	<b>17</b>	9 damage
        <b>Effect</b> The wodenelg's rider can make a free strike at any point during the charge.

        <b>Sure Footed</b>
        The wodenelg ignores all difficult terrain, including enemy squares, and doesn't provoke opportunity attacks by moving.

        <b>Where I End the Woods Begin</b> (Maneuver) %E2%97%86 3 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self<b>Target</b> Self
        <b>Effect</b> The wodenelg and their rider become invisible until the start of their next turn.

        <b>Mounted Stability</b>
        The wodenelg's rider has damage immunity 2.

        <b>Shared Glamor</b>
        If the wodenelg's rider has the Masking Glamor or Hunter's Galamor trait, they also gain the trait's benefits.

        Retainer
