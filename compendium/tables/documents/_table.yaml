    sections:
      jf: |
        ???
      jb: |
        [[encounter:A5 1 4]]
      y: |+
        When she's winded, Queen Bargnot attempts to dive between the loot sacks and flee down the chute into [A6. Spider Nest], and the goblins prioritize her escape. However, if the goblins are outnumbered two to one by the time she's winded, they flee and leave her on her own.


      w: |+
        ## Tactics

      x: |
        The warriors and assassins do everything in their power to stand between the heroes and their queen. The cursespitters and the stinkers take to the walls and ceiling, pinning the heroes from a safe distance. Queen Bargnot focuses on calling more goblin runners into the room until the heroes are completely overrun.
      u: |+
        |8| (**Reinforcements**) Two [goblin runner]s (minion squad)|

      v: |
        **Encounter Adjustments**
      s: |
        |6| Three [goblin cursespitter]s|
      t: |
        |7| Two [goblin stinker]s|
      q: |
        |4| Two [goblin assassin]s|
      r: |
        |5| Two [goblin assassin]s|
      jQ: |
        [[encounter:A5 0 4]]
      p: |
        |3| Two [goblin warrior]s|
      m: |
        |**Group** |**Creatures**|
      n: |
        |1| One [goblin monarch] (Queen Bargnot)|
      vF: |
        If this encounter has more or fewer than five heroes, make the following adjustments:
      l: |
        **A5 Groups**
      jF: |
        ???
      h: |
        [[encounter:A5 Heroes's Cup]]
      e: |+
        The heroes battle [Queen Bargnot] and her advisors in the war room of [Castle Andreas].

      f: |+
        [[setting:Number of Heroes]]

      jB: |
        [[encounter:A5 5+]]
      a: |+
        In truth, the Jagged Edge’s numbers are severely weakened thanks to the heroes’ efforts. If the heroes are willing to negotiate, [Queen Bargnot] stares each of them down quietly for a long time. Wait a beat before calling for a hero to make a hard Presence test. They have a double edge on the test if they call Queen Bargnot on her bluff. On a success, she calls the other goblins to stay their weapons and negotiations begin (see [Coming to Terms]). Otherwise, combat begins.

      jk: |
        [[encounter:A5 5+]]
      yQ: |
        The encounter ends when Queen Bargnot is defeated or if she flees and the remaining goblins are outnumbered two to one and then flee. The heroes earn 1 Victory each or 2 Victories each if Queen Bargnot is finally defeated here.
      vY: |+
        * For three heroes, remove two goblin warriors, one goblin assassin, and one goblin cursespitter.



      jg: |
        **2 Respites**
      jo: |
        ???query numheroes = 4
      Y: |+
        The queen provides the heroes with one last chance to surrender, telling them in Caelian, “*The Jagged Edge have you outnumbered, you know. But your blood doesn’t need to touch these floors. Die a quiet death tomorrow instead of here and now by my hand!*”

      W: |+
        Four **goblin warriors**, four **goblin assassins**, two **goblin stinkers**, three **goblin cursespitters**, and [Queen Bargnot] the **goblin monarch** cut their arguing short at the heroes’ arrival.

      jL: |
        [[encounter:A5 0 Respites]]
      U: |+
        Heroes who climb into the area through the grate in [A3. Old Armory] appear underneath the stone steps and aren’t immediately noticed by the goblins at the table.

      S: |+
        ## Queen’s Court

      Q: |+
        {**Secret:** A climbable chute concealed by the loot sacks leads all the way down into [A6. Spider Nest].}


      vt: |+
        [[encounter:reinforcements]]

      O: |+
        > * “Queen Bargnot is not happy.”

      M: |
        > * “Sullied maps, ink bottles, and daggers cover the stone table. Angry goblins pace and yell at each other across the table.”
      jT: |
        [[encounter:A5 0 3]]
      K: |
        > * “Stone steps along the left wall lead to a bolted trap door out to the roof of the keep.”
      jX: |
        ???query numheroes > 4
      G: |
        > * “Two large lanterns illuminate each brick of the octangular chamber.”
      jE: |
        [[encounter:A5 4]]
      E: |+
        # A5. War Room

      C: |+
        [[/screenshake 5 | Shake the Screen]]

