    import:
      type: mcdm
      data: |+
        Frost Giant Wind Sprinter	Level 8 Elite Harrier
        Frost Giant, Giant	EV 40
        <b>Stamina</b> 200	<b>Immunity</b> cold 8
        <b>Speed</b> 10	<b>Size</b> 4 /<b> Stability</b> 5
        <b>Free Strike</b> 8
        Might +4	Agility +4	Reason -1	Intuition 0	Presence 0
        <b>Cold Axe</b> (Action)%E2%97%86 2d10 + 4%E2%97%86 Signature
        <b>Keywords</b> Charge, Melee, Strike, Weapon
        <b>Distance</b> Melee 3<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	12 damage
        %E2%98%85	<b>12%E2%80%9316</b>	17 damage; A<3 bleeding (save ends)
        %E2%9C%B8	<b>17</b>	21 damage; A<4 bleeding (save ends)
        <b>Effect</b> This ability deals an additional 1d6 cold damage if the target is already bleeding.

        <b>Blizzard Surge</b> (Action)%E2%97%86 5 Melee
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The wind sprinter shifts up to their speed and uses their Cold Axe against each enemy who comes within 2 squares of them during the move. The wind sprinter makes one power roll against all targets.

        <b>Ice Dance</b> (Maneuver)
        <b>Keywords</b> Attack, Melee
        <b>Distance</b> Melee 1<b>	Target</b> 1 giant ally
        <b>Effect</b> Both giants shift 6, staying adjacent to each other. The wind sprinter allows the target to jump 5 and make a free strike.

        <b>Begone, Smallfolk!</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Trigger</b> The wind sprinter takes damage.
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The wind sprinter moves up to their speed and uses their Cold Axe on a single target.

        <b>Crush Underfoot</b>
        The wind sprinter can move through enemies and objects at normal speed. A creature can choose to fall prone or take 8 damage the first time the wind sprinter passes through their space on a turn.

        <b>Kingdom of Isolation</b>
        The wind sprinter is surrounded by a snowstorm. An enemy that starts their turn within 2 squares of the wind sprinter can't shift.



