  content: "# Encounter D5	\n\nThe heroes encounter undead and ruinborn monsters near the entrance of the Delian Tombʼs second level.\n\n[[setting:numheroes]]\n\n[[encounter: D5]]\n\n**D5 Groups**\n|Group	|Creatures|\n|1|One armoured soulwight, One spindlegoth|\n|2|One armoured soulwight, One spindlegoth|\n|3|One armoured soulwight, One spindlegoth|\n|4|One armoured soulwight, One spindlegoth|\n|5|One armoured soulwight, One spindlegoth|\n\n \n**Encounter Adjustments**\nIf this encounter has more or fewer than five heroes, make the following adjustments:\n* For six heroes, add two spindlegoths.\n* For four heroes, remove one spindlegoth and one armored soulwight.\n* For three heroes, remove two spindlegoths and two armored soulwights.\n \n\n## Noticing the Enemies\n\nA hero on the lookout for trouble can make a moderate Intuition test:\n|Lookout for Trouble: Intuition test\n|{#The hero doesn't notice anything.} {The hero doesn't notice the enemies.}\n|{#The hero notices the enemies, and the enemies notice them at the same time, causing the enemies to attack.}\n|{#The hero notices the enemies, but the enemies don't realize they've been revealed. The heroes can catch their foes surprised.}\n\n\n## Tactics\n\nIf not discovered by the heroes, the ambushing creatures try to time their attacks with the sarcophagus trap triggering, or while the trap is being disarmed. The spindlegoths identify and try to grab isolated prey. Meanwhile, the soulwights surround the hero with the highest Stamina to take them down before they can rally. The monsters know about the sarcophagus trap and avoid its radius.\n\n\n## Ending the Encounter\n\nThe ambushing creatures fight until reduced to 0 Stamina. The heroes earn 1 Victory each\n[[/awardvp 1|Award Heroes 1 Victory]]"
  description: Encounter D5
