name: Blood Essence Vial
equipmentCategory: 95125d91-fe41-4310-8f7b-44386651b0a7
description: |-
  When you damage an adjacent creature who has blood, you can capture the target’s life essence in this vial (no action required). Record the damage you dealt. 

  You can capture life essence in the vial only once. As a maneuver, you drink the contents of the vial to regain Stamina equal to half the damage dealt. 

  If you spend 1 Heroic Resource while you drink, you regain Stamina equal to the damage dealt. Once you drink from the vial, it crumbles to dust.
