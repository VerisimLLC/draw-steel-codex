  name: Fallen Immortal
  ctime: 1755514091671
  description: You used to be an immortal creature, dispensing justice and doing the bidding of the gods. Now, whether as punishment or reward, you have been ordered to set your true nature aside and become a mortal. Your remaining years will be short, but living alongside your fellow mortals gives your life new meaning.
  id: 08f703de-fa25-44b3-b7b1-8bd5b92bb024
  benefit: You have the Religion skill (from the lore skill group). Additionally, whenever you use an ability that deals untyped damage, that ability can deal holy damage instead.
e6b1fd45-46bc-4852-873a-db0f9015e294:
  __typeName: CharacterComplication
  drawback: Law enforcement officials and bounty hunters who recognize you attempt to arrest you.
  mtime: 1755603944696
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Outlaw
  ctime: 1755516238389
  description: 'You might be a common bandit or an idealistic freedom fighter, but in any event, the authorities don’t approve of your actions. You’ve managed to stay one step ahead of the law so far, but until your name is cleared, you’ve got to keep a low profile. '
  id: e6b1fd45-46bc-4852-873a-db0f9015e294
  benefit: You earn 1 Renown.
