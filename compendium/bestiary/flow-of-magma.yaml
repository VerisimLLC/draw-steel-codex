      data: |
        FLOW OF MAGMA Level 3 MINION HARRIER
        Elemental EV 3 for two minions
        1L 5 6 2 4
        Size Speed Stamina Stability Free Strike
        Immunity: Fire 2 Weakness: -
        Movement: Climb With Captain:
        M ight +2 A gility -2 R eason 0 I ntuition 0 P resence +1
        m Molten Strike 2d10 + R Signature Ability
        Magic, Melee, Strike Main Action
        e Melee 2 %C3%97 One creature or object per minion
        %C3%A1 4 fire damage; shift 3
        %C3%A9 6 fire damage; shift 4
        %C3%AD 8 fire damage; shift 5
        Effect: Each square that the flow shifts into becomes wreathed in
        flames until the start of the flow's next turn. An enemy that enters
        an affected square takes 2 damage.
        t Eruption 1 Essence
        When the flow is reduced to 0 Stamina, they launch lava into an area
        equal to 1 + their size within 5 squares. The affected area becomes
        difficult terrain for enemies until the end of the encounter. An
        enemy that enters an affected square or starts their turn there takes
        4 fire damage.
