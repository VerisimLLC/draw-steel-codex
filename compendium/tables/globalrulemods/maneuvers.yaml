      name: Search for Hidden Creatures
      activatedAbility:
        __typeName: ActivatedAbility
        targetFilter: Conditions has "hidden"
        repeatTargets: false
        behaviors:
        - __typeName: ActivatedAbilityOpposedRollBehavior
          attackAttributes:
            "1":
              skill: 7f6d9375-0ab0-415c-8196-4d99e98aa12b
              attribute: inu
            attribute: mgt
          defenseAttributes:
            "1":
              skill: fdd43bde-6062-484d-aea6-3803d396ea8e
              attribute: agl
            attribute: mgt
        - __typeName: ActivatedAbilityPurgeEffectsBehavior
          conditions:
          - 31daf7f6-f77c-4f73-8eab-43e2d0f123c0
