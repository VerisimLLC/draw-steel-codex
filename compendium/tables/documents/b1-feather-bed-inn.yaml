      |Gather Rumors: Presence Test
    M: |+
      **If asked about the dwarf merchants:** “Ah, they’re bringing stone for [Dunquat], but it seems they can’t agree on a price. That’s a tough go. [Dunquat] prides herself on using quality dwarf stone.”


    N: |
      # Gossip at the Tavern
    K: |+
      **If asked about Broadhurst or general happenings:** “Honestly, I don’t know much, love, but I can say that if you’re around in the evening and want to take a pint with some folks in the common room, they’ll happily gossip ’til the sun’s rising.”

    L: |+
      **If asked about the [Gilded Hand]:** “Came all the way from Wend, they did. I heard them sayin’ they battled cultists in some tomb! I can’t imagine why they came all the way out here. As far as I can tell, no one in Broadhurst can afford them.”

    I: |
      ## Gweldyr
    J: |+
      [Gweldyr] is always happy to greet the heroes as they enter the inn, and her greetings become warmer with every quest they accomplish. She’s polite but doesn’t like to waste time. There’s always something to take care of, especially with the inn this packed. If asked about Broadhurst or its happenings, [Gweldyr] offers the following information:

    G: |
      > * “The inn is full at the moment. In addition to yourselves, a mercenary band called the [Gilded Hand] stays here. They don’t seem to think highly of anyone who can’t afford them, which is everyone in this village.”
    H: |+
      > * “A group of [dwarf merchants] stays here as well. They mostly keep to themselves, but they do take over a corner of the inn for quiet conversation when they eat.”


    E: |
      > * “Its rooms are clean, if simple and sparse. A large common room on the first floor serves as Broadhurst’s tavern, where locals and travelers can meet, gossip, and enjoy a meal and a drink.”
    F: |
      > * “Rosy-cheeked, middle-aged [Gweldyr] runs the place and serves as the bartender. She’s kind but always in a rush.”
    C: |+
      The heroes are already staying at this inn at the start of the adventure. When they return here or if they ask about the location, share the following information:

    D: |
      > * “The Feather Bed Inn is the largest building in all Broadhurst, standing two stories tall.”
    B: |+
      # B1. Feather Bed Inn

