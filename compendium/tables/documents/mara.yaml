  # Mara

  [[image]]

  *A human elementalist in her fifties, Mara is an expert in magic and Caelian history. She doesn’t reveal much to any hero who speaks to her, but she does ask lots of questions about their adventures in the tomb, playing the part of a merely curious scholar.*
