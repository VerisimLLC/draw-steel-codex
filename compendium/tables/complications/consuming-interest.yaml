__typeName: CharacterComplication
drawback: |-
  You can’t imagine ever being wrong on the topic of your obsession. Whenever you make a test to recall lore using your chosen skill, the Director makes the test in secret. Instead of informing you whether you’re right or wrong, they provide you with correct information if you succeeded and false information if you failed.

  Study Lore
  Item Prerequisite: None
  Project Source: A significant source of information on the topic of your
  obsession, such as a major library or a world-renowned sage
  Project Roll Characteristic: Reason
  Project Goal: 120, 150, 180
  Each time you complete this project, your knowledge of your chosen
  field expands, and the bonus to tests provided by your chosen skill
  increases by 1.
