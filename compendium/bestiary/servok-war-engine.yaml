      data: |+
        Servok War Engine	Level 10 Elite Brute
        Construct, Servok, Valok	EV 48
        <b>Stamina</b> 260
        <b>Speed</b> 5	<b>Size</b> 3 /<b> Stability</b> 8
        <b>Free Strike</b> 10
        Might +5	Agility -2	Reason -4	Intuition -1	Presence -5
        <b>Blade Rake</b> (Action)%E2%97%86 2d10 + 5 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 3<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	15 damage
        %E2%98%85	<b>12%E2%80%9316</b>	21 damage; pull 3
        %E2%9C%B8	<b>17</b>	25 damage; pull 6

        <b>Prismacore Cannon</b> (Action)%E2%97%86 2d10 + 5
        <b>Keywords</b> Ranged, Strike, Weapon
        <b>Distance</b> Ranged 20<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	22 damage
        %E2%98%85	<b>12%E2%80%9316</b>	29 damage; I<4 dazed (save ends)
        %E2%9C%B8	<b>17</b>	34 damage; I<5 dazed (save ends)
        <b>Effect</b> The damage can't be reduced in any way. The prismacore cannon cannot be used again until the start of the next round.

        <b>Burning Oil</b> (Action)%E2%97%86 3 Malice
        <b>Keywords</b> Area
        <b>Distance</b> 10 x 3 line within 1<b>	Target</b> All enemies and objects
        <b>Effect</b> Each target makes an <b>Agility test.</b>
        %E2%9C%B8	<b>%E2%89%A411</b>	16 fire damage; burning (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	12 fire damage; burning (EoT)
        %E2%9C%A6	<b>17</b>	8 fire damage
        <b>Effect</b> A burning target takes 1d6 fire damage at the start of each of their turns until the condition ends. The affected area becomes difficult terrain. An enemy takes 3 fire damage when they leave an affected square.

        <b>Destructive Rollout</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The war engine moves up to their speed in a straight line, automatically destroying unattended, mundane size 1 objects or walls in their path. A creature can choose to fall prone or take 10 damage the first time the war engine passes through their space during this movement.

        <b>Quickshot</b> (Free Triggered Action) %E2%97%86 2d10 + 5%E2%97%86 1 Malice
        <b>Keywords</b> -
        <b>Trigger</b> The target deals damage to the war engine.
        <b>Distance</b> Ranged 20<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	8 damage; push 2
        %E2%98%85	<b>12%E2%80%9316</b>	12 damage; push 5
        %E2%9C%B8	<b>17</b>	16 damage; push 8
        <b>Effect</b> The damage can't be reduced in any way.

        <b>Servok Siege Machine</b>
        The war engine ignores difficult terrain and deals an additional 15 damage with abilities used against objects.

        <b>Crafted to Perfection</b>
        The war engine's shape can't change via any external effects.

        <b>Valiar Might</b>
        Each power roll made against the war engine can't get higher than a tier-1 result while they aren't winded, weakened, or bleeding.

