16d3c636-0931-4851-a891-4ad5dfe03e78:
  __typeName: CharacterComplication
  drawback: Each time the artifact appears, you lose a Recovery. If you have no Recoveries remaining, you take 1d10 damage instead, which can’t be reduced in any way.
  mtime: 1755511012003
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Artifact Bonded
  ctime: 1755510962149
  description: A powerful artifact has bonded to you, though you don’t know whether you’re destined to wield the artifact or to destroy it. You’re not powerful enough to use it at the moment, although you might be someday. For now, though, the artifact has no effect beyond getting you in trouble
  id: 16d3c636-0931-4851-a891-4ad5dfe03e78
  benefit: "Choose an artifact (see Treasures in Chapter 13: Rewards). The first time in an encounter that you are reduced to 0 Stamina against your will, the artifact appears on your person. It disappears at the end of your next turn, when you benefit from one of its properties, or when you have more than 0 Stamina, whichever comes first."
