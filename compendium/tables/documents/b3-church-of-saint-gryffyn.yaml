description: B3. Church of Saint Gryffyn
content: "# B3. Church of Saint Gryffyn\n\n> * “The doors to this long house are open, revealing the inside to be a chapel set with wood benches and a modest altar.”\n> * “A small room at the back of the house serves as [Abbott Loric]’s bedroom and study—with bookshelves lining each wall and a small cot in the corner.”\n\n[Abbott Loric] greets the heroes with a smile whenever they come here, and he leaves his books available to them.\n\n## Research at the Church\n\nIf the heroes are taking a respite in Broadhurst, they’re free to use the library to do research as part of their downtime activities.\n\nWhile the heroes are here, they have project sources in Caelian that allow them to undertake the following Discover Lore projects:\n\n**Unseal the second level of the Delian Tomb (45 Project Points):** \nUpon completion of this project, the heroes learn that the second level of the Delian Tomb can be unsealed by the Amulet of the Delian Order, which is a large brass amulet that looks like a sun. Many of these amulets were acquired by an organization called the Coursers, whose members operate in secret.\n\n**Unseal the third level of the Delian Tomb (45 Project Points):** \nThe third level of the tomb can be unsealed with the Delian Knight Commander’s Ring, many of which are buried with other Caelian knights, such as Cressa. The ring is a gold band with an emerald cut like a shield.\n\n**Find the Jagged Edge hideout (45 Project Points):** \nThe heroes can look for likely places in the region where the Jagged Edge could be hiding out. When they complete this project, there are four likely places: \n\nA ruined fort out on a lake in the northwestern part of the Silver Wood (see [Fort Forsaken]). \n\nAn abandoned mage tower out near the east road (see [Mage Tower]).\n\nA cave on the bank of the Dunn River as it flows south out of town (see [Wolf Den]).\n\nOr an ancient Caelian ruined called Castle Andreas that is northeast of Broadhurst in the Silver Wood (see [Castle Andreas] in [Part 3: The Jagged Edge]).\n\n\n## Follower: Abbott Loric\n\nIf a hero has enough Renown to gain a follower and doesn’t have one, they can recruit Abbott Loric as a sage. If the heroes wish to recruit him as a sage, give them the [Abbott Loric Follower Card]..\n\n \n"
