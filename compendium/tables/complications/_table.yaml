  name: Rogue Talent
  ctime: 1755516734058
  description: You are the only survivor of a cataclysmic psionic event—an experiment gone wrong, a voiceless talker attack, or some naturally occurring phenomenon of a far-off part of the timescape. It left you with a psionic talent, but also made you vulnerable to telepathic attacks.
  id: b68b52ab-3aa6-4b9e-b608-2c63e80101e1
  benefit: |-
    You have the following ability, which you can use as a ranged free strike:
    Telekinetic Grasp
f5ecb6f1-a29d-4d83-900c-f6829309bed6:
  __typeName: CharacterComplication
  drawback: With a tier 1 outcome, you receive a painful vision that is fractal and inscrutable. When you finish the respite, you lose 1 Recovery
  mtime: 1755604177656
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Waking Dreams
  ctime: 1755518181880
  description: You broke a magic amulet, immersing your mind in weird energy that granted you the power of premonition. However, you struggle to control this new gift. Whenever you take a respite, make a Reason test to determine whether you gain this complication’s benefit or drawback.
  id: f5ecb6f1-a29d-4d83-900c-f6829309bed6
  benefit: With a tier 2 outcome, you experience a vision of an event currently happening in your world. The vision lasts for only a few seconds, but the information you glean is helpful to you. With a tier 3 outcome, the vision lasts for 1 minute or more.
f61ecccc-a709-4dc3-981c-38eb95626a69:
  __typeName: CharacterComplication
  drawback: When you lie, your honor is stained and you lose this complication’s benefit. Additionally, you take a bane on any test that uses a skill from the interpersonal skill group. You can lose the bane and regain this complication’s benefit only by doing penance, such as gaining the forgiveness of the creature you lied to.
  mtime: 1755604172065
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Vow of Honesty
  ctime: 1755517694950
  description: You were brought up to a strict standard of behavior. You cannot tell a lie
  id: f61ecccc-a709-4dc3-981c-38eb95626a69
  benefit: If a creature is of a lower level than you, you automatically know when they are lying, though you don’t necessarily know the actual truth behind their lie. Additionally, you have a double edge on any test made to persuade a creature of some specific fact.
