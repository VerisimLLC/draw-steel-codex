    import:
      type: mcdm
      data: |+
        Voiceless Talker Artillerist	Level 6 Elite Artillery
        Horror, Voiceless Talker	EV 32
        <b>Stamina</b> 140	<b>Immunity</b> psychic 6
        <b>Speed</b> 5 (teleport, hover)	<b>Size</b> 1M /<b> Stability</b> 2
        <b>Free Strike</b> 7
        Might +0	Agility +3	Reason +1	Intuition +2	Presence +1
        <b>Psionic Rifle Burst</b> (Action) %E2%97%86 2d10 + 3%E2%97%86 Signature
        <b>Keywords</b> Psionic, Ranged, Strike, Weapon
        <b>Distance</b> Ranged 10<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	11 damage
        %E2%98%85	<b>12-16</b>	19 damage; spread 1
        %E2%9C%B8	<b>17</b>	22 damage; spread 2
        <b>Effect</b> The blast hits nearby targets, dealing 3 damage to each enemy within a number of squares of the target equal to the result's spread value.
        <b>2 Malice</b> The attack deals an additional 3 damage to each enemy within the spread distance

        <b>Mind Jolt</b> (Action) %E2%97%86 2d10 + 3
        <b>Keywords</b> Area, Psionic
        <b>Distance</b> 1 x 10 line within 10<b>	Target</b> All enemies
        %E2%9C%A6	<b>%E2%89%A411</b>	6 lightning damage
        %E2%98%85	<b>12-16</b>	10 lightning damage; I<2 slowed (save ends)
        %E2%9C%B8	<b>17</b>	13 lightning damage; I<3 slowed (save ends)

        <b>In Our Sights</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 10<b>	Target</b> 1 creature
        <b>Effect</b> The next power roll with the psionic keyword made against the target will automatically be a 17 until the start of the artillerist's next turn.

        <b>Tactical Reposition</b> (Triggered Action) %E2%97%86 1 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Trigger</b> The artillerist takes damage.
        <b>Effect</b> The artillerist teleports 5 and doesn't suffer any additional effects associated with the damage.

        <b>Psionic Conductor</b>
        When a non-minion Voiceless Talker within 5 of the artillerist uses an ability with the Psionic keyword, they can do so as if they were in the artillerist's space.

        <b>Locked On</b>
        The artillerist ignores invisibility, cover, and concealment. A creature can't hide from the artillerist while the artillerist has line of effect to them.



