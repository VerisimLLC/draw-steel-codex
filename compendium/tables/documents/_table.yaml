  description: Followers, Titles, and Treasures Index
  content: "# Index\nAll of the followers, titles, and treasures in The Delian Tomb, and where to find them.\n\n## Followers\n\n* [Abbott Loric Follower Card]\n[Abbott Loric] - [B3. Church of Saint Gryffyn]\n\n* [Ashleigh Follower Card]\n[Ashleigh] - [A Mother's Plea] and [Part 1 Rewards]\n\n* [Dunquat Follower Card]\n[Dunquat] - [B13. Mason]\n\n* [Harim Follower Card]\n[Harim] - [B12. Cobbler]\n\n* [Illwyth Follower Card]\n[Illwyn] - [Gilded Hand] - [Negotiate For the Ring]\n\n* [Mikael Follower Card]\n[Mikael] - [B10. Carpenter]\n\n* [Tansy Follower Card]\n[Tansy] - [B11. Furrier]\n\n\n## Titles\n\n* [Courser Chanterelle]\nFinish [Arixx Nest] and return to [Orson] - [B9. Charcoal Burner] \n\n* [Delian Delver]\nFinish [Delian Tomb Third Level]\n\n* [Monster Bane]\nFinish [Arixx Nest]\n\n* [Queen Slayer]\nFinish Part 3 Conclusion\n\n* [Violet's Savior]\nFinish Part 1 Conclusion and save Violet\n\n* [Voice of Peace]\nFinish Part 3 Conclusion\n\n\n\n## Treasures\n\n* [Adaptive Second Skin of Toxins]\n[Mage Tower] Aftermath Reward from [Harim]\n\n* [Amulet of the Delian order]\nReward from [Orson] [B9. Charcoal Burner] for completing [Arixx Nest]\n\n* [Black Ash Dart]\n[A3. Old Armory] Loot in [Castle Andreas] \nand\n[D10. The First Trick] Loot in [Delian Tomb Third Level]\n\v* [Blade of the Luxurious Fop]\n[F2. Aldiva's Quarters] Loot from [Aldiva] in [Fort Forsaken]\n\n* [Bloodbound Band]\nLoot from Vorgosh in [D4. Stair Down]\n\n* [Buzz Balm]\n(Downtime Project) Project Source Reward from [Ellery] for completing [Arixx Nest] \n\n* [Color Cloak (Red)]\nReward from [Mikael] and [Tansy] for completing [Wolf Den]\n\n* [Cup of Iulius]\n[D14.1 Cup Room Untouched] Loot in [Delian Tomb Third Level]\nor, depending on if the Gilded Hand got there first\nLoot on [Queen Bargnot] in [Castle Andreas] in [Part 3: The Jagged Edge]\n\n* [Delian Knight Commander's Ring]\n[Illwyth]'s emerald ring. \nInterest 3-5 Reward for [Negotiating for the Ring]\nor\nReward for [Grabbing the Ring]\n\n* [Foesense Lenses]\n(Downtime Project) Recipe and Project Source Loot from Vorgosh in [D4. Stair Down] \n\n* [Giant's-Blood Flame]\n(Downtime Project) Recipe and Project Source Loot from [D9. Treasury] in [Delian Tomb Second Level] \n\n* [Growth Potion]\nLoot from [Mage Tower] Third Floor\nand\n(Downtime Project) Project Source Loot from [W2. Saera's Lair] in [Wolf Den] \n\n* [Healing Potion]\nLoot in [D1. Offering Room]\nand \n(Downtime Project) Project Source Loot from [D1. Offering Room]\nand\nLoot in [D6. Hall of Triumph] in [Delian Tomb Second Level]\nand \n(Downtime Project) Project Source Loot from [Mage Tower] Third Floor\nand \nInterest 5 Reward for [Negotiation with Thurston] in [Fort Forsaken]\n\n* [Heelcutter]\nLoot from [D9. Treasury] in [Delian Tomb Second Level] \n\n* [Imp's Tongue]\nLoot from [D5. Sarcophagus Chamber] in [Delian Tomb Second Level] \n\n* [Lachomp Tooth]\nLoot from [D8. Obelisk Chamber] in [Delian Tomb Second Level] \n\n* [Mirror Token]\nInterest 5 Reward for [Vurkor Negotiation] in [Mage Tower]\nor\nLoot from [Vurkor] in [Mage Tower]\n\n* [Portable Cloud]\n(Downtime Project) Project Source Loot from [Mage Tower] Third Floor\n\n* [Quantum Sachel]\n(Downtime Project) Project Source Loot from [Dunquat] for completing [B14. Stables and Carriage House] The Getaway successfully. \n\n* [Revenger's Wrap]\n[D14.1 Cup Room Untouched] Loot in [Delian Tomb Third Level]\nor, depending on if the Gilded Hand got there first\n[D14.2 Cup Room Raided] Loot from [Mara] in [Delian Tomb Third Level]\n\n* [Shrouded Memory]\nLoot from [Queen Bargnot] in [Part 3: The Jagged Edge]\n\n* [Snapdragon]\nLoot from [D8. Obelisk Chamber] in [Delian Tomb Second Level] \nand\nReward from [Vaughn] in [B6. Woodcutter] for not reporting Percival\n\n* [Unbinder Boots]\n[Mage Tower] Aftermath Reward from [Murkik]\nor \n[Negotiating With Murkik] Interest 5 Reward.\n\n* [Unblinking Candle]\n(Downtime Project) Project Source Loot from [D7. Hall of Regret] in [Delian Tomb Second Level] "
