    **Encounter Adjustments**
    If this encounter has more or fewer than five heroes, make the following adjustments:
    * For six heroes, add two **skeletons**.
    * For four heroes, remove two **ghouls**. The **sigil** has 40 Stamina (see [Skull Sigil]).
    * For three heroes, remove four **ghouls**. The **sigil** has 20 Stamina (see [Skull Sigil]).


    ## New Rules: 5-Cost Heroic Abilities

    When combat begins, share the following information with the players:

    > * “Take a look at your hero’s sheet and note any features or abilities you gain for this, the third encounter.”
    > * “All of you have a new heroic ability that costs 5 resources! Now you’ve got lots of stuff to spend your resources on.”

    Then [Draw Steel!]


    ## Tactics

    These undead are mindless and lack tactical thinking. Each undead creature targets the enemy nearest to them. The ghouls run into the fray, leaping at targets to knock them down. Skeletons remain at range to shoot targets with their bows. At the start of their turn, the zombies use their Zombie Dust action as Malice allows, so they can stand after using it. These undead have the Arise or Endless Knight trait, which
    allows them to get up and keep fighting the first time they are reduced to 0 Stamina!

    The undead don't leave this room.


    ## Skull Sigil

    See [Skull Sigil].


    ## Ending the Encounter
    The undead fight until destroyed. If the heroes destroy the undead or the skull sigil, they earn 1 Victory each.

    [[/awardvp 1 |Award Heroes 1 Victory]]

    ## Secret Door

    The statue is a magic object connected to a secret door behind it. A hero who examines the area behind the statue can make a Reason test.

    |Find the Secret Door: Reason Test
    |{#The hero finds a secret door behind the statue}{; however, they make so much noise while searching that the goblins in D4. Stair Down are ready for the heroes when they arrive. The goblins get to act first in combat.}
    |{#The hero finds a secret door behind the statue.}
    |{#The hero finds a secret door behind the statue and does so
    with such skill and grace that they can catch the goblins in
    D4. Stair Down surprised.}

    This secret door leads to [D4. Stair Down].

    ### Riddle of Delius

    The secret door also reveals itself if the heroes speak aloud the answer to the riddle carved beneath the statue while in this chamber. The answer is “bravery”, “courage”, or a similar synonym. Anything along those lines works. Solving the riddle allows the heroes to approach [D4. Stair Down] silently. If they do, they catch the goblins surprised.

    They can’t approach silently and catch the goblins surprised if they open the door during combat.


  description: D3. Hall of the Brave
