  content: |
    # Fort Forsaken

    The Forsaken Wraiths are a bandit crew stealing food from Broadhurst and planning a violent raid. The bandits have established a stronghold, which they call Fort Forsaken, on an island at the center of a lake in the Silver Wood. The heroes must get to the island and infiltrate the fort to end the bandits’ mayhem. A head-on assault is very dangerous, but sneaking or bluffing their way into the fort can pay dividends. A power struggle between two bandit leaders gives the heroes an opportunity to end the bandits’ reign of terror with minimal bloodshed.

    The heroes can learn the location of Fort Forsaken from [Brune] the Butcher (see [B8. Butcher]) or by questioning a bandit after they raid the village (see [Wraith Raid] in [Events]).

    This quest uses the [Fort Forsaken Map].


    ## What Do the Forsaken Wraiths Know?

    If the heroes capture or question a Forsaken Wraith, the bandit provides the following information in exchange for their life. No test is required to gain this information from a bandit who knows they’ve been beaten:

    * [Aldiva] leads the Forsaken Wraiths. She is a brutal, effective leader.

    * [Thurston], an older human, has seemed unhappy with [Aldiva]’s leadership recently. He’s got some supporters, and they’re whispering of a mutiny.

    * Several months ago, the Forsaken Wraiths discovered one of their members, [Saera], was cursed with lycanthropy and had become a werewolf. Aldiva banished Saera, hoping the werewolf would haunt the woods outside of Broadhurst and stir up chaos and confusion in the village, making them more vulnerable to raids.(see [Wolf Den])
  description: Fort Forsaken
