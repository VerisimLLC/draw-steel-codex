      description: "After a basilisk dies, a character can make a Reason test to claim oil from the basilisk's mouth, which can be used to create a special salve. One dose of salve can be applied to a petrified creature as a main action, and 1 minute after the salve is applied, that creature is no longer petrified.!The character must complete the Find a Cure down time project in Draw Steel: Heroes to create one dose of salve.@The character creates one dose of salve and can create two more doses by completing the Find a Cure downtime project.#The character creates three doses of salve."
