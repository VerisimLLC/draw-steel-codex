      > * “Speaking of danger, [Mikael] the carpenter was attacked by some kind of creature in the forest when he decided to get wood after [Vaughn] refused. Between those two things and [Tansy], the furrier, getting their traps broken—mark my words, something dangerous and not humanoid is in Silver Forest.”
