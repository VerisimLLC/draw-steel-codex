      HEE: |
        * “Remnants of spoiled food and silk-bound carcasses lay under a hole in the back part of the cavern ceiling.”
      DAA: |+
        Heroes chasing Queen Bargnot into the cavern from [A5. War Room] appear near the hole in the ceiling. The queen has an opportunity to hide before her pursuers arrive. When the encounter continues, any goblins who didn’t retreat from the war room come down from the ceiling one per turn at a time but are reduced to 1 Stamina.

      QIN: |+
        |{#The creatures won’t attack unless harmed first. This effect lasts for 10 minutes outside of combat or until the end of the next round in combat.}



