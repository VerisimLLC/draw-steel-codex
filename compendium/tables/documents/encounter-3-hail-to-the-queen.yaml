textStorage:
  __typeName: TextStorage
  sections:
    NGT: |+
      [[encounter:Hail to the Queen QB]]

    ed: |+
      Queen Bargnot uses her Handaxe ability to allow the spiders to make free strikes. She and the snipers remain atop the spiders to maintain high ground, gaining an edge on strikes against creatures below them.

    "on": |+
      ## Ending the Encounter

    kj: |
      The spiders target clusters of heroes with Web. If they have sufficient Malice, they use Trample to harm as
    ih: |
      The goblin runners leap from the backs of the war spiders to get the benefit of the war spiders’ Ride Launcher trait. They spread out to attack as many heroes as possible. 
    cb: |+
      ## Tactics

    qp: |
      The goblins fight until Queen Bargnot and one of the war spiders are reduced to 0 Stamina, then they flee. The heroes earn 2 Victories each for winning the day.
    PI: |
      |**Group** |**Creatures**|
    sr: |+
      [[/awardvp 2|Award Heroes 2 Victories]]


    aY: |+
      ## Well

    VO: |
      |6 |Eight [goblin runners] (riders; minion squad)|
    NGe: |
      ## Queen Bargnot has the Cup of Iulius
    LE: |+
      The heroes battle Queen Bargnot and her giant war spiders in the village square of Broadhurst.

    JC: |
      > *  “Goblins ride atop platforms on each giant arachnid. One goblin with long white hair wears a gold crown upon her head.”
    NG: |+
      [[encounter:Hail to the Queen]]

    HA: |2

    YV: |
      * For four heroes, remove a group of eight goblin snipers.
    XT: |
      * For six heroes, add a group of eight goblin runners not riding a war spider.
    yz: |2+


    ww: If Queen Bargnot has the [item:Cup of Iulius], she brings it with her to the battle. She wears [item:Shrouded Memory] armor.
    yzZ: See [Part 3 Conclusion]
    G: |
      # Encounter 3: Hail to the Queen
    SL: |
      |3 |One [war spider] (mount)|
    IB: |
      > * “Two enormous spiders, their legs covered in blades, trample their way into the eastern and western sides of the square.”
    NGp: |+
      [[encounter:Hail to the Mystic Queen QB]]

    ZX: |+
      * For three heroes, remove a group of eight goblin snipers and a group of eight goblin runners.


    ut: |+
      ## Loot

    NGJ: |
      ## The Heroes have the Cup of Iulius
    gf: |+
      Queen Bargnot stays adjacent to an ally so she can continue to use Meat Shield. She also spends Malice on each of her turns to use Get in Here.

    RK: |
      |2 |One [war spider] (mount)|
    QJ: |
      |1 |One [goblin monarch] (Queen Bargnot; rider)|
    NGu: |+
      *Place down the relevant Monsters, and then mount up the goblins by dragging them into the mount slots*

    TM: |
      |4 |Eight [goblin snipers] (riders; minion squad)|
    ml: |+
      many creatures as possible.


    LEZ: |+
      [[/activateobjects e23_start.AreaTemplate activate|Show Hero Start Area]][[/activateobjects e23_start.AreaTemplate deactivate|Hide Hero Start Area]]


    bZ: |+
      The well at the center of the town is 4 squares deep and has less than 1 square of water in it.


    VP: |+
      |7 |Eight [goblin runners] (riders; minion squad)|

    UN: |
      |5 |Eight [goblin snipers] (riders; minion squad)|
    WR: |
      If this encounter has more or fewer than five heroes, make the following adjustments:
    MF: |+
      [[setting:Number of Heroes]]

    KD: |+
      > *  “She stands up and cries out, ‘Let me meet the so-called heroes of Broadhurst! I’d like to introduce them to their doom.’”


    VQ: |
      **Encounter Adjustments**
    yzm: |2+






