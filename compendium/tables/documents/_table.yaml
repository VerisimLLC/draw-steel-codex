  content: |-
    # Dalrath and the Timescape

    Broadhurst is in the barony of Dalrath, ruled by the benevolent Lord Kenway. An occasional monster or threat of war emerges from the wodes and mountains that surround the barony, but most folks in the region live simple, mundane lives. Dalrath is part of Vasloria, a continent on the world of Orden. Orden is just one world in a vast universe of magic and metaphysics called the timescape.

    This adventure takes place entirely in and around Broadhurst, so you can feel free to change the world where the village is set to suit your needs.
  ctime: 1763039693931
