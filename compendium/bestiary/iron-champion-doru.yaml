    import:
      type: mcdm
      data: |+
        Iron Champion Doru	Level 10 Elite Brute
        Humanoid, War Dog	EV 48
        <b>Stamina</b> 260
        <b>Speed</b> 5	<b>Size</b> 1L /<b> Stability</b> 2
        <b>Free Strike</b> 10
        Might +5	Agility +4	Reason +1	Intuition +4	Presence +2
        <b>Houndaxe</b> (Action) %E2%97%86 2d10 + 5%E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>	Target</b> Two creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	15 damage
        %E2%98%85	<b>12-16</b>	21 damage; Doru gains an edge on his next power roll; M<4 slide 3
        %E2%9C%B8	<b>17</b>	25 damage; Doru gains a double edge on his next power roll; M<5 slide 5
        <b>Effect</b> The damage can't be reduced.
        <b>3 Malice</b> This ability targets an additional creature or object.

        <b>Bloody Whirlwind</b> (Action) %E2%97%86 2d10 + 5%E2%97%86 2 Malice
        <b>Keywords</b> Area, Melee, Weapon
        <b>Distance</b> Melee 3<b>	Target</b> All creatures and objects
        %E2%9C%A6	<b>%E2%89%A411</b>	5 damage; A<3 bleeding (save ends)
        %E2%98%85	<b>12-16</b>	11 damage; A<4 bleeding (save ends)
        %E2%9C%B8	<b>17</b>	15 damage; A<5 bleeding (save ends)
        <b>Effect</b> Doru deals an additional 5 damage for each winded target in the area.

        <b>Hunting Leap</b> (Maneuver)
        <b>Keywords</b> Attack, Melee, Weapon
        <b>Distance</b> Ranged 5<b>	Target</b> one creature or object
        <b>Effect</b> Doru jumps to an unoccupied square adjacent to the target, then makes a free strike against them. If the target is winded or bleeding, the distance is Ranged 10 and the free strike deals an additional 5 damage.

        <b>Laugh it Off</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Trigger</b> An enemy makes a strike against Doru.
        <b>Effect</b> Doru imposes a bane on the strike and gains an edge on his next power roll.

        <b>Leaving Already?</b> (Free Triggered Action)
        <b>Keywords</b> Attack, Melee, Weapon
        <b>Distance</b> Melee 2<b>	Target</b> one enemy
        <b>Trigger</b> An enemy triggers an opportunity attack from Doru
        <b>Effect</b> Doru's opportunity attack deals an additional 5 damage and the target is <b>A<4</b> slowed (EoT).
        <b>1 Malice </b>Doru shifts up to 2 squares.

        <b>Iron Juggernaut</b>
        Doru is immune to the effects of the slowed and restrained conditions. Doru may move while grabbed, and the creature grabbing him moves along with him unless they choose to let go.

        <b>The Scarless</b>
        Doru regenerates 10 Stamina at the beginning of his turn unless he was dealt fire or acid damage the previous round. Whenever he regains Stamina this way, he can spend 2 malice to end one save ends condition on himself.

        <b>Champion's Loyalty Collar</b>
        When Doru dies, he explodes, dealing 4d6 damage to each enemy within 3 spaces.

