description: Part 1 Conclusion
content: |-
  # Conclusion

  ## Loot

  Vorgosh wears a [item:Bloodbound Band] and carries a second [item:Bloodbound Band] in her robes that she planned to give to a worthy apprentice (once she found one). She also carries [Lenses carved from Volcanic Glass](item:Lenses carved from Volcanic Glass) two clear lenses carved from volcanic glass and a recipe in Caelian that describes how to make [Foesense Lenses] and counts as a project source for that item.

  ## Part 1 Conclusion

  If the heroes manage to rescue Violet, a grateful Ashleigh and her daughter thank the heroes, showering them with praise. If the goblins are defeated, but Violet doesn’t survive the ordeal, Ashleigh thanks the heroes for their efforts with blame aimed only at the Jagged Edge. 

  In any case, Ashleigh asks the heroes for an escort back to Broadhurst, since there could be more trouble on the road.

  ## Hero Update
  When part 1 concludes, give the players the following information:
  * “Now that we’ve finished part 1 of the adventure, take a look at your sheet and your end of part 1 updates that should be made to your hero.”
  * “With these new features and abilities, you now have a fully fleshed out 1st-level hero that you can use in future parts of the adventure.”
  * “The tutorial section of this adventure is over. There are more rules to this game, which can be reviewed in the Starter Rules document that comes with this adventure.”

  [Part 1 Rewards]

  ---


  # Call for a Break

  If this is your first time running a game of Draw Steel, this is a good spot to stop the session if you’ve been playing for a few hours. If you haven’t yet, review the Starter Rules book ([Delian Tomb Starter Rules v1.02]) before continuing the game.


  ## Continuing the Story 

  When the heroes make it back to Broadhurst, proceed with [Part 2: Broadhurst and Environs].
