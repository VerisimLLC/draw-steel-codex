  name: Self-Taught
  ctime: 1755516930892
  description: While your peers were learning their trades in fancy schools, you honed your capabilities on the mean streets with nothing but your own instinct as a guide. What you lost in polish and tactical acumen, you now make up for in raw power.
  id: 98ea8988-0c8b-4e35-b517-ad47699b5f9d
  benefit: At the start of each of your turns during combat, you can forgo gaining your Heroic Resource until the start of your next turn. If you do, your strikes gain a damage bonus equal to your highest characteristic score until the start of your next turn.
f5b14d27-cde7-48f3-8bb5-bbbc993d3b16:
  __typeName: CharacterComplication
  drawback: Out of combat, you use your Stone Eyes ability on anyone who meets your gaze, whether you intend to or not. Your companions know not to make eye contact, but strangers are likely to trigger the ability unless you cover your eyes.
  mtime: 1755516131090
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Medusa Blood
  ctime: 1755516075774
  description: |+
    Your mother and father never saw eye to eye. You know this because your father is still alive and your mother is a medusa. This made your childhood difficult, and now it’s making your adulthood complicated as well.

  id: f5b14d27-cde7-48f3-8bb5-bbbc993d3b16
  benefit: |-
    You have the following ability:
    Stone Eyes
4c078ae2-4260-4d78-a739-0be216eb31cd:
  __typeName: CharacterComplication
  drawback: Whenever you take damage, your face becomes blank, with no eyes, nose, mouth, or ears. This doesn’t affect your senses or your ability to speak. Your face doesn’t return until you use the benefit of this complication to restore it.
  mtime: 1755604134630
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Stolen Face
  ctime: 1755517257531
  description: An evil fairy cursed you, leaving you with a blank visage instead of a face. Although you’re able to imitate other peoples’ features, you’d like to have your own back.
  id: 4c078ae2-4260-4d78-a739-0be216eb31cd
  benefit: You can spend 5 uninterrupted minutes to rearrange your face to resemble the face of another creature of your ancestry who you’ve observed before. You have a double edge on tests made to impersonate that creature or to disguise your identity. You are unable to change your hair or other nonfacial features.
389e83c3-a941-4789-81e5-3ec42f028688:
  __typeName: CharacterComplication
  drawback: Outside of combat, your retainer is under the Director’s control. The retainer sometimes acts without orders—always with your best interests at heart, but often in embarrassing or inconvenient ways.
  mtime: 1755516011675
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Meddling Butler
  ctime: 1755516011675
  description: You’re not sure what you did to deserve it, but for some reason, your family saddled you with an old, trusted, and extremely irritating family servant. They’re supremely competent, of course, but they sometimes seem to forget who’s in charge.
  id: 389e83c3-a941-4789-81e5-3ec42f028688
  benefit: "You have a retainer, in addition to any followers you acquire through Renown or other means. As usual, you can have only one retainer in your service at a time. (See Renown in Chapter 13: Rewards and Retainers in Draw Steel: Monsters)."
