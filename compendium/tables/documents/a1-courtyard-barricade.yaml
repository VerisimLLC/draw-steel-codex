  sections:
    yR: |+
      ## Ending the Encounter

    Ji: |+
      [[/activateobjects a1_a3_teleporter activate|Enable Teleporter]] [[/activateobjects a1_a3_teleporter deactivate|Disable Teleporter]]
      }

    y: |+
      |{#The creature manages to get out of the way. They move up to their speed to the nearest unoccupied square of their choice outside of the affected area. If they can't move to such a space, treat this as 12–16.}

    yw: |+
      See [A3. Old Armory]




















    x: |
      |{#The creature is battered by debris. They take 6 damage.}
    u: |+
      When a tower falls, each creature within 10 squares of the tower must make an Agility test. Each affected goblin has an edge on the test.

    ys: |+
      |{#The ivy climbs all the way into the window into A3. Old Armory. It can be climbed with little effort if the tower isn’t in the way. If the heroes climb in this way, they catch the goblins inside surprised.}


    s: |+
      ## Tilted Towers

    t: |+
      The beams supporting the tower were made to fall apart. A creature can use their main action to remove a tower's beams and then move out of the way. Alternatively, the beams can be destroyed after taking 6 or more damage.

    q: |+
      ## Archer’s Stakes

    r: |+
      The courtyard is surrounded by archer's stakes pointing both inward and outward.


    o: |
      **1 or 2 Respites**
    p: |+
      [[encounter:A1 1 Respite]]



    m: |
      **0 Respites**
    n: |+
      [[encounter:A1 0 Respites]]


    k: |+
      [[encounter:A1 Heroes's Cup]]



    l: |+
      ### If Queen Bargnot Has the Cup of Iulius


    yF: |+
      ## Tactics

    g: |+
      This, and all following encounters, change depending on if the Heroes or [Queen Bargnot] has the [item:Cup of Iulius]. See [Goblin Replacements] for more information.

    h: |+
      For this encounter, the **goblin snipers** have been placed down already as to be invisible when combat starts. 

    e: |
      * For four heroes, remove six goblin runners and one goblinunderboss.
    f: |+
      * For three heroes, remove six goblin runners, one goblin underboss, and two goblin warriors.

    yg: |2

    d: |
      * For six heroes, add one group of six goblin runners and one goblin underboss as their captain.
    a: |+
      |5|Two [goblin warrior]s|

    b: |
      **Encounter Adjustments**
    yU: |+
      At the end of the third round, any remaining goblins in the courtyard retreat inside the keep, while the snipers and stinkers flee, ending the encounter. The heroes earn 2 Victories each.

    Y: |
      |3|Six [goblin sniper]s (minion squad), Six [goblin sniper]s (minion squad)|
    Z: |
      |4|Two [goblin warrior]s|
    W: |
      |1|One [goblin underboss] (captain), Six [goblin runner]s (minion squad)|
    X: |
      |2|One [goblin underboss] (captain), Six [goblin runner]s (minion squad)|
    U: |
      **A1 Groups**
    V: |
      |**Group**|**Creatures**|
    S: |+
      ## Encounter A1

    T: |+
      The heroes battle Jagged Edge soldiers in the courtyard of Castle Andreas.

    Q: |+
      :<> [[sound:bugle02]]

    R: |+
      Alternatively, the goblin disappears into the keep if the heroes are willing to cooperate, and 10 minutes later, the bugbear from area [A2. Great Hall Barracks] exits the main doors to escort them inside (see [Coming to Terms]).


    O: |+
      Twelve **goblin runners** (excluding the lookout), two **goblin underbosses**, and four **goblin warriors** brandish their weapons. Twelve **goblin snipers** prepare in secret underneath the tower heaps. They attack when the bugle is sounded a second time or combat begins.

    P: |+
      The lookout plays the bugle again and retreats to area [A5. War Room] if a hero responds with anything other than surrender or a desire to negotiate. 

    M: |+
      :<> [[sound:bugle01]]

    N: |+
      The lookout shouts out to the heroes in Caelian, *“If you draw steel, we will show no mercy!”* and waits for their response.

    K: |
      # Enemies
    L: |+
      Should the heroes take a direct approach, the **goblin runner** on top of the keep sounds a bugle once, calling all the goblins below to attention. 

    yd: |+
      A hero who actively investigates the ivy can make a moderate Reason or Intuition test. If the left tower fell, they have an edge on the test.

    yp: |
      |{#The hero finds a way up that reaches up to just below the window into A3. Old Armory. If the tower isn’t in the way, a hero can make it into the room, but the effort requires spending a Recovery.}
    G: |
      > * “The fortress reaches high into the air with crumbling windows marking each floor inside. Ivy creeps and crawls up its base despite visible efforts to stop it.”
    H: |+
      > * “Goblins patrol the courtyard and hang from the keep’s walls at the ready. A lone runt of a goblin cradles his bugle on top of the keep.”

    E: |
      > * “The remaining two towers flanking the keep have lost many of their bricks and sag inward towards the courtyard. Wooden beams only barely hold them up.”   
    yI: |
      When the heroes cross the threshold into the courtyard, the goblins have two approaches. The underbosses command the runners to push the heroes toward the edges of the maps and into the stakes.
    C: |
      > * “Mottled white wooden stakes arc the front of the old castle.”
    D: |
      > * "Lines of rubble outline where the courtyard used to sit. Two large heaps of stone, masonry, and broken arrows rest at the end of these lines where two castle towers used to stand.”
    B: |+
      # A1. Courtyard Barricade

    yX: |+
      [[//awardvp 2|Award Heroes 2 Victories]]



    ym: |
      |{#The ivy reaches an arduous way up the wall, barely within reach of the window into A3. Old Armory. If the tower isn’t in the way, a hero can climb into the room but the effort requires spending a Recovery. The goblins within are alerted to the hero and can’t be surprised.}
    ya: |
      ## Exposed Ivy
    yL: |+
      The snipers start combat hidden in the heaps and open fire when the heroes least expect. If the heroes are particularly tough, the goblins lure the heroes toward the towers.

    TZ: |+
      [[/activateobjects a1_start.AreaTemplate activate|Show Hero Start Area]][[/activateobjects a1_start.AreaTemplate deactivate|Hide Hero Start Area]]

    yC: |+
      The affected area becomes difficult terrain.


    JQ: |
      {**Secret:** If the left tower falls, the window into [A3. Old Armory] can be accessed by climbing the ivy on the wall.
    yj: |
      |Examine Ivy: Reason or Intuition Test 
    F: |
      > * “The courtyard is overgrown and uneven with natural knolls disrupting the remnants of an old walkway. Near the right tower, the earth sinks into a muddy pit.”
    v: |
      |Falling Tower: Agility Test
    J: |+
      [[/activateobjects a1_a6_teleporter activate|Enable Teleporter]] [[/activateobjects a1_a6_teleporter deactivate|Disable Teleporter]]
      }

    I: |
      {**Secret:** The muddy pit hides a wooden flap door that leads to the spider nest in [A6. Spider Nest]. A hero who searches the pit finds it.
    c: |
      If this encounter has more or fewer than five heroes, make the following adjustments:
    j: |+
      ### The Heroes Have The Cup of Iulius


    yO: |+
      The warriors knock down one tower per round trying to hit as many heroes as possible. Afterward, they target any opponents caught in the rubble.


    w: |
      |{#The creature is crushed under the rubble. They take 9 damage and is restrained (save ends).}
