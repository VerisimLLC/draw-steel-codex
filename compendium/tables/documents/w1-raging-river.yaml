description: W1. Raging River
content: |-
  # Cave Features

  The cave has the following features:

  > * **Ceilings**: The ceilings in the rooms are 3 squares high.
  > * **Illumination**: The water within the cave magically glows thanks to its connection to Quintessence, illuminating each area.

  ## W1. Raging River

  > * The cave opening becomes a tunnel, which travels downward, finally opening into a cavern bisected by a raging river.
  > * “A 60-foot-wide river cuts this larger cavern in two. A passage leads out of the cavern on the opposite shore.”
  > * “Small islands of wet rock dot the river: some are flat and round, some are jagged and sharp.”

  > * “The noise of the rapidly flowing river is deafening.”

   **Secret:** Several water wolves, elemental creatures made of water that look like predatory canines, hide beneath the river’s surface.

  ## Water Wolves

  The water wolves pass back and forth between this plane and Quintessence through this river. They feel a kinship to [Saera], and they allow her to pass and use these caves as a lair. They are not so amicable to others.

  A hero observing the river can make a moderate Intuition test.

  |Find the Water Wolves: Intuition Test
  |{#The heroes don’t notice the wolves and are surprised at the start of the encounter.} 
  |{#The heroes and wolves notice each other at the same time. No one is surprised.}
  |{#The heroes notice the wolves before the wolves notice them. The wolves are surprised at the start of the encounter.}

  The river contains one **essence of change**, two **sudden downpours**, and sixteen **flows of the river**

  ## Encounter W1

   The heroes battle water wolves in an elemental cave.

  ## River
  The river flows west to east at a rapid pace and is only 5 squares deep. A creature without a swim speed who enters the water or starts their turn in it must make a Might test:

  |Enter or start your turn in the Water: Might Test
  |{#The creature is pushed 3 squares to the east and their speed becomes 0 for the rest of this turn.}
  |{#The creature is pushed 3 squares to the east.}
  |{#No Effect.}

  Creatures pushed into a stone or cave wall take damage from the forced movement as normal. The river flows through an opening on the east wall that is too small for any creature to be forced through.

  If a creature can't automatically swim at full speed while moving, their power rolls take a bane while they are fully submerged in the water.

  If there are no enemies here, the heroes can cross the river carefully without needing to make any tests.

  ## Tactics
  The wolves do everything they can to move and keep the heroes in the water, so the heroes take banes on their power rolls for being submerged. They use Pack Formation to keep up with heroes who are pushed down the stream, and stick together to gain the benefit of their Pack Strong trait.

  The wolves don't pursue heroes who leave this chamber, but they do stay on guard and attack again if the heroes re-enter.

  ## Combat

  Allow easy adjustment of the number of heroes to balance for:

  [[setting:Number of Heroes]]

  [[encounter]]

  When you are ready, [Draw Steel!]

  ## Tactics

  The wolves do everything they can to move and keep the heroes in the water, so the heroes take banes on their power rolls for being submerged. They use Pack Formation to keep up with heroes who are pushed down the stream, and stick together to gain the benefit of their Pack Strong trait. 

  The wolves don't pursue heroes who leave this chamber, but they do stay on guard and attack again if the heroes re-enter.

  ## Aftermath and Rewards

  End Combat once the battle is over.

  The heroes gain 1 VP if they win the battle.

  [[/awardvp 1|Award Victories]]
