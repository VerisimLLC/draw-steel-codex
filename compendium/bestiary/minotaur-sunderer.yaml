      data: |+
        Minotaur Sunderer	Level 3 Elite Brute
        Accursed, Humanoid, Minotaur	EV 20
        <b>Stamina</b> 120
        <b>Speed</b> 6	<b>Size</b> 2 / <b>Stability</b> 2
        <b>	Free Strike</b> 6
        Might +2	Agility +1	Reason 0	Intuition +2	Presence -1
        <b>Spiked Maul</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Charge, Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	8 damage; pull 1
        %E2%98%85	<b>12%E2%80%9316</b>	12 damage; pull 2
        %E2%9C%B8	<b>17</b>	15 damage; pull 3
        <b>Effect</b> A target is grabbed if they are pulled adjacent to the sunderer.

        <b>Fearsome Bay </b>(Action) %E2%97%86 2d10 + 2 %E2%97%86 5 Malice
        <b>Keywords</b> Area
        <b>Distance</b> 3 burst<b>	Target</b> All enemies in the burst
        %E2%9C%A6	<b>%E2%89%A411</b>	I<0 frightened (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	I<1 frightened (save ends)
        %E2%9C%B8	<b>17</b>	I<2 frightened (save ends)
        <b>Effect</b> The minotaur has damage immunity 2 and deals an additional 5 damage with their strikes until the end of their next turn.

        <b>Disemboweling Horns </b>(Maneuver) %E2%97%86 2d10 + 2 %E2%97%86 3 Malice
        <b>Keywords</b> Charge, Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>Target</b> 1 grabbed creature
        %E2%9C%A6	<b>%E2%89%A411</b>	5 damage; push 1; M<0 bleeding (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	8 damage; push 3; M<1 bleeding (save ends)
        %E2%9C%B8	<b>17</b>	9 damage; push 5; M<2 bleeding (save ends)
        <b>Effect</b> The target takes 1d6 damage at the start of each of their turns while bleeding from this ability.

        <b>Retaliatory Gore</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Trigger</b> The sunderer takes damage from a creature within 6.
        <b>Distance</b> Self	<b>Target</b> Triggering creature
        <b>Effect</b> The sunderer charges the target using Spiked Maul.

        <b>Minotaur Sense</b>
        The sunderer cannot get a result lower than tier 2 when making Tests to navigate, search, or seek.



