description: B12. Cobbler
content: |+
  # B12. Cobbler


  > * “This small shop has a sign carved with a shoe outside.”
  > * “Within, a human hunches over a table of leather-working tools and scraps, repairing a shoe.”


  [Harim] the cobbler is exhausted. As the only cobbler in town, they work long hours to keep everyone’s feet covered and safe. The cobbler tends to keep answers short and gets exasperated with longer conversations and people who don’t cut to the point, but they are grateful if the heroes offer help.


  ## Missing Merchants

  If the heroes ask [Harim] about the shipment of leather or if the cobbler needs help, they reply with the following information:


  > * “I’m almost out of leather I need to make and repair shoes and boots.”
  > * “Forbin, a leather merchant from Wend, was supposed to arrive here by the east road seven days ago, but the caravan never came.”
  > * “If you can go scout the east road for Forbin and the leather, I’d be forever grateful.”

  If the heroes search the road, they find several empty merchant wagons parked outside of a ruined mage tower (see [Mage Tower]).


  ## Follower: Harim
  If a hero has enough Renown to gain a follower and doesn’t have one, they can recruit [Harim] as an artisan. If they do, give them the [Harim Follower Card].

