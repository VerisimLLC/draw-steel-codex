47ffe837-3036-4e79-9035-64ddd535b605:
  __typeName: Deity
  mtime: 1754151185467
  group: Heroes of the Elves
  name: The Taste of Morning
  description: |-
    The Taste of Morning, also known as the Librarian. Credited with building the first library, most scholars consider this a real, historical event (never a certainty with the tales of the legendary heroes) and adventurers through all ages have sought this legendary building. If, indeed, it was a building.
    He canonized the idea that knowledge, truth, was a kind of beauty. The Library of Morning was a temple to thought, wisdom, scholarship. It contained plays, poems, histories, treatises on the nature of reality. The knowledge held within was incalculable. Legends say it held codices written by the elder dragons, though modern scholars suspect this is a literary conceit, as there is no evidence the elder dragons bothered with writing.
