content: "# Encounter D14.2	\nThe heroes face the [Gilded Hand] in the Delian Tomb.\n\n[[/spawn Mara -23 7; spawn \"Boddorff Buckfeather\" -17 6; spawn Gorek -16 6|Spawn The Gilded Hand]]\n\n**D14.2 Groups**\n|Group	|Creatures|\n|1|Boddorff Buckfeather|\n|2|Gorek|\n|3|Mara|\n \n**Encounter Adjustments**\nIf this encounter has four or three heroes, make the following adjustments:\n* For four heroes, remove Boddorff Buckfeather from the start of the encounter.\n* For three heroes, remove Boddorff Buckfeather, and reduce Gorek's\nStamina to 80 and Mara's Stamina to 40.\n\n\n## Braziers\n\nEach time a creature touches a heavy iron brazier or starts their turn touching it, they take 2 fire damage.\n\n\n## Stairs\n\nIf a creature is force moved down the stairs, they end their movement prone.\n \n\n## Tactics\n\n[Gorek] applies a “King of the Hill” strategy to the fight, using the Knockback maneuver and Brutal Impact to force foes back down the stairs when they approach. Meanwhile, [Boddorff] stands well back, buffing [Gorek] with Imbue with Might, and throwing holy damage at the heroes. [Mara] stands back and uses ranged abilities to damage as many heroes as possible.\n\n\n## Ending the Encounter\n\nWhen only one member of the [Gilded Hand] remains, that member surrenders and tells the heroes everything they know, including the location of [Queen Bargnot] in the ruins of [Castle Andreas] (see [Part 3: The Jagged Edge]). The heroes earn 1 Victory each for winning the day.\n[[/awardvp 1|Award Heroes 1 Victory]]\n\n"
description: Encounter D14.2
