        <b>Effect</b> Restrained targets and targets restrained by this ability are pulled 3. A target restrained by a dwarf can be pulled by this ability.

        <b>Stunning Blast</b> (Maneuver) %E2%97%86 2d10 + 2 %E2%97%86 3 Malice
        <b>Keywords</b> Area, Melee, Weapon
        <b>Distance</b> 3 burst<b>Target</b> All enemies in the burst
        %E2%9C%B8	<b>%E2%89%A411</b>	3 lightning damage; A<0 slowed (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	6 lightning damage; A<1 slowed (save ends)
        %E2%9C%A6	<b>17</b>	8 lightning damage; A<2 slowed (save ends)

        <b>Cupola</b>
        Three of the war walker's size 1 allies can occupy the same space while riding the war walker. Riders have cover against attacks that target them.

        <b>Mobile Prison Harness</b>
        Slowed or restrained creatures adjacent to the war walker become restrained (save ends) and have a bane on all power rolls. Adjacent restrained creatures are automatically moved with the war walker, ignoring stability.


        Retainer
