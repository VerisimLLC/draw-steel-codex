        name: Abyssal Rift
        guid: b1840ad4-ebcf-41f9-af3a-4e226e6404e7
        description: |-
          Any demon can use an abyssal rift as a portal to another abyssal rift in the encounter, moving into any space in one rift and appearing immediately in any unoccupied space in the other rift. A non-demon who enters a rift for the first time in a round or starts their turn there takes corruption damage equal to the level of the highest-level demon on the encounter map. 

          An abyssal rift is an immovable object that has 25 Stamina, damage immunity 2, and holy weakness 5. The rift closes when there are no demons remaining on the encounter map. 

          Additionally, a creature who has the Magic or Psionics skill can make a Reason test or Intuition test as a maneuver while adjacent to a rift to destabilize and close it.
        behavior: attribute
        attribute: 82abd296-d79f-4d33-b1e6-47a28f30e161
