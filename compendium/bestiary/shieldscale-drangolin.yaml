      data: |+
        Shieldscale Drangolin    Level 1 Elite Brute
        Beast, Kobold    EV 12
        <b>Stamina</b> 80
        <b>Speed</b> 7 (burrow)    <b>Size</b> 2 /<b> Stability</b> 0
        <b>Free Strike</b> 5
        Might +2    Agility +1    Reason -3    Intuition 0    Presence -2
        <b>Fiery Claws</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>Target</b> 2 creatures or objects
        %E2%9C%A6    <b>%E2%89%A411</b>    7 fire damage
        %E2%98%85    <b>12%E2%80%9316</b>    10 fire damage
        %E2%9C%B8    <b>17</b>    13 fire damage

        <b>Drangolin Plume</b> (Action) %E2%97%86 5 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self    <b>Target</b> Self
        <b>Effect</b> The drangolin shifts their speed and uses Fiery Claws against each creature who comes within 1 during the move. The drangolin makes one power roll against all targets.

        <b>Erupt</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 3 Malice
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> 2 burst (while burrowing)<b>Target</b> All creatures
        %E2%9C%A6    <b>%E2%89%A411</b>    6 damage; push 1; A<0 prone
        %E2%98%85    <b>12%E2%80%9316</b>    8 damage; push 3; A<0 prone
        %E2%9C%B8    <b>17</b>    11 damage; push 5; A<0 prone
        <b>Effect</b> Each target directly over the drangolin takes 2 fire damage.

        <b>Ashen Cloud</b>
        Each ally adjacent to the drangolin has concealment.

        <b>Tunneler</b>
        When the drangolin burrows, they create a size 1S tunnel. The tunnel remains stable for one day, then collapses.
        Trained Gelatinous Cube    Level 1 Elite Hexer
        Kobold, Ooze    EV 12
        <b>Stamina</b> 40    <b>Immunity</b> Acid 3
        <b>Speed</b> 5    <b>Size</b> 2 / <b>Stability</b> 2
        <b>Free Strike</b> 4
        Might +2    Agility -1    Reason -3    Intuition 0    Presence -2
        <b>Engulf</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>Target</b> 1 creature or object
        %E2%9C%A6    <b>%E2%89%A411</b>    7 acid damage; A<0 dazed (save ends)
        %E2%98%85    <b>12%E2%80%9316</b>    10 acid damage; A<1 dazed (save ends)
        %E2%9C%B8    <b>17</b>    14 acid damage; A<2 restrained (save ends)
        <b>    Effect </b>A size 2 or smaller creature restrained by this ability is pulled into one of the cube's squares and moves with the cube. The creature takes 4 acid damage at the start of each of their turn while restrained. When restrained ends, the creature moves to the nearest unoccupied square adjacent to the cube.
        <b>2 Malice</b> The cube targets 1 additional creature or object.

        <b>You Didn't Pay Attention!</b> (Free Triggered Action)
        <b>Keywords</b> -
        <b>Trigger </b>A creature moves or is force moved into the cube.
        <b>Distance</b> Self<b>Target</b> Self
        <b>Effect</b> The cube uses Engulf with a double edge.

        <b>Translucent Cube</b>
        The cube completely occupies their space, blocking line of effect on enemy abilities. The cube is hidden until they act.


      type: mcdm
