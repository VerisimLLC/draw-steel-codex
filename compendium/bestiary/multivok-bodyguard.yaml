        Multivok Bodyguard	Level 9 Elite Defender
        Construct, Multivok, Valok	EV 44
        <b>Stamina</b> 240
        <b>Speed</b> 5	<b>Size</b> 2 /<b> Stability</b> 5
        <b>Free Strike</b> 9
        Might +4	Agility 0	Reason -2	Intuition +1	Presence -4
        <b>Gatling Bolt Gun</b> (Action)%E2%97%86 2d10 + 4%E2%97%86 Signature
        <b>Keywords</b> Ranged, Strike, Weapon
        <b>Distance</b> Ranged 10<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	13 damage
        %E2%98%85	<b>12%E2%80%9316</b>	18 damage
        %E2%9C%B8	<b>17</b>	22 damage; A<4 bleeding (save ends)

        <b>Valiar Axe</b> (Action)%E2%97%86 2d10 + 4%E2%97%86 3 Malice
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	15 damage; M<2 weakened (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	21 damage; M<3 weakened (save ends)
        %E2%9C%B8	<b>17</b>	26 damage; prone; M<4 weakened (save ends)
        <b>Effect</b> The bodyguard has a double edge on this ability if it was previously used against the same target.

        <b>Magnetic Pull</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> 10 burst<b>	Target</b> All metal clad enemies and metal objects
        <b>Effect</b> Pull 8 or <b>M<3</b> Pull 15.The bodyguard can make a free strike against each target that ends up in an adjacent square.

        <b>Valiar Cloak</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Melee 2<b>	Target</b> Self
        <b>Trigger</b> An ally within distance is targeted by an enemy. The bodyguard can use this after seeing the result of the power roll.
        <b>Effect</b> The bodyguard becomes the new target.

        <b>Multivok Maintenance</b>
        At the start of the bodyguard's turn, all servoks within 2 of the bodyguard regains 15 Stamina.

        <b>Crafted to Perfection</b>
        The bodyguard's shape can't change via any external effects.

        <b>Valiar Might</b>
        Each power roll made against the bodyguard can't get higher than a tier-1 result while they aren't winded, weakened, or bleeding.



