description: |-
  While worn, a yellow Color Cloak grants you lightning immunity equal to your level. 

  Additionally, when you are targeted by any effect that deals lightning damage, you can use a triggered action to shift a number of squares equal to your level. If you do so, the lightning immunity granted by the cloak becomes lightning weakness with the same value until the end of the next round. You can’t use this triggered action again until this weakness ends.
