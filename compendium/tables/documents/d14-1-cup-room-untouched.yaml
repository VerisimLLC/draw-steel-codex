content: |
  # D14.1 Cup Room Untouched

  > * “A massive set of steps leads up to a landing where the Cup of Iulius sits on a plinth that stands between two massive, flaming braziers.”
  > * “As you enter, a voice calls out, ‘No fell hand shall seize the Cup of Iulius so long as Dame Cornelia has bones with which to do something about it!’”
  > * “An armored wight emerges from a sarcophagus on the landing. She produces a glaive, blocking your view of the chalice. She drives the blade into the ground, causing humanoid figures to writhe and rise around her on the landing.”
  Dame Cornelia leads twelve decrepit skeletons, four soulwights, and three zombies in attacking the heroes.

  See [Encounter D14.1].

  # Loot
  Cornelia’s sarcophagus contains a [Revenger's Wrap] (see Treasure in Handouts). The plinth holds the [Cup of Iulius] (see Treasure in Handouts).
description: D14.1 Cup Room Untouched
