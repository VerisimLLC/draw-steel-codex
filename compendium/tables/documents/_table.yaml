  content: |-
    # Moving Onwards

    This part of the adventure doesn’t have a formal conclusion. The heroes can claim the [Cup of Iulius] and still have quests to explore in [Part 2]. When the heroes are ready to explore [Castle Andreas], proceed to [Castle Andreas] in [Part 3: The Jagged Edge]. If they have more quests from [Part 2] they wish to complete even after battling [Queen Bargnot], they can do that!

    If the Jagged Edge or the heroes recover the [Cup of Iulius], the heroes finish three respites, and don’t go to [Castle Andreas], [Queen Bargnot]’s forces descend on Broadhurst in an assault. See [Attack on Broadhurst] in [Part 3: The Jagged Edge].
    Remember to make a note in [Tracking Respites].
