    import:
      type: mcdm
      data: |+
        Trained Gelatinous Cube    Level 1 Hexer
        Animal, Kobold    EV 16
        <b>Stamina</b> 20    <b>Immunity</b> Acid 3 Weapon 3
        <b>Speed</b> 5    <b>Size</b> 2 / <b>Stability</b> 2
        <b>Free Strike</b> 4
        Might +2    Agility -1    Reason -3    Intuition 0    Presence -2
        <b>Engulf</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Attack, Melee, Weapon
        <b>Distance</b> Melee 1<b>Target</b> 1 creature or object
        %E2%9C%A6    <b>%E2%89%A411</b>    3 acid damage; A1 dazed (save ends)
        %E2%98%85    <b>12%E2%80%9316</b>    5 acid damage; A2 dazed (save ends)
        %E2%9C%B8    <b>17</b>    7 acid damage; A3 restrained (save ends)
        <b>    Effect </b>A size 2 or smaller creature restrained by this attack is pulled into one of the cube's squares and moves with the cube. The creature takes 3 acid damage at the start of each of their turn while restrained. When restrained ends, the creature moves to the nearest unoccupied square adjacent to the cube.
        <b>    3 Malice</b> The cube attacks 1 additional target.

        <b>You Didn't Pay Attention!</b> (Free Triggered Action)
        <b>Keywords</b> -
        <b>Trigger </b>A creature moves or is force moved into the cube.
        <b>Distance</b> Self<b>Target</b> Self
        <b>Effect</b> The cube uses Engulf with a double edge.

        <b>Translucent Cube</b>
        The cube completely occupies their space, blocking line of effect on enemy attacks and abilities. The cube is hidden until they act.

