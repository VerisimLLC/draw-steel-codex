        <b>Whiptail</b> (Action) %E2%97%86 2d10 + 2
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 3<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	8 damage
        %E2%98%85	<b>12%E2%80%9316</b>	13 damage
        %E2%9C%B8	<b>17</b>	16 damage; A<2 bleeding (save ends)
        <b>Effect</b> This ability has an edge against a target on top of the scyza and knocks the target prone into an unoccupied adjacent square.

        <b>Crestfall</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 2 Malice
        <b>Keywords</b> Area, Melee, Weapon
        <b>Distance</b> 3 cube within 2<b>	Target</b> All enemies in the cube
        %E2%9C%A6	<b>%E2%89%A411</b>	4 damage; 1 sonic damage; R<0 dazed (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	7 damage; 2 sonic damage; R<1 dazed (save ends)
        %E2%9C%B8	<b>17</b>	9 damage; 3 sonic damage; R<2 dazed (save ends)

        <b>Sandstorm</b> (Maneuver) %E2%97%86 2d10 + 2 %E2%97%86 3 Malice
        <b>Keywords</b> -
        <b>Distance</b> 3 burst<b>	Target</b> Special
        <b>Effect</b> The scyza kicks up a sandstorm concealing themselves and each ally in the affected area until the end of the scyza's next turn. Each enemy in the burst makes an <b>Intuition test.</b>
        %E2%9C%B8	<b>%E2%89%A411</b>	10 damage; prone; slowed (EoT)
        %E2%98%85	<b>12%E2%80%9316</b>	7 damage; slowed (EoT)
        %E2%9C%A6	<b>17</b>	4 damage

        <b>Brace and Bogart</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Self	<b>Target</b> Self
        <b>Trigger</b> The scyza or an ally riding the scyza is targeted by an ability.
        <b>Effect</b> Any damage dealt by the triggering ability is halved. If the creature or object who used the ability is within 3 of the scyza, the scyza makes a free strike against them.

        <b>War Harness</b>
        Three of the scyza's size 1 allies can occupy the same space while riding the scyza.

        <b>Terrible Beast</b>
        The scyza deals an additional 6 damage on strikes and abilities used against objects.

