    import:
      type: mcdm
      data: |+
        Wode Elf Tree Guerilla	Level 3 Ambusher
        Fey, Humanoid, Wode Elf	EV 20
        <b>Stamina</b> 50
        <b>Speed </b>7 (teleport)	<b>Size</b> 1M / <b>Stability</b> 0
        	<b>Free Strike</b> 5
        Might 0	Agility +2	Reason 0	Intuition 0	Presence +1
        <b>Splinter Dagger</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Melee, Ranged, Strike, Weapon
        <b>Distance</b> Melee 1 or Ranged 5<b>Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	7 damage
        %E2%98%85	<b>12%E2%80%9316</b>	11 damage
        %E2%9C%B8	<b>17</b>	14 damage; M<2 bleeding (save ends)
        <b>Effect</b> The tree guerilla can teleport 3 after using this ability.
        <b>3 Malice</b> The tree guerilla targets an additional creature or object. The tree guerilla deals an additional 3 damage if both targets are adjacent to each other.

        <b>Do Not Hesitate in the Wode</b> (Free Triggered Action) %E2%97%86 3 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self and Squad<b>Target</b> Self and Squad
        <b>Trigger </b>An ally ends their turn while the tree guerilla hasn't acted this round.
        <b>Effect</b> The targets take their turn immediately. Each target has an edge on their abilities until the end of their turn.

        <b>Hunter's Glamor</b>
        The tree guerilla immediately hides at the end of their turn, even if they are observed.



