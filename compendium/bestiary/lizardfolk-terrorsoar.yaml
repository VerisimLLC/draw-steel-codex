        %E2%9C%B8	<b>17</b>	9 damage; prone
        <b>Effect</b> The terrorsoar can shift 4 after using this ability if they are flying.

        <b>Poison Blowdart</b> (Action) %E2%97%86 2d10 + 2
        <b>Keywords</b> Ranged, Strike, Weapon
        <b>Distance</b> Ranged 5	<b>Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	4 damage; M<0 weakened (save ends)
