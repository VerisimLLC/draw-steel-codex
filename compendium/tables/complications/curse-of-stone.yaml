name: Curse of Stone
ctime: 1755513748704
description: As a child, you met a creature who turns people to stone, such as a medusa. You escaped half petrified, avoiding the fate of others who stand as statues now.
id: 0c8de051-84c1-4ffc-b68a-d7d3f457e9ba
benefit: You have a +1 bonus to stability. Additionally, you can use a free maneuver to cause your body, gear, and any items you hold to take on the appearance of stone, making you appear to be a mundane statue while you remain unmoving.
