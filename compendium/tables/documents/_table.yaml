  content: |
    # Delian Tomb

    *Heroes who have the History skill can tell that the tomb was built long ago during the Caelian Empire, a dead civilization that stretched across the land that is now Dalrath, and that Delius is a proper name, likely the name of someone interred in the crypt.*


    # Part 2

    See [Queen Bargnot's Plot].

    ## Second Level
    The heroes can uncover information in [Abbott Loric]’s library (see [B3. Church of Saint Gryffyn]) that says the [Amulet of the Delian Order] is needed to unseal the second level of the tomb (see [Tomb Second Level]).
    If the heroes talk to [Orson] (see [B9. Charcoal Burner]), they learn the amulet was taken during an arixx attack and could be recovered in the creature’s nest (see [Arixx Nest]).

    This part uses the [Delian Tomb - Level 2] map

    ## Third Level
    The [Delian Knight Commander’s ring] is needed to unseal the third level (see [Tomb Third Level]). The ring is held by the [Gilded Hand] (see [B1. Feather Bed Inn]).

    This part uses the [Delian Tomb - Level 3] map
