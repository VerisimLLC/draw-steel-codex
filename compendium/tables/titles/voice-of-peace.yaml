__typeName: Title
effect: "Choose one of the following benefits:\n\nLegendary Talker: If you are negotiating with a creature who your Renown doesn’t influence, you can spend a hero token to influence the creature as if it did. \n\nSzetch Smoothtalker: You must know Szetch to gain this benefit. When you make a Reason, Intuition, or Presence test to influence a creature who understand Szetch while speaking that language, you can reroll the test. You must use the new result and can’t use this benefit twice or more during the same conversation. \n\nUnoffensive: When you make an argument that invokes a pitfall during a negotiation, the NPC’s patience doesn’t decrease. "
prerequisite: Make a successful argument in a negotiation with Queen Bargnot and have that negotiation end with her interest at 5
