      data: |+
        Demon Torlas	Level 1 Horde Controller
        Abyssal, Demon	EV 3
        <b>Stamina</b> 10	<b>Weakness</b> Holy 3
        <b>Speed</b> 5	<b>Size</b> 1S/<b> Stability</b> 0
        	<b>Free Strike</b> 1
        Might +0	Agility +1	Reason +0	Intuition +0	Presence +2
        <b>Floor to Flesh</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Area, Magic, Ranged
        <b>Distance</b> 3 cube within 10	<b>Target</b> Each enemy in the cube
        %E2%9C%A6	%E2%89%A411	Slide 3
        %E2%98%85	12%E2%80%9316	Slide 4
        %E2%9C%B8	17+	Slide 5
        <b>Effect</b> The area turns into a morass of spongy flesh before the targets are force moved. Until the start of the torlas's next turn, the area is difficult terrain, and each creature who moves within the area takes 1 damage for each square moved.

        <b>Grasping Tendons</b> (Maneuver)
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 10	<b>Target</b> Three creatures
        <b>Effect</b> The torlas pulls each target 3 squares.

        <b>Lethe</b>
        While winded, the torlas has an edge on strikes, and strikes have an edge against them.

        <b>Soulsight</b>
        Each creature within 2 of the torlas can't be hidden from them.



