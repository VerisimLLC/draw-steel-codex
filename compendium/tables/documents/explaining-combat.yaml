      When a creature you control makes a free strike, they don't roll. Instead, their stat block features a Free Strike stat representing the amount of damage they deal with a melee free strike with a distance of melee 1 or the creature's signature ability, whichever is higher. This is also the amount of damage they deal with a ranged free strike with a distance equal to 5 or the range of the creature's signature ability, whichever is higher. Even though a Director-controlled creature doesn't roll when they make a free strike, if they have a bane on attacks against a creature, they still can't make an opportunity attack against them.
