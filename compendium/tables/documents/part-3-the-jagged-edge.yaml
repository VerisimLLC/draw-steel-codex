description: Part 3 The Jagged Edge
content: |
  # Part 3: The Jagged Edge

  Eventually, the heroes must face [Queen Bargnot]’s forces for the good of the people of Broadhurst! Whether they face the Jagged Edge in [Castle Andreas] or on the streets of Broadhurst is up to the actions (or inaction) of the heroes.


  ## Running Part 3	

  Part 3 of this adventure either occurs at the Jagged Edge base in the ruins of Castle Andreas or in the village square of Broadhurst.

  If the heroes go to [Castle Andreas], they find the Jagged Edge there. Depending on if and how long [Queen Bargnot] has had the [Cup of Iulius], it might be a challenging battle. See [Castle Andreas] for more details.
  If the heroes or the Jagged Edge claim the [Cup of Iulius] and the heroes don’t go to [Castle Andreas] before finishing three respites, then the Jagged Edge comes to them. See [Attack on Broadhurst] for more details.
