    X: |+
      Should the heroes ask about the [Gilded Hand]’s adventures, [Targon] says, “Ever hear of the Cressan Tomb? That was us who cleared out the cult of the demon lord Aurumvas.” Unless you decide otherwise, the heroes haven’t heard of this deed, though they can learn more about the tomb in [Abbott Loric]’s library (see [B3. Church of Saint Gryffyn]).

