  textStorage:
    __typeName: TextStorage
    sections:
      ex: |+
        ## Heroes Start

      dO: |
        |3|Eight [human raider]s (minion squad)|
      kz: |
        |{#The door begins to break. One more test with a result of 12+ brings it down.}
      lz: |+
        |{#The door falls aside.}


      mz: |+
        ## Cookfire

      nz: |+
        The first time a creature touches the cookfire in the mess tent on a turn or starts their turn touching it, they take 2 fire damage.


      gz: |+
        ## Fort Door

      hz: |+
        The entry to the fort remains open unless there is an attack. In that case, a series of wooden planks are pulled into place. This door has 40 Stamina and can be forced open with a moderate Might test:

      iz: |
        |Force open the door: Moderate Might Test
      jz: |
        |{#The door does not budge.}
      sz: "If the heroes are inside when the alarm is raised, the raiders and the scoundrel engage them in melee, while the rest of the humans use ranged abilities. The bandits spread the damage around, hoping to hamper all the heroes at once.\n \n\n"
      tz: |+
        ## Ending the Encounter

      vz: |+
        When the heroes outnumber the bandits, the remaining bandits flee and the heroes earn 1 Victory each.

      oz: |+
        ## Training Grounds

      pz: |+
        In the center of the fort's open courtyard, fighting dummies and archery targets sit waiting to be pummeled, shot, or stabbed as part of the bandits' training regimen. Each dummy has sharp spear and dagger extensions that are harmless when training. A creature force moved into a space containing a fighting dummy takes an extra 5 damage, and the dummy is destroyed.


      qz: |+
        ## Tactics

      b: |+
        When you are ready, [Draw Steel!]

      ds: |
        * For four heroes, remove eight **human raiders**.
      dF: |
        |1|One [human scoundrel] (Kora)|
