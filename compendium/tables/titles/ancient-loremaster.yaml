    description: "Choose one of the following benefits:"
    options:
    - __typeName: CharacterFeature
      modifiers: []
      name: Leverage
      description: You know a priceless secret. The Director chooses the type of person who would value this secret—usually a member of a particular faction, such as a Higaran noble, or a type of person, such as a fence of stolen goods. When engaged in a negotiation with this type of person, you can offer this secret. If they accept, their interest increases by 3 (to a maximum of 5). You can share this secret only once.
      guid: 8fc3c763-fc9d-44f7-82ca-e518cb6bd9e8
      canHavePrerequisites: true
      source: Feat
    - __typeName: CharacterFeature
      description: You add rare, ancient books to your collection. Whenever you undertake a research project, roll 1d6 for each dead language you know and add the total to the project roll.
