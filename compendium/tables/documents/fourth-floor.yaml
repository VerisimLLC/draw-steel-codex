description: Fourth Floor
content: |-
  # Room 4


  > * “The curving stairs leading up from this floor end before reaching the ceiling, and the opening in the ceiling that would lead to another floor has been sealed off with hastily applied stonework. The higher section of the stairs appears to have been built recently.”
  > * “This chamber contains more tools and stone for mason work. It also has a living area with a bed, desk, wardrobe, and other furniture. Laboratory equipment and books are in a separate area.”
  > * “A dwarf and an orc sit at one of the tables here, urgently discussing something.”
  > * “Six corpses lie on the floor.”

  **Vurkor** is here talking with Bassa, a **civilian** and dwarf merchant.
  **Secret:** The bodies at their feet are actually six **zombies**.

  ## More Malevolent Magic
  The floor above this has been sealed off because a malevolent magic— that kills people and turns them into zombies—has been plaguing the area. The corpses on the floor were workers who got too close to the ceiling while building the stairs. Bassa has some rudimentary skill with earth magic and with great effort and time was able to seal off the opening with stones from a distance to stem the immediate problem.

  # Vurkor
   Vurkor cares nothing for the lives that have been lost as he reconstructs the tower, but he’s also no fool. He believes that he can defeat the heroes with the help of his zombies, but he’s aware the heroes must be capable combatants to have made it this far.

  ## Vurkor Negotiation
  If the heroes want to negotiate for the release of the prisoners, Vurkor is willing to hear them out—though his trust and patience for these intruders is low.

   ## Vurkor Negotiation Stats

   **Interest**: 1 • **Patience**: 2 • **Impression**: 3
   Native Language: Kalliak
   **Motivations**
   **Discovery**: Vurkor wants to discover more secrets of the tower. While having captives could increase the rate of restoration, keeping them here is just going to draw a target on his back that keeps interrupting his work and could actually slow the discovery of secrets. Arguing that keeping captives is detrimental to his goal appeals to this motivation.
   **Pitfalls**
   **Power**: Vurkor believes that magic and knowledge are power. If the heroes offer that Vurkor keep the tower in exchange for the prisoners, they appeal to this motivation. 
  **Benevolence:** Vurkor cares little for the captives and their loved ones. If the heroes try to appeal to his empathic side (he doesn’t have one), they invoke this pitfall.

   **Interest 5**: Vurkor agrees to release the prisoners and not commit further crimes. To prove he’s serious about the deal, Vurkor gives the heroes a recipe he found in the tower that serves as source material for crafting Mirror Tokens (see Treasure in Handouts).
   **Interest 4:** Vurkor agrees to release the prisoners and not commit further crimes.
   **Interest 3**: Vurkor agrees to release the prisoners and not commit further crimes, provided the heroes give him a treasure that isn’t a consumable to help him restore the tower.
   **Interest 2**: Vurkor agrees to let the humans in the tower go if the heroes give him a treasure that isn’t a consumable, but he refuses to let the dwarves go—their knowledge of stone work is too valuable. 
  **Interest 1**: Vurkor refuses to release any captives.
   **Interest 0**: Vurkor attacks the heroes. See Mage Tower Fourth Level in the Encounters Book.
   If the heroes end the negotiation with Vurkor’s interest at 3 or higher, they earn 1 Victory each.

  # Combat

   The heroes fight Vurkor in the top level of his tower.

  ## Dangerous Compounds

  The tables in Vurkor's laboratory area contain dangerous chemical compounds and alchemical mixtures. A creature who is force moved into a laboratory table takes 3 acid damage, or 5 acid damage if the table breaks.

  ## Bassa

  Bassa, a **civilian**, is the last to act during the round. She flees to the stairs. Vurkor lets her run, knowing she can't escape the tower.

  ## Tactics

  If the heroes fight Vurkor, he chooses a magic-wielder, preferably another elementalist, as the target of his Rivalry trait. At the start of the encounter, the zombies animate and attack under his command. Vurkor stays behind them, using ranged attacks to harm his foes.  
  He's careful not to harm Bassa, since he believes the dwarf will be instrumental in restoring the tower. If he becomes winded, he flees for the stairs, using Glowing Recovery to heal himself.

  ## Ending the Encounter

  The encounter ends when Vurkor is reduced to 0 Stamina, which causes the zombies to fall down dead.

  ## Combat

  Allow easy adjustment of the number of heroes to balance for:

  [[setting:Number of Heroes]]

  [[encounter]]

  When you are ready, [Draw Steel!]

  ## Aftermath and Rewards

  [End Combat] once the battle is over.

  The heroes gain 1 VP if they win the battle.

  [[/awardvp 1|Award Victories]]

  ## Loot
   Vurkor carries source material in Variac for crafting Mirror Tokens (see Treasure in Handouts) as well as six sheets of glass and enough sunbaked gold dust to make two tokens.

  If a hero touches Vurkor’s amulet, they know the item allows them to create a door in the first level of the tower (no action required). However, if someone other than Vurkor touches the amulet after his death, it also causes the tower to collapse.
