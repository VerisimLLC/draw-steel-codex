        <b>Trundle</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The beast moves up to their speed. The beast can make a free strike on each creature that makes an opportunity attack against them during this movement.

        <b>Animal Rally</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Trigger</b> An ally within line of effect is knocked prone.
        <b>Effect</b> The beast moves up to their speed. If they end their turn adjacent to the triggering ally, they can pick the ally up and allow them to climb on top of the beast.

        <b>Beast of Burden</b>
        Two of the beast's size 1 allies can occupy the same space while riding the beast.

        <b>Nature Calls</b>
        The beast ignores 1 bane on their abilities while in an encounter outside or in a natural environment.


