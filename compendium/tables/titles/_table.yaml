    - __typeName: CharacterFeatureChoice
      allowDuplicateChoices: false
      name: Forsaken Benefit
      numChoices: 1
      description: "Choose one of the following benefits:"
      guid: 36409483-f811-4439-ba3a-95e48f0a96f6
      options:
      - __typeName: CharacterFeature
        modifiers: []
        name: Brief Reunion
        description: While you’re winded, you can use a maneuver to summon the artifact to your hand. It disappears at the end of your next turn. Once you use this benefit, you can’t use it again until you earn 1 or more Victories.
        guid: accf8d88-7f48-4397-9962-496b4d96cdb8
        canHavePrerequisites: true
        source: Feat
      - __typeName: CharacterFeature
        modifiers: []
        name: Perfect Protection
        description: The Director chooses a damage type that is dealt by or thematically related to the artifact—for instance, holy for the Blade of a Thousand Years, psychic for the Encepter, or corruption for the Mortal Coil. You have immunity all to the chosen damage type.
        guid: 8d5d339c-b0f4-4f58-89d1-d91cdaade552
        canHavePrerequisites: true
        source: Feat
      - __typeName: CharacterFeature
        modifiers: []
        name: Poor Compensation
        description: Instead of disappearing or otherwise departing, the artifact turns into a trinket or leveled treasure of the Director’s choice that has the same approximate shape as the lost item—for instance, any magic sword for the Blade of a Thousand Years, any implement for the Encepter, or a Thief of Joy or any other torque for the Mortal Coil.
        guid: 344ba39c-92f9-4628-b5fe-ea7455315bd6
        canHavePrerequisites: true
        source: Feat
