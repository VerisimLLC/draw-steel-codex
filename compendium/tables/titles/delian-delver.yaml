__typeName: Title
effect: |-
  Choose one of the following benefits:

  At Home in the Dungeon: While in an artificial underground structure, you can’t be surprised. 

  Knight Scholar: When negotiating with knights or other nobles who reached their standing through military service, your renown is considered to be 2 higher than usual.

  Mail Breaker: When you make a melee strike against a creature with the leader role, the strike gains a +2 rolled damage bonus.
prerequisite: Reach the final room of the Delian Tomb
