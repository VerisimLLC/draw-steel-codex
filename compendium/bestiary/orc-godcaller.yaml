      data: |+
        Orc Godcaller	Level 1 Support
        Humanoid, Orc	EV 13
        <b>Stamina</b> 30
        <b>Speed</b> 6	<b>Size</b> 1M /<b> Stability</b> 0
        <b>Free Strike</b> 3
        Might +1	Agility 0	Reason 0	Intuition +1	Presence +1
        <b>Power Chord</b> (Action) %E2%97%86 2d10 + 1 %E2%97%86 Signature
        <b>Keywords</b> Attack, Magic, Melee, Ranged
        <b>Distance</b> Reach 1 or Ranged 10<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	3 sonic damage
        %E2%98%85	<b>12%E2%80%9316</b>	5 sonic damage; weakened (EoT)
        %E2%9C%B8	<b>17</b>	7 sonic damage; weakened (PRS ends)

        <b>Cadenza</b> (Action)
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 10<b>	Target</b> 1 ally
        <b>Effect</b> The godcaller's song enables the target to move up to their speed and take an action.
        <b>3 VP</b> This ability targets a second ally.

        <b>Rallying Ostinato</b> (Maneuver) %E2%97%86 2 VP
        <b>Keywords</b> Magic
        <b>Distance</b> Ranged 10<b>	Target</b> Self and up to 3 allies
        <b>Effect</b> Each target regains 15 Stamina and ignores difficult terrain until the end of the encounter.

        <b>Relentless</b>
        If the godcaller's Stamina drops to 0, they can take a reach 1 or ranged 5 free strike before dying. If the target is reduced to 0 Stamina by the attack, the godcaller lives and their Stamina is reduced to 1 instead.

