        <b>Stone Wave</b> (Maneuver) %E2%97%86 2d10 + 2 %E2%97%86 3 Malice
        <b>Keywords</b> Area, Magic, Ranged
        <b>Distance</b> 3 cube within 10<b>	Target</b> All enemies in the cube
