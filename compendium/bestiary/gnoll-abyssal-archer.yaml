    import:
      type: mcdm
      data: |+
        Gnoll Abyssal Archer	Level 2 Horde Artillery
        Abyssal, Gnoll	EV 4
        <b>Stamina</b> 15
        <b>Speed </b>5	<b>Size</b> 1M /<b> Stability</b> 1
        <b>Free Strike</b> 3
        Might 0	Agility +2	Reason +1	Intuition 0	Presence -1
        <b>Dark Longbow</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Ranged, Strike, Weapon
        <b>Distance</b> Ranged 10	<b>Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	5 corruption damage
        %E2%98%85	<b>12%E2%80%9316</b>	6 corruption damage
        %E2%9C%B8	<b>17</b>	8 corruption damage; M<2 slowed (save ends)
        <b>Effect</b> This ability has an edge against creatures not at full Stamina.

        <b>Cackletongue</b> (Maneuver) %E2%97%86 2 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self and 2 burst	<b>Target</b> Self and all allies
        <b>Effect</b> Each target has an edge on their next strike before the end of their next turn. Targets who haven't used a cackletongue maneuver on this turn use it immediately at no cost.

        <b>Death Frenzy</b>
        Whenever a non-minion ally within 5 is reduced to 0 Stamina, the abyssal archer moves up to their speed and makes a free strike.

        <b>Bloodscent</b>
        The abyssal archer can target creatures not at full Stamina with abilities, even if they don't have line of effect.

