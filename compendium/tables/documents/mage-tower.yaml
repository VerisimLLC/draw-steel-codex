content: |-
  # Mage Tower	


  [Vurkor], an orc elementalist, came to Broadhurst looking for a rumored tower that once belonged to a powerful magician. Finding the tower empty and in ruins, [Vurkor] and his two ogre servants captured travelers along the road and forced them to rebuild the wondrous tower. Other travelers avoid this fate if they offer [Vurkor] magic treasures, which he uses to restore the tower’s defenses.

  The heroes can infiltrate the tower and deal with [Vurkor], the ogres, and some of the more malignant magic that permeates the weathered stones of the tower.

  The heroes can learn the tower’s location by following leads given to them by [Harim] (see [B12. Cobbler]) or through interacting with the [dwarf merchants] staying at the Feather Bed Inn (see [B1. Feather Bed Inn]).

  This quest uses the [Mage Tower Map]. See [MT Start Here].

