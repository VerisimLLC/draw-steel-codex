    import:
      type: mcdm
      data: |+
        High Elf Bloodletter	Level 1 Platoon Ambusher
        Fey, High Elf, Humanoid	EV 6
        <b>Stamina</b> 30
        <b>Speed</b> 7	<b>Size</b> 1M /<b> Stability</b> 0
        <b>Free Strike</b> 4
        Might 0	Agility +2	Reason 0	Intuition +1	Presence 0
        <b>Razor's Edge</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	6 damage
        %E2%98%85	<b>12%E2%80%9316</b>	9 damage
        %E2%9C%B8	<b>17</b>	12 damage; R<2 bleeding (save ends)
        <b>Effect</b> The bloodletter and each ally has a double edge on abilities targeting a creature or object bleeding from this ability.

        <b>Blood Haze</b> (Maneuver) %E2%97%86 2 Malice
        <b>Keywords</b> Area, Magic, Melee
        <b>Distance</b> 1 burst	<b>Target </b>Special
        <b>Effect</b> The bloodletter creates a cloud of blood vapor in the area until the end of the next round. The cloud blocks line of effect for enemies, and an enemy has Magic weakness 3 occupying an affected square. The bloodletter then shifts up to their speed, hiding if they end their movement under concealment.

        <b>Otherworldly Grace</b>
        At the start of their turn, the scribe can turn the duration of one save ends effect they suffer from into EoT.



