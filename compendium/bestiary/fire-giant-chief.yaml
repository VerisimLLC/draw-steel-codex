        Fire Giant Chief	Level 9 Boss
        Fire Giant, Giant	EV 104
        <b>Stamina</b> 240	<b>Immunity</b> fire 10
        <b>Speed</b> 10	<b>Size</b> 5 /<b>Stability</b> all
        <b>Free Strike</b> 9
        Might +5	Agility +3	Reason 0	Intuition +2	Presence +3
        <b>Roiling Fist</b> (Action) %E2%97%86 AGL or INU RR %E2%97%86 Signature
        <b>Keywords</b> Area, Melee, Resistance, Weapon
        <b>Distance</b> 3 Cube within 4<b>Target</b> All enemies and objects
        %E2%9C%B8	<b>%E2%89%A411</b>	19 fire damage; burning (MGT ends)
        %E2%98%85	<b>12-16</b>	14 fire damage; prone
        %E2%9C%A6	<b>17</b>	9 fire damage
        <b>Effect</b> A burning target takes 1d6 fire damage at the start of each of their turns until the condition ends.

        <b>Lava Pillar</b> (Action) %E2%97%86 AGL RR %E2%97%86 3 VP
        <b>Keywords</b> Area, Ranged, Resistance
        <b>Distance</b> 3 Cube within 10<b>Target</b> All enemies and objects
        %E2%9C%B8	<b>%E2%89%A411</b>	18 fire damage; vertical push 10; prone
        %E2%98%85	<b>12-16</b>	14 fire damage; vertical push 5
        %E2%9C%A6	<b>17</b>	8 fire damage; vertical push 3

        <b>Sweltering Heat</b> (Maneuver) %E2%97%86 MGT RR
        <b>Keywords</b> Area, Melee, Resistance
        <b>Distance</b> 3 Burst<b>Target</b> All enemies
        %E2%9C%B8	<b>%E2%89%A411</b>	Weakened (MGT ends)
        %E2%98%85	<b>12-16</b>	Weakened (EoT)
        %E2%9C%A6	<b>17</b>	No effect
        <b>Effect</b> Targets with a fire immunity have a double edge on the roll.

        <b>Fuel the Fire</b> (Triggered Action) %E2%97%86 1 VP
        <b>Keywords</b> -
        <b>Trigger</b> The target makes an attack. The chief can use this after seeing the result.
        <b>Distance</b> Ranged 12<b>Target</b> 1 fire giant ally
        <b>Effect</b> The attack gains a double edge and deals an extra 9 fire damage.

        <b>Forward!</b> (Villain Action 1)
        <b>Keywords</b> Area
        <b>Distance</b> 10 Burst<b>Target</b> Self and all allies
        <b>Effect</b> Each target shifts up to their speed and takes a free strike.

        <b>Burning Legion </b>(Villain Action 2)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 15<b>Target</b> Special
        <b>Effect</b> The chief shifts up to their speed and 5 fire giant troopers appear in unoccupied spaces.

        <b>All to Cinders</b> (Villain Action 3) %E2%97%86 AGL RR
        <b>Keywords</b> Area
        <b>Distance</b> Self and 10 Burst<b>Target</b> All fire giant allies
        <b>Effect</b> Each target unleashes a 2 burst fire wave. Enemies within distance of a target's burst make an <b>Agility resistance roll</b>:
        %E2%9C%B8	<b>%E2%89%A411</b>	16 fire damage
        %E2%98%85	<b>12-16</b>	12 fire damage
        %E2%9C%A6	<b>17</b>	8 fire damage

        <b>Searing Skin</b>
        Whenever an enemy makes physical contact with the chief or uses a melee ability against the chief, they take 9 fire damage.

        <b>End Effect</b>
        The chief takes 5 damage and ends one EoE effect affecting them at the end of their turn.
