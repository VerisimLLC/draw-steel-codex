  # Orson

  [[image]]

  *An old man, seemingly eccentric, and a charcoal burner who is covered in soot.*
  {
  Secret: See [B9. Charcoal Burner]

  Orson plays the doddering old man, but he belongs to a semisecret organization of adventuring heroes called the Coursers. Retired from performing heroic deeds, Orson stays in Broadhurst and operates a safehouse for adventuring Coursers passing through the village. His put-on persona keeps the other villagers away and his waystation a secret.
  }

