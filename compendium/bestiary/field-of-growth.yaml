        <b>Hampering Roots</b> (Action)%E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 8<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	8 damage
        %E2%98%85	<b>12-16</b>	13 damage; R<1 prone can't stand (save ends)
        %E2%9C%B8	<b>17</b>	16 damage; prone R<2 and can't stand (save ends)
        <b>Effect</b> This ability inflicts restrained (save ends) on targets that are already prone. When the restrained condition ends, any can't stand effects also end.

        <b>Convocation of Verdure</b> (Maneuver)
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 5<b>	Target</b> Self or 1 elemental
        <b>Effect</b> The target gains 15 temporary Stamina that lasts until the start of the field's next turn.
        <b>3 Malice</b> The ground within 1 of the target is overgrown with thicket and vines until the end of the encounter. Whenever an enemy attacks the target while within line of effect of the affected area, they are pulled 5 towards the affected area. Whenever an enemy enters the affected area on a turn or starts their turn within it, they are knocked prone.

        <b>Rose Lash</b> (Triggered Action) %E2%97%86 1 Malice
        <b>Keywords</b> Magic, Melee, Ranged
        <b>Distance</b> Melee 3	<b>Target</b> 1 creature or object
        <b>Trigger</b> The field takes damage from the target.
        <b>Effect</b> The field deals 6 damage to the target and <b>A<2</b> bleeding (save ends).

        <b>Roots Run Deep</b>
        The field can target creatures touching the ground with abilities, even if they don't have line of effect.

        <b>Fickle and Free</b>
        The field can't be restrained, slowed, or knocked prone, and they ignore difficult terrain.

