  ctime: 1755514285723
  description: A great monster who breathed fire burned your home to the ground. While everything around you was consumed, you somehow stood strong amid the inferno, your body adapting to ignore the effects of the flames.
  id: 7fb672a0-80ae-442e-a5c6-531298188a4a
  benefit: You have fire immunity 5
97d5b152-2039-437e-8c4f-6fd2a92510cc:
  __typeName: CharacterComplication
  drawback: Your starting Wealth is -5. While your Wealth is lower than 1, you can purchase items as if you had 1 Wealth, but you’re frequently visited by threatening creditors, and shopkeepers often lock their doors when they see you coming.
  mtime: 1765963023576
  modifierInfo:
    __typeName: ClassLevel
    features:
    - __typeName: CharacterFeature
