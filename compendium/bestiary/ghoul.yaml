        %E2%9C%A6	%E2%89%A411	3 damage
        %E2%98%85	12%E2%80%9316	4 damage
        %E2%9C%B8	17+	5 damage; M<2 bleeding (save ends)

        <b>Leap</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Self	<b>Target</b> Self
        <b>Effect</b> The ghoul jumps 3 squares. If they land on a size 1 enemy, that enemy is knocked prone and the ghoul makes a free strike against them.

        <b>Hunger</b>
        If the ghoul charges, their speed increases by 2 until the end of their turn.

        <b>Arise</b>
        The first time the ghoul is reduced to Stamina 0 by damage that isn't fire damage or holy damage and their body isn't destroyed, they regain half their Stamina and fall prone.

