    import:
      override: true
      data: |+
        War Dog Crucibite	Level 1 Horde Artillery
        Humanoid, War Dog	EV 3
        <b>Stamina</b> 10	<b>Immunity</b> Fire 2
        <b>Speed</b> 5	<b>Size</b> 1M / <b>Stability</b> 0
        	<b>Free Strike</b> 2
        Might +0	Agility +2	Reason +0	Intuition +0	Presence +0
        <b>Flamebelcher</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Area, Weapon
        <b>Distance</b> 5 x 1 line within 1	<b>Target</b> All creatures and objects
        %E2%9C%A6	%E2%89%A411	2 fire damage
        %E2%98%85	12%E2%80%9316	4 fire damage
        %E2%9C%B8	17+	5 fire damage
        <b>Effect </b>The area is covered in sticky fire until the start of the crucibite's next turn. Whenever a creature enters the area for the first time in a round or starts their turn there, they take 2 fire damage.
        <b>3 Malice </b>The area increases to a 10 x 1 line, and if any ally of the crucibite is in the area when it is created, the crucibite deals an additional 2 damage to each target.

        <b>Posthumous Promotion</b> (Maneuver)
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 10	<b>Target</b> One war dog with a loyalty collar
        <b>Effect </b>The target's loyalty collar detonates, killing them instantly.

        <b>Loyalty Collar</b>
        When the crucibite dies, they explode, dealing 1d6 damage to each adjacent enemy.



