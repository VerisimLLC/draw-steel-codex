        Voiceless Talker Exile	Level 6 Artillery Retainer
        Psionic, Voiceless Talker	EV 27
        <b>Stamina</b> 70	<b>Immunity</b> psionic 3
        <b>Speed</b> 5 (flying, teleport)	<b>Size</b> 1M/<b>Stability</b> 2
        <b>Free Strike</b> 6
        Might 0	Agility +3	Reason +1	Intuition +2	Presence +1
        <b>Psychic Erasure</b> (Action) - 2d10 + highest characteristic - Signature
        <b>Keywords</b> Ranged, Psionic, Strike
        <b>Distance</b> Ranged 10	<b>Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>		7 psychic damage
        %E2%98%85	<b>12-16</b>		12 psychic damage
        %E2%9C%B8	<b>17</b>		15 psychic damage
        <b>Effect</b> The exile is invisible to the target until the end of the target's next turn.

        <b>Mindspace Jaunt </b>(Maneuver, Encounter)
        <b>Keywords</b> Area, Psionic
        <b>Distance</b> 5 burst	<b>Target</b> Self and mentor
        <b>Effect</b> The exile and their mentor turn invisible until the start of their next turn. While this invisibility lasts, the exile and their mentor take half damage from all attacks and their attacks do half damage to enemies.

        <b>Psionic Pspread</b>
        When an ally within 5 of the exile uses an ability with the Psionic keyword, they can do so as if they were in the exile's space.

        Level 7 Retainer Advancement Ability
        <b>Psychic Toss</b> (Action, Encounter) - 2d10 + highest characteristic
        <b>Keywords</b> Ranged, Psionic, Strike
        <b>Distance</b> Ranged 5	<b>Target</b> One creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>		6 damage; vertical slide 2
        %E2%98%85	<b>12-16</b>		10 damage; vertical slide 3
        %E2%9C%B8	<b>17</b>		14 damage; vertical slide 5
        <b>Effect</b> The exile can forego dealing damage. If they do so, the slide distance is doubled.

        Level 10 Retainer Advancement Ability
        <b>Cower Before Me</b> (Action, Encounter) - 2d10 + highest characteristic
        <b>Keywords</b> Area, Psionic
        <b>Distance</b> 2 burst	<b>Target</b> All enemies
        %E2%9C%A6	<b>%E2%89%A411</b>		8 damage; R (weak) frightened (save ends) and prone
        %E2%98%85	<b>12-16</b>		10 damage; R (average) frightened (save ends) and prone
        %E2%9C%B8	<b>17</b>		14 damage; R (strong) frightened (save ends) and prone

