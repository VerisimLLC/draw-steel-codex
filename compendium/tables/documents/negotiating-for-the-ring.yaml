description: Negotiating for the Ring
content: |
  # Negotiating for the Ring

  {If the heroes privately ask [Illwyth] for the ring and mention that they know the [Gilded Hand]’s plan to give the [Cup of Iulius] to [Queen Bargnot], the wode elf is willing to negotiate.}
  *(see Negotiation on page 298 in [Draw Steel Heroes])*

  ## Illwyth Negotiation Stats 

  {
  Impression: 1 
  Native Language: Yllric
  }



  INTEREST:  [[#----]] 
  PATIENCE:  [[###--]]

  [[image]]

  All Motivations & Pitfalls:
  *Benevolence, Discovery, Freedom, Greed, Higher Authority, Justice, Legacy, Peace, Power, Protection, Revelry, Vengeance*



  Illwyth's Motivations
  {**Greed**}
  {Money isn’t everything to Illwyth, but it’s close. If the heroes point out that working with Queen Bargnot could cost her future coin or make some other argument that affects her income, they appeal to this motivation.}

  {**Legacy**}
  {Illwyth cares about her reputation and what folks might say of her long after she’s dead. If the heroes make an argument that working with Queen Bargnot will negatively impact her reputation, they appeal to this motivation.}

  & Pitfalls 
  {**Justice**}
  {Illwyth has no interest in seeing the wicked punished for crimes, though she doesn’t wish to see innocent folk hurt either. If a hero argues that Queen Bargnot or the other members of the Gilded Hand should be brought to justice as a way to appeal to Illwyth’s conscience, they invoke this pitfall.}


  {
  **Negotiation outcomes**
  As the heroes make arguments to [Illwyth], she responds based on her interest:

  |Interest 5 |Yes, and... |Illwyth offers the heroes the [Delian Knight Commander’s Ring], tells them that the Jagged Edge are staying in the ruins of Castle Andreas (see [Castle Andreas] in [Part 3: The Jagged Edge]), and feels so invested in their cause that she offers to join them as a retainer (see the [Illwyth Retainer Follower Card]). She tells them this is the most she can offer.|
  |Interest 4 | Yes.|Illwyth offers the heroes the [Delian Knight Commander’s Ring] and tells them that Jagged Edge is staying in the ruins of [Castle Andreas] without expecting anything in return.|
  |Interest 3 | Yes, but… |Illwyth offers the heroes the [Delian Knight Commander’s Ring] and the location of the Jagged Edge if they promise to trade her for it. The heroes must either lose a combined number of Wealth equal to 3 to pay her properly or give her a nonconsumable treasure, such as a Bloodbound Band they might have recovered from the Delian Tomb.|
  |Interest 2 | No, but… |Illwyth won’t give the heroes the ring for fear of angering the others, but she does tell them that the [Gilded Hand] have no way of entering the tomb’s second level and are closely watching the heroes, hoping they can take care of that ward.|
  |Interest 1 | No. |Illwyth won’t give the heroes the ring or help them.|
  |Interest 0 | No, and… |Illwyth won’t give the heroes the ring, and secretly decides they know too much and need to be put down. She ends the negotiation and plots with the [Gilded Hand] to take the heroes out (see [Gilded Showdown] in [Events]).|

  If the heroes end the negotiation with Illwyth’s interest at 3 or higher and make a deal with her, they each gain 1 Victory. If she doesn’t join the heroes after giving them the ring, she leaves Broadhurst and the [Gilded Hand] leaves to pursue her.

  [[/awardvp 1|Award Heroes 1 Victory]]

  If [Illwyth] travels with the heroes, the Gilded Hand confronts them in the streets (see [Gilded Showdown] in [Events]).

  }


