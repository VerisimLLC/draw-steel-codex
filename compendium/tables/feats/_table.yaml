  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features: []
  tag: Exploration Perks
  name: Wood Wise
  description: When you make a test using a skill from the exploration skill group and at least one of the d10s rolled is a 1, you can reroll one d10. You can use this perk only once per test.
  mtime: 1772880214789
  id: 7cdbe600-9e48-4612-afc6-6f2580d36601
  ctime: 1730700578415
04a95fe4-9555-4c87-bf91-0d0309c0a688:
  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features: []
  tag: Lore Perks
  name: I've Read About This Place
  description: |
    Each time you enter a settlement you’ve never been to before, you can ask the Director one of the following questions:

    • Who is the most influential public figure in this settlement?
    • Who in this settlement would be the friendliest to us right now?
    • What does this settlement need most from outsiders?

    If the Director doesn’t have an answer to the question you ask, or doesn’t want to answer, you can instead ask a different question.
  mtime: 1772874087715
  id: 04a95fe4-9555-4c87-bf91-0d0309c0a688
  ctime: 1730700853527
5615fd42-2ef7-4a3b-bb50-0d312fcf2e44:
  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features: []
  tag: Crafting Perk
  name: Inspired Artisan
  description: When you make a project roll using a skill from the crafting skill group, you can spend a hero token to make another project roll for the same project as part of the same respite activity. You can’t use this perk more than once per respite.
  mtime: 1755373453938
  id: 5615fd42-2ef7-4a3b-bb50-0d312fcf2e44
  ctime: 1730700419018
5af11aa9-1a78-4583-aedb-e4c92c1a2b0f:
  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features: []
  tag: intrigue perk
  name: Gum Up the Works
  description: Whenever a mundane trap activates within 3 squares, you can use a triggered action to move up to 3 squares toward it. If this movement brings you adjacent to any of the trap’s mechanisms, you can jam the trap, preventing it from activating. As long as you stay adjacent to the mechanism, the trap can’t go off unless an attempt to disarm it fails.
  mtime: 1755374246322
  id: 5af11aa9-1a78-4583-aedb-e4c92c1a2b0f
  ctime: 1755374199307
5b93a8f4-b0ea-4faa-81c1-9d6229269542:
  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features:
    - __typeName: CharacterSkillChoice
      categories:
        lore: true
      name: Eidetic Memory
      guid: 6ea28f46-55c9-46f4-b070-da81e1d9160f
      description: Select a Skill, which you can change with each respite
      source: Feat
  tag: Lore Perks
  name: Eidetic Memory
  description: Your mind is an encyclopedia, though not always an easy one to organize. When you finish a respite, choose one skill from the lore skill group that you don’t have. You have that skill until you finish your next respite. Additionally, if you spend 1 uninterrupted minute or more reading any page of text, you can memorize its contents, allowing you to memorize entire books with sufficient time.
  mtime: 1763083697162
  id: 5b93a8f4-b0ea-4faa-81c1-9d6229269542
  ctime: 1730700812732
1ba87ee8-d226-4590-ab42-1fe08a1431a2:
  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features: []
  tag: intrigue perk
  name: Slipped Lead
  description: You gain an edge on tests made to escape bonds. Given 1 uninterrupted minute, you can escape any mundane bonds without making a test. Additionally, it’s not immediately obvious when you’ve escaped bonds until you do something that makes it clear you have done so (cast them off, use an ability that harms one or more creatures, and so forth).
  mtime: 1755374325111
  id: 1ba87ee8-d226-4590-ab42-1fe08a1431a2
  ctime: 1730449736744
06e9de24-0fb5-4f8d-adf3-1a886e75ecf7:
  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features: []
  tag: Interpersonal Perk
  name: Spot The Tell
  description: Whenever you make a test to read a person and obtain a tier 3 outcome, you notice several tells that give away their true feelings. Any test you make to read that person in the future gains an edge.
  mtime: 1755078904607
  id: 06e9de24-0fb5-4f8d-adf3-1a886e75ecf7
  ctime: 1730700760197
33187c06-068d-478c-a474-a699e80c0f88:
  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features: []
  tag: Interpersonal Perk
  name: So, Tell Me ...
  description: Whenever you succeed on a Presence test to influence one or more creatures, you can ask one creature you influenced a follow-up question after the test resolves, which they must answer honestly. At the Director’s discretion, the creature doesn’t have to answer the question completely—or at all—if the response would put them or a loved one in danger.
  mtime: 1755078911525
  id: 33187c06-068d-478c-a474-a699e80c0f88
  ctime: 1730700736974
7dd83084-1ea1-4e76-b1a4-833ba39d4cf5:
  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features: []
  tag: Interpersonal Perk
  name: Pardon My Friend
  description: When an ally within 5 squares fails a Presence test, you can step in and make a Presence test that takes a bane, with your roll replacing the ally’s roll. This perk can be used only once per test, even if more than one character has it.
  mtime: 1755078899175
  id: 7dd83084-1ea1-4e76-b1a4-833ba39d4cf5
  ctime: 1730700689855
a10f52dc-c30f-41dd-a6bd-fe7f8b6dc92e:
  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features: []
  tag: Lore Perks
  name: But I Know Who Does
  description: Whenever you fail a test to recall lore using a skill from the lore skill group, you instinctively recall the nearest location where the information you seek might be found. This could be the tower of a local sage, a library in a nearby city, somewhere deep in a dungeon, or any other location of the Director’s determination. The Director can decide that certain lore can’t be revealed this way.
  mtime: 1755079519072
  id: a10f52dc-c30f-41dd-a6bd-fe7f8b6dc92e
  ctime: 1730700798423
fd4f211d-25bf-45df-be9c-a2842c310035:
  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features: []
  tag: Exploration Perks
  name: Danger Sense
  description: Whenever you are in a natural environment (but not in a settlement in that environment), you gain an edge on tests made using the Alertness skill, and you can’t be surprised. Additionally, you have a connection to nature that warns you if any natural disaster is imminent within the next 72 hours, though you don’t know exactly what it will entail (an earthquake, a wildfire, and so forth).
  mtime: 1755079467677
  id: fd4f211d-25bf-45df-be9c-a2842c310035
  ctime: 1754888868403
82a7a2d7-f292-4a3a-973c-0da592818698:
  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features: []
  tag: Exploration Perks
  name: Brawny
  description: Whenever you fail a Might test, you can lose Stamina equal to 1d6 + your level to improve the outcome of the test by one tier. You can use this perk only once per test.
  mtime: 1755373592458
  id: 82a7a2d7-f292-4a3a-973c-0da592818698
  ctime: 1730700475852
077a32d2-4447-434a-b624-1d57d2592f52:
  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features: []
  tag: Interpersonal Perk
  name: Power Player
  description: Whenever you make a test that uses the Brag, Flirt, or Intimidate skills, you can use Might instead of any other characteristic the test calls for.
  mtime: 1755374046320
  id: 077a32d2-4447-434a-b624-1d57d2592f52
  ctime: 1730700719903
2ee21e30-f771-4ede-bb84-523b45ae9247:
  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features: []
  tag: Crafting Perk
  name: Improvisation Creation
  description: Without needing to make a test—and even without tools—you can quickly jury-rig or repair a mundane item or piece of equipment related to a skill you have from the crafting skill group. That item lasts for 1 hour or works for one use or activation (whichever comes first, as the Director determines), then breaks beyond repair. For example, if you have the Carpentry skill, you could repair a rickety wooden bridge long enough for a group of creatures to cross it, or build a simple shovel made of wood that can be used for 1 hour.
  mtime: 1755373425214
  id: 2ee21e30-f771-4ede-bb84-523b45ae9247
  ctime: 1730700409151
6338f7b4-e6c6-427e-9bf0-32171fc05030:
  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features: []
  tag: Exploration Perks
  name: Team Leader
  description: At the start of a group test or montage test, you can spend a hero token. If you do, all participants make tests as if they also had any skill you have from the exploration group.
  mtime: 1755079463960
  id: 6338f7b4-e6c6-427e-9bf0-32171fc05030
  ctime: 1730700569910
631febee-7a99-4319-b3a8-7df0fe2f5aa1:
  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features: []
  tag: Crafting Perk
  name: Handy
  description: Whenever you make a test to craft something and don’t have a skill that applies to the test, you gain a +1 bonus to the power roll.
  mtime: 1755373356478
  id: 631febee-7a99-4319-b3a8-7df0fe2f5aa1
  ctime: 1730700388067
303d8a16-0dee-47e1-a9c3-8c8a4856ae0c:
  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features: []
  tag: intrigue perk
  name: Lucky Dog
  description: Whenever you fail a test using any skill from the intrigue skill group, you can lose Stamina equal to 1d6 + your level to improve the outcome of the test by one tier. You can use this perk only once per test.
  mtime: 1755374292592
  id: 303d8a16-0dee-47e1-a9c3-8c8a4856ae0c
  ctime: 1730442431408
e0c518bd-dd36-4937-bcc6-e31ae177c896:
  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features: []
  tag: Exploration Perks
  name: I've Got You!
  description: Whenever a willing ally falls and would land on you or adjacent to you, you can safely catch them as a free triggered action. Neither of you takes damage from the ally’s fall.
  mtime: 1755079450819
  id: e0c518bd-dd36-4937-bcc6-e31ae177c896
  ctime: 1730700509292
7a84f127-3e28-4759-ab28-b599fb69c857:
  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features: []
  tag: Supernatural Perks
  name: Thingspeaker
  description: |-
    When you hold an object in your hand for 1 uninterrupted minute, you can sense whether it bears emotional resonance. Objects with emotional resonance could include treasured gifts, murder weapons, or personal keepsakes. If the Director determines that the object bears emotional resonance, you learn the most dominant emotion associated with the object, then receive a vision that answers one of the following questions:

    • What was the name of the person whose emotion is imprinted on this object?
    • Why does this emotion linger on the object?
    • How long has it been since the object was held by the person whose emotion lingers on it?

    After asking one question, you can choose to delve deeper by asking one additional question from the list, but you are then overcome with emotions that do not belong to you. You take a bane on Intuition and Presence tests until you finish a respite, and you can’t use this perk again while you suffer this bane.
  mtime: 1755375869198
  id: 7a84f127-3e28-4759-ab28-b599fb69c857
  ctime: 1730702186217
9a4e5a62-d28f-46cb-a03e-37cfc4c882ab:
  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features: []
  tag: intrigue perk
  name: Criminal Contacts
  description: You have access to a network of criminal contacts. As a respite activity while you take a respite in a settlement, you can ask a question of your contacts by making a Presence test. On a tier 2 outcome, you learn one piece of information that would be common among criminals—the secret entrances into a building, the location of a local criminal in hiding, the name of a local thieves’ guild leader, and so forth. On a tier 3 outcome, you can instead gain knowledge that would be uncommon among criminals as long as such information exists—the location of a local treasure cache, the location of a murder weapon used in a noble’s assassination, the name of an NPC secretly bankrolling a local assassin’s guild, and so forth.
  mtime: 1755078940093
  id: 9a4e5a62-d28f-46cb-a03e-37cfc4c882ab
  ctime: 1730442332715
3dd235fe-f471-4edb-a8fa-80e216988467:
