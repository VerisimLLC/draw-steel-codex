      data: |+
        Gnoll Abyssal Summoner	Level 2 Horde Support
        Abyssal, Gnoll	EV 4
        <b>Stamina</b> 20
        <b>Speed</b> 5	<b>Size</b> 1M /<b> Stability</b> 1
        <b>Free Strike</b> 2
        Might +1	Agility 0	Reason 0	Intuition +2	Presence +2
        <b>Flame Wad</b> (Action)%E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 5<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	4 fire damage
        %E2%98%85	<b>12%E2%80%9316</b>	5 fire damage
        %E2%9C%B8	<b>17</b>	7 fire damage; I<2 burning (save ends)
        <b>Effect</b> A burning target takes 1d6 fire damage at the start of each of their turns until the condition ends.

        <b>Call Abyssal Hyenas</b> (Maneuver) %E2%97%86 3 Malice
        <b>Keywords</b> -
        <b>Distance</b> Ranged 5<b>	Target</b> Special
        <b>Effect</b> 2 <b>abyssal hyenas</b> claw out of the ground into unoccupied squares.

        <b>Cackletongue</b> (Maneuver) %E2%97%86 4 Malice
        <b>Keywords</b> -
        <b>Distance</b> 2 burst<b>	Target</b> All allies
        <b>Effect</b> 1 abyssal hyena target turns into a <b>gnoll maurader</b>, keeping their Stamina. Targets who haven't used a cackletongue maneuver on this turn use it immediately at no cost.

        <b>Death Frenzy</b>
        Whenever a non-minion within 5 is reduced to 0 Stamina, the abyssal summoner moves up to their speed and makes a free strike.

