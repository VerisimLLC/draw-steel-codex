      classid: f6f4fcd3-c93e-49dd-832a-f898bc5fca78
      description: You and each ally within 5 squares of you ignore negative effects from inclement weather, such as banes or environmental damage. Additionally, you can use the Blessing of Fortunate Weather feature as if you were a 1st-level conduit (see 1st-Level Domain Feature in the Conduit section).
      name: Stormborn
      implementation: 0
    - __typeName: CharacterFeature
      domains:
        class:f6f4fcd3-c93e-49dd-832a-f898bc5fca78: true
        class:ce18b1ba-363b-4403-945b-34a3ce08a465: true
      guid: db4f8f04-ed46-4180-b75d-c4abc7785f96
      modifiers: []
      name: Blessing of Fortunate Weather
      classid: f6f4fcd3-c93e-49dd-832a-f898bc5fca78
      description: "When you finish a respite, you can decide the weather conditions within 100 squares of you. Until you finish another respite, the weather conditions you establish follow you through any mundane outdoor locations. \n\nChoose one of the following types of weather, each of which grants a benefit to you and your allies: \n\nClear: You and each ally gain an edge on tests that use the Search or Navigate skills. \n\nFoggy: You and each ally gain an edge on tests that use the Hide skill. \n\nOvercast: You and each ally gain an edge on tests that use the Endurance skill. \n\nPrecipitation: When the ground is muddy or snowy, you and each ally gain an edge on tests that use the Track skill. "
      source: Stormwight Class Feature
      implementation: 0
