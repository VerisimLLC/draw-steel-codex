    l: 'The areas detailed inside and outside the keep are keyed to the [Castle '
    f: |+
      Deep in the Silver Wood and rumored to be haunted by Caelian ghosts, the ruins of Castle Andreas slumbered untouched for centuries. Then a few months ago, the Jagged Edge stumbled into it. The old keep verges on the brink of collapse, but the goblins aren’t afraid of toppling it if it means putting an end to their attackers. 

    Z: |+
      # Castle Andreas

    w: |+
      ## Keep Interior Features

    xL: |
      * **Ceilings:** The ceilings in most rooms are 4 squares high. The ceilings in [A2. Great Hall Barracks] are 6 squares high.
    u: |
      |So Many Different Encounters!|
    v: |+
      |There are different goblins in every battle depending on if the heroes have the cup, Queen Bargnot has the cup, and how long she has had the cup for. See [Goblin Replacements] for more information. The encounters have already been sorted out for you, you just need to select the right one based on your adventure situation!|


    s: |+
