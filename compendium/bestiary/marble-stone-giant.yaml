      data: |+
        Marble Stone Giant	Level 8 Elite Hexer
        Giant, Stone Giant	EV 40
        <b>Stamina</b> 207
        <b>Speed</b> 6 (burrow)	<b>Size</b> 4 /<b> Stability</b> 10
        <b>Free Strike</b> 8
        Might +4	Agility +3	Reason 0	Intuition +3	Presence 0
        <b>Marble From A Great Sling</b> (Action)%E2%97%86 2d10 + 4 %E2%97%86 Signature
        <b>Keywords</b> Area, Ranged, Weapon
        <b>Distance</b> 3 cube within 10<b>	Target</b> All enemies and objects
        %E2%9C%A6	<b>%E2%89%A411</b>	6 damage; I<2 dazed (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	10 damage; I<3 dazed (save ends)
        %E2%9C%B8	<b>17</b>	14 damage; I<4 dazed (save ends)
        <b>Effect</b> This ability knocks the target prone if they are already affected by an EoT or a Save Ends effect.

        <b>Far Flung</b> (Action)%E2%97%86 2d10 + 4%E2%97%86 3 Malice
        <b>Keywords</b> Melee, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	Vertical push 10
        %E2%98%85	<b>12%E2%80%9316</b>	Vertical push 12
        %E2%9C%B8	<b>17</b>	Vertical push 15
        <b>Effect</b> The target is catapulted sky high. This ability has a double edge against prone or grabbed targets.

        <b>Polish Stone Shape</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> 10 x 2 line within 1<b>	Target</b> Special
        <b>Effect</b> The affected area becomes slick and glossy. Non-giants that start or end their turn on the ground in the affected area are knocked prone and slide 2.

        <b>Break Armor</b> (Triggered Action) %E2%97%86 1 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self	<b>Target</b> Self
        <b>Trigger</b> The marble stone giant takes damage
        <b>Effect</b> The marble stone giant halves the damage, gains damage weakness 3, and increases their speed by 3. The damage weakness increases by 3 each time the marble stone giant uses this ability in an encounter.

        <b>Stone Steps</b>
        The marble stone giant ignores difficult terrain.

        <b>Stonebreaker Flesh</b>
        Whenever an enemy gets a tier 1 result on a melee strike against the marble stone giant, they have a bane on all subsequent uses of that ability until the end of the encounter.

