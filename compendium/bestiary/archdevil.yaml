      data: |
        Archdevil	Level 6 Leader
        Devil, Infernal	EV 32
        <b>Stamina</b> 181	<b>Immunity</b> Fire 8
        <b>Speed</b> 7 (fly)	<b>Size</b> 1M /<b> Stability</b> 2
        <b>Free Strike</b> 6
        Might +1	Agility +3	Reason +2	Intuition +1	Presence +4
        <b>Infernal Decree</b> (Action) %E2%97%86 2d10 + 4 %E2%97%86 Signature
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 12<b>	Target</b> Three creatures or objects
        %E2%9C%A6	%E2%89%A411	10 damage; P<2 the target can't hide (save ends)
        %E2%98%85	12%E2%80%9316	15 damage; P<3 the target can't hide (save ends)
        %E2%9C%B8	17	19 damage; P<4 the target can't hide (save ends)
        <b>2 Malice</b> Each devil has an edge to strike a target that can't hide.

        <b>Compel the Jury</b> (Maneuver) %E2%97%86 2d10 + 4
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 12	<b>Target</b> 2 creatures
        %E2%9C%A6	%E2%89%A411	I<2 charmed (save ends)
        %E2%98%85	12%E2%80%9316	I<3 charmed (save ends)
        %E2%9C%B8	17	I<4 charmed (save ends)
        <b>Effect</b> Until the condition ends, a charmed creature considers the archdevil an ally, and the archdevil can spend 1 malice on their turn to force move a charmed creature up to 3 squares.

        <b>Devilish Suggestion</b> (Triggered Action) %E2%97%86 2 Malice
        <b>Keywords</b> Magic
        <b>Distance</b> Ranged 5<b>	Target</b> Triggering creature
        <b>Trigger</b> A creature targets the archdevil with a strike.
        <b>Effect</b> The target makes a <b>Presence test.</b>
        %E2%9C%B8	%E2%89%A411	Charmed (save ends) (see Compel the Jury)
        %E2%98%85	12%E2%80%9316	The archdevil chooses a new target for the strike
        %E2%9C%A6	17	The archdevil halves the incoming damage

        <b>End Effect</b>
        At the end of their turn, the archdevil can take 10 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>True Name</b>
        If a creature within 10 squares of the archdevil speaks the archdevil's true name aloud, the archdevil loses their immunities, the additional effects on their signature attack, and their Devilish Suggestion triggered action.

        <b>Welcome, Friends</b> (Villain Action 1)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 3 burst<b>	Target</b> Each enemy in burst
        <b>Effect</b> Each target makes a <b>Presence test.</b>
        %E2%9C%A6	%E2%89%A411	15 psychic damage; charmed (save ends)
        %E2%98%85	12%E2%80%9316	12 psychic damage; charmed (save ends)
        %E2%9C%B8	17	7 psychic damage

        <b>Heed My Commands! </b>(Villain Action 2)
        <b>Keywords</b> -
        <b>Distance</b> Self and 5 burst<b>	Target</b> Self and each allies in the burst
        <b>Effect</b> Each target shifts up to their speed. The archdevil can force move each charmed creature up to half their speed.

        <b>Deceptive Stratagem</b> (Villain Action 3)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 12<b>	Target</b> 1 ally or charmed creature
        <b>Effect</b> The archdevil swaps places with the target. Then, each ally and charmed creature within 12 of the archdevil make a free strike against a target of the archdevil's choice.
        RETAINER
        Devil Defector	Level 5 Hexer Retainer
        Devil, Planar
        <b>Stamina</b> 57	<b>Immunity</b> fire 5
        <b>Speed </b>6 (fly)	<b>Size</b> 1M /<b> Stability</b> 0
        <b>Free Strike</b> 5
        Might +3	Agility +2	Reason +3	Intuition +1	Presence +2
        <b>Corrupting Flame</b> (Action) %E2%97%86 2d10 + Highest Characteristic %E2%97%86 Signature
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 10<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	6 fire or corruption damage
        %E2%98%85	<b>12%E2%80%9316</b>	10 fire or corruption damage
        %E2%9C%B8	<b>17</b>	13 fire or corruption damage

        <b>Tempting Offer</b> (Free Triggered Action, Encounter)
        <b>Keywords</b> Attack, Melee
        <b>Distance</b> Ranged 10<b>	Target</b> Triggering  creature
        <b>Trigger</b> A sapient enemy is reduced to 0 Stamina.
        <b>Effect</b> If the creature takes the defector's offer, the creature is reduced to 1 Stamina instead of 0. If they do so, on their next turn the defector controls the creature's move action, and the creature must use a Signature Action against a creature of the defector's choice or immediately die. The Director must spend 3 Malice to have the creature turn down this offer.

        <b>True Name</b>
        If a creature within 10 squares of the defector speaks the defector's true name aloud, the defector loses their immunities, the additional effects on their signature attack, and their Devilish Charm triggered action.

        Level 7 Retainer Advancement Ability
        <b>Flames of Revenge</b> (Action, Encounter) - 2d10 + highest characteristic
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 3 cube within 10	<b>Target</b> All enemies
        %E2%9C%A6	<b>%E2%89%A411</b>		6 corruption damage
        %E2%98%85	<b>12%E2%80%9316</b>		10 corruption damage
        %E2%9C%B8	<b>17</b>		14 corruption damage
        <b>Effect</b> If the defector's mentor is in the area, they burn with harmless flame until the end of the defector's next turn. While this fire burns, the mentor has fire immunity 10 and any creature that hits the mentor takes 10 fire damage.

        Level 10 Retainer Advancement Ability
        <b>Hell On Earth</b> (Action, Encounter)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 5 cube within 10	<b>Target</b> --
        <b>Effect</b> The area burns with infernal fire until the end of the devil's next turn. An enemy of the defector that ends their turn in the area takes 10 fire damage and is <b>P (medium) frightened</b> (save ends).
