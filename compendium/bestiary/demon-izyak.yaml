      data: |+
        Demon Izyak	Level 10 Horde Controller
        Abyssal, Demon	EV 12
        <b>Stamina</b> 55	<b>Weakness</b> Holy 5
        <b>Speed</b> 6 (teleport)	<b>Size</b> 2 /<b> Stability</b> 0
        <b>Free Strike</b> 4
        Might +0	Agility +0	Reason +5	Intuition +2	Presence +4
        <b>Nostalgic Wanderlust</b> (Action) %E2%97%86 2d10 + 5%E2%97%86 Signature
        <b>Keywords</b> Psionic, Ranged, Strike
        <b>Distance</b> Ranged 10<b>	Target</b> One creature
        %E2%9C%A6	<b>%E2%89%A411</b>	9 psychic damage; R<3 restrained (save ends)
        %E2%98%85	<b>12-16</b>	12 psychic damage; R<4 restrained (save ends)
        %E2%9C%B8	<b>17</b>	14 psychic damage; R<5 restrained (save ends)
        Effect 	A restrained target can be force moved and slides 3.
        <b>2 Malice</b> The izyak vertically slides the target 6 squares instead. A target restrained in midair doesn't fall until the condition ends.

        <b>Ruinous Temptation </b>(Action) %E2%97%86 2d10 + 5 %E2%97%86 3 Malice
        <b>Keywords</b> Area, Psionic, Ranged
        <b>Distance</b> 4 cube within 10<b>	Target</b> All enemies in the cube
        %E2%9C%A6	<b>%E2%89%A411</b>	4 psychic damage; I<3 dazed (save ends)
        %E2%98%85	<b>12-16</b>	7 psychic damage; I<4 dazed (save ends)
        %E2%9C%B8	<b>17</b>	9 psychic damage; I<5 dazed (save ends)
        <b>Effect</b> A dazed target must move their speed toward the izyak on their turn.
        <b>2 Malice</b> The area increases to a 6 cube.

        <b>Lethe</b>
        While winded, the izyak has an edge on strikes, and strikes have an edge against them.

        <b>Soulsight</b>
        Each creature within 2 of the izyak can't be hidden from them.

