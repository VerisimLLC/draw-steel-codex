        <b>Eager Claws</b> (Action) %E2%97%86 2d10 + 3%E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> One creature or object per minion
        %E2%9C%A6	<b>%E2%89%A411</b>	3 damage
        %E2%98%85	<b>12-16</b>	5 damage; target has a bane on their next strike
        %E2%9C%B8	<b>17</b>	7 damage; target has a bane on their next strike

        <b>Feast</b> (Triggered Action)
        <b>Keywords</b> Psionic
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Trigger</b> The whelp kills a creature.
        <b>Effect</b> The whelp transforms into a <b>mindkiller</b>. They have Stamina equal to their squad's Stamina pool before transforming.

        <b>Psionic Conductor</b>
        When a non-minion Voiceless Talker within 5 of the whelp uses an ability with the Psionic keyword, they can do so as if they were in the whelp's space.



