  description: B7. Smokehouse
  content: |
    # B7. Smokehouse

    > * “A squat stone building with a chimney pipes smoke into the air.”
    > * “Outside the smokehouse, a young woman with a soot-covered face watches your approach with apprehension as she stacks wood outside the house.”


    Saberna, a 17-year-old, tends to the smokehouse. She stands watch outside it and goes in to stoke the fire every so often. When the heroes approach, she’s nervous and standoffish with them.


    ## Stolen Meat

    If the heroes ask Saberna about the stolen meat, she responds that there are some villagers who think the meat is being stolen, but they just don’t understand that it shrinks throughout the smoking process. Any hero can tell that this immediate defensive reaction is a lie without the need for a test.
    If accused of lying or if a hero attempts to get the truth out of Saberna, she panics and starts running off. If the heroes wish to chase her, they must engage in a montage test.


    ## [Montage Test: Chase Saberna]
