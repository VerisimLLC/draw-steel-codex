        ##  Negotiation Stats 

        {
      L: |
        Impression: 3
      I: |+
        {Queen Bargnot is suspicious of the heroes. They’ve been chasing her and causing problems for the bandits this entire time. However, this is also an opportunity for her to finally stop fighting and live the rest of her life.

      J: |+
        If the heroes have the [item:Cup of Iulius], her patience increases by 1.}


      G: |+
        # Negotiation: Queen Bargnot

      H: |+
        *(see Negotiation on page 283 in [pdf:Draw Steel Heroes:283])*

      E: |
        Queen Bargnot wants to look good in the eyes of her people but won’t commit to anything at her expense. She rallies and raises the commotion of the goblins around her while she speaks to the heroes, showing a tremendous amount of presence not normally seen in battle.
      F: |+
        The queen communicates her true emotions with her eyes, expressing fear when confronted with the future and determination whenever she speaks about her people. The only way to tell if she’s lying during negotiations is if she makes a statement while expressing zero emotion in her gaze.


      C: |+
        The heroes can negotiate with Queen Bargnot if they come to Castle Andreas and ask her to stand down her attack on Broadhurst. The Jagged Edge bandits provide opportunities to put down weapons in A1. Courtyard Barricade and A5. War Room, where the queen comes to meet the heroes in front of her goblins.


      D: |+
        ## Roleplaying Queen Bargnot

