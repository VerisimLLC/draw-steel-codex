    import:
      override: true
      data: |+
        Ogre Juggernaut	Level 2 Elite Harrier
        Giant, Ogre	EV 16
        <b>Stamina</b> 80
        <b>Speed</b> 6	<b>Size</b> 2 /<b> Stability</b> 2
        <b>Free Strike</b> 5
        Might +2	Agility +1	Reason -1	Intuition 0	Presence -1
        <b>Pitchfork Catapult</b> (Action)%E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Charge, Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	7 damage
        %E2%98%85	<b>12%E2%80%9316</b>	10 damage; A<1 vertical push 3
        %E2%9C%B8	<b>17</b>	13 damage; A<2 vertical slide 5
        <b>1 Malice</b> Each target is <b>M<1</b> bleeding (save ends).

        <b>Earth Breaking Jump</b> (Action)%E2%97%86 2d10 + 2
        <b>Keywords</b> Area, Melee, Weapon
        <b>Distance</b> 3 burst<b>	Target</b> All creatures in the burst
        <b>Effect</b> The juggernaut jumps up to 6 squares before using this ability.
        %E2%9C%A6	<b>%E2%89%A411</b>	4 damage
        %E2%98%85	<b>12%E2%80%9316</b>	6 damage; push 2; M<1 prone
        %E2%9C%B8	<b>17</b>	9 damage; push 4; M<2 prone

        <b>Horrible Bellow</b> (Maneuver) %E2%97%86 2d10 + 2 %E2%97%86 2 Malice
        <b>Keywords</b> Area
        <b>Distance</b> 3 burst<b>	Target</b> All enemies in the burst
        %E2%9C%A6	<b>%E2%89%A411</b>	I<0 frightened (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	I<1 frightened (save ends)
        %E2%9C%B8	<b>17</b>	I<2 frightened (save ends)
        <b>Effect</b> All ogres have an edge on strikes against creatures frightened by this ability.

        <b>Hrraaaaaagh!</b> (Free Triggered Action) %E2%97%86 1 Malice
        <b>Keywords</b> -
        <b>Trigger</b> The juggernaut takes damage.
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The juggernaut moves up to their speed and makes a free strike.

        <b>Destructive Path</b>
        The juggernaut automatically destroys unattended, mundane size 1 objects in their path during their movement. They can break through any mundane wall made of wood, stone, or a similarly sturdy material in this way, so long as the wall is no more than 1 square thick.

        <b>Defiant Anger</b>
        The juggernaut has damage immunity 2 while they are winded.



