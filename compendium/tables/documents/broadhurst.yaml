      After meeting with Abbott Loric, the heroes are free to explore the town. These locations are keyed on the [Broadhurst Region] map. 
    v: |+
      Whatever happens next, let the players decide where to go. They should drive the action. If the heroes take their sweet time deciding what to do, you can advance the action with one of the events listed in the Events section.

