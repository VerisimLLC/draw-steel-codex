content: |-
  # Grabbing the Ring

  If the heroes wish to obtain the ring, they can attempt to steal it from [Illwyth]’s hand. While talking to her, a hero can engage in a bit of sleight of hand with a hard Agility test.
  |Steal Illwyth’s Ring: Agility Test
  |{# The hero fails to get the ring and Illwyth notices. She makes a mental note the heroes need to be dealt with and tells her friends as soon as possible (see Gilded Showdown in Events).}
  |{# The hero fails to get the ring, but Illwyth doesn’t notice.}
  |{# The hero gets the ring without Illwyth’s immediate notice. However, she eventually figures out what happened after the heroes finish their next respite. She tells her friends (see Gilded Showdown in Events).}

  See [Gilded Showdown] in [Events], and make a note on the [Respite Tracker] if necessary.
