  name: Waterborn
  ctime: 1755518439046
  description: You nearly lost your life at sea, but then you heard the voice. Someone—or something—in the water called out to you, telling you to swim. The ocean was suddenly no longer your doom but your parent, granting you a fragment of its power. But for what purpose, you can’t be sure.
  id: 8d8d7a75-6207-4b90-ae9f-f9fa9d74bb01
  benefit: You can automatically swim at full speed while moving, and you can breathe underwater. Additionally, you have the Rogue Wave ability.
909d4869-385b-4d34-aca7-d90ff3348dea:
  __typeName: CharacterComplication
  drawback: Each time you resume your true identity while you are still hunted, you have a 20 percent cumulative chance each day that your enemies will find you. This chance resets if you resume your secret identity for 1 day.
  mtime: 1755604041079
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Secret Identity
  ctime: 1755516860424
  description: You’re secretly important—but it’s not safe for your true identity to be known. Perhaps you’re the witness to a crime or a member of a royal family on the run from a usurper. Until you are no longer at risk of being hunted, you’ll maintain the guise of an ordinary adventurer.
  id: 909d4869-385b-4d34-aca7-d90ff3348dea
  benefit: You have a skill of your choice from the intrigue skill group. Additionally, you can resume your true identity temporarily. While in your true identity, your Renown and Wealth are treated as 2 higher than usual, and you might gain other benefits in consultation with the Director.
