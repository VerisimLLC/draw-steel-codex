      data: |+
        Wyvern Lurker	Level 4 Elite Ambusher
        Beast, Wyvern	EV 24
        <b>Stamina</b> 120	<b>Immunity</b> Acid 5
        <b>Speed</b> 9 (fly)	<b>Size</b> 2 /<b> Stability</b> 2
        <b>Free Strike</b> 6
        Might +2	Agility +3	Reason -1	Intuition +1	Presence 0
        <b>Agonizing Stinger</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	%E2%89%A411	9 damage
        %E2%98%85	12%E2%80%9316	14 damage; M<2 bleeding (save ends)
        %E2%9C%B8	17	17 damage; M<3 bleeding (save ends)
        <b>1 Malice</b> The lurker deals an additional 6 acid damage to one target if they were hidden from them.

        <b>Acidic Anguish</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 3 Malice
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>	Target</b> 1 creature or object
        %E2%9C%B8	%E2%89%A411	10 acid damage; M<1 weakened (save ends)
        %E2%98%85	12%E2%80%9316	16 acid damage; M<2 weakened (save ends)
        %E2%9C%A6	17	20 acid damage; M<3 weakened (save ends)
        <b>Effect</b> A target weakened from this ability takes 1d4 acid damage at the start of each of their turns until the condition ends.

        <b>Swooping Torment</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The lurker flies up to their speed and hides. Each enemy that comes within 1 square of the lurker during this movement can choose to take 3 sonic damage or fall prone.

        <b>Retaliatory Dive</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 5<b>	Target</b> Triggering creature
        <b>Trigger</b> A creature deals damage to the lurker with a ranged ability.
        <b>Effect</b> The lurker flies into a square adjacent to the target and makes a free strike against them.

        <b>Ruthless Rage</b>
        The lurker deals an additional 3 damage on strikes while within 10 squares of another wyvern.

        <b>Tenacious Hunter</b>
        Any creature suffering a condition inflicted by a wyvern can't be hidden from the lurker.



