  content: "# Encounter D7\n\nThe heroes battle ruinborn and undead in the Hall of Regret.\n\n[[setting:numheroes]]\n\n[[encounter: D7]]\n\n**D7 Groups**\n|Group	|Creatures|\n|1|One wallmaster|\n|2|One soulwight (captain), Four decrepit skeletons (minion squad)|\n|3|One soulwight (captain),Four decrepit skeletons (minion squad)|\n|4|Two skeletons|\n|5|Two skeletons|\n \n**Encounter Adjustments**\nIf this encounter has more or fewer than five heroes, make the following adjustments:\n* For six heroes, add two skeletons.\n* For four heroes, remove two skeletons.\n* For three heroes, remove all four skeletons.\n\n\n## Tactics\n\nIf the heroes approach the altar, the wallmaster opens the walls and ambushes the party. The skeletons pepper the heroes with arrows to bait them to enter the niches, where the wallmaster can trap them away from the rest of the party. Meanwhile, the two soulwights move to guard the door out. If it looks like the heroes are going to make a break for it with the shield half, the wallmaster tries to block the exit as quickly as possible.\n\n\n## Ending the Encounter\n\nIf the wallmaster and both soulwights are defeated, the remaining creatures crumble. Alternatively, if all heroes exit this room, the monsters don't pursue them. Leaving the room with the right half of the Delian Shield earns the heroes 1 Victory each.\n[[/awardvp 1|Award Heroes 1 Victory]]\n"
