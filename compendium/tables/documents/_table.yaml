    sections:
      Nc: |+
        ## The Heroes have the Cup of Iulius

      "No": |+
        ## Queen Bargnot has the Cup of Iulius

      NW: |+
        [[encounter:civilians]]

      t: |+
        ## Ending the Encounter

      Ni: |+
        [[encounter:The Cavalry]]

      r: |+
        Goblins drawn into the battle have straightforward tactics. The assassins and warriors move around the battlefield with their worgs, running in and out of melee while the stinkers ride around the edge of the battlefield and attempt to keep the heroes away from still-captive civilians.


      MM: |+
        *Place down the relevant Monsters, and then mount up the goblins by dragging them into the mount slots*

      Nu: |+
        [[encounter:The Cavalry QB]]


      n: |+
        The well at the center of the town is 4 squares deep and has less than 1 square of water in it.


      l: |+
        ## Well

      j: |+
        The goblins favor targeting the heroes over freed captives, but they don't mind if a captive gets caught in the crossfire.


      g: |+
        A hero who is adjacent to a restrained captive can use a maneuver to free a captive, pulling them off the worg into an unoccupied adjacent square and ending the restrained condition for that captive. If a captive is force moved, they are similarly freed.

      h: |+
        Each freed captive acts at the end of the round, moving toward the nearest edge of the map that they can while avoiding danger. If they move off the edge of the map, they are safe and leave the encounter.

      e: |+
        Each of the eight worg-riding goblins has a captive on their back, a restrained civilian. While restrained, the civilian can occupy the same space as a goblin riding a worg.

      f: |+
        While a goblin has a captive on their back, they attempt to reach the south end of the map, leaving the encounter if they move off that edge of the map with the captive. If a goblin loses their captive, they turn and fight the heroes instead.

      c: |+
        * For three heroes, remove two goblin warriors and two worgs and two civilians.


      d: |+
        ##Freeing the Captives

      a: |
        * For six heroes, add one goblin warrior riding one worg who carries one civilian captive.
      b: |
        * For four heroes, remove one goblin warrior, one worg, and one civilian.
      Y: |
        **Encounter Adjustments**
      Z: |
        If this encounter has more or fewer than five heroes, make the following adjustments:
