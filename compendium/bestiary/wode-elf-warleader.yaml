    import:
      type: mcdm
      data: |+
        Wode Elf Warleader	Level 3 Leader
        Fey, Humanoid. Wode Elf	EV 20
        <b>Stamina</b> 120
        <b>Speed</b> 7 (teleport)	<b>Size</b> 1M / <b>Stability</b> 2
        	<b>Free Strike</b> 5
        Might +2	Agility +3	Reason +2	Intuition +2	Presence +2
        <b>Wodeblade</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>Target</b> Two creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	8 damage; M<1 restrained (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	12 damage; M<2 restrained (save ends)
        %E2%9C%B8	<b>17</b>	15 damage; M<3 restrained (save ends)
        <b>	Effect</b> The warleader strikes each target one at a time and can teleport 3 squares between each strike.
        <b>2 Malice</b> A target restrained by this ability takes an additional 3 damage.

        <b>Fairness is a Human Concept</b> (Maneuver) %E2%97%86 5 Malice
        <b>Keywords</b> Area
        <b>Distance</b> 10 burst<b>Target</b> All allies in the burst
        <b>Effect</b> Each target can make a free strike and then shifts 3. A target immediately hides at the end of the warleader's turn while in cover or concealment.

        <b>Wode Sickness</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Trigger</b> An ally ends their turn.
        <b>	Distance</b> Ranged 10	<b>Target</b> 1 enemy
        <b>Effect</b> The target must take their turn now, if they have not already taken it. <b>P<2</b> the target is bleeding and has a bane on their strikes until the end of their turn.

        <b>End Effect</b>
        At the end of their turn, the warleader can take 5 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Hunter's Glamor</b>
        The warleader immediately hides at the end of their turn, even if they are observed.

        <b>You Will ALL Witness my Blade </b>(Villain Action 1)
        <b>Keywords</b> Area
        <b>Distance</b> 5 burst<b>Target</b> All enemies in the burst
        <b>Effect</b> The warleader uses Wodeblade against each target with an edge.

        <b>Suppressing Volley </b>(Villain Action 2)
        <b>Keywords</b> Area
        <b>Distance</b> 5 burst<b>Target</b> All allies in the burst
        <b>Effect</b> The warleader uses Wodeblade against a single creature or object. Each target then makes a free strike.

        <b>Is it Now or is it Then? Where are We? </b>(Villain Action 3)
        <b>Keywords</b> Area
        <b>Distance</b> Self and 5 burst<b>Target</b> Self and all allies in the burst
        <b>Effect</b> Each target becomes invisible until the start of the next round. The warleader then uses Wodeblade.



