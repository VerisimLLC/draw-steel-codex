    import:
      type: mcdm
      data: |+
        ANGULOTL SLINK	LEVEL 1 HORDE AMBUSHER
        Angulotl, Humanoid	EV 3
        Stamina 15	Immunity poison 2
        Speed 7 (swim, climb)	Size 1S / Stability 0
        Free Strike 2
        Might +1	Agility +2	Reason 0	Intuition 0	Presence 0
        Tonguelash (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        Keywords Melee, Strike, Weapon
        Distance Melee 6	Target 1 creature or object
        %E2%9C%A6	%E2%89%A411	4 damage; pull 2
        %E2%98%85	12%E2%80%9316	6 damage; pull 4
        %E2%9C%B8	17	7 damage; pull 6
        Effect The target is wet (save ends) (see Wet). Allies targeted by this ability take no damage and are pulled 6, ignoring stability.

        Hop To It (Free Maneuver) %E2%97%86 1 Malice
        Keywords %E2%80%94
        Distance Self	Target Self
        Effect The slink jumps 3 squares. If the slink lands in cover or concealment, they can immediately Hide.

        Toxiferous
        When an adjacent enemy grabs or uses a melee ability against the slink, they take 2 poison damage.

        Adhesive
        The slink excretes residue into their square at the end of each of their turns. A non-angulotl creature or object that enters or leaves the square must use a maneuver to withstand the adhesive or be restrained (EoT).



