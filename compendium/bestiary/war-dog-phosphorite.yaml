        <b>Caustic Detonator</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 10	<b>Target</b> One creature or object
        <b>Effect </b>A detonator attaches to the target. At the end of each round, roll a die. On an odd result, the detonator explodes, triggering the power roll.
        %E2%9C%A6	%E2%89%A411	4 acid damage; M<0 bleeding (save ends)
        %E2%98%85	12%E2%80%9316	6 acid damage; M<1 bleeding (save ends)
        %E2%9C%B8	17+	10 acid damage; M<2 bleeding (save ends)
        <b>Special</b> An adjacent creature can attempt an <b>easy Agility test </b>to remove the detonator as a maneuver. A failure does nothing, a success disarms and destroys the detonator, and a success with a reward allows the disarming creature to throw the detonator onto another target within 5 squares.

        <b>Posthumous Promotion</b> (Maneuver)
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 10	<b>Target</b> One war dog with a loyalty collar
        <b>Effect </b>The target's loyalty collar detonates, killing them instantly.

        <b>Loyalty Collar</b>
        When the phosphorite dies, they explode, dealing 1d6 damage to each adjacent enemy.



