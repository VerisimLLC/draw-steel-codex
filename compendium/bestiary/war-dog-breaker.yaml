      data: |+
        War Dog Breaker    Level 7 Elite Brute
        Humanoid, War Dog    EV 36
        <b>Stamina</b> 200
        <b>Speed</b> 5    <b>Size</b> 2 /<b> Stability</b> 4
        <b>Free Strike</b> 8
        Might +4    Agility +2    Reason +1    Intuition +1    Presence +3
        <b>Pile BunkerGauntlet</b> (Action) %E2%97%86 2d10 + 4%E2%97%86 Signature
        <b>Keywords</b> Charge, Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>    Target</b> Two creatures or objects
        %E2%9C%A6    <b>%E2%89%A411</b>    12 damage; push 4
        %E2%98%85    <b>12-16</b>    17 damage; slide 4
        %E2%9C%B8    <b>17</b>    21 damage; vertical slide 4
        <b>Effect </b>A target that is force moved into an obstacle is knocked prone and <b>M<3</b> dazed (save ends).

        <b>Surging Power</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>    Target</b> Self
        <b>Effect</b> The breaker's speed increases by 3 and they have a double edge on their abilities until the start of their next turn. The breaker fails all potent effects until the start of their next turn.

        <b>Breaking Point</b>
        When the breaker is reduced to 0 Stamina, they do not die. They lose any conditions affecting them and immediately take a turn, regardless of if they have already taken one this round. During this turn, they deal an additional 5 damage on their strikes and abilities. The breaker dies at the end of this turn.

        <b>Loyalty Collar</b>
        When the breaker dies, they explode, dealing 3d6 damage to each adjacent enemy.
        War Dog Firestarter    Level 8 Horde Hexer
        Humanoid, War Dog    EV 10
        <b>Stamina</b> 45    <b>Immunity </b>Fire 8
        <b>Speed</b> 5    <b>Size</b> 1M /<b> Stability</b> 0
        <b>Free Strike</b> 3
        Might +0    Agility +2    Reason +3    Intuition +4    Presence +1
        <b>Twin Flamebelchers</b> (Action) %E2%97%86 2d10 + 4%E2%97%86 Signature
        <b>Keywords</b> Area, Weapon
        <b>Distance</b> 10 x 1 line within 1<b>    Target</b> All creatures and objects
        %E2%9C%A6    <b>%E2%89%A411</b>    3 fire damage; A<2 seared (save ends)
        %E2%98%85    <b>12-16</b>    6 fire damage; A<3 seared (save ends)
        %E2%9C%B8    <b>17</b>    8 fire damage; A<4 seared (save ends)
        <b>Effect</b> A seared creature has a bane on their strikes and damage weakness 5. A tier-3 result that includes an already seared target allows the firestarter to immediately use Enflame as a free triggered action.

        <b>Enflame </b>(Maneuver) %E2%97%86 2d10 + 4
        <b>Keywords</b> Magic
        <b>Distance</b> Ranged 10<b>    Target</b> Special
        <b>Effect</b> Roll power against each enemy within 2 of a seared creature within distance:
        %E2%9C%A6    <b>%E2%89%A411</b>    2 fire damage
        %E2%98%85    <b>12-16</b>    4 fire damage; A<3 seared (save ends)
        %E2%9C%B8    <b>17</b>    6 fire damage; A<4 seared (save ends)

        <b>Loyalty Collar</b>
        When the firestarter dies, they explode, dealing 3d6 damage to each adjacent enemy.

