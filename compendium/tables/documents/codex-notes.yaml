content: |-
  # Codex Notes

  The ! on the map is clickable by your players and they can use it to see the scene before proceeding.

  Ensure your players are ready for encounter 2 before proceeding: [[/slowstartlevel 2 | Level Heroes to Encounter 2]]

  Your players can click on the door after approaching it to open or close it.

  The stairs are set up as a teleporter, meaning your players just have to move onto them to teleport down into the tomb. You can double click (or middle click) on the stairs to go there too.

  Remind your players they can press "L" to turn their lights on!


  ## Call for a Break After Combat
  If this is your first time running a game of Draw Steel and you haven’t read the rest of part 1, you can call for a break after this combat encounter. While your players grab snacks, chat, use the bathroom, and look over their heroes, go ahead and read the map notes on [Delian Tomb - Level 1] to prepare for what’s coming next.
description: Codex Notes
