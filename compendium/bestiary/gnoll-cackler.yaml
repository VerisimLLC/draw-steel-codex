    import:
      type: mcdm
      data: |+
        Gnoll Cackler	Level 2 Horde Hexer
        Abyssal, Gnoll	EV 4
        <b>Stamina</b> 15
        <b>Speed</b> 5	<b>Size</b> 1S /<b> Stability</b> 1
        <b>Free Strike</b> 2
        Might 0	Agility 0	Reason +2	Intuition +2	Presence +2
        <b>Moment of Brutality</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 8	<b>Target</b> 1 creature
        %E2%9C%A6	<b>%E2%89%A411</b>	4 psychic damage; I<0 target makes a free strike against a creature of the cackler's choice
        %E2%98%85	<b>12%E2%80%9316</b>	5 psychic damage; I<1 target makes a free strike against a creature of the cackler's choice
        %E2%9C%B8	<b>17</b>	7 psychic damage; I<2 target uses a signature action against a creature of the cackler's choice
        <b>Effect</b> An ally targeted by this ability makes a free strike instead of taking damage.

        <b>Cackletongue</b> (Maneuver) %E2%97%86 4 Malice
        <b>Keywords</b> Area, Magic, Resistance
        <b>Distance</b> 2 burst	<b>Target</b> All creatures in the burst
        <b>Effect</b> Each enemy target makes an <b>Intuition test.</b>
        %E2%9C%B8	<b>%E2%89%A411</b>	Frightened (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	Frightened (EoT)
        %E2%9C%A6	<b>17</b>	No effect
        <b>Effect</b> Targets who haven't used a cackletongue maneuver on this turn use it immediately at no cost.

        <b>Death Frenzy</b>
        Whenever a non-minion ally within 5 is reduced to 0 Stamina, the cackler moves up to their speed and makes a free strike.


