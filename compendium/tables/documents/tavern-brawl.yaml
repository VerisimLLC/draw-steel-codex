    H: |+
      [Murkik] is a dwarf stonewhisperer accompanied by one dwarf warden and three dwarf trappers.

    E: |2
       * The heroes get caught stealing the merchants’ stone from the stables (see [B14. Stables and Carriage House]).
    F: |2+
       * The heroes don’t solve the dispute with [Dunquat] and the merchants and finish five respites during the adventure (see [Respite Tracker]). The next time they are in the inn, [Dunquat] is confronting the merchants and the conflict turns violent as [Murkik] lashes out at her. [Dunquat] calls out to the heroes for help, causing [Murkik] to attack them whether the heroes plan to defend [Dunquat] or not. [Dunquat] flees as [Murkik] focuses on the more dangerous foes.

    C: |
