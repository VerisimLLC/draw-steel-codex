    import:
      type: mcdm
      data: |+
        Fossil Cryptic	Level 2 Solo
        Elemental	EV 40
        <b>Stamina</b> 250
        <b>Speed</b> 8 (burrow)	<b>Size</b> 1L /<b> Stability</b> 3
        <b>Free Strike</b> 5
        Might +3	Agility +2	Reason +1	Intuition +1	Presence 0
        <b>Solo Monster</b>
        <b>Solo Turns</b> The cryptic takes up to two turns each round. They can't take turns consecutively.
        <b>End Effect</b> At the end of their turn, the cryptic can take 5 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Churning Trunk</b>
        The cryptic emits a 1 aura of swirling debris that obscures their form. Any enemy who enters the aura for the first time in a round or starts their turn there takes 5 damage. Ranged abilities that target the cryptic have a bane.

        <b>Seismic Step</b>
        The cryptic ignores difficult terrain. Additionally, they have line of effect to concealed creatures touching the ground.

        <b>Sand Slam</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2	<b>Target</b> Two creatures or objects
        %E2%9C%A6	%E2%89%A411	8 damage; A<1 slide 2
        %E2%98%85	12%E2%80%9316	12 damage; A<2 prone and can't stand (EoT)
        %E2%9C%B8	17+	15 damage; A<3 slide 3, prone and can't stand (EoT)
        <b>Effect</b> The ground beneath each target becomes difficult terrain.

        <b>Stone Bone Storm</b> (Action) %E2%97%86 2d10 + 3
        <b>Keywords</b> Area, Melee
        <b>Distance</b> 6 x 1 line within 1	<b>Target</b> Each enemy in the line
        %E2%9C%A6	%E2%89%A411	4 damage; M<1 push 2
        %E2%98%85	12%E2%80%9316	7 damage; M<2 prone
        %E2%9C%B8	17+	10 damage; M<3 prone
        <b>Effect</b> The cryptic reforms their body and appears in an unoccupied space within the line.

        <b>Shatterstone</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 5 Malice
        <b>Keywords</b> Area, Melee
        <b>Distance</b> 2 burst	<b>Target</b> Each enemy in the burst
        <b>Effect</b> The cryptic burrows up to half their speed, then creates the burst when they breach the surface.
        %E2%9C%A6	%E2%89%A411	4 damage; push 2
        %E2%98%85	12%E2%80%9316	7 damage; push 3; prone
        %E2%9C%B8	17+	10 damage; push 4; prone

        <b>Stoneshift</b> (Maneuver)
        <b>Keywords</b> Ranged
        <b>Distance</b> Ranged 5	<b>Target</b> One creature or object on the ground
        <b>Effect</b> Slide 3.
        <b>2 Malice</b> The distance of the ability becomes Ranged 10 and the slide increases to slide 6.

        <b>Dissipate</b> (Triggered Action) %E2%97%86 1 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self	<b>Target</b> Self
        <b>Trigger</b> The cryptic takes damage
        <b>Effect</b> The cryptic halves the damage, ignores any additional effects associated with it, and shifts up to 3 squares.

        <b>First Warning Quake</b> (Villain Action 1)
        <b>Keywords</b> Area, Melee
        <b>Distance</b> 5 burst	<b>Target</b> Each enemy on the ground in the burst
        <b>Effect</b> Each target makes a <b>Might test.</b>
        %E2%9C%B8	%E2%89%A411	The target is prone and can't stand (EoT)
        %E2%98%85	12%E2%80%9316	Prone
        %E2%9C%A6	17+	No effect
        <b>Effect</b> The affected area becomes difficult terrain.

        <b>Final Warning Fissure </b>(Villain Action 2)
        <b>Keywords</b> Area, Melee
        <b>Distance</b> 5 burst	<b>Target</b> Each enemy on the ground in the burst
        <b>Effect</b> Each target makes an <b>Agility test.</b>
        %E2%9C%B8	%E2%89%A411	9 damage; prone
        %E2%98%85	12%E2%80%9316	5 damage
        %E2%9C%A6	17+	The target moves to the nearest unoccupied space outside the area.
        <b>Effect</b> The area drops 2 squares. Each enemy in the area falls, while allies of the fossil cryptic drop safely. The affected area then becomes difficult terrain.

        <b>No Escape</b> (Villain Action 3) %E2%97%86 2d10 + 3
        <b>Keywords</b> Ranged
        <b>Effect</b> The cryptic makes an initial power roll that calls down stone pillars from the ceiling.
        <b>Distance</b> Ranged 10	<b>Target</b> Two creatures or objects
        %E2%9C%A6	%E2%89%A411	5 damage; prone; M<1 restrained (save ends)
        %E2%98%85	12%E2%80%9316	9 damage; prone; M<2 restrained (save ends)
        %E2%9C%B8	17+	12 damage; prone; M<3 restrained (save ends)
        <b>Effect</b> The cryptic then makes a final power roll that raises stone pillars from the floor.
        <b>Distance</b> Ranged 10
        <b>Target</b> Two creatures or objects on the ground
        %E2%9C%A6	%E2%89%A411	2 damage; vertical slide 2
        %E2%98%85	12%E2%80%9316	3 damage; vertical slide 4
        %E2%9C%B8	17+	4 damage; vertical slide 8 or the target is restrained against the ceiling (save ends)

