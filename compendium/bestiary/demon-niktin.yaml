        <b>Violent Transformation</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Area, Magic, Melee
        <b>Distance</b> 2 burst<b>	Target</b> All enemies in the burst
        %E2%9C%B8	<b>%E2%89%A411</b>	3 corruption damage
        %E2%98%85	<b>12-16</b>	6 corruption damage
        %E2%9C%A6	<b>17</b>	7 corruption damage; I<3 dazed (save ends)
        <b>Effect</b> The niktin violently changes shape. The niktin deals an additional 6 damage to each target they were hidden from with their Aggressive Mimicry ability.

        <b>Aggressive Mimicry</b> (Maneuver) %E2%97%86 1 Malice
        <b>Keywords</b> Magic
        <b>Distance</b> Self	<b>Target</b> Self
        <b>Effect</b> The niktin can become a mundane object the same size or smaller and is hidden. They can change back as a free action.

        <b>Lethe</b>
        While winded, the niktin has an edge on strikes, and strikes have an edge against them.

        <b>Soulsight</b>
        Each creature within 2 of the niktin can't be hidden from them.

