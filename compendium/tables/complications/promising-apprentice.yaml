name: Promising Apprentice
ctime: 1755516488308
description: You were apprenticed to learn a crafting trade. Your mentor said you had a special gift and might well become a master of your craft someday. But before your training was complete, your mentor was killed.
id: ce0845d2-f856-4c78-bdee-d2c1847e7d9f
benefit: You have one skill of your choice from the crafting skill group. Additionally, choose one of your skills from the crafting group. You gain an edge on any test that uses that skill.
