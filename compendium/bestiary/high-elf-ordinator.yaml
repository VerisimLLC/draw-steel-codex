    import:
      type: mcdm
      data: |
        High Elf Ordinator	Level 3 Leader
        Fey, High Elf, Humanoid	EV 20
        <b>Stamina</b> 120
        <b>Speed</b> 5 (fly)	<b>Size</b> 1M /<b> Stability</b> 0
        <b>Free Strike</b> 5
        Might 0	Agility +2	Reason +3	Intuition +2	Presence +3
        <b>Lightning Rod</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 10<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	9 lightning damage; R<1 dazed (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	14 lightning damage; R<2 dazed (save ends)
        %E2%9C%B8	<b>17</b>	17 lightning damage; R<3 dazed (save ends)
        <b>Effect</b> High elves have an edge on abilities used against the target until the start of the ordinator's next turn.

        <b>Elemental Uproar</b> (Maneuver)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 10 Burst<b>	Target</b> Each elemental ally in the burst
        <b>Effect</b> Each target moves up to their speed or makes a free strike. An elemental mote target can use their Spark of Life trait.

        <b>Summon Elemental</b> (Free Maneuver)%E2%97%86 2+ Malice
        <b>Keywords</b> -
        <b>Distance</b> Ranged 10<b>	Target</b> Special
        <b>Effect</b> For every 2 malice spent, the ordinator summons 4 <b>elemental motes</b> or 4 <b>soot crows</b> into unoccupied squares
        <b>5+ Malice</b> For every 5 malice spent, the Ordinator summons 1 <b>ceramic horse</b> or 1 winded <b>brambleguard</b> instead.

        <b>Enough!</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 10<b>	Target</b> Triggering enemy
        <b>Trigger</b> An enemy targets the ordinator or an ally within distance with an ability.
        <b>Effect</b> The ordinator uses Lightning Rod against the target.

        <b>Otherworldly Grace</b>
        At the start of their turn, the ordinator can turn the duration of one save ends effect they suffer from into EoT.

        <b>Magic Beacon</b>
        While using Chaincast, magic abilities that use the Ordinator's space have a double edge (see Chaincast).

        <b>Fountains Roar, Now Free From The Earth</b> (Villain Action 1)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 10 burst<b>	Target</b> All allies in the burst
        <b>Effect</b> Each target glows, ending one condition on themselves and then moving up to twice their speed.

        <b>And The Sun Forsook Her Children </b>(Villain Action 2)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 5 cube within 10<b>	Target</b> All enemies in the cube
        <b>Effect</b> Each target makes a <b>Presence test</b>.
        %E2%9C%B8	<b>%E2%89%A411</b>	12 corruption damage; pull 5 towards center of cube
        %E2%98%85	<b>12%E2%80%9316</b>	9 corruption damage; pull 3 towards center of cube
        %E2%9C%A6	<b>17</b>	Pull 1 towards center of cube
        <b>Effect</b> The affected area is considered difficult terrain for enemies, becoming darkened and warping violently in every direction.

        <b>But We Will Change Her Mind.</b> (Villain Action 3)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> Self and 10 burst<b>	Target</b> Self and each ally in the burst
        <b>Effect</b> All elves glow with magic. Each target makes a free strike that has the Magic keyword and deals an additional 3 damage.
        Ceramic Horse	Level 1 Platoon Mount
        Elemental, High Elf	EV 6
        <b>Stamina</b> 30
        <b>Speed</b> 10	<b>Size</b> 2 /<b> Stability</b> 2
        <b>Free Strike</b> 3
        Might +2	Agility +2	Reason 0	Intuition 0	Presence +1
        <b>Elemental Charge</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Charge, Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	5 damage
        %E2%98%85	<b>12%E2%80%9316</b>	7 fire damage
        %E2%9C%B8	<b>17</b>	9 lightning damage; M<2 prone

        <b>Stomp</b> (Action) %E2%97%86 2d10 + 2
        <b>Keywords</b> Area, Melee, Weapon
        <b>Distance</b> 1 burst<b>	Target</b> All enemies in the burst
        %E2%9C%A6	<b>%E2%89%A411</b>	3 damage
        %E2%98%85	<b>12%E2%80%9316</b>	5 damage
        %E2%9C%B8	<b>17</b>	7 damage
        <b>Effect</b> This attack deals an additional 2 damage to prone targets.

        <b>Buck</b> (Maneuver) %E2%97%86 2 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> The horse's rider
        <b>Effect</b> Vertical slide 3; The rider can use a ranged ability at any point during the movement and then fall without taking damage.

        <b>Shared Otherworldly Grace</b>
        If the ceramic horse's rider has the Otherworldly Grace trait, it also gains the Otherworldly Grace trait.

        Retainer
