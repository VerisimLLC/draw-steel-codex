        Demon Bendrak	Level 2 Horde Hexer
        Abyssal, Demon	EV 4
        <b>Stamina</b> 15	<b>Weakness</b> Holy 3
        <b>Speed</b> 5	<b>Size</b> 1L/<b> Stability</b> 0
        	<b>Free Strike</b> 2
