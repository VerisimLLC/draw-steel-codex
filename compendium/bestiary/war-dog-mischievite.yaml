        %E2%9C%A6	<b>%E2%89%A411</b>	5 damage
        %E2%98%85	<b>12-16</b>	7 damage
        %E2%9C%B8	<b>17</b>	8 damage; R<3 dazzled (save ends)
        <b>Effect</b> A dazzled creature has a bane on strikes and can't have line of effect to targets who aren't adjacent to them.

        <b>Misdirection</b> (Maneuver)
        <b>Keywords</b> --
        <b>Distance</b> Ranged 3	<b>Target</b> 1 ally or dazzled creature
        <b>Effect </b>The mischievite swaps positions with the target. An ally targeted by this ability can make a free strike either before or after being swapped.
        <b>2 Malice</b> The mischievite may use this ability as a triggered action when targeted by a strike or ability. The swapped target becomes the new target of the triggering strike or ability.

        <b>Crafty</b>
        The mischievite's movement does not trigger opportunity attacks.

        <b>Loyalty Collar</b>
        When the mischievite dies, they explode, dealing 2d6 damage to each adjacent enemy.

