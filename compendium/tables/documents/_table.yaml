  id: 65b016e9-c4bb-49e6-8b21-066c6c3bb0f8
  ctime: 1764270262406
  textStorage:
    __typeName: TextStorage
    sections:
      SY: |
        ???
      w: |+
        If [Mikael] doesn’t survive the encounter, then Tansy (see [B11. Furrier]) comes to find the heroes and lets them know that Mikael told them he was attacked by a wolf near the same place where her traps were destroyed. Fearing that wolf could be the werewolf who cursed [Mikael], [Tansy] begs the heroes to find and hunt the creature (see [Wolf Den]).


      t: |+
        The werewolf fights until reduced to 0 Stamina, at which point he reverts to his human form of Mikael (see [B10. Carpenter]). If [Mikael] survives the encounter, he begs the heroes to lock him up until they can cure him and shares any information about the wolf who attacked him that he thinks would help them.

      q: |+
        [[/awardvp 1|Award Victories]]

      r: |+
        ## Aftermath

      o: |+
        ## Ending the Encounter

      p: |2+
         The werewolf fights until reduced to 0 Stamina, at which point he reverts to his human form of Mikael the carpenter. If the heroes save at least three villagers, they earn 1 Victory each.

      n: |2+
         The werewolf focuses on attacking the villagers at the start of combat, since they're the easiest prey. If a hero interposes themself between him and the villagers, he attacks that hero first. Once the werewolf takes a total of 25 damage, he focuses fully on attacking the heroes.

      l: |+
        ## Tactics

      j: |2+
         The well at the center of the town is 4 squares deep and has less than 1 square of water in it

      Sf: |
        ???query numheroes < 4
      MZ: |+
        *Use the slider in the **Time of Day/Lighting** panel to adjust the lightning to nighttime.* 

      f: |2+
         Once the werewolf is out of the alley, the villagers flee as soon as they're able. 

      c: |+
        ## Stargazers

      d: |2
         The stargazing villagers, six **civilians**, take their turn at the start of each round. The werewolf has the stargazers cornered in an alley. While the werewolf blocks their path, these terrified civilians do nothing more than take the Defend action.
      a: |
        * For four heroes, reduce the werewolf's Stamina to 150 and decrease the damage dealt by his abilities by 2 (minimum 1).
      b: |+
        *  For three heroes, reduce the werewolf's Stamina to 100 and decrease the damage dealt by his abilities by 3 (minimum 1).

      P: |+
        [[setting:Number of Heroes]]

      h: |+
        ## Well

      O: |+
        [[/activateobjects WE_start.AreaTemplate activate|Show Hero Start Area]] [[/activateobjects WE_start.AreaTemplate deactivate|Hide Hero Start Area]]

      Sm: |
        [[encounter:3 heroes]]
      Y: |
        **Encounter Adjustments**
      Z: |
        If this encounter has more or fewer than five heroes, make the following adjustments:
      W: |
        |1|[Werewolf] |
      X: |+
        |2|[Werewolf] |

      U: |
        **Full Moon Groups**
      V: |
        |**Group**|Creatures** |
      S: |
        [[encounter:5+ heroes]]
      T: |+
        When you are ready, [Draw Steel!]

      Q: |
        [[encounter]]
      R: |
        ???query numheroes > 4
      St: |+
        ???

      SF: |
        ???
      M: |+
        The stargazers are **six civilians**. They are confronted by one **werewolf**.

      N: |+
        ## Combat

      SR: |
        [[encounter:4 heroes]]
      L: |+
        > * "The monster howls, following them at alarming speed."

      I: |
        group of villagers are enjoying some stargazing after a hard day of farm work."
      J: |
        > * "The peaceful scene is interrupted with a snarl as a giant bipedal wolf-human hybrid leaps into the square, snapping teeth and growling at the suddenly shrieking villagers who run down an alley."
      G: |
        When the event begins, the heroes are passing through the village square. 
      H: "> * \"The light of the full moon illuminates the village square where a "
      E: |+
        This encounter takes place on the [Broadhurst Town Square] Map.

      F: |+
        ## Setting the Scene

      C: |
        [Mikael] the carpenter doesn’t know it, but he’s been cursed with lycanthropy and is about to turn into a werewolf. If the heroes don’t end his curse by the time they finish their tenth respite in town, this event occurs the following evening. 
      D: |
        See [Respite Tracker] and [B10. Carpenter].
      SL: |
        ???query numheroes = 4
      B: |
        # Full Moon
