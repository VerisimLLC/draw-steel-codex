content: |+
  ## Thurston’s Quarters

  * “A human with his head in his hands sits with a group of humans, all seated on crates. The others seem afraid to speak.”

  *  “A few bedrolls are scattered around the edge of this room.” 

  Thurston, a **human knave** and the second-in-command, sulks in his quarters as he contemplates his next move with four **human raiders**. He’s unhappy with the leadership of Aldiva, who wants to keep raiding Broadhurst for food. Thurston regrets the bandit life and would like to rejoin society. Many of the Forsaken Wraiths agree with him, but he knows Aldiva and those loyal to her wouldn’t let them go back to a quiet life. After all, the best way to obtain a pardon for crimes is turning in other criminals.

  ## Mutiny

  If the heroes don’t immediately attack Thurston when they encounter him, the bandit lieutenant considers how he might be able to use them to get what he wants whether they are pretending to be bandits or not. He hints at the unhappiness of the bandits, saying things like, “Aldiva’s plan is ambitious, but I’m not sure it’s what everyone wants …” If the heroes pick up Thurston’s hints and offer to aid him, a negotiation begins.

  Thurston realizes that the heroes are likely powerful as opponents,but potential allies with regard to dealing with the people in charge in Broadhurst. 

  # Negotiation

  *(see Negotiation on page 298 in [Draw Steel Heroes])*

  ## Thurston Negotiation Stats 

