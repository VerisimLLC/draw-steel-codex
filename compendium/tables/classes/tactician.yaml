id: 506d41b6-816b-45c5-8f28-765f29d6f8ae
name: Tactician
details: |-
  Strategist. Defender. Leader. With weapon in hand, you lead allies into the maw of battle, barking out commands that inspire your fellow heroes to move faster and strike more precisely.
  All the while, you stand between your compatriots and death, taunting the followers of evil to best you if they can.

  As a tactician, you have abilities that heal your allies and grant them increased damage, movement, and attacks, even as you leave your enemies struggling to respond.
mtime: 1774734143902
hitpointsCalculation: 21 + (Level - 1)*9
quantity: "2"
