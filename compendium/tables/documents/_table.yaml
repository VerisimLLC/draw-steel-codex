    # Illwyth Alone

    [[image]]

    After the initial meeting with the [Gilded Hand], the heroes notice that [Illwyth] eats alone at nights in the common room. If engaged in conversation, [Illwyth] is polite and shares the following information freely if the heroes ask about the following subjects:

    **Gilded Hand:** "We don’t see eye to eye on every little subject, but when it comes down to it, we work together, and we do it well.  Disagreements are normal, but I’d trust any of them to have my back in a fight."
    **Cressan Tomb:** "Ah, that was quite the victory for us. The folks in Wend will surely remember the name the Gilded Hand fondly for ages. That means something. Gold is good and all, but making your reputation last long after you’re gone is worth quite a bit."
    **Her Ring:** "Ah, we found this in the Cressan Tomb. A bit large for my tastes, but it’s got a bit of magic, and I like that."

    While interacting with [Illwyth], a hero who is suspicious of her motives can make an easy Intuition test to attempt to discern their level of honesty.

    |Discern Illwyth’s Honesty: Intuition Test
    |{#The hero can tell that Illwyth is withholding the truth and that she’s bothered by something the rest of the Gilded Hand is doing. However, Illwyth can tell she is being scrutinized and leaves the conversation. She doesn’t return to the common room until the heroes finish a respite and avoids the heroes entirely during that time.}
    |{#The hero can tell that Illwyth is withholding the truth and that she’s bothered by something the rest of the Gilded Hand is doing.}
    |{#The hero can tell that Illwyth is withholding the truth and that she’s bothered by something the rest of the Gilded Hand is doing. They can also tell she seems overly protective of her ring.}

    If a hero attempts to press [Illwyth] into revealing more about her relationship with the [Gilded Hand] or the ring she wears, the hero must make a hard Presence test.

    |Press Illwyth for Information: Presence Test
    |{#Illwyth tells the hero she doesn’t want to talk anymore and gets up and leaves. She doesn’t return to the common room until the heroes finish a respite and avoids the heroes entirely during that time.
    |{#Illwyth tells the hero she doesn’t want to talk about it anymore and deflects any future attempts to bring it up during this conversation.}
    |{#If asked about the Gilded Hand, llwyth tells the heroes that she’s starting to have some second thoughts about the Gilded Hand’s latest job, but she won’t reveal what it is. If asked about the ring, she says she believes the ring has some function that may be useful in the Delian Tomb, but refuses to offer more information, saying it has to do with her latest job.}

    *(Make a note in the [Respite Tracker] for when she returns to the common room, if applicable)*

