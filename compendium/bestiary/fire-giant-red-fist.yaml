        <b>Flaming Punch</b> (Action)%E2%97%86 2d10 + 4 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 3<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	14 fire damage; push 2
        %E2%98%85	<b>12%E2%80%9316</b>	19 fire damage; push 4; A<3 burning (save ends)
        %E2%9C%B8	<b>17</b>	23 fire damage; push 6; A<4 burning (save ends)
        <b>Effect</b> A burning target takes 1d6 fire damage at the start of each of their turns until the condition ends.

        <b>Caldera</b> (Action) %E2%97%86 2d10 + 4 %E2%97%86 5 Malice
        <b>Keywords</b> Area, Melee
        <b>Distance</b> Special<b>	Target</b> All enemies and objects in the burst
        %E2%9C%A6	<b>%E2%89%A411</b>	Distance is 2 burst; 8 fire damage; M<2 pull 2
        %E2%98%85	<b>12%E2%80%9316</b>	Distance is 3 burst; 12 fire damage; M<3 pull 4
        %E2%9C%B8	<b>17</b>	Distance is 4 burst; 15 fire damage; M<4 pull 6
        <b>Effect</b> The outermost squares of the affected area become walls of dirt and stone. The rest of the affected area is set on fire. A creature takes 3 fire damage whenever they enter or start their turn in an enflamed square.

        <b>Blazing Leap</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The red fist jumps 5 squares. Each creature within 1 of the red fist when they land takes 5 fire damage.

        <b>Heat and Pressure</b> (Free Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Melee 3<b>	Target</b> 1 creature or object
        <b>Trigger</b> The target moves or shifts away from the red fist.
        <b>Effect</b> The target makes a <b>Might test</b>. A target with a fire immunity automatically gets a tier 3 result.
        %E2%9C%B8	<b>%E2%89%A411</b>	Weakened and slowed (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	Weakened (EoT)
        %E2%9C%A6	<b>17</b>	No effect

        <b>Guardian Block</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Melee 3<b>	Target</b> Self
        <b>Trigger</b> An ally within distance is targeted by an enemy's ability.
        <b>Effect</b> The red fist becomes the target of the ability. The red fist makes a free strike against the enemy after the ability resolves.

        <b>Searing Skin</b>
        Whenever an enemy makes physical contact with the red fist or uses a melee ability against the red fist, they take 5 fire damage.



