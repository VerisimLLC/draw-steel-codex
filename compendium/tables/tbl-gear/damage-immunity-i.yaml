description: |-
  When you start this project, select three damage types. You have immunity 5 to those damage types.**DIRECTOR INSTRUCTIONS**
  As there are many possible combinations and we can't know the choice of the player ahead of time, the item will imbue with 3  damage immunity modifiers, currently all set to 'all' damage. When the item is in the inventory, you can right click on it and click 'Edit Item' Then Edit the feature that says 'Damage Immunity I' and the damage immunity behaviours will display. Click the dropwdown where it displays 'all damage' and change it to the required damage type.
