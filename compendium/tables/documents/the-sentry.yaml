    w: ":<> [[/hidetoken Skewra|Hide Skewra]][[/showtoken Skewra|Show Skewra]] "
    h: |+
      She continues peppering the heroes with arrows until at least two of them make it to the shore, then she runs toward the gate to try to raise the alarm.

    n: If the heroes make it to shore without waking [Skewra], they find her unconscious on the beach with her bow and an empty wine bottle next to her. If woken up surrounded by heroes, she immediately surrenders. She is loyal to [Thurston] and would like him to take control of the camp.
    Q: |+
      [Skewra], a Forsaken Wraith and [human archer], is drunkenly asleep on the shore when the heroes approach. The sound of combat with the clawfish or the heroes making a lot of noise wakes her up (as does taking damage or being touched). 

    t: |2+


    Y: |+
      If she wakes and sees the heroes approaching on a raft, she lights a torch, lights an arrow, and shoots it toward the raft, hoping to ignite it. 

    I: |+
