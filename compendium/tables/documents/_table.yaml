  content: |+
    # Encounter D6

    The heroes encounter incorporeal undead if they solve the puzzle incorrectly in the Hall of Triumph.


    [[setting:numheroes]]

    [[encounter: D6]]

    **Optional based on mistakes in [D6. Hall of Triumph]'s Ghostly Encounter Puzzle**
    **Only add the highest one applicable**
    |[[encounter:1-2 Mistakes]]|[[encounter:3-4 Mistakes]]|[[encounter: 5+ Mistakes]]|

    **D6 Groups**
    |Group	|Creatures|
    |1|One Ghost|
    |2|Two Specters|
    |3|Two Specters|
    |4|Two Specters (Optional)|
    |5|Two Specters (Optional)|
    |6|Eight Shades (Optional, Minion Squad)|
    |7|Two Specters (Optional)|

    **Encounter Adjustments**
    If this encounter has more or fewer than five heroes, make the following adjustments:
    > * For six heroes, add two specters.
    > * For four heroes, remove two specters.
    > * For three heroes, remove four specters.


    ## Tactics

    The ghost uses Haunt on themself or an ally each round to damage as many enemies as possible with Corruptive Phasing. They keep their distance from foes, using Heat Death each round. The specters move into melee position, each taking on a different hero if they can. On the first round, they use Decaying Touch to weaken foes. On subsequent rounds, they move through foes with Corruptive Phasing before doing so again. If shades are present, each targets a different creature, spreading the damage around as much as possible. They move through their foes when possible, to avoid being targeted by an opportunity attack. The undead save their Malice to use Dread March and the ghost's Shriek triggered action.

    ## Ending the Encounter
    If the ghost and all other enemies are destroyed, the plaque pops open, revealing a compartment. The heroes earn 1 Victory each.

    [[/awardvp 1; objectcommand D6_door.Door opendoor; |Open The Compartment and Award Heroes 1 Victory]]



  description: Encounter D6
