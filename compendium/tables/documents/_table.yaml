  content: |-
    # Aldiva’s Quarters

    > * “A human in fine leather armor stands over a barrel, looking at roughly sketched map of Broadhurst, nodding as she mumbles to herself.”
    > * “Beside her stands an unarmed woman in plain robes, arms folded comfortably.”
    > * “Several crates and barrels are stacked around the room and a straw mattress lies on the ground in the corner.”

     Aldiva, a **human bandit chief**, plans a raid on Broadhurst in her quarters, assessing the situation with her personal null bodyguard named **Laesi**. The two are aware of Thurston’s displeasure, but they are unaware that the mutiny has grown to this level. 

    ## Aldiva and Laesi

     Aldiva sees herself as the queen of the area, and she refuses to believe her reign is over, whether from a mutiny or from a group of meddling heroes. Similarly, Laesi defends her friend and mentor to the death.

     If the heroes try to warn her of a forthcoming mutiny, Aldiva brushes it off as overreacting if she believes the heroes are new recruits. If they press the issue, she attacks. 
    ## Brune
     If **Brune** (see B8. Butcher) left Broadhurst to warn the Forsaken Wraiths about the heroes, he is also here, advising Aldiva about Broadhurst.
     If Brune is not here, they find his house circled on the Aldiva’s map with a note that says “Brune—Ally.”

    ## Groups 
     Aldiva, Laesi, and Brune are each a group on their own.
    ## Loot
    Aldiva uses a Blade of the Luxurious Fop (see Treasure in Handouts).

    [[encounter]]

    [[encounter]]

    When you are ready, [Draw Steel!]

    ## Tactics

    The enemies engage the heroes in melee, attempting to use abilities that force move heroes out of their way and allow them to shift so they can run out into the area surrounded by the palisade and get help from other bandits there. 
     Once in a more comfortable place with some allies, **Aldiva** uses *Kneel, Peasant* before unleashing *Whip and Magic Longsword* to gain the benefit of striking a prone target. **Laesi** uses *Nimblestep* to deal as much damage as possible. If **Brune** is there, he uses *Butcher Knife* or the *Grab* maneuver to grab targets to use as humanoid shields. See Within the Palisade for more information

    ## Ending the Encounter

    [End Combat] The encounter ends when Aldiva and Laesi are reduced to 0 Stamina. If the heroes win the battle, they earn 1 Victory each.

    [[/awardvp 1|Award Victories]]
  description: Aldiva’s Quarters
