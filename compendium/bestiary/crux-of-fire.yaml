      data: |+
        Crux of Fire	Level 3 Elite Artillery
        Elemental	EV 20
        <b>Stamina</b> 80	<b>Immunity</b> fire 5
        <b>Speed</b> 6	<b>Size</b> 1T /<b> Stability</b> 0
        <b>	Free Strike</b> 6
        Might -1	Agility +2	Reason 0	Intuition +1	Presence +2
        <b>Spitfire</b> (Action)%E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 12<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	8 fire damage
        %E2%98%85	<b>12%E2%80%9316</b>	12 fire damage; A<1 burning (save ends)
        %E2%9C%B8	<b>17</b>	15 fire damage; A<2 burning (save ends)
        <b>Effect</b> A burning creature or object takes 1d6 fire damage at the start of each of their turns until the condition ends.

        <b>Convocation of Flames</b> (Maneuver)
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 5<b>	Target</b> Self or 1 elemental
        <b>Effect</b> The target receives fire immunity 5 until the start of the crux's next turn if they don't already have it.
        <b>3 Malice</b> The ground within 3 of the target is wreathed in fire until the end of the encounter. Whenever an enemy first enters the affected area on a turn or starts their turn within it, they take 3 fire damage.

        <b>Flame Jet</b> (Triggered Action) %E2%97%86 1 Malice
        <b>Keywords</b> Magic
        <b>Distance</b> Self	<b>Target</b> Self
        <b>Trigger</b> The crux takes damage.
        <b>Effect</b> The crux ignores any effects associated with the damage and flies up to their speed. If the crux doesn't end this movement on solid ground, they fall prone.

        <b>Fickle and Free</b>
        The crux can't be restrained, slowed, or knocked prone, and they ignore difficult terrain.



