description: A1. Courtyard Barricade
content: |-
  # A1. Courtyard Barricade

  > * “Mottled white wooden stakes arc the front of the old castle.”
  > * "Lines of rubble outline where the courtyard used to sit. Two large heaps of stone, masonry, and broken arrows rest at the end of these lines where two castle towers used to stand.”
  > * “The remaining two towers flanking the keep have lost many of their bricks and sag inward towards the courtyard. Wooden beams only barely hold them up.”   
  > * “The courtyard is overgrown and uneven with natural knolls disrupting the remnants of an old walkway. Near the right tower, the earth sinks into a muddy pit.”
  > * “The fortress reaches high into the air with crumbling windows marking each floor inside. Ivy creeps and crawls up its base despite visible efforts to stop it.”
  > * “Goblins patrol the courtyard and hang from the keep’s walls at the ready. A lone runt of a goblin cradles his bugle on top of the keep.”

  {**Secret:** The muddy pit hides a wooden flap door that leads to the spider nest in [A6. Spider Nest]. A hero who searches the pit finds it.}

  {**Secret:** If the left tower falls, the window into [A3. Old Armory] can be accessed by climbing the ivy on the wall.}

  # Enemies
  Should the heroes take a direct approach, the goblin runner on top of the keep sounds a bugle once, calling all the goblins below to attention. The lookout shouts out to the heroes in Caelian, *“If you draw steel, we will show no mercy!”* and waits for their response.

  [[sound:bugle01]]

  Twelve goblin runners (excluding the lookout), two goblin underbosses, and four goblin warriors brandish their weapons. Twelve goblin snipers prepare in secret underneath the tower heaps. They attack when the bugle is sounded a second time or combat begins.

  [[sound:bugle02]]

  The lookout plays the bugle again and retreats to area [A5. War Room] if a hero responds with anything other than surrender or a desire to negotiate. Alternatively, the goblin disappears into the keep if the heroes are willing to cooperate, and 10 minutes later, the bugbear from area [A2. Great Hall Barracks] exits the main doors to escort them inside (see Coming to Terms).

  ## If the Heroes Have the Cup of Iulius
  [[setting:Number of Heroes]]

  :<>[[encounter:courtyardbarricade1]]

  ## If Queen Bargnot Has the Cup Iulius
  The encounters are written as if the heroes are in possession of the Cup of Iulius. If the goblins have the cup, then Queen Bargnot slowly transforms her force from regular goblins to magically enhanced warriors

  ### And the Heroes Have Completed No Respites
  If the heroes haven’t finished any respites since learning Queen Bargnot has the cup, replace the following stat blocks in each encounter in the castle:

  [[setting:Number of Heroes]]

  :<>[[encounter:courtyardbarricade2]]

  ### And the Heroes Have Completed One Respite
