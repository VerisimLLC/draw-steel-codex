content: |+
  # Explaining Combat

  When the map is set with tokens, it’s time to draw steel! The following sections provide a script and rules you can use to explain how combat works to your players. The rules outlined here aren’t true for just this encounter, but for all future encounters as well.

  Feel free to repeat yourself as often as necessary.



  ## Draw Steel!

  To explain the order of combat to your players, read the following text aloud:
  > * “Combat takes place in a series of turns and rounds. During a round of combat, each creature in the combat takes a turn one at a time.”
  > * “Creatures act in alternating side order. So, when your side—the heroes’ side—gets to act, you pick one hero from among you and they take their turn. After they take a turn, I get to pick a group of monsters, and they each take a turn, and then play passes back to your side.”
  > * “We go back and forth like this until everyone has acted. If all the creatures on one side have acted and the other side still has multiple creatures left to act, those remaining creatures on that side can act in any order they choose. Once everyone has acted, a new round begins.”
  > * “Whichever side acts first during the first round of combat acts first in all subsequent rounds.”
  > * “To determine which side goes first, let’s look at the outcome of the Intuition test you made before the fight.”
  The test total in Searching for Goblins determines which side acts first. If the heroes achieve a 12–16 total, an additional roll determines who goes first. Read the following:
  > * “Since you noticed the goblins at the same time as they noticed you, you’ll need to roll to see who goes first.”
  > * “Pick one player on your side to roll a single ten-sided die. If the roll comes up as a 6 or higher, the heroes take the first turn. Otherwise, my goblins go first.”
  Once you determine which side goes first, have the players pick a hero to take the first turn, or you pick a pair of goblins to take the first turn.



  ## Actions in Combat

  When you know which creature is acting first in the combat encounter, explain the following rules to the players:
  > * “On your turn in combat, you can take three different actions: a main action, a move action, and a maneuver.”
  > *  “In general, your move action is used to take the Advance move action, which is available to all creatures. You can use this move action to move a number of squares equal to your speed in any direction, including diagonally.”
  > * “Your hero’s statistics include a number of abilities, many of which are actions and some of which are maneuvers.”
  > * “If an action is listed as a free maneuver, then you can take it on your turn without it counting against the number of actions you can take.”
  > * “There is also a list of main actions and maneuvers any creature can take listed in the Rules Reference sheet. For example, anyone can use the Knockback maneuver, which allows you to attempt to push a nearby creature.”
  > * “Take a minute to read over your various abilities and their action types. I’ll discuss the other details after you’ve had a chance to review them.”
  What you’re telling the players is also true of the creatures you control.
  Read over the [goblin warrior] stat block in [Goblin Guards Combat] to see what your goblins can do.



  ## Abilities in Combat

  After taking a minute to look over your options, explain further how abilities work to your players:
  > * “As you’re looking over your abilities, pay attention to the various details. In addition to an action type, each ability has keywords listed at the top of the entry, like Magic, Melee, Psionic, Ranged, or Weapon. The rules occasionally reference abilities with a specific keyword. You won’t need to worry much about it this battle.”
  > * “Each ability has a distance. Melee abilities are used within a short distance and include creatures you can touch with your body or weapons you are holding. Ranged abilities can be used at a farther distance. The number in this entry, such as Melee 1 or Ranged 5, tells you how far away a creature can be targeted with this ability. Some abilities affect an area on the map. These areas of effect are defined in the Rules Reference.”
  > * “Each ability also has a target entry, that tells you how many and what kinds of creatures within distance you can affect with the ability.”
  > * “Then each ability has a power roll, an effect entry, or both! If the ability requires a power roll, it should tell you what to roll in addition to 2d10, and what occurs at each tier of result for the roll. Skills are never added to ability power rolls. The effect entry of an ability notes what happens when the ability is used regardless of any power roll.”
  > * “Many abilities deal damage, which allows you to harm the target. Abilities also allow you to force move targets, teleport, impose a condition, such as ‘taunted,’ on the target, or do similar things. The Rules Reference defines the effects used in this first battle.”
  Now that you’ve explained the basics to the heroes, go ahead and have the first side to act take a turn.



  ## Heroic Resources

  When the first hero acts, give the following information to the players:
  > * “Each of you gains heroic resources, which you can use to enhance your abilities. The way you generate heroic resources should be listed on your hero’s sheet.”
  > * “Read over that section carefully. You each gain heroic resources at the start of your turn. Additionally, you each gain resources in some other ways during the round, so pay attention for those things to happen!”
  > * “Your heroic resources disappear at the end of combat. You’ll all most likely have a lot leftover at the end of this battle. Don’t sweat it! More ways to spend them are coming.”



  ## First Goblin Turn

  When it is time for the goblins to act, choose a group of two goblin warriors to act. Each goblin takes their turn one at a time, targeting a different hero to spread the damage around:
  > * The goblin uses the Advance move action to move 6 squares toward a hero.
  > * Then the goblin uses Spear Charge. The Charge keyword on this ability allows each warrior to first move their speed in a straight line toward a hero and deal damage to them based on the power rolls you make all as part of the same main action.
  > * The goblin forgoes using a maneuver this round. This is a choice you can make for the creatures you control to keep moving combat along.




  **See [Explaining Combat Continued].**















