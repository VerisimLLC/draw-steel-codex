    # Third Floor

     One **ogre goon**, one **ogre juggernaut**, and twelve **mohlers** live on this floor and six **civilian** captives are working here. The mohlers are used to dig around and look for stones to use in repairing the tower.
    ---
    > * “As before, a set of curving stairs leads up along the outer wall, going through the ceiling above the floor.”

    > * “Several large cages with open doors and exterior locking bars dot the room. The cages hold strange pig-like creatures with sharp claws.”
    > * “Two ogres rest on enormous stools, drinking deeply from equally a large mugs. They ignore a collection of books and bags at their feet
    > * “Four people standing near a hole in the outer wall hold masonry equipment and discuss something among themselves.”
    > * “Several statues also dot the room. Most of them are of people, but a few of them are of the strange pig-like creatures.” 
    > * “A dark energy emerges from the hole. Where you there should be a view to the outside of the tower, there is only darkness.”

    **Secret:** Getting too close to the hole in the wall can petrify a creature.

    ## Magical Hole

    The hole cannot be entered, as it is drawing energy from a different dimension. The first time on a turn that a creature enters a square adjacent to the hole or starts their turn there, they must make a moderate Might test:

    |Magic Hole: Moderate Might Test
    | The creature's speed becomes 0 until the start of their next turn. If they fail this test three rounds in a row, they turn to stone for as long as they remain adjacent to the hole. While stone, a creature has damage immunity 10 and they are unconscious. If left this way for 24 hours, a creature becomes stone permanently.
    |At the end of this turn, the creature is slowed (save ends).
    | The creature can move and is immune to the hole's effects for the next 24 hours. If the creature enters a square adjacent to the hole after this time, they must make the test again

    ## Mohler Cage

     If a creature is force moved into one of the mohler cages, the door can be shut and the creature trapped inside. Each cage has 25 Stamina and is immune to poison and psychic damage. If a creature is inside a cage A when it is destroyed, they take 2 damage. A creature outside the cage who can reach it can unlock it as a maneuver.

    |Unlatch Cage Door: Agility Test
    |The door doesn't open.
    |The door opens, but the lock is destroyed. The door can't be locked again.
    |The door opens, and creatures inside can exit. Future attempts to open the latch from the inside have a double edge.


    ## Captives

     The four civilians here are terrified. Unless the heroes intervene,they take the Defend action at the end of each round. If a hero uses a maneuver to shout out at a civilian within 5 squares, that civilian instead uses their turn to head toward the second floor.The people here know the same information as the people on the second floor, with the following additions:

    > * Bassa the stonemason is upstairs with an orc elementalist.

    > * They explain the danger of the magic hole in the wall.

    > * Strange magic, such as the hole in the wall here, affects the top floors of this tower.

    ## Enemies

    Gruul, an **ogre juggernaut**, and Forg, an **ogre goon**, attack as soon as they notice the intruders. When they do, their twelve **mohlers** attack as well. The mohlers can’t burrow through the walls or floors of the tower.

    ## Combat

    Allow easy adjustment of the number of heroes to balance for:

    [[setting:Number of Heroes]]

    [[encounter: Third Floor]]

    When you are ready, [Draw Steel!]

    ## Tactics
    The ogres have straight forward tactics. They attempt to force move the heroes into cages, the hole in the wall, or each other. They don't care if they harm civilians, but as long as both ogres are alive, they focus on harming the heroes. Forg uses **Grabby Hand** each turn and **People Bowling** when he has a creature grabbed and sufficient Malice to spend.

    Gruul uses **Pitchfork Catapult** or **Earth-Breaking Jump**, and **Horrible Bellow** as often as possible. When the ogres have plenty of Malice, they use **Bully**.

    When one ogre is dead, the other uses **Rampage** and targets the nearest creatures, including any civilians.

    The mohlers spread out to harm as many heroes as possible. They're
    trained not to harm any captives.

    ## Objective

    [End Combat] When the heroes defeat the ogres, the mohlers stop attacking and return to their cages, cowering. 

    If at least half the civilians survived the ordeal, the heroes earn 1 Victory each.

    [[/awardvp 1|Award Victories]]

    ## Loot

    Vurkor moved some of his books and crafting ingredients found in the tower to this level while construction continues on the floor above. 

    *The players or director can click on one of the piles near the ogres' stools to access the following loot and add it to their inventory*:


    > * A **cup of rainwater from a sacred fey grove** and a recipe in Caelian that serves as a project source for a **Portable Cloud** (see Treasure in Handouts)
    > * Three ounces of **costmary leaves**, good for making Healing Potions (see Treasure in Handouts)
    > * A recipe in Caelian that serves a project source for a Growth Potion (see Treasure in Handouts)
    > * Vurkor’s Journal, written in Kalliak
