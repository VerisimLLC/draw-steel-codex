27d83658-d6ee-4ff4-b49f-58c9ad7eb136:
  __typeName: MarkdownDocument
  description: Glossary
  parentFolder: private
  updateid: bd8572d0-0ddd-48eb-9067-a49f2f5ec477
  annotations: []
  id: 27d83658-d6ee-4ff4-b49f-58c9ad7eb136
  mtime: 1763106121577
  content: |-
    # The Basics

    **Characteristics Scores:** Your Might, Agility, Reason, Intuition, and Presence are your characteristic scores and measures of mental and physical power.

    **Natural 19 or 20:** A result of 19 or 20 rolled on the dice without a modifier (a Critical Hit) is always a Tier 3 result, no matter the modifiers.

    **Power Roll:** Most abilities and all tests require you to roll 2d10 and add a characteristic. Each power roll has three tiers of outcome. Tier 1 is a result of 11 or lower. Tier 2 is a result of 12 to 16. Tier 3 is a result of 17 or higher.

    **Recovery:** You can spend a Recovery to regain Stamina equal to your recovery value. Only heroes have Recoveries.

    **Respite:** An uninterrupted rest for 24 hours in a safe place, at the end of which you regain all your Recoveries and Stamina and your Victories are converted into XP.

    **Skill:** If you have at least one skill that applies to a test (not an ability roll), you gain a +2 bonus to it.

    **Victories:** When you successfully overcome challenges such as combat in an adventure, you earn Victories.

    # Edges and Banes

    **Edge:** If you have a situational advantage (edge) on a power roll, the roll gains +2.

    **Double Edge:** If you have two or more edges, the roll is one tier higher instead.

    **Bane:** If you have a situational disadvantage (bane) on a power roll, the roll gains -2.

    **Double Bane:** If you have two or more banes, the roll is one tier lower instead.

    * If you have an edge and a bane or a double edge and a double bane, the roll is made normally without any edges or banes.
    * If you have a double edge and a bane, the roll has one edge.
    * If you have a double bane and an edge, the roll has one bane.

    # Hero Tokens

    Your Director will set out hero tokens in a shared pool at the start of each session.
    You can spend:
    * 1 hero token to gain 2 surges.
    * 1 hero token when you fail a saving throw, letting you succeed on the save instead.
    * 1 hero token to reroll a test. You must use the new roll.
    * 2 hero tokens on your turn or after you take damage (no action required) to regain Stamina equal to your Recovery value.

    # Combat

    **Combat Turn:** On your turn in combat, you can take a main action, a move action, and a maneuver. You can turn your action into an additional move action or maneuver. There is no limit to the number of free maneuvers you can take.

    **Triggered Action:** You can take one triggered action per round when the trigger happens. There is no limit to the number of free triggered actions you can take.

    # Main Actions

    Any creature can take the following main actions, in addition to those listed in their stats:

    * **Charge:** Move up to your speed in a straight line without shifting, and can then make a melee free strike or use an ability with the Charge keyword against a creature when you end your move. 
    * **Defend:** All ability power rolls made against you have a double bane until the start of your next turn. You gain no benefit from this action while another creature is taunted by you.
    * **Free Strike:** You make a free strike.
    * **Heal:** Choose an adjacent creature who can spend a Recovery or make a saving throw.

    # Move Actions

    Any creature can take the following move actions:

    * **Advance:** Move a number of squares up to your speed. You can break up this movement with your maneuver and action however you wish.
    * **Disengage:** Shift 1 square.
    * **Ride:** Cause a mount you are riding to take the Advance move action.
    A mount can only benefit from this once per round.

    # Maneuvers

    Any creature can take the following maneuvers, in addition to those listed in their stats:
    * **Aid Attack:** Choose an adjacent enemy. The next ability power roll an ally makes against them before the start of your next turn has an edge.
    * **Catch Breath:** Spend a Recovery.
    * **Escape Grab:** You use the Escape Grab ability while grabbed.
    * **Grab:** You use the Grab ability.
    * **Hide:** You become hidden from creatures who aren’t observing you while you have cover or concealment from them.
    * **Knockback:** You use the Knockback ability.
    * **Stand Up:** You stand up from prone, ending that condition. Alternatively, you can use this maneuver to make an adjacent prone creature stand up.

    # Combat Glossary

    **Critical Hit:** When you roll a natural 19 or 20 on a Strike or ability power roll on an ability that uses an action, you can immediately take another action.

    **Concealment:** Darkness, fog, invisibility magic, and any other effect that fully obscures a creature or object but doesn’t protect their physical form grants that creature or object concealment. Even if you have line of effect to such a target, a creature or object has concealment from you if you can’t see or otherwise observe them. You can target a creature or object with concealment using a strike, provided they aren’t hidden. However, strikes against such targets take a bane.

    **Cover:** When you have line of effect to a creature or object but that target has at least half their form blocked by a solid obstruction such as a tree, wall, or overturned table, the target has cover. You take a bane on damage-dealing abilities used against creatures or objects that have cover from you.

    **Damage Immunity:** Each damage immunity has a type and value. If a creature with damage immunity takes damage of that type, they reduce the damage equal to the value (minimum 0). If a creature reduces incoming damage to 0, they avoid any associated effects with the damage too.

    **Damage Weakness:** Each damage weakness has a type and value. If a creature with damage weakness takes damage of that type, they take additional damage equal to the weakness value.

    **Dying:** While your Stamina is 0, you are dying and can’t take the Catch Breath maneuver in combat. While dying, you are bleeding until you are no longer dying. When your Stamina is equal to negative your winded value, you die.

    **EoT:** If an effect ends with “(EoT)” at the end of its description, a creature suffers the effect until the end of their next turn, or the current turn if they got the effect on their current turn.

    **Flanking:** When you and at least one ally are adjacent to the same enemy and on completely opposite sides of the enemy, you are flanking that enemy. While flanking an enemy, you gain an edge on melee strikes against them.

    **High Ground:** Whenever a creature uses an ability to target a creature or object while standing on the ground and occupying a space that is fully above the target’s space, they gain an edge on the power roll against that target. To be fully above a target, the bottom of a creature’s space must be higher than or bordering on the top of the target’s space.

    A creature can gain this benefit while climbing only if they have “climb” in their speed entry or can automatically climb at full speed while moving.

    **Line of Effect: **To target a creature or object with an ability, you must have line of effect to them. If a solid object completely blocks the creature from you, then you don’t have line of effect to them. Opportunity Attack: When a creature within your reach willingly moves out of it without shifting, you can make a melee free strike against that creature as a free triggered action. 

    **Potency: ** Many of your ability effects have a potency, which is a value that indicates how high a target’s characteristic score must be
    to resist the effect.

    A potency always appears in text as a capital letter followed by a less-than sign (<) and then your potency value, such as M < 1 or R < 2. The single capital letter indicates which characteristic the target uses to resist the effect. M for Might, A for Agility, R for Reason, I for Intuition, and P for Presence. The value indicates the minimum score in that characteristic the target needs to beat the effect. If the target’s characteristic score is equal to or higher than the potency value, they don’t suffer the effect.
