      data: |+
        Bugbear Commander	Level 2 Elite Support
        Bugbear, Goblin, Humanoid, Fey	EV 16
        <b>Stamina</b> 80
        <b>Speed</b> 5	<b>Size</b> 1L /<b> Stability</b> 0
        <b>Free Strike</b> 5
        Might +2	Agility +1	Reason +2	Intuition 0	Presence 0
        <b>Inspiring Swordplay</b> (Action)%E2%97%86 2d10 + 2%E2%97%86 Signature
        <b>Keywords</b> Attack, Melee, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	7 damage
        %E2%98%85	<b>12%E2%80%9316</b>	10 damage
        %E2%9C%B8	<b>17</b>	13 damage; one target is grabbed
        <b>Effect</b> 1 ally within 5 of the commander has an edge on their next attack until the start of the commander's next turn.

        <b>You Next!</b> (Action)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 8<b>	Target</b> 1 ally
        <b>Effect</b> The target moves up to their speed and uses a signature action.

        <b>Fall Back!</b> (Action)%E2%97%86 5 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self and 5 burst<b>	Target</b> Self and all allies
        <b>Effect</b> Each target shifts up to their speed. Each target can use the Throw maneuver if they are grabbing a creature or object.

        <b>Throw</b> (Maneuver)
        <b>Keywords</b> Attack, Melee
        <b>Distance</b> Melee 1<b>	Target</b> 1 creature or object grabbed by the commander
        <b>Effect</b> Vertical push 4. An ally target doesn't take damage from being force moved.

        <b>Catcher</b> (Free Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Melee 1<b>	Target</b> 1 size 1 creature or object
        <b>Trigger</b> The target is force moved into a square adjacent to the commander.
        <b>Effect</b> The target is grabbed by the commander.

        <b>The Commander's Watching</b>
        While an ally has line of effect to the commander, the ally can end one condition afflicting them at the start of their turn.

      type: mcdm
