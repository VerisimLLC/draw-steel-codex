      data: |+
        High Elf Deathtouch	Level 2 Platoon Artillery
        Fey, High Elf, Humanoid	EV 8
        <b>Stamina</b> 30
        <b>Speed</b> 5	<b>Size</b> 1M /<b> Stability</b> 0
        <b>Free Strike</b> 5
        Might +2	Agility 0	Reason +1	Intuition 0	Presence +1
        <b>Heartpiercer</b> (Action)%E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Ranged, Strike, Weapon
        <b>Distance</b> Ranged 15<b>	Target</b> 1 creature
        %E2%9C%A6	<b>%E2%89%A411</b>	7 damage
        %E2%98%85	<b>12%E2%80%9316</b>	10 damage
        %E2%9C%B8	<b>17</b>	13 damage; R<1 bleeding (save ends) ; I<1 frightened (save ends) ; P<1 restrained (save ends)
        <b>5 Malice</b> The ability replaces Strike with the Area keyword, the distance becomes 3 cube within 10, and it targets all creatures in the cube.

        <b>Kiss of Death</b> (Maneuver)
        <b>Keywords</b> Magic
        <b>Distance</b> Melee 1<b>	Target</b> 1 ally
        <b>Effect</b> The target's speed increases by 5 and they cannot get results lower than tier 3 on their power rolls. The target immediately dies at the end of their next turn.

        <b>Otherworldly Grace</b>
        At the start of their turn, the deathtouch can turn the duration of one save ends effect they suffer from into EoT.

