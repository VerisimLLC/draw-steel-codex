    name: Cup of Iulius
    description: |-
      You can fill the Cup of Iulius with a liquid and drink the entirety of the liquid as a maneuver. You gain the following benefits based on the liquid consumed if you drink a cup’s worth:

      Caelian Wine Over 1,000 Years Old or the Blood of an Innocent Humanoid: Your level increases by 1 for the next 10 days. At the end of this time, roll a d10. On a result of 6 or higher, you die and can’t be returned to life. If you drink to gain this benefit again while it is currently active, the expiration resets.

      Mead That is 100 Years Old or More: At the start of the next combat encounter you have, you gain surges equal to your highest characteristic score plus your Victories.

      Water: You regain 1 Recovery. You can’t gain this benefit again until you complete a respite.
