    import:
      type: mcdm
      data: |+
        Basilisk Tonguesnapper	Level 1 Hexer Captain
        Basilisk, Monster	EV 26
        <b>Stamina</b> 50	<b>Immunity</b> Poison 5
        <b>Speed</b> 8	<b>Size</b> 2 <b>Stability</b> 2
        <b>Free Strike</b> 4
        Might +1	Agility +1	Reason -3	Intuition -1	Presence -1
        <b>Prehensile Tongue</b> (Action) %E2%97%86 2d10 + 1 %E2%97%86 Signature
        <b>Keywords</b> Attack, Melee, Weapon
        <b>Distance</b> Reach 3
        <b>Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	4 poison damage; pull 1
        %E2%98%85	<b>12-16</b>	7 poison damage; pull 2
        %E2%9C%B8	<b>17</b>	10 poison damage; pull 3
        Effect	A target restrained by petrifying eye beams will remain restrained if pulled by this effect.

        <b>Petrifying Eye Beams </b>(Maneuver) %E2%97%86 MGT RR
        <b>Keywords</b> Magic, Ranged, Resistance
        <b>Distance</b> Ranged 5
        <b>Target</b> 2 creatures
        %E2%9C%B8	<b>%E2%89%A411</b>	Restrained (MGT ends)
        %E2%98%85	<b>12-16</b>	Slowed (MGT ends)
        %E2%9C%A6	<b>17</b>	Slowed (EoT)
        <b>Effect</b> 		The target magically begins to turn to stone. Targets that are already slowed have a bane on this resistance roll. While restrained, the target, or a creature adjacent to them, can use an action to cut the encroaching stone from the target's body. When they do, the target takes 8 damage which can't be reduced in any way, and they are no longer restrained.

        <b>A</b> target that ends two consecutive turns restrained by this ability is petrified until freed by a magical effect.

        <b>Barrage</b> (Action) %E2%97%86 2d10 + 1 %E2%97%86 <b>5 VP</b>
        <b>Keywords</b> Attack, Melee, Weapon
        <b>Distance</b> Reach
        <b>Target</b> 3 creatures
        <b>Effect </b>Make a prehensile tongue attack against each target.

        <b>Neurotoxin Splash</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Trigger</b> The basilisk takes Weapon damage.
        <b>Distance</b> 2 burst
        <b>Target</b> All enemies
        <b>Effect</b> Each target takes 5 poison damage and is slowed (EoT).

        <b>Petrifying Fumes</b>
        A creature that begins their turn adjacent to the basilisk is slowed (EoT).

