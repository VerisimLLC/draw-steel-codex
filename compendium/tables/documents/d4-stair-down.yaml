  # D4. Stair Down
  > * “A glowing, translucent, white energy field crackles across an opening in the floor that leads to a staircase going down.”
  > * “A carving on the south wall reads, ‘Iulius’s cup shall remain free from the hands of the unworthy. Turn back or perish.’”
  > * “Five human warrior statues, each smeared with blood, stand around the stair. A band of goblins stand among the statues, raising their voice in a unified chant. A robed goblin covered in fur and over 7 feet tall leads the chanting.”
  > * “A young woman with soot-stained hands and a bruised face is tied to the southmost statue. She lets out a shriek of pain as the goblins chant, tendrils of white energy moving out from her chest to the energy field below.”

  The captured woman is [Violet] (who uses the civilian stat block). A hero who has the Magic or Religion skill can tell that the goblins are performing a sacrificial ritual that will kill the girl and remove the magic barrier from the stairs. They also know that removing her from the room or defeating the bugbear leading the ritual will end the proceedings. [Vorgosh], a bugbear channeler, leads a chant that is taken up by eight goblin spinecleavers and six goblin warriors.


  ## New Rules: Hero Update and Surprised

  When combat begins, share the following information with the players:
  > * “Take a look at your hero’s sheet and note any features or abilities you gain for this, the fourth encounter.”
  > * “There aren’t a lot of new general rules to introduce at this point, just new stuff that your heroes can do in a fight.”

  If the heroes caught their enemies surprised, add:
  > * “Hey, look at that! You snuck up on the goblins, so they’re surprised.”
  > * “A surprised creature can’t take triggered or free triggered actions and ability power rolls against them gain an edge.”
  > * “After the first round of combat, your enemies will no longer be surprised, so use this temporary advantage wisely!”

  After the players get a chance to absorb their new features and abilities, play out the encounter!


  See [Encounter D4] for encounter details.
