    import:
      type: mcdm
      data: |+
        Servok Miner	Level 9 Elite Controller
        Construct, Servok, Valok	EV 44
        <b>Stamina</b> 200
        <b>Speed</b> 5 (burrow, climb)	<b>Size</b> 2 /<b> Stability</b> 6
        <b>Free Strike</b> 9
        Might +4	Agility -2	Reason -4	Intuition -1	Presence -5
        <b>Drill Press</b> (Action)%E2%97%86 2d10 + 4%E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	13 damage; M<2 restrained (save ends) and prone
        %E2%98%85	<b>12%E2%80%9316</b>	18 damage; M<3 restrained (save ends) and prone
        %E2%9C%B8	<b>17</b>	22 damage; prone; M<4 restrained (save ends)
        <b>Effect</b> Restrained targets become entrenched in a 1 square deep hole in the ground.

        <b>Unload Rocks</b> (Action)%E2%97%86 3 Malice
        <b>Keywords</b> Area
        <b>Distance</b> 4 cube within 1<b>	Target</b> All enemies and objects
        <b>Effect</b> Each target makes an <b>Agility test.</b>
        %E2%9C%B8	<b>%E2%89%A411</b>	14 damage; slide 4; each ally is concealed from the target (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	11 damage; slide 2
        %E2%9C%A6	<b>17</b>	7 damage
        <b>Effect</b> The affected area becomes difficult terrain.

        <b>Break Ground</b> (Maneuver) %E2%97%86 5 Malice
        <b>Keywords</b> Area
        <b>Distance</b> 20 x 1 line within 1<b>	Target</b> All enemies and objects
        <b>Effect</b> A fissure along the ground is created that falls 5 squares deep. Each ally in the area can shift into the nearest unoccupied square outside of the fissure. Each target makes an <b>Agility test.</b>
        %E2%9C%B8	<b>%E2%89%A411</b>	14 damage; target falls; prone can't stand (EoT)
        %E2%98%85	<b>12%E2%80%9316</b>	11 damage; target is prone hanging on the edge
        %E2%9C%A6	<b>17+</b>	7 damage; target can shift into the nearest unoccupied square outside of the fissure

        <b>Miner Inconvenience</b> (Triggered Action) %E2%97%86 2 Malice
        <b>Keywords</b> -
        <b>Distance</b> 2 burst<b>	Target</b> Special
        <b>Trigger</b> The miner is targeted by a strike.
        <b>Effect</b> Dust and dirt billows around the affected area until the end of the round. As long as the miner remains in this space, the miner does not suffer any additional effects associated with strikes.

        <b>Tunneler</b>
        When the miner burrows, they create a stable, size 2 tunnel.

        <b>Servok Siege Machine</b>
        The miner ignores difficult terrain and deals an additional 15 damage with abilities used against objects.

        <b>Crafted to Perfection</b>
        The miner's shape can't change via any external effects.

        <b>Valiar Might</b>
        Each power roll made against the miner can't get higher than a tier-1 result while they aren't winded, weakened, or bleeding.


