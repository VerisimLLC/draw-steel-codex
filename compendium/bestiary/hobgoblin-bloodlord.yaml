      data: |
        Hobgoblin Bloodlord	Level 6 Leader
        Goblin, Hobgoblin, Humanoid, Infernal	EV 32
        <b>Stamina</b> 180	<b>Immunity</b> fire 6
        <b>Speed</b> 6 (teleport)	<b>Size</b> 1M /<b> Stability</b> 2
        <b>Free Strike</b> 7
        Might +4	Agility +2	Reason +2	Intuition +3	Presence +3
        <b>Soul Sword</b> (Action) %E2%97%86 2d10 + 4 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> Two creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	11 corruption damage; P<2 bleeding (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	16 corruption damage; P<3 bleeding (save ends)
        %E2%9C%B8	<b>17</b>	19 corruption damage; P<4 bleeding (save ends)
        <b>2 Malice</b> Each target is marked until they die or the end of the encounter. Allies have an edge on strikes against marked targets. The bloodlord can only have up to 3 targets marked this way, removing the oldest mark first.

        <b>Take Point!</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 10<b>	Target</b> 1 ally
        <b>Effect</b> The target moves up to their speed and uses a signature action.

        <b>An Army From Blood</b> (Triggered Action) %E2%97%86 3 Malice
        <b>Keywords</b> -
        <b>Trigger</b> The target takes damage
        <b>Distance</b> Ranged 10<b>	Target</b> 1 non-minion hobgoblin
        <b>Effect</b> 3 <b>hobgoblin recruits</b> crawl out of the target's blood and appear in unoccupied spaces adjacent to the target.

        <b>Infernal Ichor</b>
        If the bloodlord's Stamina drops to 0, they spray burning blood. Each creature within 1 of the bloodlord takes 3 fire damage.

        <b>End Effect</b>
        At the end of their turn, the bloodlord can take 10 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Advance!</b> (Villain Action 1)
        <b>Keywords</b> Area
        <b>Distance</b> Self and 10 burst<b>	Target</b> Self and all allies
        <b>Effect</b> Each target gains 10 temporary Stamina, moves up to their speed, and makes a free strike.

        <b>Skulls Abound </b>(Villain Action 2)
        <b>Keywords</b> Area, Magic, Melee
        <b>Distance</b> 3 aura<b>	Target</b> Self
        <b>Effect</b> The bloodlord surrounds themselves with a storm of flying skulls until the end of the encounter. An enemy that first enters the aura or starts their turn there takes 8 corruption damage and has a bane on their next power roll until the start of their next turn.

        <b>I am Fire! I am Death!</b> (Villain Action 3) %E2%97%86 2d10 + 4
        <b>Keywords</b> Area, Magic, Melee
        <b>Distance</b> 5 burst<b>	Target</b> All enemies in the burst
        %E2%9C%A6	<b>%E2%89%A411</b>	5 fire damage; P<2 2 fire damage; push 2, prone
        %E2%98%85	<b>12%E2%80%9316</b>	5 fire damage; P<3 7 fire damage; push 3, prone
        %E2%9C%B8	<b>17</b>	5 fire damage; P<4 10 fire damage; push 5, prone
        <b>Effect</b> The bloodlord is wreathed in black flames until the end of the encounter. When an adjacent enemy touches or uses a melee ability against the bloodlord, they take 5 corruption damage.
        Retainer
        Hobgoblin Flameslinger	Level 4 Controller Retainer
        Goblin, Hobgoblin, Humanoid, Infernal
        <b>Stamina</b> 48	<b>Immunity</b> fire 4
        <b>Speed</b> 5	<b>Size</b> 1M/<b>Stability</b> 0
        <b>Free Strike</b> 5
        Might +1	Agility 0	Reason +2	Intuition +1	Presence +3
        <b>Fire Curse</b> (Action) - 2d10 + highest characteristic - Signature
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 10 	<b>Target </b>One creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>		5 fire damage
        %E2%98%85	<b>12%E2%80%9316</b>	9 fire damage
        %E2%9C%B8	<b>17</b>		12 fire damage; A (strong) burning (save ends)
        <b>Effect </b>A burning target takes 1d6 fire damage at the start of each of their turns until the condition ends.

        <b>Fuel for the Fire</b> (Action)
        <b>Keywords</b> %E2%80%93
        <b>Distance</b> Ranged 10	<b>Target</b> 1 creature
        <b>Effect</b> The target gains fire weakness 10 until the end of the flameslinger's next turn. If the target is the flameslinger's mentor, they instead gain fire immunity 10.

        <b>Infernal Ichor</b>
        If the flameslinger's Stamina drops to 0, they spray burning blood. Each creature within 1 of the flameslinger takes 3 fire damage.

        Level 7 Retainer Advancement Ability
        <b>Unholy Attraction</b> (Action, Encounter) - 2d10 + highest characteristic
        <b>Keywords</b> Area, Magic, Ranged
        <b>Distance</b> 3 cube within 10	<b>Target</b> All enemies
        %E2%9C%A6	<b>%E2%89%A411</b>		8 damage; pull 1
        %E2%98%85	<b>12%E2%80%9316</b>		12 damage; pull 2
        %E2%9C%B8	<b>17</b>		16 damage; pull 4
        <b>Effect </b>A creature pulled adjacent to the flameslinger is P (medium) prone.

        Level 10 Retainer Advancement Ability
        <b>Fire Spiral</b> (Action, Encounter) - 2d10 + highest characteristic
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 3 burst	<b>Target</b> All enemies
        %E2%9C%A6	<b>%E2%89%A411</b>		8 fire damage; push 2
        %E2%98%85	<b>12%E2%80%9316</b>		12 fire damage; push 3
        %E2%9C%B8	<b>17</b>		16 fire damage; push 5
        <b>Effect </b>If the fireslinger's mentor is within 10, the mentor can be the source of the burst instead of the fireslinger.
