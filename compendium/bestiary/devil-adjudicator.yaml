    import:
      type: mcdm
      data: |+
        Devil Adjudicator	Level 6 Elite Controller
        Devil, Infernal	EV 32
        <b>Stamina</b> 140	<b>Immunity</b> Fire 5
        <b>Speed</b> 6 (fly)	<b>Size</b> 1M /<b> Stability</b> 1
        <b>Free Strike</b> 7
        Might 0	Agility +1	Reason +2	Intuition +1	Presence +3
        <b>Infernal Injunction</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 10<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	%E2%89%A411	10 fire damage; I<1 frightened (save ends)
        %E2%98%85	12%E2%80%9316	15 fire damage; I<2 frightened (save ends)
        %E2%9C%B8	17	18 fire damage; I<3 frightened (save ends)
        <b>Effect</b> The adjudicator can slide a target frightened by this ability 2 squares.

        <b>Adjudicator's Interdiction</b> (Action)
        <b>Keywords</b> Magic
        <b>Distance</b> Ranged 10<b>	Target</b> 1 creature
        <b>Effect</b> The target makes a <b>Presence test.</b>
        %E2%9C%B8	%E2%89%A411	Slowed, bane on power rolls, can't regain Stamina (save ends)
        %E2%98%85	12%E2%80%9316	Slowed, bane on power rolls (save ends)
        %E2%9C%A6	17	Slowed (save ends)

        <b>Quid Pro Quo</b> (Maneuver)
        <b>Keywords</b> Magic
        <b>Distance</b> Ranged 10<b>	Target</b> 1 ally or 1 frightened creature
        <b>Effect</b> The adjudicator switches places with the target.

        <b>Devilish Charm</b> (Triggered Action) %E2%97%86 2 Malice
        <b>Keywords</b> Magic
        <b>Distance</b> Ranged 5<b>	Target</b> Triggering creature
        <b>Trigger</b> A creature targets the adjudicator with a strike.
        <b>Effect</b> The target makes a <b>Presence test.</b>
        %E2%9C%B8	%E2%89%A411	The adjudicator chooses a new target for the strike
        %E2%98%85	12%E2%80%9316	The adjudicator halves the incoming damage
        %E2%9C%A6	17	The target has a bane on the strike

        <b>Vexatious Litigation</b>
        A creature has -2 on saving throws while within 10 of the adjudicator if their Presence score is lower than the adjudicator's.

        <b>True Name</b>
        If a creature within 10 squares of the adjudicator speaks the adjudicator's true name aloud, the adjudicator loses their immunities, the additional effects on their signature action, and their Devilish Charm ability.


