      **Tavern Rumors**

    V: |+
      [[/r d100| Roll a d100]]

    S: |+
      |The hero learns three rumors from the Tavern Rumors table.

    T: |+
      When a hero learns a rumor, you can choose one from the table, or you can roll randomly to see what they know. If you roll for a rumor and get a rumor that is no longer relevant to the heroes or is something they already know, reroll or pick a different rumor that would be helpful to them. If the heroes learn all the rumors, you can create more of your own or let the heroes know that for now they’ve learned everything there is to learn from hanging out in the tavern.

    Q: |
      |The hero learns one rumor from the Tavern Rumors table.
    R: |
      |The hero learns two rumors from the Tavern Rumors table.
    O: "If the heroes want to gossip at the tavern, each hero should make a Presence test to determine how well they mingle with the locals and what rumors they learn.\n \n"
