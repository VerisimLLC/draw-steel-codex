  # Respite Tracker

  While the heroes go about their business in this part of the adventure, the villains don’t halt their plans. Track the number of respites the heroes finish to mark the passage of time and determine how far along their plans advance. Add more rows to the table if needed. 

  Check [Events] to see the other ways these events could be triggered.

