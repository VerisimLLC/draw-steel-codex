0c047d4e-fcdc-4091-8fec-2ce11cd2b465:
  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features:
    - __typeName: CharacterFeature
      modifiers:
      - __typeName: CharacterModifier
        sourceguid: 2eb7c962-81c8-4f61-842c-931876427351
        guid: 79db3e31-ebce-4f15-9a37-bde15f883a00
        source: Feat
        behavior: activated
        description: 'You cast an entertaining spell that creates a minor but impressive magical effect. '
        name: Arcane Trick
        activatedAbility:
          __typeName: ActivatedAbility
          numTargets: "1"
          modifiers: []
          display:
            brightness: 1
            saturation: 1
            hueshift: 0
            bgcolor: "#ffffffff"
          strain: []
          guid: 8333b9e9-8195-4264-a1a0-2e4b4ced22e0
          repeatTargets: false
          abilityType: none
          domains: []
          behaviors: []
          persistence: []
          name: Arcane Trick
          targetType: self
          description: |
            **Effect:** Choose one of the following effects:
            • You teleport a size 1S or smaller object adjacent to you into an unoccupied space adjacent to you.

            • Until the start of your next turn, a part of your body shoots a shower of harmless noisy sparks that light up each square adjacent to you.

            • You ignite or snuff out (your choice) every mundane light source of 1L or smaller adjacent to you.

            • You transform up to 1 pound of edible food you touch to make it taste delicious or disgusting.

            • Until the start of your next turn, you make your body exude a particular odor you’ve smelled before. This smell can be sensed by each creature within 5 squares of you, but can’t impose any condition or other drawback on those creatures.

            • You place a small magical inscription on the surface of a mundane object you touch, or you can remove an inscription that was made by you or by another creature using Arcane Trick.

            • You touch a size 1T object to cover it with an illusion that makes it look like a different object. Any creature who handles the object becomes aware of the illusion. The illusion ends when you stop touching the object.
          range: 1
          iconid: ec6bc428-544e-4e8d-b479-a08a6845f14b
      name: Arcane Trick
      guid: 2eb7c962-81c8-4f61-842c-931876427351
      description: 'You cast an entertaining spell that creates a minor but impressive magical effect. '
      source: Feat
  tag: Supernatural Perks
  name: Arcane Trick
  description: You gain the ability Arcane Trick
  mtime: 1775035450558
  id: 0c047d4e-fcdc-4091-8fec-2ce11cd2b465
  ctime: 1730700891063
5a480801-a2e6-408b-a14f-32c0194b2908:
  __typeName: CharacterFeat
  prerequisite: "	"
  tag: Lore Perks
  modifierInfo:
    __typeName: ClassLevel
    features:
    - __typeName: CharacterLanguageChoice
      numChoices: 2
      guid: a3052614-7561-44a6-9a89-5213325ccdf9
      description: Choose Two New Languages
      source: Feat
  name: Linguist
  description: You automatically learn two new languages, as long as you have regularly heard those languages spoken or seen them written before. Additionally, if you spend 7 days or more in a place where you regularly hear or read a language you don’t know, you can pick up enough of that language to hold a conversation or understand basic written information. Having picked up a language this way, you can subsequently learn it using the Learn New Language research project at half the usual project goal cost.
  mtime: 1756582039450
  id: 5a480801-a2e6-408b-a14f-32c0194b2908
  ctime: 1730700863983
