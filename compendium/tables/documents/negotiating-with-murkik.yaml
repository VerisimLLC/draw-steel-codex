description: Negotiating With Murkik
content: |
  # Negotiation 

  {If the heroes know the truth of [Murkik]’s friends being held captive and ask [Murkik] to sell [Dunquat] the stone without handing over the [Quantum Satchel], he is willing to negotiate.}
  *(see Negotiation on page 298 in [Draw Steel Heroes])*

  ## Murkik Negotiation Stats 

  {
  Impression: 2
  Native Language: Zaliac
  }



  INTEREST:  [[##---]] 
  PATIENCE:  [[###--]]

  [[image]]

  All Motivations & Pitfalls:
  *Benevolence, Discovery, Freedom, Greed, Higher Authority, Justice, Legacy, Peace, Power, Protection, Revelry, Vengeance*



  Murkik's Motivations
  {**Peace**}
  {Murkik just wants to do business as normal. He’s hoping that giving Vurkor the bag will be the end of it, but if the heroes point out that this might just be the start, or that doing dirty business with Dunquat could mean word gets out that the merchants renege on deals, they appeal to this motivation.}

  {**Protection**}
  {Murkik wants to protect all of the merchants in his employ. If the heroes point out that Vurkor holds all the power in this relationship and that giving him the bag doesn’t guarantee their safety and just robs Dunquat of what’s hers, they appeal to this motivation.}

  & Pitfalls 
  {**Greed**}
  {Murkik is interested in making money honestly, and he hates the idea of turning a bad situation to his advantage financially. If the heroes make an argument that he’ll make more money if he works with them, they invoke this pitfall.}



  {
  **Negotiation outcomes**


  |Interest 5 |Yes, and... |[Murkik] agrees to honor the original deal with [Dunquat]. He encourages the heroes to confront [Vurkor] and gives them a pair of [Unbinder Boots] that he planned on giving to [Vurkor] with the bag. |
  |Interest 4 | Yes.|[Murkik] agrees to honor the original deal with [Dunquat].|
  |Interest 3 | Yes, but… |[Murkik] agrees to honor the original deal with [Dunquat] if the heroes first free his friends from [Vurkor] (see [Mage Tower]).|
  |Interest 2 | No, but… |[Murkik] won’t honor the original deal with [Dunquat], but does agree to take only the [Quantum Satchel] and require no money of [Dunquat]. If this deal is taken to [Dunquat], she begrudgingly agrees.|
  |Interest 1 | No. |[Murkik] won’t change the current terms of the deal offered to [Dunquat].|
  |Interest 0 | No, and… |[Murkik] won’t change the current terms of the deal offered to [Dunquat]. [Murkik] also believes the heroes could be foolish enough to confront [Vurkor] and put his captured friends in jeopardy. He attacks the heroes (see [Tavern Brawl] in [Events]).|


  If the heroes end the negotiation with [Murkik]’s interest at 4 or higher and make a deal with him, they each gain 1 Victory.
  [[/awardvp 1|Award Heroes 1 Victory]]


