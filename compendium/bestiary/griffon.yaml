        Might +2	Agility +2	Reason -1	Intuition +1	Presence +2
        <b>Claw Swipes</b> (Action)%E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Charge, Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	7 damage; shift 1
        %E2%98%85	<b>12-16</b>	10 damage; shift 2
        %E2%9C%B8	<b>17</b>	13 damage; shift 3
        <b>Effect</b> If this ability is used while charging, the griffon grapples one of the targets.

        <b>Crack the Earth</b> (Maneuver)
        <b>Keywords</b> Area, Ranged
        <b>Distance</b> 3 cube within 8 (while flying)	<b>Target</b> All enemies
        <b>Special</b> The griffon must be grabbing a creature or object to use this maneuver.
        <b>Effect</b> The griffon flies up to half their speed towards the ground and then sends the creature or object they've grappled hurtling towards the affected area.
        %E2%9C%A6	<b>%E2%89%A411</b>	4 damage
        %E2%98%85	<b>12-16</b>	6 damage; A<1 push 3
        %E2%9C%B8	<b>17</b>	9 damage; A<2 push 4 and prone

        <b>Wing Buffet</b> (Maneuver) %E2%97%86 2d10 + 2 %E2%97%86 3 Malice
        <b>Keywords</b> Area, Melee
        <b>Distance</b> 4 x 2 line within 1<b>Target</b> All creatures and objects
        %E2%9C%A6	<b>%E2%89%A411</b>	Push 3; A<0 forced movement is vertical
        %E2%98%85	<b>12-16</b>	Push 4; A<1 forced movement is vertical
        %E2%9C%B8	<b>17</b>	Push 5; A<2 forced movement is vertical

        <b>Zephyr Feint</b> (Triggered Action) %E2%97%86 1 Malice
        <b>Keywords</b> -
        <b>Trigger</b> The griffon takes damage
        <b>Distance</b> Self	<b>Target</b> Self
        <b>Effect</b> The griffon halves the damage, doesn't suffer any effect associated with it, and shifts 2 squares.

        <b>Beast of Prey</b>
        Creatures have a double bane on escaping the griffon's grab.

        <b>Steady</b>
        Creatures have a bane on power rolls that could knock the griffon or their rider prone.



