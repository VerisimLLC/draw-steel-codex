      data: |+
        Flesh Mournling	Level 4 Horde Defender
        Undead	EV 6
        <b>Stamina</b> 35	<b>Immunity</b> corruption 4, poison 4
        <b>Speed</b> 6	<b>Size</b> 2 /<b> Stability</b> 2
        <b>Free Strike</b> 2
        Might +3	Agility +1	Reason 0	Intuition +2	Presence -1
        <b>Multiarm Strike</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>	Target</b> 1 creature or object
        %E2%9C%B8	<b>%E2%89%A411</b>	5 damage
        %E2%98%85	<b>12-16</b>	7 damage
        %E2%9C%A6	<b>17</b>	9 damage
        <b>Effect</b> The target can't shift away from the mournling until the end of their turn.
        <b>1 Malice</b> The mournling targets an additional creature.

        <b>Horrid Wail</b> (Action) %E2%97%86 2d10 + 3
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 5 burst<b>	Target</b> all enemies in the burst
        %E2%9C%A6	<b>%E2%89%A411</b>	2 psychic damage
        %E2%98%85	<b>12-16</b>	3 psychic damage; I<2 frightened (save ends)
        %E2%9C%B8	<b>17</b>	4 psychic damage; I<3 frightened (save ends)
        <b>Effect</b> If a target is still frightened by this ability at the end of the encounter, they cannot take a respite activity during their next respite.

        <b>Immutable Form</b>
        The mournling's shape can't change via any external effects.

        <b>Arise</b>
        The first time in an encounter that the mournling is reduced to 0 Stamina with non-fire/non-holy damage and their body isn't destroyed, they regain half their Stamina and fall prone.

