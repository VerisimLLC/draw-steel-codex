        <b>Keywords</b> %E2%80%93
        <b>Distance</b> 3 cube within 10
        <b>Target</b> All enemies
        <b>Effect </b>Each target takes 5 Weapon damage and is slowed (EoT) and marked until the beginning of the gweiadur's next turn. Allies have an edge against marked targets.

