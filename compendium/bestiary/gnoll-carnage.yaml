    import:
      type: mcdm
      data: |
        Gnoll Carnage	Level 2 Leader
        Abyssal, Gnoll	EV 16
        <b>Stamina</b> 100
        <b>Speed</b> 5	<b>Size</b> 1M /<b> Stability</b> 1
        <b>Free Strike</b> 5
        Might +3	Agility +3	Reason 0	Intuition 0	Presence +3
        <b>Shrapnel Whip</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	8 damage; A<1 bleeding (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	11 damage; A<2 bleeding (save ends)
        %E2%9C%B8	<b>17</b>	14 damage; A<3 bleeding and dazed (save ends)
        <b>Effect</b> An ally targeted by this ability makes a free strike instead of taking damage.

        <b>Cackletongue</b> (Maneuver) %E2%97%86 4 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self and 5 burst<b>	Target</b> Self and all allies
        <b>Effect</b> Each target deals an additional 3 damage with their strikes until the start of the carnage's next turn. Targets who haven't used a cackletongue maneuver on this turn use it immediately at no cost.

        <b>Death Rampage</b>
        Whenever a non-minion ally within 5 is reduced to 0 Stamina, the carnage moves up to their speed and either chooses to target 2 creatures with free strikes or one creature with their shrapnel whip.

        <b>Endless Hunger</b>
        If the carnage is reduced to 0 Stamina while there are still gnolls on the battle map, one gnoll on the map is transformed into the carnage, keeping the gnoll's Stamina.

        <b>Call Up from The Abyss </b>(Villain Action 1)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 10<b>	Target</b> Special
        <b>Effect</b> The carnage summons 4 <b>gnoll wildlings</b> and 4 <b>abyssal hyenas</b> into unoccupied spaces.

        <b>Edacity </b>(Villain Action 2)
        <b>Keywords</b> Area
        <b>Distance</b> Self and 10 burst<b>	Target</b> Self and all allies
        <b>Effect</b> Each target moves up to their speed and makes a free strike. A creature that takes damage from this villain action is also knocked prone.

        <b>Deepest Wounds </b>(Villain Action 3)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 5 burst<b>	Target</b> Each winded enemy in the burst
        <b>Effect</b> The carnage's eyes and all exposed blood within distance starts to glow bright red. Each target makes a <b>Presence test.</b>
