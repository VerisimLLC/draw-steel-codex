      data: |+
        Essence of Tides	Level 3 Elite Controller
        Elemental	EV 20
        <b>Stamina</b> 80	<b>Immunity</b> cold 5
        <b>Speed</b> 7 (swim)	<b>Size</b> 1M /<b> Stability</b> 1
        <b>	Free Strike</b> 5
        Might +2	Agility 0	Reason +1	Intuition -1	Presence +2
        <b>Water Wing</b> (Action)%E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Magic, Melee, Strike
        <b>Distance</b> Melee 1<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	7 damage; slide 1
        %E2%98%85	<b>12%E2%80%9316</b>	11 damage; slide 2
        %E2%9C%B8	<b>17</b>	14 damage; slide 3
        <b>EffectP<2</b> the target's stability is reduced to 0 and they move 2 additional squares whenever they are force moved (save ends)

        <b>Convocation of Waves</b> (Maneuver)
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 5<b>	Target</b> Self or 1 elemental
        <b>Effect</b> The target receives cold immunity 5 until the start of the essence's next turn if they don't already have it.
        <b>3 Malice</b> The target emits a 1 aura pool of water until the end of the encounter. The area beneath the aura becomes a river that trails behind the target as they move and is considered difficult terrain. An enemy that ends their turn standing in the river is <b>M<2</b> slowed (save ends).

        <b>Sea Salted Wounds </b>(Triggered Action) %E2%97%86 1 Malice
        <b>Keywords</b> -
        <b>Distance</b> Malice 1	<b>Target</b> 1 creature
        <b>Trigger</b> An ally deals damage to the target.
        <b>Effect</b> The essence makes a free strike against the target.

        <b>Water Glide</b>
        When the essence starts their turn on a space containing water, they can add the flying keyword to their movement until the end of their turn. While flying, the essence doesn't provoke opportunity attacks.

        <b>Fickle and Free</b>
        The essence can't be restrained, slowed, or knocked prone, and they ignore difficult terrain.



