      data: |+
        Devil Magistrate	Level 6 Elite Harrier
        Devil, Infernal	EV 32
        <b>Stamina</b> 160	<b>Immunity</b> Fire 5
        <b>Speed</b> 7	<b>Size</b> 1M /<b> Stability</b> 0
        <b>Free Strike</b> 7
        Might +1	Agility +3	Reason 0	Intuition +1	Presence +2
        <b>Edge of the Law</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	%E2%89%A411	10 damage
        %E2%98%85	12%E2%80%9316	15 damage
        %E2%9C%B8	17	18 damage; R<3 dazed (save ends)
        <b>Effect</b> The magistrate can shift up to 3 squares before or after using this ability, or between targets.

        <b>Verdict</b> (Action) %E2%97%86 2d10 + 3
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> 1 creature
        %E2%9C%B8	%E2%89%A411	11 damage
        %E2%98%85	12%E2%80%9316	17 damage
        %E2%9C%A6	17	21 damage
        <b>Effect</b> This ability has a double edge if the magistrate was hidden before using this ability and deals an additional 5 damage if the target is dazed.

        <b>Justice Turns Its Gaze</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The magistrate becomes hidden, even if they are being observed.

        <b>Devilish Charm</b> (Triggered Action) %E2%97%86 2 Malice
        <b>Keywords</b> Magic
        <b>Distance</b> Ranged 5<b>	Target</b> Triggering creature
        <b>Trigger</b> A creature targets the magistrate with a strike.
        <b>Effect</b> The target makes a <b>Presence test.</b>
        %E2%9C%B8	%E2%89%A411	The magistrate chooses a new target for the strike
        %E2%98%85	12%E2%80%9316	The magistrate halves the incoming damage
        %E2%9C%A6	17	The target has a bane on the strike

        <b>Leading</b>
        If the magistrate moves away from an enemy who is adjacent to one of the magistrate's allies, the movement is considered shifting.

        <b>True Name</b>
        If a creature within 10 squares of the magistrate speaks the magistrate's true name aloud, the magistrate loses their immunities, the additional effects on their signature action, and their Devilish Charm ability.



