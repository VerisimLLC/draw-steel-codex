    import:
      type: mcdm
      data: |+
        Tusker Demon	Level 2 Elite Brute
        Abyssal, Demon, Gnoll	EV 16
        <b>Stamina</b> 100
        <b>Speed</b> 7	<b>Size</b> 3 /<b> Stability</b> 3
        <b>Free Strike</b> 5
        Might +2	Agility -1	Reason -3	Intuition 0	Presence -1
        <b>Gore</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Charge, Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	7 damage; push 1
        %E2%98%85	<b>12%E2%80%9316</b>	11 damage; push 2
        %E2%9C%B8	<b>17</b>	14 damage; push 3; prone
        <b>Effect</b> This ability deals an additional 4 damage while charging.

        <b>Vengeful Tusker</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 7<b>	Target</b> Triggering enemy
        <b>Trigger</b> An enemy within distance deals damage to the tusker.
        <b>Effect</b> The tusker demon charges the target using Gore.

        <b>Trample</b>
        The tusker demon can move through enemies and objects at normal speed. When the tusker enters a creature's space for the first time on their turn, the creature takes 5 damage. The tusker demon can end their turn in a prone size 1 creature's space, preventing the creature from getting up.

        <b>Lethe</b>
        While winded, the tusker demon has an edge on strikes, and strikes have an edge against them.



