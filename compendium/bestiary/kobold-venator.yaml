        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>Target</b> 1 creature or object
        %E2%9C%A6    <b>%E2%89%A411</b>    4 damage
        %E2%98%85    <b>12%E2%80%9316</b>    6 damage; M<1 restrained (save ends)
        %E2%9C%B8    <b>17</b>    7 damage; M<2 restrained (save ends)
        <b>3 Malice Then We Light the Net on Fire!                                       </b>Eachtarget restrained by this ability takes 2 fire damage at the start of each of their turns until the condition ends.

        <b>Lost in the Crowd</b>
        If the venator is adjacent to an ally that is not hiding, they can use the hide maneuver, even if observed.

        <b>Not What I Seem</b>
        The venator begins the encounter disguised as a minion. The venator has a double edge on their first action of the encounter, when they reveal themselves.

        <b>Shield? Shield!</b>
        The venator has cover, a Stability of 1, and can act as cover for allies when adjacent to an ally who also has this trait.

