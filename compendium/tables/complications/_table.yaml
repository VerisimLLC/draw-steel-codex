  ctime: 1755514436136
  description: At the edge of the world, you were lost in a winter storm and presumed dead. But an unknown fate or power kept you alive, bringing you back with frosty skin and pale eyes.
  id: 2d8ccc17-b5fd-47f6-bdf4-8cfd5e59837c
  benefit: You have cold immunity 5. Additionally, whenever you make a strike that deals untyped damage, that strike can deal cold damage instead.
d8af2c17-c677-44bb-b237-d695fcff49c1:
  __typeName: CharacterComplication
  drawback: Your twin disappeared because someone wanted them dead. Whenever you finish a respite, roll a d10. On a 1 or 2, the Director can decide that your past catches up with you in the near future in some way—an assassin seeking your twin, someone who knows your real identity and threatens to reveal it, and so forth.
  mtime: 1755604051155
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Secret Twin
  ctime: 1755516901957
  description: You have an identical twin—either a sibling or someone who looks so much like you that no one would ever know the difference. Your secret twin had a life you coveted, or perhaps had obligations that couldn’t go unfulfilled. So when they went missing, you stepped in and started living their life. Most folks are none the wiser.
  id: d8af2c17-c677-44bb-b237-d695fcff49c1
  benefit: You have a 1st-echelon trinket of your choice. This was a signature treasure of your twin, and has their name or sigil written, sewn, or emblazoned on it somewhere.
98229a32-9f16-44dd-8b80-ef2d498d391c:
