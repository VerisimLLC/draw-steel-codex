    D: |+
      # B13. Mason


    P: |+
      The weary mason considers herself an artist. She loves her work and only uses the finest stone from her home city of Kal Kalavar. After coming to the town to establish herself as a big fish in a small pond over 60 years ago, most stone structures in Broadhurst now use stone from the Granite Mountains. In her mind, using another type of stone to repair or build a new structure would cause a mismatch that is beyond offense.

    M: |+
      [Dunquat] the mason has run out of stone and is now being extorted by a group of dwarf merchants at the Feather Bed Inn (see [B1. Feather Bed Inn]). She’s stubborn but reaching the end of her will.

    n: |+
      > * “If there was some way I could get that stone from the stables and just leave him our original payment … bah. Probably a bad idea. So many ways that might go wrong.”



    k: |
      > * “I might be too close to it all. If you can talk to Murkik and convince him to take the original deal, I’d be grateful. I’m out of stone.”
    G: |
      > * “A large, fenced-in yard with sturdy tables covered in metal tools opens before a small house.”
    Y: |+
      If the heroes ask [Dunquat] about her situation with the merchants or if she needs help, she provides the following information:


    J: |+
      > * “A stone-skinned dwarf woman with an anxious expression mutters to herself as she putters about the yard putting tools into a large burlap sack.”


    w: |
      [[Follower:Dunquat]]
    h: |
      > * “I can’t work with other stone. I won’t. The stuff from the Granite Mountains is the best. After being here for nearly 60 years, most of the stone in this town is from those mountains and the idea of a mismatch is … unacceptable.”
    e: |
      > * “Not only does he want the original payment, he also wants my bag. I know it doesn’t look like much, but this thing is key to my work. It’s magic and helps me carry stone to my jobs without needing to get a cart and horse.”
    V: |
      ## Stone Shipment
    S: |+
      Dunquat’s burlap sack is a [item:Quantum Satchel] that has been in her family for generations and used by many fine masons to haul stone easily.


    t: |+
      If a hero has enough Renown to gain a follower and doesn’t have one, they can recruit [Dunquat] as an artisan. If they do, give them the Dunquat Follower.

    q: |
      ## Follower: Dunquat
    b: |
      > * “Murkik, a dwarf staying at the inn, hauled some stone all the way out from Kal Kalavar for me—but he changed the deal!”
