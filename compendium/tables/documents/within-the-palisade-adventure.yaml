      Seven large tents offer shelter to the main contingent of the bandit army. A total of thirty-two bandits are present in the tents currently: sixteen **human raiders**, eight **human archers**, and eight **human rogues**.


    yr: |
      **Ceilings:** The ceilings in the rooms are 3 squares high.
