  updateid: d899a347-eb2d-4ce4-9cad-7f1887c07e19
  mtime: 1772541569113
  content: |-
    The Forsaken Wraiths, a group of bandits, attempts to raid Broadhurst in the night to obtain supplies for their camp. This event can occur for any of the following reasons:

    * [Brune] (see [B8. Butcher]) warns the Forsaken Wraiths that the heroes are onto them.

    * The heroes don’t deal with the Forsaken Wraiths (see [Fort Forsaken]) and finish seven respites during the adventure. (see [Respite Tracker]]


    ## Setting the Scene

    When the event begins, the heroes are passing through the village square. 

    > * “As you pass through the village square in the evening, you suddenly hear shrieks for help.”

    > * “A group of farmers, their arms loaded with crops, run toward you, their goods weighing them down.”

    > * “Behind them is an advancing force of armed marauders, their weapons drawn and raised high.”

    This encounter uses the [Wraith Raid Map]. The farmers are five **civilians**. They are chased by eight **human guards**, eight **human raiders**, and two **human brawlers**.

    ## Combat

    [[setting:Number of Heroes]]

    [[encounter]]

    ## Reinforcements

     At the start of the second round of combat and each subsequent round, one **human brawler** captaining four **human raiders** appears on the map, at a map edge of your choice. These creatures are in their own group.

    |[[encounter]]|[[encounter]]|[[encounter]]|

    **Civilians**
    [[encounter:Farmers]]

    When you are ready, [Draw Steel!]


    **Wraith Raid Groups**
    |Group|Creatures|
    |1|[Human brawler] (captain), Four [human raider]s (minion squad)|
    |2|[Human brawler] (captain), Four [human raider]s (minion squad)|
    |3|Eight [human raider]s (minion squad)|
    |4 (Reinforcements)|[Human brawler] (captain), Four [human raider]s (minion squad)|

    **Encounter Adjustments**
    If this encounter has more or fewer than five heroes, make the following adjustments:

    * For six heroes, add one human brawler to the start of the encounter.
    * For four heroes, remove eight human guards from the start of the encounter.
    * For three heroes, remove one human brawler and eight human guards from the start of the encounter.

    ## Farmer Run

    The farmers (five civilians) are slowed and take their turn at the end of each round. They move as quickly and as carefully as they can to reach the south end of the map. Once they are there, they're safe.

    A hero can use a maneuver to encourage a farmer to drop what they are holding. The farmer listens and drops their crops as a free triggered action, ending the slowed condition for them.

    ## Well

     The well at the center of the town is 4 squares deep and has less than 1 square of water in it

    ## Tactics

     The bandits harm whichever creature is nearest to them, prioritizing heroes over farmers. The humans spend Malice on Exploit Opening to gain an edge.

     The **brawlers** use *Haymaker* and the *Grab* maneuver so they can benefit from their *Shoot the Hostage* trait. The **raiders** take the *Charge* action to engage foes, then fight until that foe falls before moving to the next. The guards move into position so they can flank enemies and make additional *free strikes*.


    ## Aftermath and Rewards

    If Reeve Rosamund hasn’t already asked the heroes to dispatch the Forsaken Wraiths, she does after this encounter.

    ## Ending the Encounter

     The encounter ends when all the farmers have either died or are safe and off the encounter map, at which point the remaining bandits flee. If the heroes save at least three of the farmers, they earn 1 Victory each. End Combat once the battle is over by right clicking on the combat orb.

    [[/awardvp 1|Award Victories]]

    If the heroes capture any bandits, the captured Forsaken Wraith reveals that [Brune] the butcher has been helping criminals to rob the village smokehouse. The bandit also reveals the location of their camp (see [Fort Forsaken])
  description: Wraith Raid
