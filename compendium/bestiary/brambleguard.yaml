      data: |+
        Brambleguard	Level 2 Platoon Defender
        Elemental, High Elf	EV 8
        <b>Stamina</b> 59
        <b>Speed</b> 4	<b>Size</b> 2 /<b> Stability</b> 3
        <b>Free Strike</b> 4
        Might +2	Agility 0	Reason 0	Intuition 0	Presence +2
        <b>Wall of Roses</b> (Action) %E2%97%86 Signature
        <b>Keywords</b> Area, Magic
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The brambleguard's speed becomes 0 and they extend themself into a 5 wall until the start of their next turn. Each ally adjacent to the brambleguard at the start of their turn regains 5 Stamina and can apply the Magic keyword to their weapon abilities until the end of their turn.

        <b>Whip Frenzy</b> (Action)%E2%97%86 2d10 + 2
        <b>Keywords</b> Area, Melee, Weapon
        <b>Distance</b> 2 burst<b>	Target</b> Each enemy in the burst
        %E2%9C%A6	<b>%E2%89%A411</b>	4 damage
        %E2%98%85	<b>12%E2%80%9316</b>	7 damage; push 3
        %E2%9C%B8	<b>17</b>	10 damage; push 3; A<2 bleeding (save ends)

        <b>Thicket and Thorns</b>
        The brambleguard blocks line of effect for enemies. An enemy that starts their turn adjacent to a brambleguard takes 4 damage.

