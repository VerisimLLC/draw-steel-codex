        <b>Go.</b> (Action)%E2%97%86 Signature
        <b>Keywords</b> -
        <b>Distance</b> Ranged 10<b>	Target</b> 1 ally
        <b>Effect</b> The target moves up to their speed and uses an action.
        <b>1 Malice</b> The warleader targets a second ally.
        <b>3 Malice</b> The warleader targets a squad instead of a second ally.

        <b>Mace Lariat</b> (Action) %E2%97%86 2d10 + 3
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> All enemies
        %E2%9C%A6	<b>%E2%89%A411</b>	7 damage; push 1; M<1 dazed (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	10 damage; push 3; M<2 dazed (save ends)
        %E2%9C%B8	<b>17</b>	13 damage; push 5; M<3 dazed (save ends)

        <b>Lockdown</b> (Maneuver)%E2%97%86 3 Malice
        <b>Keywords</b> -
        <b>Distance</b> Ranged 10<b>	Target</b> 3 allies
        <b>Effect</b> Each target moves up to their speed and uses the Grab maneuver with an edge. The warleader moves up to their speed.

        <b>Courtesy Call</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 10<b>	Target</b> 1 creature
        <b>Trigger</b> The target gets a tier 1 result on a power roll.
        <b>Effect</b> The target has a double edge on next power roll.

        <b>Close In</b> (Villain Action 1)
        <b>Keywords</b> Area
        <b>Distance</b> 10 Burst<b>	Target</b> All allies
        <b>Effect</b> Each target moves up to their speed. Each enemy within 1 of a target makes an <b>Intuition test.</b>
        %E2%9C%B8	<b>%E2%89%A411</b>	Frightened of the warleader (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	Frightened of the warleader (EoT)
        %E2%9C%A6	<b>17</b>	no effect

        <b>Familial Reinforcements</b> (Villain Action 2)
        <b>Keywords</b> Area
        <b>Distance</b> Ranged 10<b>	Target</b> All allies
        <b>Effect</b> The warleader shifts up to their speed and 5 <b>orc blitzers</b> appear in unoccupied spaces within distance.

        <b>I'll Do This Myself</b> (Villain Action 3)
        <b>Keywords</b> Attack, Melee, Weapon
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The warleader shifts up to their speed and uses Mace Lariat. Then, the warleader shifts up to their speed and uses Mace Lariat. Finally, the warleader shifts up to their speed and uses Mace Lariat.

        <b>End Effect</b>
        At the end of their turn, the warleader can take 5 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Relentless</b>
        If the warleader's Stamina drops to 0, they can take a free strike before dying. If the target is reduced to 0 Stamina or killed by the strike, the dohma lives and their Stamina is reduced to 1 instead.
