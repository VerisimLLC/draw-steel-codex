name: Getting Too Old for This
ctime: 1755514484853
description: You were once a renowned hero, but you’ve been living the last few years in blissful peace. Now you’re coming out of retirement for one last hurrah. Your fighting skills might have atrophied to the point where you’re no stronger than a wet behind-the-ears novice adventurer, but you still remember some of your old tricks.
id: a3e3a577-1a65-4b5c-ad90-b9fd216a8c50
benefit: On your turn, you can choose a heroic ability that you would be able to learn if you were one level higher. Provided you meet the ability’s other prerequisites and can spend any required Heroic Resource, you can use the ability. Once you use this benefit, you can’t do so again until you earn 2 or more Victories.
