  description: B11. Furrier
  content: |
    # B11. Furrier


    > * “The preserved head of a bear is mounted over the door of this shop, which has furs on display in its window.”
    > * “Inside, a furrier examines a pelt as they attach it to the bottom of a large cloak.”


    [Tansy] the furrier is always serious. While they aren’t rude, they have hardly any sense of humor and take almost everything anyone says literally.


    ## Broken Trap

    If the heroes talk to [Tansy] about their broken traps, the furrier provides the following information:


    > * “Something keeps breaking my traps. I need to catch a lot more animals and stop repairing my snares if we want warm clothes for the winter.”
    > * “The best place to catch animals is along the riverbank in the Silver Forest. I usually follow the Dunn River south. There’s a small cave there filled with wildlife, and I set my traps outside.”
    > * “Whatever is breaking the traps is strong. Chewing right through metal to get to the rodents I’m catching.”
    > * “I’m going to have to find a new spot. But if you can bring me the hide of this predator, I’d be very grateful!”



    If the heroes ask to examine a broken trap, [Tansy] is happy to share it with them. A hero examining the trap can make an easy Reason test.

    |Examine the Trap: Reason Test
    |{#The hero knows that something big and powerful managed to break the trap with their teeth. No normal animal in these parts could do such a thing. While examining the trap, the hero accidentally punctures themself on a jagged piece of metal and takes 1 damage.}
    |{#The hero knows that something big and powerful managed to break the trap with their teeth. No normal animal in these parts could do such a thing.}
    |{#The hero knows that something big and powerful managed to break the trap with their teeth. No normal animal in these parts could do such a thing. The creature also knew just where to bite the trap to make it break, which suggests an intelligence greater than the average animal.}

    If the heroes wish to hunt the animal that did this, they can follow the Dunn River south into the Silver Wood until they find the [Wolf Den].


    ## Follower: Tansy

    If a hero has enough Renown to gain a follower and doesn’t have one, they can recruit [Tansy] as an artisan. If they do, give them the [Tansy Follower Card].
