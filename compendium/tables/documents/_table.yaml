    sections:
      w: "[[/awardvp 1|Award Victories]]"
      x: |2

      t: |2+
         If the heroes fail to win the day, [Murkik] leaves them bloodied on the ground. [Dunquat], either because she is there or hears news of the brawl, trades her [item:Quantum Satchel] along with the original fee for the stone to get the merchants to leave town and prevent further violence.

      r: |2+
         If Murkik survives the encounter and the heroes are victorious, he apologizes and comes clean about why he’s asking for [Dunquat]’s [item:Quantum Satchel]. He then asks the heroes to rescue his friends from Vurkor (see [Mage Tower]).

      p: |+
        The dwarves fight until [Murkik] falls, then surrenders. The heroes earn 1 Victory each.

      n: |+
        End Combat once the battle is over by right clicking the combat orb.

      l: |+
        ## Aftermath and Rewards

      j: |+
        Murkik uses Stone Wave and Tile Slide to keep the heroes away from him and separated while shouting orders to the other dwarves and reminding them not to kill anyone. The warden corners the toughest melee combatant they can reach and attempts to separate them from the others. The trappers split up, concentrating on restraining as many heroes as possible with their Steam-Powered Snare ability. If the heroes are positioned in a line, the dwarves use Snaring Line.

      h: " The dwarves are out for blood, but they know better than to kill anyone. If a hero would die in this encounter, they fall unconscious instead.\n \n"
      f: |+
        ## Tactics

      d: |+
        * For three heroes, remove two dwarf trappers.


      b: |
        * For four heroes, remove one dwarf trapper.
      Y: |+
        If this encounter has more or fewer than five heroes, make the following adjustments:

      Z: |
        * For six heroes, add one dwarf warden.
