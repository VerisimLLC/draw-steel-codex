  content: |-
    # Illwyth

    [[image]]

    *A wode elf shadow.*

    {
    Secret: see [Gilded Hand]
    Illwyth is the only member of the [Gilded Hand] with reservations about selling the Cup of Iulius to Queen Bargnot, though she hasn’t shared her feelings with anyone.

    She’s often in the common room alone so she can get away from the reality of her friends’ decisions. [Targon] charged her with the safekeeping of the ring, since as a pickpocket herself, Illwyth knows the best way to defend against them.
    }

    {
    Director Notes: 

    *Use this area to make notes for yourself about the NPC. Suggested information would be:
    Roleplaying notes, such as the voice/mannerisms you gave the character, if any.How they feel towards the Heroes, and any personal interactions they had that you can reference later on.* 
    }
