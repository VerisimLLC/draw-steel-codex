bc083000-3543-41ff-ad8d-332f73cd92aa:
  __typeName: CultureAspect
  modifierInfo:
    __typeName: ClassLevel
    features:
    - __typeName: CharacterSkillChoice
      categories:
        crafting: true
        lore: true
      name: Rural Skill
      guid: f23ac9de-f6b9-4116-b0fc-9f3a39a88ba3
      description: One skill from the crafting or lore skill groups. (*Quick Build:* Nature)
      source: Rural Culture Feature
  name: Rural
  description: "A rural culture is one located in a town, village, or smaller settled enclave. People dwelling in such places often cultivate the land, trade goods or services with travelers passing through, harvest fish from the sea, or mine metals and gems from the earth.  \n\nLiving among a small population, most folks in a rural community learn a trade and are handed down bits of essential knowledge to help their community survive. For example, when a rural culture has only one blacksmith, it’s important to have an apprentice already learning at the anvil well before that smith starts to get old. If the only priest in town gets the sniffles, folks want an acolyte ready to wear the fancy robes should the worst occur.  "
  mtime: 1756163889697
  id: bc083000-3543-41ff-ad8d-332f73cd92aa
  ctime: 1730708022180
8fb4c210-bbfb-4179-8218-26dc6fadc705:
  __typeName: CultureAspect
  mtime: 1756163815925
  modifierInfo:
    __typeName: ClassLevel
    features:
    - __typeName: CharacterSkillChoice
      categories:
        crafting: true
        exploration: true
      name: Communal Skill
      guid: 09ab831a-6fe0-4f1f-94f4-68a934425b46
      description: Choose one Skill from the crafting or exploration skill groups. (*Quick Build:* Jump)
      source: Communal Culture Feature
  name: Communal
  category: organization
  description: "A communal culture is a place where all members of the culture are considered equal. The community works together to make important decisions that affect the majority of the culture. While they elect leaders to carry out these decisions and organize their efforts, each person has a relatively equal say in how the culture operates, and everyone contributes to help their people survive and thrive. Individuals often share the burdens of governing, physical labor, childcare, and other duties. A collective of farmers who work together to cultivate and protect their land without a noble, a city of pirates where each person can do as they wish, and a traveling theatrical troupe whose members vote on every artistic and administrative decision are all communal cultures. \n\nMany communal cultures operate outside settled lands, sticking to the wilds, a specific district in a larger settlement, city sewers, forgotten ruins, or other isolated places. For even when such cultures are harmless, their members know that outsiders might try to impose rules upon them if they live in the same place. As such, many folks in communal cultures focus on fending for themselves while avoiding the danger that other groups can represent. "
  id: 8fb4c210-bbfb-4179-8218-26dc6fadc705
  ctime: 1730729843237
b791f023-6852-426e-aeef-7eac5d04aa7b:
  __typeName: CultureAspect
  mtime: 1756162962869
  modifierInfo:
    __typeName: ClassLevel
    features:
    - __typeName: CharacterSkillChoice
      categories:
        intrigue: true
      name: Lawless Skill
      guid: b1f90d54-9ada-4e8f-8980-f19dce2d9372
      description: Choose one skill from the intrigue skill group. (*Quick Build:* Sneak)
      source: Lawless Culture Feature
  name: Lawless
  category: upbringing
  description: Your hero grew up among folk who performed activities that other people—whether within or outside their culture—considered unlawful. A band of pirates, a guild of assassins, or an organization of spies all commit unlawful acts for money. And under tyranny, people engaged in rebellion are often considered lawless in their actions and activities. People brought up in a lawless culture typically don’t mind breaking the rules when it suits them—and are good at making sure no one finds out they did.
  id: b791f023-6852-426e-aeef-7eac5d04aa7b
  ctime: 1756162664252
