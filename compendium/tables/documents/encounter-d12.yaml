    w: |+
      [[/awardvp 1|Award Heroes 1 Victory]]

    u: |
      Once the heroes secure the control room, the oozes flee and the heroes earn 1 Victory each.
    s: |+
      ## Ending the Encounter

    q: |+
      The oozes aim to force heroes back into the gauntlet to dispatch them more ably. However, they're otherwise not especially tactical. Thanks to their Amorphous trait, they pursue heroes down the narrow tunnel to the south with ease, and the creeping sludges can pull creatures out of that tunnel, reverting some of their progress toward the control panel.


