      data: |+
        Myxovidan the Sintaker	Level 6 Elite Hexer
        Draconian, Dragon, Humanoid	EV 46
        <b>Stamina</b> 140	<b>Immunity </b>corruption 6
        <b>Speed</b> 5 (flying)	<b>Size</b> 1M /<b> Stability</b> 2
        <b>Free Strike</b> 7
        Might -1	Agility +3	Reason +2	Intuition +2	Presence +1
        <b>Breaking Palm</b> (Action) %E2%97%86 2d10 + 3%E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> 2 enemies
        %E2%9C%A6	<b>%E2%89%A411</b>	10 damage; M<1 weakened (save ends)
        %E2%98%85	<b>12-16</b>	15 damage; M<2 weakened (save ends)
        %E2%9C%B8	<b>17</b>	18 corruption damage; M<3 weakened (save ends)
        <b>2 Malice</b> Myxovidan regains Stamina equal to half the damage dealt.

        <b>Expunging Exhalation </b>(Action)
        <b>Keywords</b> Area, Magic, Melee
        <b>Distance</b> 2 burst<b>	Target</b> All enemies in the burst
        %E2%9C%A6	<b>%E2%89%A411</b>	7 corruption damage; M<1 condemned (save ends)
        %E2%98%85	<b>12-16</b>	12 corruption damage; M<2 condemned (save ends)
        %E2%9C%B8	<b>17</b>	15 corruption damage; M<3 condemned (save ends)
        <b>Effect </b>A condemned creature has corruption weakness 3 until the condition ends.

        <b>Step and Swap </b>(Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 3<b>	Target</b> 1 ally
        <b>Effect </b>Myxovidan and the target shift and swap places.

        <b>Anyone Can Do That</b> (Triggered Action) %E2%97%86 2 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Trigger</b> An adjacent creature damages Myxovidan
        <b>Effect </b>Myxovidan perfectly recreates the damaging move. If the move requires a Power Roll, Myxovidan rolls power using his stats. If Myxovidan gets a higher tier on this roll than the triggering creature, the Director gains 2 Malice.

        <b>Stench of Death</b>
        Whenever an enemy regains Stamina while within 5 of Myxovidan, they regain 3 less Stamina.



