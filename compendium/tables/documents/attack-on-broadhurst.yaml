    O: |
      The attack on Broadhurst happens right after the heroes finish their third respite in the village after they or the Jagged Edge obtain the [item:Cup of Iulius]. See [Respite Tracker].
    p: |
      ## Take the Cup!
    k: |+
      These encounters use the [Attack on Broadhurst Map].


    W: |+
      The attack on Broadhurst happens in three encounters that occur one right after the other. The time between encounters is just long enough for the heroes to spend Recoveries as they wish before the next begins.


    H: |+
      # Attack on Broadhurst

    u: If the heroes are in possession of the [item:Cup of Iulius] and surrender it to the Jagged Edge, the goblins call off the attack … for now. They’ll return after the heroes finish another three respites to raze the village if the heroes don’t travel to [Castle Andreas] to stop the Jagged Edge.
    f: |+
      |Queen Bargnot has some large spiders are her disposal. If you or any of your players feel uncomfortable with the description of spiders, you can change these creatures to make them giant wolves carrying mechanical net-launchers or whatever other awesome giant animal you can dream up.|


    S: |+
      If the heroes have the cup, the goblins are attacking the village to obtain it. If the goblins have the cup, [Queen Bargnot] is here for revenge and to burn Broadhurst to the ground. (See [Goblin Replacements])

    v: |2+



