  ctime: 1755516411291
  description: You once contracted a terrible illness for which no one could find a cure. You sought out a primordial swamp said to be either cursed or miraculously salubrious. It turned out to be both, keeping your illness at bay while corrupting your body with its unnatural energy
  id: 85ec8058-8b3f-49ae-8f3c-a052bd2b75f8
