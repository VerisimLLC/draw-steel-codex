description: D2. Fresco Hall
content: |-
  # D2. Fresco Hall


  > * “Frescoes on the wall of this narrow hall show a fallen knight and a large silver chalice being carried by a procession of warriors into a tomb carved with the name ‘Delius’ atop its entrance.”
  > * “The head of a goblin lies on the floor, next to the presumably matching corpse.”


  {**Secret:** The hall contains a scythe trap that springs from a thin horizontal slit in the north wall that is 30 inches high and triggered by a pressure plate (shown on the Delian Tomb First Level map). The goblins discovered this trap the hard way and know to duck when moving by the trap to avoid getting their heads cut off.}

  ## Trap: Bladed Scythe
  A hero who actively looks for a trap can make a Reason or Intuition test. 
  *Click on the heading of the applicable roll and then select which hero to prompt.*

  |Find the Scythe Trap: Reason or Intuition Test
  |{#The hero steps on the pressure plate and triggers the trap while searching for it. Since they were approaching cautiously, they have an edge on the test made to dodge out of the way of the trap.}
  |{#The hero finds the pressure plate and notices a slit in the wall.}
  |{#The hero finds the pressure plate and can disarm the trap without making a second test.}

  If a hero notices the trap, they can attempt to disarm it by wedging a thin, sturdy object, like a dagger, under the plate to prevent it from depressing. The hero doing this must make an Agility test.

  |Disarm the Scythe Trap: Agility Test
  |{#The hero triggers the trap.}
  |{#The hero fails to disarm the trap but doesn’t trigger it.}
  |{#The hero disarms the trap.}

  If a creature triggers the trap, each creature standing on the ground in a space that could trigger the trap must make an Agility test as a blade emerges from the slit in the walls and slices across their space.

  |Dodge the Scythe Trap: Agility Test
  |{#The hero takes 7 damage.}
  |{#The hero takes 6 damage.}
  |{#The hero takes 4 damage.}

  |**Damage In The Codex**|
  |To manually apply damage to one or muliple characters, select them and type the value into the Damage field.|

  The trap automatically resets once it is triggered. A hero who witnesses the trap being triggered has an edge on tests made to interact with it. The player can click on the 'edge' button when making the roll to apply this.



  |**Getting Creative With Traps**|
  |Traps allow heroes a chance to get creative with their problemsolving skills. This adventure outlines what we think is the most obvious way to deal with the bladed scythe and other traps in this adventure, but the players might come up with other solutions for solving problems that seem like they should work. For example, instead of disarming the trap, the heroes might decide to leap back and forth over the pressure plate, carrying the weaker members of their party who can’t jump more than 1 square or crawl under the slit in the wall where the blade emerges. Allow the players to attempt these creative solutions to problems and call for a test only when necessary. Good ideas just work without a test!|
