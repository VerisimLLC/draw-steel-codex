      data: |+
        Troll Butcher	Level 5 Elite Hexer
        Giant, Troll	EV 28
        <b>Stamina</b> 120	<b>Weakness </b>Acid 5, Fire 5
        <b>Speed</b> 8	<b>Size</b> 2 /<b> Stability</b> 2
        <b>Free Strike</b> 6
        Might +3	Agility +1	Reason +1	Intuition +0	Presence +0
        <b>Savoring Bite</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	%E2%89%A411	9 damage; M<1 bleeding (save ends)
        %E2%98%85	12%E2%80%9316	14 damage; M<2 bleeding (save ends)
        %E2%9C%B8	17	17 damage; M<3 bleeding (save ends)
        <b>1 Malice</b> The gourmand regains Stamina equal to the damage dealt.

        <b>Rotten Scraps</b> (Action)
        <b>Keywords</b> Area, Ranged
        <b>Distance</b> 3 cube within 10<b>	Target</b> Each enemy in the cube
        %E2%9C%A6	%E2%89%A411	5 poison damage; M<1 weakened (save ends)
        %E2%98%85	12%E2%80%9316	9 poison damage; M<2 weakened (save ends)
        %E2%9C%B8	17	11 poison damage; M<3 weakened (save ends)
        <b>Effect</b> Each troll in the cube regains 3 Stamina.

        <b>Gourmet Flesh</b> (Maneuver) %E2%97%86 2 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The gourmand enhances their next Savoring Bite ability, changing the damage type and inflicted condition to one of the following combinations: corruption and dazed, acid and restrained, or lightning and frightened.

        <b>Acquired Taste</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Melee 1<b>	Target</b> Triggering creature
        <b>Trigger</b> A creature with deals damage to the gourmand with an Edge or a Surge.
        <b>Effect</b> The gourmand makes a free strike against the target. The gourmand has an edge on power rolls and deals an additional 3 damage on their strikes until the end of their next turn.

        <b>Bloody Feast</b>
        Each ally within 5 of the gourmand has an edge on power rolls that target an enemy suffering from a condition.

        <b>Relentless Hunger</b>
        The gourmand only dies when they are reduced to 0 Stamina by acid or fire damage, end their turn with 0 Stamina, or take acid or fire damage while at 0 Stamina.

