  name: Stone Pillars
  targetType: anyspace
  description: |-
    Two pillars of stone 1 square wide either thrust up out of the ground or jut down from the ceiling anywhere on the encounter map, to a height of up to 5 squares. A creature in the area of a pillar before it appears is knocked prone on its surface. If the creature
    comes into contact with the ceiling above or the floor beneath the pillar and has M<2 they are restrained (save ends).
