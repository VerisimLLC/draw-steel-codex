      Two guards are stationed in the front area of the fort: Berrick, a **human trickshot**, stands atop a platform to the east of the entryway, while Kora, a **human scoundrel**, stands to the west of the entryway in case anyone charges in. They’re friends and distracted by chatting with each other.


    yv: "**Illumination:** The Forsaken Wraiths have placed lit torches in wall sconces to illuminate the entirety of the fortress."
