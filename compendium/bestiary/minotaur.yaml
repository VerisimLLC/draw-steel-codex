      data: |+
        Minotaur	Level 3 Elite Harrier
        Accursed, Humanoid, Minotaur	EV 20
        <b>Stamina</b> 100
        <b>Speed</b> 8	<b>Size</b> 2 / <b>Stability</b> 2
        <b>	Free Strike</b> 5
        Might +2	Agility +2	Reason 0	Intuition +1	Presence -1
        <b>Flail and Blade</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Charge, Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	7 damage; push 1
        %E2%98%85	<b>12%E2%80%9316</b>	11 damage; push 2
        %E2%9C%B8	<b>17</b>	14 damage; push 3
        <b>	Effect</b> Shift 3.

        <b>Primal Bay </b>(Action) %E2%97%86 3 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self<b>Target</b> Self
        <b>Effect</b> The minotaur has damage immunity 2 and deals an additional 5 damage with their strikes until the end of their next turn. On their next turn, they have access to an additional maneuver.

        <b>Goring Horns </b>(Maneuver) %E2%97%86 2d10 + 2 %E2%97%86 5 Malice
        <b>Keywords</b> Charge, Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	5 damage; I<0 dazed (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	8 damage; I<1 dazed (save ends)
        %E2%9C%B8	<b>17</b>	9 damage; I<2 dazed (save ends)
        <b>Effect</b> The potency of this ability increases by 1 if it's used while charging.

        <b>Retaliatory Gore</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Trigger</b> The minotaur takes damage from a creature within 8.
        <b>Distance</b> Self	<b>Target</b> Triggering creature
        <b>Effect</b> The minotaur charges the target using Flail and Blade or Goring Horns.

        <b>Minotaur Sense</b>
        The minotaur cannot get a result lower than tier 2 when making Tests to navigate, search, or seek.



