    import:
      type: mcdm
      data: |+
        Soulbinder Psyche	Level 10 Elite Hexer
        Humanoid, War Dog	EV 48
        <b>Stamina</b> 220
        <b>Speed</b> 5 (fly, hover)	<b>Size</b> 1M /<b> Stability</b> 1
        <b>Free Strike</b> 10
        Might +1	Agility +3	Reason +3	Intuition +4	Presence +5
        <b>Soulbind</b> (Action) %E2%97%86 2d10 + 5%E2%97%86 Signature
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 10<b>	Target</b> Two creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	15 holy damage; R<3 soulbound (save ends)
        %E2%98%85	<b>12-16</b>	20 holy damage; R<4 soulbound (save ends)
        %E2%9C%B8	<b>17</b>	24 holy damage; R<5 soulbound (save ends)
        <b>Effect</b> Soulbound creatures cannot benefit from surges or edges until the condition ends as their equipment fights against them.

        <b>Soulstorm</b> (Action) %E2%97%86 2d10 + 5%E2%97%86 2 Malice
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 3 cube within 10<b>	Target</b> All enemies in the cube
        %E2%9C%A6	<b>%E2%89%A411</b>	8 corruption damage; P<3 weakened (EoT)
        %E2%98%85	<b>12-16</b>	12 corruption damage; P<4 weakened (EoT)
        %E2%9C%B8	<b>17</b>	15 corruption damage; P<5 weakened (EoT)
        <b>Effect</b> The affected area is considered difficult terrain until the beginning of Psyche's next turn. Psyche may use a maneuver at the start of her turn to maintain this effect, move it up to 5 squares in any direction, and roll power against each creature in the new area.
        <b>1 Malice </b>Until the start of Psyche's next turn, if this ability applies weakened, it also applies Soulbound (save ends)

        <b>Command the Awakened </b>(Maneuver)
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> 5 burst<b>	Target</b> all soulbound enemies
        <b>Effect</b> Each target takes 5 damage as if attacking themself, and <b>M<4</b> slides 5.

        <b>Spirit Form </b>(Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Trigger</b> An enemy moves within 2 squares of Psyche.
        <b>Effect</b> Psyche moves 5 squares away. During this movement, she has damage immunity 5 and ignores difficult terrain. Whenever she passes through a creature for the first time during the movement, that creature takes 5 corruption damage.

        <b>Vengeance for the Slain </b>(Free Triggered Action)
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 10<b>	Target</b> One war dog
        <b>Trigger</b> The target becomes winded or dies.
        <b>Effect</b> An enemy within 10 of the target loses all Surges and takes 5 corruption damage.
        <b>1 Malice </b>The enemy also has a bane on their next strike.

        <b>Immortal Soul</b>
        When Psyche dies, her spirit supports the nearest war dog, who gains damage immunity 2, deals an additional 5 damage on strikes, and may use the Immortal Strike maneuver until the end of the encounter. That war dog also gains the Immortal Soul trait, and on their death will transfer this effect to the nearest war dog.

        <b>Immortal Strike </b>(Maneuver)
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 10<b>	Target</b> one creature or object
        <b>Effect</b> The target takes 10 psychic damage.
        Castellan Hoplon	Level 10 Elite Defender
        Humanoid, War Dog	EV 48
        <b>Stamina</b> 260	<b>Immunity</b> damage 3
        <b>Speed</b> 5	<b>Size</b> 1M /<b> Stability</b> 3
        <b>Free Strike</b> 10
        Might +5	Agility +2	Reason +4	Intuition +3	Presence +4
        <b>Inspiring Strike</b> (Action) %E2%97%86 2d10 + 5%E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> Two creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	15 damage
        %E2%98%85	<b>12-16</b>	20 damage; push 3
        %E2%9C%B8	<b>17</b>	24 damage; push 5
        <b>Effect </b>Two allies within 10 of Hoplon can shift up to their speed and either take the defend action or make a free strike.

        <b>Summon the Onyx Tower</b> (Action) %E2%97%86 5 Malice
        <b>Keywords</b> Area
        <b>Distance</b> 5 cube within 15<b>	Target</b> Special
        <b>Effect</b> A 10-square tall tower made of black stone shimmers into being. It has 3 floors and a crenelated rooftop. War dogs within or adjacent to the onyx tower gain 5 Stamina at the start of each of their turns and have damage immunity 2, and war dogs within the tower have line of effect through its walls. The tower has an entrance in the middle of each side on the ground floor. This ability can only be used once per encounter.

        <b>Shield Warden</b> (Maneuver) %E2%97%86 2 Malice
        <b>Keywords</b> Area
        <b>Distance</b> 3 burst<b>	Target</b> All enemies in the burst
        %E2%9C%A6	<b>%E2%89%A411</b>	R<3 taunted (EoT)
        %E2%98%85	<b>12-16</b>	R<4 taunted (EoT)
        %E2%9C%B8	<b>17</b>	R<5 taunted (EoT)
        <b>Effect</b> Until the start of his next turn, enemy abilities that include Hoplon as a target have a bane.

        <b>Timely Intervention</b> (Triggered Action)
        <b>Keywords</b> Attack, Magic
        <b>Distance</b> Ranged 10<b>	Target</b> Triggering enemy
        <b>Trigger</b> An enemy targets an ally with a strike or ability.
        <b>Effect</b> Hoplon teleports to an unoccupied space adjacent to the target and becomes the new target. Hoplon then makes a free strike against the target, who becomes <b>R<4</b> taunted (EoT).

        <b>Black Shield's Curse</b> (Free Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 10<b>	Target</b> One enemy
        <b>Trigger</b> The target deals damage to Hoplon.
        <b>Effect</b> Hoplon's cursed shield returns some of the damage it takes. The target takes corruption damage equal to half the damage dealt to Hoplon +3 (or +10 if Last Stand is activated).

        <b>Hold the Line</b>
        Each ally within 3 squares of Hoplon has damage immunity 2 and cover.

        <b>Last Stand</b>
        The first time Hoplon's Stamina would be reduced to 0, it is instead reduced to 1. He gains damage immunity 10 until the end of his next turn. When Hoplon dies, each ally within 5 gains damage immunity 3 and deals an additional 5 damage on strikes.



