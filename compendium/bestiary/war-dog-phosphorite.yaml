      data: |+
        War Dog Phosphorite	Level 2 Horde Hexer
        Humanoid, War Dog	EV 4
        <b>Stamina</b> 15	<b>Immunity</b> Acid 2
        <b>Speed</b> 5	<b>Size</b> 1M / <b>Stability</b> 0
