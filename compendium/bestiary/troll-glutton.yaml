    import:
      type: mcdm
      data: |+
        Troll Glutton	Level 5 Elite Brute
        Giant, Troll	EV 28
        <b>Stamina</b> 160	<b>Weakness</b> Acid 5, Fire 5
        <b>Speed</b> 6	<b>Size</b> 2 /<b> Stability</b> 4
        <b>Free Strike</b> 7
        Might +3	Agility +1	Reason -1	Intuition +0	Presence +1
        <b>Voracious Mastication</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	%E2%89%A411	10 damage
        %E2%98%85	12%E2%80%9316	15 damage; M<2 slowed (save ends)
        %E2%9C%B8	17	18 damage; M<3 slowed (save ends)
        <b>1 Malice</b> The glutton regains Stamina equal to the damage dealt.

        <b>Crash Through</b> (Action) %E2%97%86 3 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The glutton shifts up to their speed in a straight line, ignoring difficult terrain. A creature can choose to fall prone or take 10 damage the first time the glutton passes through their space during the movement. If the glutton moves into a creature or object larger than them and the glutton doesn't knock the creature prone or destroy the object, the glutton's movement stops early and they become dazed until the end of their next turn.

        <b>Food Frenzy</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The glutton has a double edge on strikes and strikes have an edge against them, until the start of their next turn.

        <b>Spiteful Retort</b> (Free Triggered Action) %E2%97%86 1 Malice
        <b>Keywords</b> -
        <b>Distance</b> Melee 1<b>	Target</b> Self
        <b>Trigger</b> The glutton is reduced to 0 Stamina but doesn't die.
        <b>Effect</b> The glutton uses their Voracious Mastication ability against an adjacent creature.

        <b>Insatiable Appetite</b>
        Once per turn, the glutton can take the Charge action as a free maneuver if they target a winded creature.

        <b>Relentless Hunger</b>
        The glutton only dies when they are reduced to 0 Stamina by acid or fire damage, end their turn with 0 Stamina, or take acid or fire damage while at 0 Stamina.



