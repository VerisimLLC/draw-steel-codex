        canHavePrerequisites: true
        classid: 97bd30e0-b670-41c7-9136-6a832625f049
        description: |-
          As a respite activity, you can scribe a notice of your arrival (such as a calling card or a formal letter) addressed to an enemy. You can deliver the notice to the target personally if you are in the same general area, send it by courier, or leave it in a covert location for the target to find. You can have only one notice active at a time.

          The Director determines when the target receives your notice. When the target receives the notice, they become alarmed and take desperate measures to stop you. The Director gains 1 additional Malice per combat round during encounters involving the target. The heroes start each such encounter with 2 additional hero tokens. These hero tokens disappear at the end of the encounter.
        name: Formal Introductions
        implementation: 3
      - __typeName: CharacterFeature
        domains:
          class:97bd30e0-b670-41c7-9136-6a832625f049: true
        description: |-
          You can invoke your reputation at the start of a social interaction with one or more NPCs who haven’t met you before, automatically creating a bond with one of those NPCs from that group as if using your Scene Partner feature. This bond counts against the limit on active bonds from your Scene Partner feature. While the bond is active, all heroes present treat their Renown as 2 higher than usual for the purpose of entering into a negotiation with the bonded NPC.

          The Director can award the heroes 1 hero token to make you infamous among the group of creatures instead, and preventing you from forming this bond. Until you take action to improve your reputation, all heroes present take a bane on tests made to interact with creatures in the group using skills from the interpersonal skill group. You can still use your Scene Partner feature to find allies within the group.
        modifiers: []
        name: My Reputation Precedes Me
        classid: 97bd30e0-b670-41c7-9136-6a832625f049
        guid: 97b2b243-45ea-4558-a1bb-66aed706f7c8
        source: Troubadour Class Feature
        canHavePrerequisites: true
