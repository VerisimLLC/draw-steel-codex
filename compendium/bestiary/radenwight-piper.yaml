      data: |+
        Radenwight Piper    Level 1 Platoon Support
        Humanoid, Radenwight    EV 6
        <b>Stamina</b> 30
        <b>Speed</b> 5 (climb)    <b>Size</b> 1S / <b>Stability</b> 0
        <b>Free Strike</b> 3
        Might +0    Agility +0    Reason +0    Intuition +2    Presence +1
        <b>Piercing Trill</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Magic, Melee, Ranged, Strike
        <b>Distance</b> Melee 1 or Ranged 10    <b>Target</b> One creature or object
        %E2%9C%A6    %E2%89%A411    5 sonic damage; push 1
        %E2%98%85    12%E2%80%9316    7 sonic damage; push 3
        %E2%9C%B8    17+    9 sonic damage; push 4
        <b>Effect</b> The piper or an ally within distance regains Stamina equal to half the damage dealt.

        <b>Vivace Vivace!</b> (Maneuver)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 3 burst    <b>Target</b> Each ally in the burst
        <b>Effect</b> Each target who has used their Ready Rodent ability since their last turn regains the use of their triggered action.
        <b>2 Malice</b> The area increases to 6 burst.

        <b>Ready Rodent </b>(Triggered Action)
        <b>Keywords</b> Melee, Weapon
        <b>Distance</b> Melee 1    <b>Target</b> One creature
        <b>Trigger</b> An ally deals damage to the target.
        <b>Effect</b> The piper makes a free strike against the target.

        <b>Musical Suggestion</b>
        At the end of the piper's turn, they can choose an adjacent creature and slide them 2, ignoring stability.

      type: mcdm
