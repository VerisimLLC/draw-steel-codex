    |6||||
    |7|[Wraith Raid]|||
    |8||||
    |9||||
    |10|[Full Moon]|||
    |11||||
    |12||||


    Special:
    [Gilded Showdown] happens **one** respite after successfully stealing the ring (see [Grabbing the Ring])

    [Another Meeting With the Hand] has various events depending on the heroes actions & rolls.

    [Attack on Broadhurst] happens if the Jagged Edge or the heroes recover the Cup of Iulius, the heroes finish **three** respites, and don’t go to Castle Andreas.
