  content: |-
    # What Do the Goblins Know?

    If the heroes capture or question a goblin, the goblin provides the following information and then flees the first chance they get. A captured goblin is scared enough of the heroes that no test is necessary to get the information:

    * The goblins are part of a group of traveling brigands called the Jagged Edge.
    * A mighty goblin, Queen Bargnot, leads the group. Years ago, Queen Bargnot was driven out of the area by the people of Broadhurst. She’s rebuilt her forces and come back for revenge!
    * While searching for a new base of operation, Queen Bargnot found the tomb and noticed its frescoes, which promise a magic cup that can turn even the lowliest goblin into a great warrior.
    * She left a contingent of goblins here to search the tomb for the cup while she looks for a new base.
    * The lower levels of the tomb are sealed off with magic. The goblins captured a human whom Vorgosh, a bugbear mage, believes can be used in a sacrificial ritual to unseal the tomb.
  ctime: 1762882850176
