      |Interest 0 | No, and… |Queen Bargnot and her court attack the heroes.|


    j: |
      If the negotiation ends with Queen Bargnot’s interest at 4 or 5, the heroes earn 1 Victory each.
    g: |
      |Interest 2 | No, but… |Queen Bargnot refuses to leave [Castle Andreas] or hand over the [item:Cup of Iulius] if she has it, but she is willing to not attack or harass the people of Broadhurst if the heroes leave right now. She stays true to her promise, provided the Jagged Edge remains left alone. There’s no telling what her successor will do when she dies.|
    h: |
      |Interest 1 | No. |Queen Bargnot refuses to make a deal with the heroes and tells them to leave immediately—and promises they’ll die the next time she sees them.|
    e: |
      |Interest 4 | Yes.|Queen Bargnot agrees to leave Dalrath with the Jagged Edge and whatever she currently has in her possession or has been promised by the heroes—including the [item:Cup of Iulius].|
    f: |
      |Interest 3 | Yes, but… |Queen Bargnot agrees to leave Dalrath with the Jagged Edge but only if the heroes give her the [item:Cup of Iulius]. If she’s already in possession of the cup, she demands another prize from them in the form of a permanent treasure that is armor, an implement, or a weapon.|
    c: |+
      **Negotiation outcomes**


    d: |
      |Interest 5 |Yes, and... |Queen Bargnot agrees to leave Dalrath with the Jagged Edge and live a peaceful life. If she has the [item:Cup of Iulius], she hands it  over to the heroes, claiming holding onto the item isn’t worth being pursued by power-hungry generals and treasure-seekers. If she doesn’t have the cup, she instead gives the heroes her [item:Shrouded Memory] armor, saying she won’t  need it anymore.|
    a: |
      {**Justice**}
    b: |
      {The queen’s volition prevents her from accepting any idea of justice other than her own. She won’t be imprisoned and won’t allow another goblin to suffer the same fate. Arguing that she and her bandits should face consequences for their actions invokes this pitfall.}


      {
    Y: |
      {**Higher Authority**}
    Z: |+
      {Serving another ruler leaves Queen Bargnot and the bandits in no better position than they were. If the heroes suggest she serve a king, the heroes invoke this pitfall and Queen Bargnot spits on the ground.}

    W: |+
      {Queen Bargnot would love to keep the Cup of Iulius. Securing any land or rule for the Jagged Edge would mean her bandits gained more than they started with. It also looks good while negotiating in front of a crowd of her people. Arguments that promise her the cup or power appeal to this motivation.}

    X: |
