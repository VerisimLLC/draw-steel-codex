      data: |+
        Lydixavus the Eyeful	Level 6 Artillery Troop
        Draconian, Humanoid	EV 48
        <b>Stamina</b> 100	<b>Immunity </b>cold 6
        <b>Speed</b> 5 (flying)	<b>Size</b> 1M /<b> Stability</b> 2
        <b>Free Strike</b> 7
        Might -1	Agility +3	Reason +3	Intuition +3	Presence +1
        <b>Breathsnipe</b> (Action) %E2%97%86 2d10 + 3%E2%97%86 Signature
        <b>Keywords</b> Ranged, Strike, Weapon
        <b>Distance</b> Ranged 15<b>	Target</b> 1 enemy
        %E2%9C%A6	<b>%E2%89%A411</b>	10 cold damage
        %E2%98%85	<b>12-16</b>	16 cold damage; the target has a bane on their next strike.
        %E2%9C%B8	<b>17</b>	19 cold damage; the target has a double bane on their next strike.

        <b>Ice Lob</b> (Action) %E2%97%86 2d10 + 3
        <b>Keywords</b> Area, Magic, Ranged
        <b>Distance</b> 2 cube within 10<b>	Target</b> All enemies and objects in the cube
        %E2%9C%A6	<b>%E2%89%A411</b>	5 cold damage; M<1 dazed (save ends)
        %E2%98%85	<b>12-16</b>	9 cold damage; M<2 dazed (save ends)
        %E2%9C%B8	<b>17</b>	12 cold damage; M<3 dazed (save ends)

        <b>Parting Gift</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> Lydixavus flies up to their speed, leaving a size 1S ice mine in the square they took off from. The ice mine explodes when an enemy enters a square containing it. Lydixavus rolls power for an exploding ice mine as if they used their Ice Lob ability, targeting the triggering creature and each creature and object within 1 of the ice mine.

        <b>Wasn't Aiming For You</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Trigger</b> Lydixavus gets a Tier 1 result on their signature action
        <b>Effect</b> Lydixavus uses an additional signature action targeting a creature within 5 of the original target.

        <b>Scorekeeping Scales</b>
        Lydixavus knows the location of every creature who has ever dealt damage to them and has line of effect to each of these creatures while they're within 20 of Lydixavus.



