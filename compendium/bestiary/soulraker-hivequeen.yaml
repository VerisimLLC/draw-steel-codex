    import:
      type: mcdm
      data: |+
        Soulraker Hivequeen	Level 9 Leader
        Abyssal, Demon, Soulraker	EV 44
        <b>Stamina</b> 240	<b>Weakness</b> Holy 5
        <b>Speed</b> 6 (fly)	<b>Size</b> 5 /<b> Stability</b> 2
        <b>Free Strike</b> 9
        Might +5	Agility -1	Reason +3	Intuition +3	Presence +2
        <b>Stinging Ovipositor</b> (Action) %E2%97%86 2d10 + 5%E2%97%86 Signature
        <b>Keywords</b> Magic, Melee, Ranged, Strike
        <b>Distance</b> Melee 1 or Ranged 10<b>	Target</b> Two creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	14 poison damage; M<3 bleeding (save ends)
        %E2%98%85	<b>12-16</b>	19 poison damage; M<4 bleeding (save ends)
        %E2%9C%B8	<b>17</b>	23 poison damage; M<5 implanted
        <b>Effect</b> Implanted creatures have a <b>soulraker handmaiden</b> parasite gestating in them (see the handmaiden's Implanted Parasite).

        <b>Forced Gestation</b> (Maneuver) %E2%97%86 3 Malice
        <b>Keywords</b> Area
        <b>Distance</b> 10 burst	<b>Target</b> All soulraker handmaiden parasites
        <b>Effect</b> The hivequeen lets loose a subsonic call to each target, forcing them to immediately emerge as a matured <b>soulraker handmaiden</b> from their host's body and make a free strike.

        <b>For the Queen!</b> (Triggered Action) %E2%97%86 2 Malice
        <b>Keywords</b> -
        <b>Distance</b> 5 burst<b>	Target</b> Special
        <b>Trigger</b> The hivequeen is striked a second time during a turn.
        <b>Effect</b> Two soulraker minions appear within distance.
        <b>2 Malice </b>A <b>soulraker praetorian</b> also appears within distance.

        <b>Cannibal Queen</b>
        At the end of their turn, the hivequeen can consume an adjacent Soulraker demon to end one save ends effect affecting them (no action required).

        <b>Lethe</b>
        While winded, the hivequeen has an edge on strikes, and strikes have an edge against them.

        <b>Hive Soulsight</b>
        The hivequeen can see through the eyes of any Soulraker demons within 100 miles and benefits from their Soulsight.

        <b>Kicking the Nest </b>(Villain Action 1)
        <b>Keywords</b> Area
        <b>Distance</b> 10 burst<b>	Target</b> All creatures
        <b>Effect</b> All minions within distance move their speed and take a free strike. If no minions are present, four soulraker minions are summoned into unoccupied squares within distance before the hivequeen uses this action.

        <b>Buzz Off! </b>(Villain Action 2) %E2%97%86 2d10 + 5
        <b>Keywords</b> Area, Melee
        <b>Distance</b> 5 burst<b>	Target</b> All Enemies
        <b>Effect</b> The hivequeen buzzes her wings at an earsplitting frequency then shifts up to her speed.
        %E2%9C%A6	<b>%E2%89%A411</b>	push 3; I<3 dazed (save ends)
        %E2%98%85	<b>12-16</b>	push 3; I<4 dazed (save ends)
        %E2%9C%B8	<b>17</b>	11 sonic damage; push 3; I<5 dazed (save ends)

        <b>Bomber Wasp Warfare</b> (Villain Action 3) %E2%97%86 2d10 + 5
        <b>Keywords</b> Area, Magic, Ranged
        <b>Distance</b> Four 2 cubes within 10<b>	Target</b> All creatures
        %E2%9C%A6	<b>%E2%89%A411</b>	7 poison damage; M<3 bleeding (save ends)
        %E2%98%85	<b>12-16</b>	11 poison damage; M<4 bleeding (save ends)
        %E2%9C%B8	<b>17</b>	14 poison damage; M<5 bleeding (save ends)
        Demons - 4th Echelon
        The more souls a demon consumes, the more they evolve. The more they evolve the more refined their tastes become, until eventually the demon can only be satisfied by souls that exemplify particular qualities.
        Aurumvas stands among named demons for craving not only wealth, but highly avaricious souls. His powerful ilk have their tastes honored by their titles, such as Gorgino, the Sensuous Feast, Tyx, the Obliviated Spiral, and Lorikta, the Discarded Dream.
        Aurumvas: Hungry for Riches
        Aurumvas lords over vast vaults of treasure in the Abyssal Wastes he has slaughtered hundreds of creatures to acquire. The demon king gazes upon his riches and wants for more. He allures lesser demons and wicked mortals to work for him with minor treasures, knowing full well that one needs to spend wealth to make it. If left unchecked, Aurumvas will see to it that his glittering hoards and hordes will one day encompass the entire timescape.
        Category 10 Demons
        <b>Optacus</b> is an abyssal eye atop a spindly flesh stalk supported by innumerable legs. Able to affix to any surface, it fires deadly beams at distant foes.
        A horrifying cross between a thresher shark and a terror lizard. <b>Tyburaki</b>'s tails are lined with tiny shark maws, able to bite multiple foes at once.
        <b>Unguloid</b>'s are similar to a centaur but with the body and head resembling a demonic rhinoceros with a devastating charge.
        The mercurial form of a <b>Izyak</b> ripples with psionic energy, looking different to everyone viewing it. It's true form is a brain supported four bone legs.
        <b>Vicisitator demons</b> are dangerous and horrifically unstable, with flesh and bone in a state of perpetual agonizing flux. Their very touch results in agonizing warps to flesh, bone, and soul.
        Covetous is too soft a word to describe the avarice of <b>Aurumvas</b> (<i>or-UM-</i><i>vahs</i>). Towering, with a stack of crowns atop his ophidian head. A vision of opulence, excess, and absolute debasement.

