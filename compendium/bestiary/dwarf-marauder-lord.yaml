    import:
      type: mcdm
      data: |+
        Dwarf Marauder Lord	Level 3 Leader
        Dwarf, Humanoid	EV 20
        <b>Stamina</b> 132
        <b>Speed </b>5	<b>Size</b> 1M / <b>Stability</b> 4
        <b>Free Strike</b> 5
        Might +3	Agility 0	Reason +2	Intuition +1	Presence 0
        <b>Levitating Axes</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Melee, Psionic, Strike, Weapon
        <b>Distance</b> Melee 1 or Ranged 10<b>	Target</b> Two creature or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	8 damage; slide 1
        %E2%98%85	<b>12%E2%80%9316</b>	12 damage; slide 3
        %E2%9C%B8	<b>17</b>	15 damage; slide 5
        <b>Effect</b> A target restrained by a dwarf can be slid by this ability.
        <b>3 Malice</b> A target that is force moved adjacent to an ally with this ability is restrained (EoT).

        <b>Magnetomancy</b> (Maneuver)
        <b>Keywords</b> Psionic, Ranged
        <b>Distance</b> Ranged 10<b>	Target</b> 1 creature or object
        <b>Effect</b> Vertical slide 5. A target restrained by a dwarf can be slid by this ability.
        <b>5 Malice</b> This ability gains the Area keyword, its distance becomes 10 burst, and it now targets restrained creatures<b>.</b>

        <b>Your Weapon is Useless </b>(Triggered Action)
        <b>Keywords</b> Psionic
        <b>Distance</b> Self or ranged 10	<b>Target</b> Self or 1 ally
        <b>Trigger</b> A creature makes a melee strike against the target.
        <b>Effect</b> The target takes half damage from the attack. The attacker takes 4 damage.

        <b>End Effect</b>
        At the end of their turn, the marauder lord can take 5 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Ajax Will Pay Well for These Specimens </b>(Villain Action 1)
        <b>Keywords</b> Area, Psionic, Weapon
        <b>Distance</b> 5 cube within 10<b>	Target</b> All enemies in the cube
        <b>Effect</b> The marauder lord uses Levitating Axes against each target. The marauder lord makes one power roll against all targets.

        <b>Don't Let Them Escape!</b> (Villain Action 2)
        <b>Keywords</b> Area
        <b>Distance</b> 5 burst<b>	Target</b> All allies in the burst
        <b>Effect </b>Each target shift up to their speed. The marauder lord then uses Levitating Axes.

        <b>Test Your Metal!</b> (Villain Action 3)
        <b>Keywords</b> Psionic
        <b>Distance</b> Ranged 10<b>	Target</b> special
        <b>Effect</b> The marauder lord creates three 2-square metal objects in unoccupied squares within distance. When the marauder lord uses Magnetomancy, they can additionally target one of these objects.



