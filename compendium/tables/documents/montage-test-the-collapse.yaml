content: |-
  # Montage Test: The Collapse

  ## Overview

   Vurkor has completed a ritual that connects his amulet and his life force to the magic of the tower. If someone removes Vurkor’s amulet after he dies, the tower begins to collapse. If the heroes are on the ground floor of the tower, they can easily escape the collapsing tower without issue. If the heroes escape with all the captives this way, they earn 1 Victory each.

   Otherwise, removing the amulet kicks off a montage test to see if the heroes and the captives can escape.

   The Collapsing Tower Test Difficulty table shows this montage test’s success and failure limit based on the number of heroes in the test.

  ## Setting the Scene

  When this montage test begins, provide the following information:
  > * “As you learn the [secrets of Vurkor’s amulet], a magic shockwave emanates from his body, and the tower begins cracking, crumbling, and falling apart.”
  > * “Suddenly, a huge chunk of stone cuts off several paths to the stairs.”
  > * “Magic bolts crackle from the tower as it collapses, threatening to fry everyone within who doesn’t get crushed first.”
  > * “The stone falls away to reveal not the outside, but a black void.”
  > * “Below, captives scream for help—panicking and without any idea of what to do."

  :<>[[image:montageimage]]

  ## Tests

   The following challenges can be part of the montage test:

  {
  |Avoid Falling Rocks: Agility (Alertness or Gymnastics)
  |Easy

  |Hold Up a Wall or Move Rubble: Might (Lift)
  |Medium

  |Bind Unstable Magic: Reason or Intuition (Endurance or Magic)
  |Hard

  |Keep Everyone Calm: Presence (Empathize, Persuade or Lead)
  |Hard
  }



  ## Party


