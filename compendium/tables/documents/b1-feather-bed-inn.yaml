      ## [Gilded Hand]

    t: |+
      # Other Relevant Notes

    r: |+
      |96-100|“[Reeve Rosamund] ain’t greedy. She’s not driven by power either. She just wants to protect us. Poor woman is overworked.”|


    o: |
      |86-90|“I don’t suppose you’re a butcher? [Brune]’s fine with a cleaver, but my gods, is that one surly lump of a man. I’d pay a little more just to avoid him.”|
    p: |
      |91-95|“Here’s the thing. There’s more than one kind of bandit on the road. I heard we got goblins, we got humans, we got orcs, and even ogres! Are they working together?”|
    m: |
      |76-80|“Out of the east road the other day and I heard some clanging coming from the old wizard tower. I swear the mage’s ghost is knocking about in there!”|
    n: |
      |81-85|“When I got my meat back from the smokehouse, it was a lot less than I remember. [Saberna] said the smoking shrinks the meat. Is that true?”|
    k: |
      |66-70|“You know the [Gilded Hand] ousted a cult out of some knight’s crypt near Wend. Old knight from ancient times … Caelian, I think.”|
    l: |
      |71-75|“That elf in the [Gilded Hand] seems mighty uncomfortable. Even when she’s just with her friends, she’s always anxiously twisting that emerald ring.”|
    i: |
      |56-60|“That [Gilded Hand] won’t take any job here in town. Why the heck did they come here anyway?”|
    j: |
      |61-65|“I saw one of those [Gilded Hand] folks talking about the tomb. They seem real interested in visiting that haunted place!”|
    g: |
      |46-50|“If [Harim] doesn’t get that leather soon, I’ll have to make my own boots out of leaves.”|
    h: |
      |51-55|“[Dunquat] thinks of herself as an artist. She won’t work with just any stone. It has to be dwarf hewn!”|
    e: |
      |36-40|“When [Mikael] came back with that bite, I thought for sure he was dead. But just a few days later he was right as rain—healthier than I ever seen!”|
    f: |
      |41-45|“I went out to gather wood because [Vaughn] refuses. Found a big, fresh hole in the ground. Made me turn right back.”|
    c: |
      |26-30|“Those dwarves might be merchants, but they ain’t all about money. It’s their people that matters to them most.”|
    d: |
      |31-35|“[Tansy] owes me a new cloak. I paid for that thing weeks ago, but she still ain’t caught enough animals to make it. It’s not getting any warmer!”|
    a: |
      |16-20|“[Percy], the woodcutter’s kid, was skulking about the mill at night. Something’s off with that boy.”|
    b: |
      |21-25|“Old [Orson] is always talking about the end of the world, but his promises never come true. Thank goodness that annoying old poop lives on the edge of town. Most keep away from him.”|
    Y: |
      |06-10|“I heard something was attacking the pigs over at the [Ellery] farm, but Ellery won’t let anyone near her land.”|
    Z: |
      |11-15|“The reeve needs a hand. People been stealing food for weeks, and she’s done squat about it.”([Reeve Rosamund])|
