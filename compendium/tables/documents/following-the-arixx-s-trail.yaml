content: |-
  # Montage Test: Following the Arixx's Trail


  ## Overview

  {
  Following the events in [Arixx Nest]
  The fissure in the farmhouse lawn leads to a tunnel, created by the arixx, that leads to its lair. The tunnel, however, crosses to a network of other tunnels, presenting a confusing maze and a number of hazards.

  A hero who knows that they are hunting an arixx also know that arixx don’t normally leave permanent tunnels when they dig unless they intend to make the area a nest. The creature must be close by!
  }

  ## Find the Arixx Montage Test:
  The hero must navigate the tunnels and avoid any dangers to reach the arixx lair. The Navigate the Tunnels Test Difficulty table shows this montage test’s success and failure limit based on the number of heroes in the test.

  {
  **Navigate the Tunnels Test Difficulty**
  |Heroes|Success Limit|Failure Limit|
  |Three|3|3|
  |Four|4|4|
  |Five|5|5|
  |Six|6|6|

  }

  [[image:montageimage]]

  {
  ## Setting The Scene

  When this montage test begins, provide the following information:


  > * {# “The tunnel formed from the arixx’s passing intersects with other similar tunnels, making following the correct tunnel difficult.”}
  > * {# “The tunnels are unstable and lined with various dangers—wide pools of acid, weakened floors, collapsing passages, and stinging insects are all obstacles to your journey.”}
  }

  ## Party


  |Successes:  |[[-----]]|
  |Failures:  |[[-----]]|



  [[Party:Available Players]] :<>[[Party:Current Player]] :>[[Party:Acted Players]]

  {Add all your players to the available players party at the start. When a player is acting move them to the current player party. Then to acted players once they are done. At the end of the round move all players back to availableplayers}



  ## Montage Challenges

  The following challenges can be part of the montage test:
  {*(Edit the document to change the test difficulty before having the players roll, if you want. They are all set to Medium by default. You can also reveal the text before the power roll by changing the # to an !)*
  Also read [Consequences and Rewards] before starting the montage test. }

  {# 
  **Follow the Correct Tunnel:** Many of the tunnels show signs of an arixx’s passing. Following the tunnel of the most recent passage is tricky. 
  *Suggested Characteristics:* Reason.
  *Suggested Skills:* Nature, Search, Track.
  *Special:* The heroes can attempt this challenge twice during the montage test.
  }
  {
  |Follow the Correct Tunnel: Reason Test (Search or Track)
  |Medium
  }

  {#
  **Avoid Fresh Acid:** Pools of water dot many of the passages, but some of these pools contain acid. Stepping in those pools is painful.
  *Suggested Characteristics:* Agility, Reason.
  *Suggested Skills:* Alchemy, Climb, Jump.
  }
  {
  |Avoid Fresh Acid: Agility or Reason Test (Alchemy or Climb or Jump)
  |Medium
  }

  {#
  **Notice Weakened Floors and Walls:** Certain tunnel sections are dangerously unstable. These areas must be recognized and treaded on carefully. 
  *Suggested Characteristics:* Intuition, Reason.
  *Suggested Skills:* : Alertness, Monsters, Search.
  }
  {
  |Notice Weakened Floors and Walls: Intuition or Reason Test (Alertness or Monsters or Search)
  |Medium
  }

  {#
  **Hold Up Closing Passages While Others Pass:** Some of the tunnels the heroes must follow have weakened walls and ceilings, meaning someone has to hold those weakened areas or move debris.
  *Suggested Characteristics:* Might.
  *Suggested Skills:* Endurance, Lift.
  }
  {
  |Hold Up Closing Passages While Others Pass: Might Test (Endurance or Lift)
  |Medium
  }

  {#
  **Manage Dangerous Creatures Encountered:** 
  *Suggested Characteristics:* : Intuition, Presence
  *Suggested Skills:* Handle Animals, Intimidate, Sneak.
  }
  {
  |Manage Dangerous Creatures Encountered: : Intuition or Presence Test (Handle Animals Intimidate, Sneak.)
  |Medium
  }


  {
  **Common Tests you may present to your players during a montage:**

  [:Tests]
  }

  {
  ## Montage Test Outcomes

  One of the following outcomes ends the montage test:


  **Total Success:** The heroes reach the arixx lair quickly and with only minor hassles. Each hero earns 1 Victory, and the arixx is fully visible in the center of his lair when the heroes arrive there.

  [[/awardvp 1|Award Heroes 1 Victory]]



  **Partial Success:** The heroes get lost and suffer minor setbacks along the way, but they find the arixx lair after a while and the creature senses their arrival. It begins the encounter hidden in a burrow within the chamber.


  **Total Failure:** The confusing network of tunnels and hazards proves too much for the heroes’ skills. They only find the arixx lair by accident as they fall through the ceiling of the cavern onto the hard floor.
  Heroes earn no Victories from the montage test, and they begin the combat surprised and prone after falling 4 squares into the lair. The arixx begins the encounter burrowed.



  **Load up the [Arixx Lair Map] and the [Arixx Lair Encounter] Journal to continue**
  }
description: Following the Arixx's Trail
