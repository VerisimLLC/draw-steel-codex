        Undead - 4th Echelon
        Bonecage
        Oftentimes, undead naturally occur as a result of a tragedy visited upon the living, such as a prisoner being executed for false crimes. Other times, they may come about because a soul has unfinished business, like a lover to say farewell to. Not, however, the bonecage. Its origin lacks tragedy, romance, or even dignity: it is a tool used coldly to solve a numbers problem. Due to how weak many undead minions are, necromancers at war find themselves shy of corpses when their forces lose more numbers than they slay. Enter the bonecage. Made from giant bones, its chest has been warped to resemble a cage, which it can pry open to cram creatures inside. Trawling the scenes of great battles, the bonecage fills its chest cavity with the fallen, stealing them away for ill purpose.
        Of course, when no mass grave presents itself opportunistically, the bonecage is also more than capable of making corpses of its own. And frankly, its masters rarely mind the difference.
        Lithgekh
        Every mage who lives long enough eventually contends with the fact that their knowledge will one day leave the world. Many can't stomach this idea, and as such, the immortality of lichdom becomes an irresistable temptation. Fortunately for the Mundane World, the vast majority of prospectives fail. The lucky ones fail early enough that they can abort the mission entirely and resume their life. The unlucky ones become lithgekh, a First Language word meaning "lich corpse". Having failed to create a proper soul vessel, they suffer an eternal hunger for magic to sustain themselves.
        Especially cruel liches will sometimes intentionally trick or tempt mortal mages into pursuing lichdom, only to sabotage them and create a lithgekh under the lich's control. These servants are prized by liches for their ability to disrupt enemy magic and empower their own.
