content: |
  # D14.2 Cup Room Raided

  > * “A massive set of steps leads up to a landing where an empty plinth stands before a sarcophagus and between two massive, flaming braziers.”
  > * “Three figures emerge from the shadows on the landing. Boddorff Buckfeather, Gorek, and Mara are here. The mage says, ‘Late to the party, are we?’”


  [Mara], [Boddorff] Buckfeather, and [Gorek] have dispatched the foes who were here when they arrived, and are awaiting the heroes. They’re not here to chat. They’re here to make sure that no one knows [Targon] has the cup and is bringing it to [Queen Bargnot].

  See [Encounter D14.2].


  # Loot

  [Mara] wears a [Revenger's Wrap] (see Treasure in Handouts).
description: D14.2 Cup Room Raided
