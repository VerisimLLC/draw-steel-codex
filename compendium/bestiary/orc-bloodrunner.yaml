    import:
      type: mcdm
      data: |+
        Orc Bloodrunner	Level 3 Platoon Harrier
        Humanoid, Orc	EV 10
        <b>Stamina</b> 50
        <b>Speed</b> 8	<b>Size</b> 1M /<b> Stability</b> 0
        <b>Free Strike</b> 5
        Might +2	Agility +2	Reason 0	Intuition +1	Presence +1
        <b>Shield Bash</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	7 damage (enemy only); push X
        %E2%98%85	<b>12%E2%80%9316</b>	10 damage (enemy only); push X
        %E2%9C%B8	<b>17</b>	13 damage (enemy only); push X or prone
        <b>Effect</b> Push X is equal to the number of squares the bloodrunner moved on their turn before using this ability.
        <b>2 Malice</b> An ally pushed by this ability can make a free strike on a creature.

        <b>Unimpeded</b>
        This bloodrunner can share a prone creature's square. The first time a bloodrunner enters a creature's square on their turn, that creature takes 3 damage.

        <b>Relentless</b>
        If the bloodrunner's Stamina drops to 0, they can make a free strike before dying. If the target is reduced to 0 Stamina or killed by the strike, the bloodrunner lives and their Stamina is reduced to 1 instead.

