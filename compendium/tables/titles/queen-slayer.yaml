__typeName: Title
effect: |-
  Choose one of the following benefits:

  Craftier: When an enemy shifts out of a space adjacent to you, you can make a melee free strike against them as a triggered action.

  Criminal Killer: You have an edge on tests made to intimidate the leaders of criminal organizations.

  Goblin Bane: When you start a combat encounter that includes a foe who has the Goblin keyword, you gain a surge.
prerequisite: You reduced Queen Bargnot to 0 Stamina.
