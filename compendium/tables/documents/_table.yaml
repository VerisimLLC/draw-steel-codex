  description: D1. Offering Room
  content: |+
    # D1. Offering Room


    > * “The stairs of the tomb descend into a chamber that glows orange thanks to a flickering brazier in the center of the floor.”
    > * “The light illuminates faded frescoes on the wall that show starving, wounded humans drinking from an ornate silver chalice and turning into powerful, healthy warriors who battle a horde of demons.”
    > * “Many bedrolls lie scattered on the floor of this chamber, where two dozen goblins huddle, ready with their weapons drawn.”
    > * “For this battle, your heroes should gain any features or abilities on their sheet listed under ‘second encounter.’” 


    When the heroes enter this chamber, eight goblin spinecleavers, eight goblin snipers, and six goblin warriors are expecting them after the commotion outside and attack.


    [[/activateobjects d1zone.AreaTemplate activate|Show Hero Start Area]] [[/activateobjects d1zone.AreaTemplate deactivate|Hide Hero Start Area]]

    [[setting:Number of Heroes]]

    :<>[[encounter:tomb1]]


    *Even though The Codex can automatically adjust the combat difficulty for you with how the journals have been set up, the grouping table and encouner adjustments are still presented for you to have all the information on what it is doing. 
    You may also preview the stat blocks of various monsters by hovering over them below.*

    **D1 Groups**
    |**Group**|**Creatures**|
    |1|One [goblin warrior] (captain, Four [goblin spinecleaver]s (minion squad)|
    |2|One [goblin warrior] (captain, Four [goblin spinecleaver]s (minion squad)|
    |3|One [goblin warrior] (captain, Four [goblin sniper]s (minion squad)|
    |4|One [goblin warrior] (captain, Four [goblin sniper]s (minion squad)|
    |5|Two [goblin warrior]s |

    **Encounter Adjustments**
    If this encounter has more or fewer than five heroes, make the following adjustments:
    * For six heroes, add two **goblin warriors**.
    * For four heroes, remove two **goblin warriors** who are not captains.
    * For three heroes, remove four **spinecleavers**, four **snipers**, and the two **goblin warriors** who are the captains of these squads.


    ## New Rules: Triggered Actions

    > * “Each of you has a new ability with an action type that is called a triggered action. These abilities can only be used in response to an event that is listed on your sheet. You can use one triggered action per round, and it can be used on your turn or another creature’s turn.”
    > * “Like free maneuvers, a free triggered action doesn’t count against the number of triggered actions you have.
    > * “If you look in the Rules Reference, it has rules for a free triggered action that every creature can use called an opportunity attack.”
    > * “You can also now take the Disengage move action to shift 1 square. Some of you can shift more if you have the Disengage Bonus feature! To shift is to move without triggering an opportunity attack.”


    ## New Rules: Heroic Abilities and Malice

    > * “You also have your first heroic ability. Heroic abilities can’t be used without first spending some of your heroic resource. This new ability costs 3 of your resource.”
    > * “I also get my own resource now called Malice. It can be used to fuel the special abilities of creatures I control, so watch out!”

    See [Malice] for more information on malice.


    ## New Rules: Potency

    > * “Some of you gained a heroic ability that utilizes a mechanic called potency. An ability with a potency gives the target a chance to resist its effects. My monsters also have abilities with potencies.”
    > * “Ability effects that have a potency are applied to a target only if the effect’s potency value is higher than the target’s indicated characteristic score.”
    > * “A potency always appears as the single-letter abbreviation for the target’s characteristic. M for Might, A for Agility, R for Reason, I for Intuition, or P for Presence. That characteristic is followed by a “less than” sign and your potency value. For example, ‘M<2 dazed (save ends)’ means ‘if the target’s Might is less than 2, they are dazed (save ends).’”


    ## New Rules: Minions

    The spinecleavers and snipers are minions. If this is your first time using minions, review the [Minions] section before running the encounter.


    After you have reviewed these rules, play out the combat!
    When you are ready to start the combat, [Draw Steel!]. 
    *You can also start combat from **Game** -> **Draw Steel!** at the top right of your screen.* 


    ## Brazier

    Each time a creature touches the heavy iron brazier or starts their turn touching it, they take 2 fire damage.


    ## Tactics

    The spinecleavers run at the heroes and try to push them into the brazier with their attacks while the snipers stay near the edges of the room, moving to find the best vantage points away from melee combatants. The warriors wade into the fray, targeting melee-focused characters first and using Bury the Point as often as Malice allows before retreating. The goblins use their ability to climb to get around their opponents, clawing up and over them on walls and ceilings.


    ## Ending the Encounter

    The goblins fight until they are outnumbered two to one then flee—at which point the encounter is over, and the heroes earn 1 Victory each.


    ## Rewards

    **Loot**
    If the heroes look through the bedrolls, they find a pouch that the Jagged Edge goblins stole from an alchemist long ago. It contains three [item:Healing Potion]s (see Treasure in Handouts), five ounces of [item:costmary leaves], and a recipe in Caelian that describes how to make a [item:Healing Potion] and counts as a project source for that item (see Downtime Projects in the [Starter Rules](Delian Tomb Starter Rules v1.02) for more information).

    There is a bag item with three [item:Healing Potion]s hidden under the bedroll at 9W,1S. The players can move this bedroll and then click the bag to open it and claim the potions. 
    *The coordinates are displayed at the top of the screen in the menu bar.*

    [[/slowstartlevel 3; awardvp 1|Give Heroes 1 Victory and Level to Encounter 3]]


    ## Frescoes

    A hero who has the History or Magic skill can make a Reason test, recalling the following information about images in the frescoes based on the outcome. A hero gains all the information earned for the result of their test and any results which are lower.

    |Recall Lore About Frescoes: Reason Test
    |{#The frescoes seem to depict human warriors from the Caelian empire.}
    |{#The cup the warriors drink from is the Cup of Iulius, a legendary treasure said to have the power to transform even the weakest individuals into powerful warriors.}
    |{#The cup was lost before the fall of the Caelian empire, more than a thousand years ago, though it is said to be magically sealed in the tomb of a Caelian knight who used the cup to turn back an incursion of demons.}

