description: Fourth Floor Combat
content: |
  # Combat

   The heroes fight Vurkor in the top level of his tower.

  ## Dangerous Compounds

  The tables in Vurkor's laboratory area contain dangerous chemical compounds and alchemical mixtures. A creature who is force moved into a laboratory table takes 3 acid damage, or 5 acid damage if the table breaks.

  ## Bassa

  Bassa, a **civilian**, is the last to act during the round. She flees to the stairs. Vurkor lets her run, knowing she can't escape the tower.

  ## Tactics

  If the heroes fight Vurkor, he chooses a magic-wielder, preferably another elementalist, as the target of his Rivalry trait. At the start of the encounter, the zombies animate and attack under his command. Vurkor stays behind them, using ranged attacks to harm his foes.  
  He's careful not to harm Bassa, since he believes the dwarf will be instrumental in restoring the tower. If he becomes winded, he flees for the stairs, using Glowing Recovery to heal himself.

  ## Ending the Encounter

  The encounter ends when Vurkor is reduced to 0 Stamina, which causes the zombies to fall down dead.

  ## Combat

  Allow easy adjustment of the number of heroes to balance for:

  [[setting:Number of Heroes]]

  [[encounter]]

  When you are ready, [Draw Steel!]

  ## Aftermath and Rewards

  [End Combat] once the battle is over.

  The heroes gain 1 VP if they win the battle.

  [[/awardvp 1|Award Victories]]

  ## Loot
   Vurkor carries source material in Variac for crafting Mirror Tokens (see Treasure in Handouts) as well as six sheets of glass and enough sunbaked gold dust to make two tokens.

  If a hero touches Vurkor’s amulet, they know the item allows them to create a door in the first level of the tower (no action required). However, if someone other than Vurkor touches the amulet after his death, it also causes the tower to collapse.

  To **Shake the Screen** to visually simulate a tower collapse, press the button below.

  [[/broadcast screenshake 5 .2|Shake Screen]]
