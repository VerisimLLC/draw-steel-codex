560f62d5-2442-433b-93ac-babeaf291d9b:
  __typeName: Title
  effect: |-
    After being defeated, each character awakes, alive and with full Stamina and Recoveries. You are all captives of the creatures who defeated you, and a gruesome end awaits you—unless you can escape or overcome the nefarious challenge your captors have planned. 

    The Director chooses one of the following benefits, based on the fate your captors have in mind for you. Each hero gains the same benefit. Additionally, you must face an encounter, montage test, or adventure related to the benefit, as the Director determines.
  prerequisite: The entire party is killed or captured by sapient foes.
  modifierInfo:
    __typeName: ClassLevel
    features:
    - __typeName: CharacterFeatureChoice
      allowDuplicateChoices: false
      name: Saved for a Worse Fate Benefit
      numChoices: 1
      guid: 124b71ca-75ea-407b-8f2c-cfe320a301db
      description: "The Director chooses one of the following benefits:"
      options:
      - __typeName: CharacterFeature
        description: You must fight to the death for your captors’ amusement. Your intended opponents wield or guard a trinket or leveled treasure, which you can earn if you are victorious.
        modifiers: []
        source: Feat
        canHavePrerequisites: true
        guid: d0ee592a-7651-42ca-a78a-f1c857356313
        name: Gladiators
        implementation: 4
      - __typeName: CharacterFeature
        description: "Your captors plan to release you and hunt you down, but it’s no fun unless you offer a challenge. Each of you is given a medicinal draught that grants a +1 bonus to speed and increases your Recoveries by 2. This benefit lasts until the end of your next respite.\v\v**DIRECTOR INSTRUCTIONS**\nGive this player the consumable item 'Prey - Medicinal Draught'. When this is in their inventory they will have a Maneuver available to use the Consumable and gain the effect. "
        modifiers: []
        source: Feat
        canHavePrerequisites: true
        guid: 83917cdd-8a2d-4795-8b63-5868681da307
        name: Prey
        implementation: 3
      - __typeName: CharacterFeature
        description: You are to be dropped in a volcano, fed to a sacred monster, abandoned in a desert, or otherwise sacrificed to a higher power. You are bedecked with holy jewelry. Each hero earns 1 Wealth.
        modifiers:
        - __typeName: CharacterModifier
          guid: 42b79307-6adf-4d53-af67-ad38a2dfbffa
          sourceguid: ae9c50ee-2b0f-4491-8d5c-286af600848c
          value: 1
          source: Feat
          name: Sacrifices
          behavior: attribute
          description: You are to be dropped in a volcano, fed to a sacred monster, abandoned in a desert, or otherwise sacrificed to a higher power. You are bedecked with holy jewelry. Each hero earns 1 Wealth.
          attribute: 036da4db-4406-4038-ae7d-cf0b37890f5f
        source: Feat
        canHavePrerequisites: true
        guid: ae9c50ee-2b0f-4491-8d5c-286af600848c
        name: Sacrifices
        implementation: 3
      - __typeName: CharacterFeature
        description: Your captors fear an even stronger foe, and they want you to defeat this enemy for them. You can even keep any treasure you find while doing so.
        modifiers: []
        source: Feat
        canHavePrerequisites: true
        guid: add58404-d63e-4d88-ad61-53b25c72af6d
        name: Saviors
        implementation: 4
  name: Saved for a Worse Fate
  mtime: 1773772160163
  description: Drink this. You’ll need all your strength for what lies ahead!
  id: 560f62d5-2442-433b-93ac-babeaf291d9b
  ctime: 1762350050136
b0a0a429-093d-4ba4-ad0c-2ee24ff585eb:
  __typeName: Title
  effect: "Choose one of the following benefits:"
  modifierInfo:
    __typeName: ClassLevel
    features:
    - __typeName: CharacterFeatureChoice
      allowDuplicateChoices: false
      name: Planar Voyager Benefit
      numChoices: 1
      description: "Choose one of the following benefits:"
      guid: 3a97b4f8-e14b-4b29-8f29-ba01e662e28f
      options:
      - __typeName: CharacterFeature
        modifiers: []
        name: Prismacore Eyes
        description: Exposure to prismacore has given your eyes a mirrorlike sheen. You have psychic immunity 10, creatures can’t use magic or psionic abilities or other effects to determine your location or read your thoughts unless you allow them to, and you gain a +3 bonus to stability against magic or psionic abilities.
        guid: 5b428088-7a4b-4864-8c6e-e650b239d70f
        canHavePrerequisites: true
        source: Feat
      - __typeName: CharacterFeature
        modifiers: []
        name: Stellar Knowledge
        description: You gain the Mechanics skill. If you already have this skill, you instead gain an edge on tests made using the skill. Additionally, you gain the item prerequisite and project source for a psionic trinket.
        guid: 2aa3525e-756a-4372-907b-526eb58cd3f1
        canHavePrerequisites: true
        source: Feat
      - __typeName: CharacterFeature
        modifiers: []
        name: Time Raider Training
        description: "You gain 2 ancestry points to spend on purchased time raider ancestry traits (see Chapter 3: Ancestries)."
        guid: 84cfb91f-2359-4bf0-82b3-a431a8e11d8f
        canHavePrerequisites: true
        source: Feat
  id: b0a0a429-093d-4ba4-ad0c-2ee24ff585eb
  ctime: 1762352045858
  name: Planar Voyager
  description: I’ve seen skywhales floating above the seas of Primordius. I’ve seen star freighters dancing around the moons of Axiom. So I guess you’re right, I’m not from around these parts.
  mtime: 1775215919687
  echelon: "3"
  prerequisite: You voyage in strange vehicles on different worlds.
