    # Boddorff Buckfeather

    [[image]]

    *A polder conduit. He’s the face of the group, happy to talk and interact with others.*

    {
    Secret: see [Gilded Hand]
    A polder conduit of Pentalion, an evil saint dedicated to dominance and power, Boddorff keeps his holy symbol under his clothes unless he wishes to intimidate someone or cause a scene. He’s the face of the group, happy to talk and interact with others. He often makes up entire stories about the group’s adventures to appease those looking for a tall tale. After all, every legend helps the [Gilded Hand] find another job.
    }

