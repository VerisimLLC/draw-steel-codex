description: D7. Hall of Regret
content: "# D7. Hall of Regret\n\n> * “This long, rectangular hall ends in a raised section with a set of stairs leading up to an altar that holds half of a circular bronze shield and a book.”\n> * “Eight pillars line the walls of the room, with arches connecting them across the ceiling, granting it a cathedral-like appearance.”\n> * “The room outcrops to the south into two large chambers covered by red curtains.”\n\n{Secret: The half-shield on the altar at the far side of the room is the genuine right half of the Delian shield. However, escaping with it is no small task, as a wallmaster, eight decrepit skeletons, four skeletons, and two soulwights lie in wait here, hidden behind a wall erected by the wallmaster. A hero who suspects something can make a moderate Intuition test to try and figure out what’s unusual about this room.}\n \n\n|Anything Unusual?: Intuition Test\n|{#Nothing stands out as odd.}\n|{#The stonework in some sections of the north wall seems different from all the rest. The heroes and monsters become aware of each other at the same time.}\n|{#The hero notices gaps in the walls and can tell there are monsters lying in wait for them. The heroes win initiative, but the monsters are not surprised.}\n\nSee [Encounter D7].\n\n## Loot\nThe book on the altar is a project source for [Unblinking Candle]s and contains a compartment that holds three embers from Quintessence (see Treasure in Handouts).\nThe right half of the Delian Shield is a half-circle emblazoned with the head of a dragon.\n"
