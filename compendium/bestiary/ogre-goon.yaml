    import:
      override: true
      data: |+
        Ogre Goon	Level 2 Elite Brute
        Giant, Ogre	EV 16
        <b>Stamina</b> 100
        <b>Speed</b> 5	<b>Size</b> 2 /<b> Stability</b> 4
        <b>Free Strike</b> 5
        Might +2	Agility 0	Reason -1	Intuition 0	Presence -1
        <b>Club Swing</b> (Action)%E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	7 damage; push 2
        %E2%98%85	<b>12%E2%80%9316</b>	11 damage; push 4
        %E2%9C%B8	<b>17</b>	14 damage; push 6; prone
        <b>Effect</b> This attack deals an additional 4 damage to each creature and object that takes damage from any force movement it causes.

        <b>Grabby Hand</b> (Maneuver)%E2%97%86 2d10 + 2
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	7 damage
        %E2%98%85	<b>12%E2%80%9316</b>	11 damage; grabbed
        %E2%9C%B8	<b>17</b>	14 damage; grabbed
        <b>Effect</b> The goon can only have one target grabbed at a time.
        <b>1 Malice</b> The target has a bane on escaping the grab while the goon crushes the target in their hand.

        <b>People Bowling</b> (Maneuver)%E2%97%86 2d10 + 3%E2%97%86 3 Malice
        <b>Keywords</b> Area, Melee, Weapon
        <b>Distance</b> 6 x 1 Line within 1<b>Target</b> All creatures and objects
        <b>Special</b> The goon must be grabbing a size-1 creature or object to use this maneuver.
        <b>Effect</b> The goon hurls what's in their hand down the line and rolls power. The hurled creature or object counts as a target and lands in the last square of the line (or nearest unoccupied square of the goon's choice).
        %E2%9C%A6	<b>%E2%89%A411</b>	5 damage
        %E2%98%85	<b>12%E2%80%9316</b>	9 damage
        %E2%9C%B8	<b>17</b>	12 damage; prone

        <b>Swat The Fly</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Trigger</b> The target moves or shifts away from the goon.
        <b>Distance</b> Melee 1<b>	Target</b> 1 adjacent creature or object
        <b>Effect</b> Slide 5.

        <b>Defiant Anger</b>
        The goon has damage immunity 2 while they are winded.



      type: mcdm
