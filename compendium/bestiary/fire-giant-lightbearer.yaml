      data: |+
        Fire Giant Lightbearer	Level 9 Elite Support
        Fire Giant, Giant	EV 44
        <b>Stamina</b> 200	<b>Immunity</b> fire 9
        <b>Speed</b> 8	<b>Size</b> 4 /<b> Stability</b> 5
        <b>Free Strike</b> 9
        Might +4	Agility +3	Reason 0	Intuition +4	Presence +1
        <b>Flamelash</b> (Action)%E2%97%86 2d10 + 4%E2%97%86 Signature
        <b>Keywords</b> Magic, Melee, Strike
        <b>Distance</b> Melee 6<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	13 fire damage; slide 2
        %E2%98%85	<b>12%E2%80%9316</b>	17 fire damage; slide 4
        %E2%9C%B8	<b>17</b>	22 fire damage; slide 6

        <b>Living Blaze</b> (Action)%E2%97%86 2d10 + 4%E2%97%86 3 Malice
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 6<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	15 fire damage
        %E2%98%85	<b>12%E2%80%9316</b>	21 fire damage
        %E2%9C%B8	<b>17</b>	26 fire damage
        <b>Effect</b> The blaze ricochets, targeting 1 additional target within 4 of the original target with a bane, or 2 additional targets within 2 of the original target with a double bane. The lightbearer makes one power roll against all targets.

        <b>Travel By Fire</b> (Maneuver)
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Self or Ranged 5<b>	Target</b> 2 creatures or objects
        <b>Effect</b> Each target takes 1d6 fire damage and teleports in a plume of smoke, swapping places with the other target. The targets must be able to fit into the space they enter.

        <b>Emergency Beacon</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Trigger</b> The lightbearer takes damage.
        <b>Effect</b> The lightbearer emits a beacon of light until the start of their next turn. Each fire giant that has line of effect to the lightbearer's beacon has a double edge on their abilities.

        <b>Healing Heat</b>
        Fire giants targeted by the lightbearer's abilities receive Stamina equal to the value of the damage listed instead of taking damage. Fire giants force moved by the lightbearer's abilities can choose to ignore stability.

        <b>Searing Skin</b>
        Whenever an enemy makes physical contact with the lightbearer or uses a melee ability against the lightbearer, they take 5 fire damage.



