  ctime: 1755517227927
  description: You were trained by a group of spies, who psionically infused silence into your every step and enhanced your ability to hear distant whispers. But your enhanced hearing has some nasty side effects.
  id: cb295bd7-b588-4771-abab-a548f55442e1
  benefit: You have the Eavesdrop and Sneak skills from the intrigue skill group, plus one skill of your choice from the lore skill group. Additionally, you can telepathically communicate with any creature provided they share a language with you and you can observe each other. A creature you communicate with this way can respond telepathically if they choose.
c716456c-29f4-4cb9-9077-562959b9b58b:
  __typeName: CharacterComplication
  drawback: "Rather than attracting followers at 3, 6, 9, and 12 Renown, you can attract followers only when your Renown reaches 4, 8, 12, and 16. See Renown in Chapter 13: Rewards."
  mtime: 1755604145316
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Stripped of Rank
  ctime: 1755517450292
  description: You were trained as an officer, but you no longer serve. Whether you fled from a battle, were dishonorably discharged, or defected from an evil army, you make your own way in the world now—though your military training will never truly leave you.
  id: c716456c-29f4-4cb9-9077-562959b9b58b
  benefit: |-
    You have the following ability:
    Issue Order
c3ef3626-f107-4bd7-8096-413539fddcaf:
  __typeName: CharacterComplication
  drawback: At the start of each day, roll a d6. On a 1–4, you control your body. On a 5–6, the spirit does. Alternatively, if you and the spirit are on good terms, you can choose each day who is in control. Choose three of your skills. You can use those skills only while you are in control of your body. Then choose three new skills, which you have and can use only while your spirit is in control.
  mtime: 1755604101149
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Shared Spirit
  ctime: 1755517038060
  description: A supernatural spirit occupies your body, with each of you controlling your body by turns. You and the spirit share the same short-term goals and work equally well with your companions, though you might have different personalities, mannerisms, and long-term goals.
  id: c3ef3626-f107-4bd7-8096-413539fddcaf
  benefit: At the start of each day, roll a d6. On a 1–4, you control your body. On a 5–6, the spirit does. Alternatively, if you and the spirit are on good terms, you can choose each day who is in control. Choose three of your skills. You can use those skills only while you are in control of your body. Then choose three new skills, which you have and can use only while your spirit is in control.
c4cdb796-f89c-4edf-83e8-ce41ed38a35d:
  __typeName: CharacterComplication
  drawback: Incorporeal undead within 10 squares of you can communicate telepathically with you. Additionally, you have the Contact Spirits ability.
  mtime: 1755516075691
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Medium
  ctime: 1755516075691
  description: You can perceive ghosts and spirits that others don’t sense. These supernatural entities constantly whisper unsettling secrets in your mind—when they’re not trying to kill you.
  id: c4cdb796-f89c-4edf-83e8-ce41ed38a35d
  benefit: Incorporeal undead within 10 squares of you can communicate telepathically with you. Additionally, you have the Contact Spirits ability.
8c39a7a1-01c4-43be-9ef4-331bb4fe810a:
  __typeName: CharacterComplication
  drawback: |-
    As a respite activity, you can study the notebook. Make a test using your highest characteristic score:

    Tier 1:  You summon a hostile demon of your level or lower who attacks you at the end of the respite. The demon acts first in the combat, regardless of the traits or abilities of you or any other creature involved.
    Tier 2:  You learn nothing and your time is wasted.
    Tier 3:  You learn one bonus heroic ability from your class that you qualify for. You can use that ability until you finish your next respite.
  mtime: 1758393442596
  modifierInfo:
    __typeName: ClassLevel
    features:
    - __typeName: CharacterFeature
      modifiers:
      - __typeName: CharacterModifier
