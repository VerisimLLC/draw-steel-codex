      data: |+
        Lightbender	Level 3 Elite Ambusher
        Beast, Lightbender	EV 20
        <b>Stamina</b> 100
        <b>Speed</b> 10	<b>Size</b> 2 / <b>Stability</b> 1
        <b>	Free Strike</b> 6
        Might +2	Agility +1	Reason -3	Intuition +1	Presence -1
        <b>Flash Swipe</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	9 damage
        %E2%98%85	<b>12%E2%80%9316</b>	14 damage
        %E2%9C%B8	<b>17</b>	18 damage
        <b>Effect</b> The lightbender deals an additional 4 damage if they have an edge.

        <b>Piercing Tails </b>(Action) %E2%97%86 2d10 + 2
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	8 damage
        %E2%98%85	<b>12%E2%80%9316</b>	12 damage; M<1 bleeding (save ends)
        %E2%9C%B8	<b>17</b>	15 damage; M<2 bleeding (save ends)
        <b>Effect</b> A creature who is bleeding from this ability has a bane on tests to search for the lightbender until the condition ends.

        <b>Hypnotic Mane </b>(Maneuver) %E2%97%86 2d10 + 2 %E2%97%86 5 Malice
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 3 burst<b>Target</b> All enemies in the burst
        %E2%9C%A6	<b>%E2%89%A411</b>	I<0 dazed (save ends)
        %E2%98%85	<b>12-16</b>	I<1 dazed (save ends)
        %E2%9C%B8	<b>17</b>	I<2 dazed (save ends)
        <b>Effect</b> 	Targets dazed by this ability have a speed of 0 while dazed. If a dazed target takes damage or if someone else spends an action to shake the creature out of their stupor, the condition ends.

        <b>Stalker's Afterimage</b> (Triggered Action)
        <b>Keywords</b> Magic
        <b>Trigger</b> The lightbender takes damage from a strike.
        <b>Distance</b> Self	<b>Target</b> Self
        <b>Effect</b> The lightbender halves the damage, doesn't suffer any effect associated with it, and teleports 5 squares. The lightbender immediately hides if they teleport into cover or concealment.

        <b>Avoidance</b>
        The lightbender always treats a save ends effect as an EoT effect.



