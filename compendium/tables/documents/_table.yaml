  updateid: 2de41b5d-ed10-4b79-a1ad-f5c48a9188f5
  description: Second Floor
  content: |-
    # Second Floor

    > * “As before, a set of curving stairs leads up along the outer wall, going through the ceiling above the floor.”
    > * “The room contains a dozen people—eight humans and four dwarves. Some huddle together fearfully and some lie despondently on bedrolls in the center of the room.”
    > * “Your arrival causes a few people to sit up and move toward you quickly. ‘Quiet,’ says a nearby dwarf futilely trying to calm the crowd, ‘They can hear everything if we’re not quiet!’”

    ## Panic

     When the heroes appear, several people stand and run toward them begging for help in panicked whispers that get louder and louder. To stop the panicking from turning loud enough to draw the attention of the ogres upstairs, the heroes must make a moderate Presence test.


    |Stop the Panic: Presence Test
    |The panic leads to outright shouting, causing the ogres and their pet mohlers on the third floor to come down and investigate.
    |The heroes calm the captives before the ogres are alerted, but the noise does draw some suspicion from the ogres. Tests made to sneak up on the ogres take a bane. 
    |The heroes calm the captives before the ogres are alerted, but the noise does draw some suspicion from the ogres. Tests made to sneak up on the ogres take a bane. 

    ## Gathering Information

    When the heroes get the chance to ask questions of the captives, they can learn the following:

    > * The captives are mostly travelers, farmers, or laborers from the area. They were captured by a pair of ogres led by an orc. They’ve been forced to rebuild the third floor of the tower.

    > * The two ogres keep some mohlers as pets. They sometimes take the mohlers outside, coming back later with stones to be used for building.

    > * The orc uses magic. They don’t see him often, but he carries a pendant that opens the door in the ground floor that allows the ogres to leave. The orc also claims the pendant connects his life force to the tower.

    > * Bassa the dwarf is the orc’s most prized captive. She leads the captives in doing masonry work and was traveling with the dwarf merchants staying at the Feather Bed Inn (see B1. Feather Bed Inn), as were the rest of the dwarves here. She’s with a group of captives upstairs working.

    > * Several captives have been taken upstairs, which is where the ogres and the mohlers live and sleep when not working. The captives can describe the area (see Third Floor).

    > * The captives who were taken to the floor above the ogres’ home haven’t come back down. It’s been several days, so they didn’t survive that trip.

    > * One of the human captives is [Forbin], a leather merchant who was delivering a shipment to [Harim] (See Broadhurst, [B12. Cobbler]))
