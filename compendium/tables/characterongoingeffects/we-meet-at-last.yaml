description: |-
  You and the Troubadour can target each other with abilities even if you are beyond distance, with the distance of We Meet at Last replacing those abilities' distances. The target can't be force moved by an ability used beyond distance this way.

  The Troubadour can use a free maneuver to communicate a motivating or dispiriting message to you.
