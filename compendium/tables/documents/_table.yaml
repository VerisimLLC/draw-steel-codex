  mtime: 1768580662292
  content: |
    # Encounter D8	

    The heroes battle undead and ruinborn in the obelisk chamber of the Delian Tomb.

    [[setting:numheroes]]

    [[encounter: D8]]

    ## Reinforcements
    At the start of the second round, eight rotting zombies and two ghouls
    emerge from the tangled roots in the center of the room.

    [[encounter: D8 Reinforcements]]


    **D8 Groups**
    |Group	|Creatures|
    |1|One tomb horror|
    |2|One soulwight (captain), Four memorial ivies (minion squad)|
    |3|One soulwight (captain), Four memorial ivies (minion squad)|
    |4 (Reinforcements)|One ghoul (captain), Four rotting zombies (minion squad)|
    |5 (Reinforcements)|One ghoul (captain), Four rotting zombies (minion squad)|

    **Encounter Adjustments**
    If this encounter has more or fewer than five heroes, make the following adjustments:
    * For six heroes, add four memorial ivies to the start of the encounter and four rotting zombies to the reinforcements.
    * For four heroes, remove four memorial ivies from the start of the encounter and four rotting zombies and a ghoul from the reinforcements.
    * For three heroes, remove the reinforcements.


    ## Obelisk Chamber Features

    **Ceiling:** The ceiling in this chamber is 6 squares high.

    **Balcony:** A horseshoe-shaped balcony rings part of this room. It's 2 squares high, and accessible by stairs on its south side. Each side of the balcony (north, west, and east) has six supporting pillars. If three or more of these pillars are destroyed, that side of the balcony collapses (see Collapse!).

    **Tangled Roots:** An area that is 6 squares on a side in the center of the room is difficult terrain. The heroes' enemies in this room ignore this difficult terrain.

    ## Collapse!

    If a creature is on or underneath a balcony when it collapses, they must make an Agility test, suffering the following effects for being on the balcony when it collapses. If the creature is under the balcony, they suffer the same effect but take an extra 3 damage.

    |Balcony Collapse!: Agility Test
    |{#9 damage; M<2 restrained (save ends) and prone}
    |{#5 damage; M<2 prone}
    |{#The creature can immediately shift up to 2 spaces, after which they take 2 damage. If the creature doesn't move out of the area of the balcony, they take 5 damage instead.}

    If the northern balcony collapses, a hero can move up the pile of rubble to the exit to the north, treating the rubble as difficult terrain.


    ## Tactics

    The tomb horror tries to stay in the center of the room, pulling creatures into the difficult terrain there to make it harder for them to reach the memorial ivies on the balcony. The memorial ivies spread out and use their favorable vantage point combined with their pull to disrupt the heroes' positioning. Meanwhile, the ghouls and zombies target anyone who tries to reach the balcony, or who targets the memorial ivies with ranged attacks. If all the ivies fall, they defend the tomb horror.

    If a hero tries to rush through the room and down the corridor ahead, the tomb horror uses a main action and their vine-like appendages to grasp and tear down the northern balcony, either blocking the way, or trapping the hero inside.


    ## Ending the Encounter
    When the tomb horror and at least half the other creatures in the encounter have been dispatched, the remaining monsters crumble to dust. Finishing this encounter earns the heroes 1 Victory each.

    [[/awardvp 1; |Award Heroes 1 Victory]]
  description: Encounter D8
