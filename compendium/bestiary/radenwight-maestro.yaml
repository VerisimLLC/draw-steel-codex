      data: |
        Radenwight Maestro	Level 1 Leader
        Humanoid, Radenwight	EV 12
        <b>Stamina</b> 80
        <b>Speed</b> 5 (climb)	<b>Size</b> 1S / <b>Stability</b> 1
        <b>Free Strike</b> 4
        Might -2	Agility +2	Reason +0	Intuition +0	Presence +3
        <b>Cacophony</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 5 burst	<b>Target</b> All enemies in the burst
        %E2%9C%A6	%E2%89%A411	3 sonic damage; slide 1; shift 1
        %E2%98%85	12%E2%80%9316	6 sonic damage; slide 3; shift 3
        %E2%9C%B8	17+	8 sonic damage; slide 5; shift 5
        <b>Effect</b> Each ally within distance can use Ready Rodent as a free triggered action once before the end of the round.

        <b>Tempo Change</b> (Maneuver) %E2%97%86 2d10 + 3
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 10	<b>Target</b> Two enemies
        %E2%9C%A6	%E2%89%A411	P<1 Slowed (save ends)
        %E2%98%85	12%E2%80%9316	P<2 Slowed (save ends)
        %E2%9C%B8	17+	P<3 Slowed (save ends)
        <b>3 Malice</b> Each ally within 3 of a target has their speed increased by 2 until the end of their next turn.

        <b>Ever Ready Rodent </b>(Free Triggered Action) %E2%97%86 2 Malice
        <b>Keywords</b> Magic, Melee, Ranged
        <b>Distance</b> Ranged 5	<b>Target</b> One creature
        <b>Trigger</b> The target deals damage to an ally or takes damage from an ally.
        <b>Effect</b> The maestro makes a free strike against the target.

        <b>End Effect</b>
        At the end of their turn, the maestro can take 5 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Overture</b> (Villain Action 1)
        <b>Keywords</b> Area
        <b>Distance</b> 10 burst	<b>Target</b> All allies in the burst
        <b>Effect</b> Each target shifts up to their speed or takes the Defend action.

        <b>Solo Act</b> (Villain Action 2)
        <b>Keywords</b> Ranged
        <b>Distance</b> Ranged 15	<b>Target</b> One creature
        <b>Effect</b> Until the end of their next turn, the target halves incoming damage, deals an additional 4 damage on strikes, and their speed is doubled.

        <b>Rondo of Rat</b> (Villain Action 3)
        <b>Keywords</b> Area
        <b>Distance</b> 10 burst	<b>Target</b> All dead allies in the burst
        <b>Effect</b> Each target stands, makes a free strike, then collapses again. Allies of the targets can use Ready Rodent as a free triggered action once in conjunction with these free strikes.


        Retainer
      type: mcdm
