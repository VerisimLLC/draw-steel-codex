        <b>Trample</b>
        The predator can move through enemies and objects at normal speed. When the predator enters a creature's space for the first time on their turn, the creature takes 3 damage.

        <b>Nature Calls</b>
        The predator ignores 1 bane on their abilities while in an encounter outside or in a natural environment.

        Can I Make A Regular Animal?
        You certainly can! Animal traits can be applied to the Civilian Stat Block to make less imposing animals that the heroes can rescue (see Harmless Creatures). Surviving a wild animal attack can also be handled through group and montage tests as if they were environmental challenges to overcome.

        Arixx
        Pebbles dance as the ground quivers. A spray of rock and earth shatters the afternoon's peace, and an arixx blooms from the earth. Their mandibles drip sizzling acid as a talon impales their next meal: sometimes a fat sheep, other times a shepherd.
        An arixx is a chitinous, burrowing monstrosity larger than a horse. Their hooked claws and serrated mandibles are fearsome weapons, but even more dangerous is the stream of caustic spittle they use to dissolve their prey.
        Pastoral Pest
        Although arixxes can be found anywhere, they are a particular plague in settled lands. Arixxes hunt alone, lurking a few feet below roadways and pastures. When their sensitive antennae detect movement above, they burst from the earth, dragging living prey into their tunnels to be devoured. These hit-and-run tactics make arixxes virtually impossible to eradicate-unless they have the bad luck to ambush a party of well-armed adventurers. Many communities pay a handsome bounty for a slain arixx.
        Terror of the Thaw
        Arixxes are a year-round menace in the warmest lands. In temperate places, arixxes hibernate during the winter, granting farmers a season of peace ... but this respite is paid for on the first thaw of spring, when every arixx awakens ravenous on the same day and bursts from the ground to feed.
