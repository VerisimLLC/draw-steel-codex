flavor: This midnight-dark leather coat is embossed with fractal patterns that appear different each time they are observed.
level9: The armor’s bonus to Stamina increases to +21. Whenever you use the armor’s triggered action to teleport, you can teleport up to a number of squares equal to the damage taken (minimum 5 squares). Additionally, if a creature dealt you the triggering damage, you become invisible to that creature until the end of your next turn.
