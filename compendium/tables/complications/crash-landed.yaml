name: Crash Landed
ctime: 1755513424854
description: You used to flit around the stars in your own ship. But an ugly run-in with a pirate (or a pirate hunter) has left you marooned on this backwater world. You’re prepared to carve out a life here—at least until you can hitch a ride somewhere else.
id: 6079b4e5-95ca-4fec-8bb6-2338231ee2a8
benefit: You have the Timescape skill (from the lore skill group). Additionally, you have a power pack that you can activate or deactivate as a maneuver. When you activate the power pack, choose an energy type from cold, fire, lightning, or sonic. Until you deactivate the power pack, your damage-dealing abilities deal that damage type.
