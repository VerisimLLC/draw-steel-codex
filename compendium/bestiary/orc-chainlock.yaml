        Orc Chainlock	Level 1 Platoon Hexer
        Humanoid, Orc	EV 6
        <b>Stamina</b> 20
        <b>Speed</b> 5	<b>Size</b> 1L /<b> Stability</b> 2
        <b>Free Strike</b> 3
        Might +2	Agility +2	Reason +1	Intuition 0	Presence 0
        <b>Hook and Chain</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 3<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	5 damage; pull 1; M<0 hooked (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	7 damage; pull 2; M<1 hooked (save ends)
        %E2%9C%B8	<b>17</b>	9 damage; pull 3; M<2 hooked (save ends)
        <b>Effect</b> A hooked target can't move more than 3 squares away from the chainlock's original position until the condition ends.

        <b>Heavy Crossbolt</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 3 Malice
        <b>Keywords</b> Ranged, Strike, Weapon
        <b>Distance</b> Ranged 5<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	5 damage; A<0 slowed (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	7 damage; A<1 slowed (save ends)
        %E2%9C%B8	<b>17</b>	9 damage; prone; A<2 slowed (save ends)

        <b>Chain Link</b>
        Whenever the chainlock is force moved by a creature's melee ability, the creature is pulled the same distance towards the chainlock.

        <b>Relentless</b>
        If the chainlock's Stamina drops to 0, they can make a free strike before dying. If the target is reduced to 0 Stamina or killed by the strike, the chainlock lives and their Stamina is reduced to 1 instead.

      type: mcdm
