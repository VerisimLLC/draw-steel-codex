  flavor: This burnished copper torque thrums with a sense of judgment.
  level9: The torque’s bonus to Stamina increases to five times your highest characteristic score. Additionally, you can have multiple instances of envy and disdain, with no limit on either.
  weight: 1
  category: Gear
  specialDescription: ""
  type: Gear
  projectGoal: "450"
  ctime: 1759399873656
