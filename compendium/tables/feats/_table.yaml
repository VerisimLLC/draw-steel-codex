  tag: Supernatural Perks
  name: Familiar
  description: |-
    A supernatural spirit who has taken the form of a specific small animal or animated object has chosen to be your familiar—or to adopt you as their familiar.

    The spirit uses the familiar stat block.

    The familiar can hold small objects in their mouth or claws, but can’t perform activities that would typically require hands (opening a door, unrolling a scroll, and so forth). They can’t harm other creatures or objects. They can flank in combat, but only with you.

    If your familiar is destroyed, you can restore them as a respite activity, or by spending a Recovery as a main action to bring them back into existence in an unoccupied space adjacent to you.
  mtime: 1772941484981
  id: 3dd235fe-f471-4edb-a8fa-80e216988467
  ctime: 1730701285058
d5c2b5cf-f7d1-406d-a05a-e8c0ba9ddd3e:
  __typeName: CharacterFeat
  modifierInfo:
    __typeName: ClassLevel
    features: []
  tag: intrigue perk
  name: Forgettable Face
  description: If you spend 10 minutes or less interacting with a creature who hasn’t met you before, you can cause them to forget your face when you part. If asked to describe you, the creature gives only a vague, blank, and unhelpful description. Additionally, if you spend 1 hour or more assembling a disguise, you automatically obtain a tier 2 outcome on any test that could make use of the Disguise skill. If you have the Disguise skill, you automatically obtain a tier 3 outcome on the test.
  mtime: 1755078942219
  id: d5c2b5cf-f7d1-406d-a05a-e8c0ba9ddd3e
  ctime: 1730442411399
