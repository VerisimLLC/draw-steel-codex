        display:
          brightness: 1
          saturation: 1
          hueshift: 0
          bgcolor: "#ffffffff"
        flavor: You can use this maneuver to attempt to search for creatures hidden from you.
        categorization: Common Ability
        range: "10"
        persistence: []
        modifiers: []
        strain: []
        guid: d4c248aa-2d7b-42a7-bac8-0cb46f179ab5
        sourceReference:
          __typeName: SourceReference
          page: 274
          docid: e6cab5b7-a1c9-4b12-ad06-ed573f6ba904
        targetType: all
        domains: []
        implementation: 3
        numTargets: "1"
        name: Search for Hidden Creatures
        actionResourceId: a513b9a6-f311-4b0f-88b8-4e9c7bf92d0b
        description: |
          You can search for creatures who are hidden from you as long as those creatures are within 10 squares and you have line of effect to them. To do so, you use a maneuver to make an Intuition test using the Search skill, and any hidden creatures within 10 squares of you each make an opposed Agility test using the Hide skill. At the Director’s discretion, different characteristics and skills can be used in this opposed test. For example, your foe might make a Presence test using the Handle Animals skill to hide among a flock of sheep without disturbing them, or you could make a Reason test using the Eavesdrop skill to pick out the breathing of a creature hidden in the dark.
          If the total of your test is higher than that of a hidden creature, they are no longer hidden from you. Otherwise, they remain hidden from you.
          As part of the maneuver used to search for hidden creatures, you can point out any creatures you notice to allies within 10 squares of you, making those creatures no longer hidden from those allies.
          If a creature is hidden from your allies but not from you, you can use a maneuver without making a test to point that creature out to your allies.
        abilityType: none
        iconid: f3ca1e31-fa85-4a4f-aa5d-36d4a551310f
