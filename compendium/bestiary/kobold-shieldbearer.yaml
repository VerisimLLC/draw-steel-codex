        <b>Shield, Boss?</b>
        The shieldbearer and their mentor has cover, a Stability of 1, and can act as cover for allies when the shieldbearer is adjacent to their mentor.

        Level 4 Retainer Advancement Ability
        <b>Shield Block</b> (Triggered Action, Encounter)
        Keywords -
        <b>Distance</b> Melee 1 or Ranged 5	<b>Target</b> The shieldbearer's mentor
        <b>Effect</b> When the shieldbearer's mentor takes damage from an attack, the shieldbearer can block the attack (if the shieldbearer is adjacent to the mentor) or throw their shield into the mentor's space (if they are up to 5 away from the mentor). The triggering attack is reduced by half and any potency effects it has are reduced by 1. If the kobold threw their shield, it bounces back to their hand.

        Level 7 Retainer Advancement Ability
        Living Backpack (Action)
        Keywords -
        <b>Distance</b> Melee 1	<b>Target</b> The shieldbearer's mentor
        <b>Effect </b>The shieldbearer straps their shield on their back and then climbs onto their mentor's back. While clinging to their mentor, the shieldbearer enters the mentor's space and loses their Shield, Boss? trait. They move along with the mentor and can't use actions, moves, or maneuvers, except to end the effect as a maneuver. The effect also ends if the shieldbearer is force moved away or knocked prone. When the effect ends, the shieldbearer moves into an adjacent square if they're still in the mentor's space.

        While the shieldbearer is clinging to their mentor, both the shieldbearer and the mentor gain 10 Temporary Stamina and cover.

        Level 10 Retainer Advancement Ability
        <b>Let's Go Sledding </b>(Action, Encounter) - 2d10 + highest characteristic
        <b>Keywords</b> Charge, Melee, Strike, Weapon
        <b>Distance</b> Melee 1	<b>Target</b> 3 creatures
        %E2%9C%A6	<b>%E2%89%A411</b>		6 damage; M (weak) prone
        %E2%98%85	<b>12%E2%80%9316</b>		10 damage; M (average) prone
        %E2%9C%B8	<b>17</b>		14 damage; M (strong) prone
        <b>Effect </b>If this ability is used as part of the Charge action, gain 2 surges.

        Lightbenders
        <b>Monster Troops</b>
        Lightbenders prowl deserts, plains, forests-any sunbathed wilderness. Their adaptations make them skilled daylight predators. This monstrous creature's fur bends and refracts light from the surrounding environment, producing mirages that distract and confuse their prey-hence their name.
        Hidden Hunters
        At a distance, a lightbender looks akin to a regular lion, but closer inspection reveals their glowing eyes, iridescent mane, and pair of lashing tails spiked with refractive crystals. The lightbender's pelt magically warps light around them to disguise their movement, allowing them to teleport while leaving behind a past visual imprint. Unsuspecting prey rarely realize they're staring at an afterimage of the lightbender until the predator pounces.
        Prized Manes
        Both male and female lightbenders have the distinctive mane, which is highly prized for its light-displacing qualities and can be fashioned into a mantle of the lightbender, though only a few mages possess the knowledge to do so.
        Protective Companions
        Though lightbenders are typically solitary creatures, they sometimes cross into another lightbender's territory to help protect a newborn litter of kittens. A few people have succeeded in taming lightbenders as guards or hunting animals, and if treated well, they can make for loyal protectors, often viewing their smaller humanoid companions as surrogate kittens.
