  name: Rally the Rodents
  numTargets: "1"
  description: |-
    A radenwight uses music to coordinate living rats, forming a 10 wall of rats scurrying atop one another into unoccupied spaces anywhere on the encounter map. The wall doesn’t block line of effect for radenwights and their allies, but it does for other creatures as the rats coordinate their movements with the radenwights.
    Each square of the wall has 10 Stamina.

    If the last radenwight in the encounter dies and the wall is still standing, the rats let out a hideous screech as they disperse. Each enemy on the encounter map makes an Intuition test.

    <= 7 | sonic damage; the target can’t take a respite activity during their next respite
    12-16 | 5 sonic damage
    17+ | No effect.
