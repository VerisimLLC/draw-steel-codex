055fbdab-5657-409a-bea5-be95285dccfd:
  __typeName: CharacterComplication
  drawback: The chosen leveled treasure is broken and completely inoperative. Repairing the treasure requires that you complete the Craft Treasure project for it. The project goal is half of what it would cost to create such an item, and you already have the project source you need. You must seek out any item prerequisite.
  mtime: 1755517084508
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Shattered Legacy
  ctime: 1755517084508
  description: "You’re the heir to a powerful supernatural treasure that has been in your family for generations. One problem, though: that treasure is broken. Some ancestor of yours sundered it while saving the world. Or maybe they tripped and smashed it on a rock. Either way, it’s your job to fix it."
  id: 055fbdab-5657-409a-bea5-be95285dccfd
  benefit: "You know one language of your choice. Additionally, you have one leveled treasure of your choice (see Treasures in Chapter 13: Rewards)."
