    import:
      type: mcdm
      data: |+
        Gnoll Bonesplitter	Level 2 Horde Brute
        Abyssal, Gnoll	EV 4
        <b>Stamina</b> 25
        <b>Speed</b> 5	<b>Size</b> 1L /<b> Stability</b> 1
        <b>Free Strike</b> 3
        Might +2	Agility +1	Reason 0	Intuition 0	Presence +1
        <b>Three-Tail Flail</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	5 damage; push 2
        %E2%98%85	<b>12%E2%80%9316</b>	6 damage; push 2
        %E2%9C%B8	<b>17</b>	8 damage; grabbed M<2 target has a bane on escaping the grab
        <b>Effect</b> The bonesplitter can't use three-tail flail on another target while the current target is grabbed.

        <b>Cackletongue</b> (Maneuver) %E2%97%86 4 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self and 2 burst<b>	Target</b> Self and all allies
        <b>Effect</b> Each target makes a melee free strike. Targets who haven't used a cackletongue maneuver on this turn use it immediately at no cost.

        <b>Death Frenzy</b>
        Whenever a non-minion ally within 5 is reduced to 0 Stamina, the bonesplitter moves up to their speed and makes a free strike.

