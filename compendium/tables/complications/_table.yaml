  ctime: 1755513952693
  description: When an evil mage threatened someone you loved, you blocked that foe’s summoning of an elemental creature by absorbing their magic with your body. You are now infused with the power of that elemental—who isn’t at all happy about it
  id: b681b614-e00a-42a8-bdbc-258dc5d31893
  benefit: You gain a +3 bonus to Stamina at 1st level, then again at 4th, 7th, and 10th levels.
1e00b192-f9e1-4dd8-a438-9301e0d958d8:
  __typeName: CharacterComplication
  drawback: You have started to succumb to the curse or plague, and will suffer the fate of your family if you don’t find a cure soon. Work with the Director to determine the timeline of your transformation, which should be something that could happen during the campaign!
  mtime: 1755604030430
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Searching for a Cure
  ctime: 1755516821725
  description: Your homeland has been corrupted by some terrible curse or plague, and you’re the only one who escaped it. The members of your family still exist, but in changed forms—perhaps as vampire spawn, zombies, or living statues. People tell you the situation is hopeless, but you’re determined to find a cure that can undo your loved ones’ suffering.
  id: 1e00b192-f9e1-4dd8-a438-9301e0d958d8
  benefit: Choose a type of monster connected to your homeland’s plight, such as a vampire, ghost, or medusa. You have a +1 bonus to saving throws related to that monster’s abilities, and you treat your characteristic scores as 1 higher than usual for the purpose of resisting potencies related to those abilities.
