  name: Lightning Soul
  ctime: 1755515707172
  description: You were caught in a storm and struck by lightning—but something saved you from death. Perhaps it was a gods-given miracle, a latent psionic gift, or the magic of a helpful elementalist, but you absorbed the lightning into your body. It’s always there now, simmering under the surface.
  id: e87d0307-7197-41b7-a537-0cd3ced5d335
  benefit: Whenever you regain Stamina in combat, you gain 1 surge. Whenever you spend a surge to deal extra damage, you can make that extra damage into lightning damage.
