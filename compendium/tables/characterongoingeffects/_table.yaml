    rollType: ability_power_roll
    description: |-
      • Strikes with the weapon deal extra holy damage equal to the wielder’s highest characteristic score.
      • Any creature struck by the weapon who has holy weakness and has P < Strong frightened and weakened (save ends).
      • Any minion targeted by a strike using the weapon dies. That minion’s Stamina maximum is removed from the minion Stamina pool before any damage is applied to the rest of the squad.
      • You can’t be made frightened.
      • At the end of each of your turns, each ally adjacent to tyou makes a saving throw against each effect on them that is ended by a saving throw.
      • You have corruption immunity 10.
