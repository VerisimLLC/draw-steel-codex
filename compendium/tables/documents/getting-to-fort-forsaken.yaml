description: Getting to Fort Forsaken
content: |-
  :<># Getting to Fort Forsaken

  :<>[[image]]

  To share the above image, use the "Present to Players" button at the top right of this dialog

  # Overview

  The Forsaken Wraiths are a bandit crew stealing food from Broadhurst and planning a violent raid. The bandits have established a stronghold, which they call Fort Forsaken, on an island at the center of a lake in the Silver Wood. The heroes must get to the island and infiltrate the fort to end the bandits’ mayhem. A head-on assault is very dangerous, but sneaking or bluffing their way into the fort can pay dividends. A power struggle between two bandit leaders gives the heroes an opportunity to end the bandits’ reign of terror with minimal bloodshed. The heroes can learn the location of Fort Forsaken from Brune the a Butcher (see B8. Butcher) or by questioning a bandit after they raid the village (see Wraith Raid in Events).

   This quest uses the Fort Forsaken map.

  ## A Short, Shocking Swim

   When the heroes arrive at the lake, provide the following information:
  > * “Water laps against the shore of a large lake with an island at its center about 400 feet away.”
  > * “A stone and wood fort stands on the island, but it’s difficult to make out details from this distance.”
  > * “A wooden raft, big enough to carry several humanoids, rests on this shore. Three paddles and a long steering pole rest beside the raft.”

  **Secret**: The raft here is a trapped decoy. The raft’s wood was soaked in an accelerant that easily combusts if hit with an open flame. It’s also rigged to fall apart if it hits the sharpened logs positioned just below the lake’s surface, halfway between the two shores.

  **Secret**: A second, sturdier raft is hidden nearby for the bandits’ use.

  ## Decoy Raft

  The raft’s problematic design has been camouflaged. A hero examining the raft can make an easy Reason test.

  |Examine the Raft: Easy Reason Test
  |The hero notices the raft’s wood is soaked in chemicals to make it flammable.
  |The hero notices the raft’s wood is soaked in chemicals to make it flammable, and also that it’s built to fall apart if struck along the bottom.
  |The hero notices the raft’s wood is soaked in chemicals to make it flammable, and also that it’s built to fall apart if struck along the bottom. The hero also notices another raft, this one much safer, hidden in the bushes nearby.

  If the decoy raft takes fire damage, it immediately catches fire. The first time on a turn that a creature touches the burning raft or if they start their turn touching it, they take 5 fire damage. The raft is destroyed at the end of the second round after which it started burning.

  ## Other Means of Crossing

  Another raft, which the bandits actually use to cross the lake, is hidden in the foliage a short distance from the shore. Heroes who search the woods automatically find the second raft. Swimming is also an option, as the water is calm and still and only 3 squares deep at its deepest. However, the clawfish who inhabit the lake are hungry, attacking swimmers (or anyone who enters the water) once they are at 40 feet or farther from the shoreline.

  ##  Spiked Logs

   The bandits have rigged some sharpened logs just under the water’s surface right before the island. Only the decoy raft is structurally unsound enough to fall apart if it hits one of these trapped logs.

   A hero steering the decoy raft must make a hard Agility test as they approach the shore.

  |Steer the Decoy Raft: Agility Test
  |The hero strikes the spike logs with the raft, causing it to fall apart.
  |The hero grazes the log with the raft. It doesn’t totally fall apart, but the hero (or heroes) with the lowest Agility score on the raft falls into the water as a section of the raft breaks away and unbalances it.
  |The hero avoids the spiked logs and makes it to the island.

  ## Taking a Swim

   If one or more heroes fall into the water or elect to swim to the fort, they must swim to shore while dealing with the clawfish.

   Creatures falling into the lake or swims between the logs alert eight clawfish, which swarm and attack. At the start of each round a hero remains in the water, another eight clawfish appear until all clawfish 

  At the start of each round if a hero is in the water, another eight clawfish appear. Reinforcements continue to arrive in this way until all clawfish are dead or a total of forty-eight clawfish have appeared.

  To start this encounter, click [Draw Steel!]
  [[setting:Number of Heroes]]

  [[encounter]]
  [[encounter]]
  [[encounter]]
  [[encounter]]
  [[encounter]]
  [[encounter]]

  ## Reinforcements

   At the start of each round if a hero is in the water, another eight clawfish appear. Reinforcements continue to arrive in this way until all clawfish are dead or a total of forty-eight clawfish have appeared.

  ## Tactics
   The clawfish rush the nearest hero and attack, fighting to the death! If Skewra wakes and sees the heroes approaching on a raft, she lights a torch, and shoots a burning arrow toward the raft, hoping to ignite it. She continues peppering the heroes with arrows until at least two of them make it to shore, then she runs toward the gate to raise the alarm.

  ## Ending the Encounter
   When the heroes arrive safely on the island, they earn 1 Victory each.

  [[/awardvp 1|Award Victories]]
