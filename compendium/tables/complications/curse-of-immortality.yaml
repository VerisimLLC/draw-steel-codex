name: Curse of Immortality
ctime: 1755513566188
description: For as long as you can remember, you’ve never gotten older. You’ve simply adventured through one age after another. Still, your memory of past events—even those you were involved with—is a little hazy. Apparently, your memory isn’t as long-lived as you are.
id: b1e84ef5-95ed-4ad4-b812-3a6eb2a1bae9
benefit: You don’t age. Additionally, whenever you would die, you instead enter a state of suspended animation indistinguishable from death. If your body isn’t destroyed by dying or while you remain in this state, you come back to life after 12 hours and regain Stamina equal to your recovery value.
