      domains:
        class:506d41b6-816b-45c5-8f28-765f29d6f8ae: true
      description: |-
        You have drilled with a broad array of weapons and have developed techniques to optimize their use. Whenever you select or change your kit, you can select an additional martial kit and gain the benefits of both kits.

        If both kits grant you the same benefit, you take one or the other and can't change your choice until you finish a Respite. (This usually means taking the higher of two bonuses.) You also gain access to the signature abilities of both kits.
