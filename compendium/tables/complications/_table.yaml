  name: Lost in Time
  ctime: 1755515810521
  description: In a long-ago age, a cataclysm overtook your city. You weren’t killed, but some arcane accident caused you to be suspended in time until now. Alone, you must navigate the world around you with a head full of outdated memories—and a few ancient secrets.
  id: a5419cbd-f23f-48b0-b2a8-e0b7c589e432
  benefit: |-
    Choose a damage type from acid, cold, corruption, fire, holy, lightning, poison, psychic, or sonic. Whenever you use a signature
    ability, you can have it deal your chosen damage type instead of its usual damage.
7e0cd4f9-9fea-4f16-81ca-fe6f79df13b5:
  __typeName: CharacterComplication
  drawback: If the creature you’re bound to dies, you die as well, no matter what other traits or features you have.
  mtime: 1755603886930
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Lifebonded
  ctime: 1755515670107
  description: 'In a sinister ritual, your soul has been bound to that of another creature. This might be a companion, a creature you are beholden to, or an enemy. When they die, you die—making you the perfect bodyguard. '
  id: 7e0cd4f9-9fea-4f16-81ca-fe6f79df13b5
  benefit: Choose another creature who doesn’t have the Lifebonded complication. When you die, your body disappears until that creature finishes a respite or earns 1 or more Victories. You then appear next to the creature, fully healed.
2ce081cc-eb94-4ea1-a30e-02c15d81001b:
  __typeName: CharacterComplication
  drawback: Members of your extended family are looking for you, intending to drag you home—and you’ve never been able to stand up to them.
  mtime: 1755604023198
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Runaway
  ctime: 1755516769181
  description: To your embarrassment, no sinister omens attended your birth and your closet contains no skeletons. You’re just an ordinary person raised in a hardworking family. You’re expected to carry on the family business—but who can settle down to a boring job when adventure calls! That’s why you ran away
  id: 2ce081cc-eb94-4ea1-a30e-02c15d81001b
  benefit: You have one skill of your choice from the crafting skill group.
f931efab-f549-4c17-878f-cdb08cc5f1b0:
  __typeName: CharacterComplication
  drawback: Eventually, the voice reveals it wants something from you that you might not want to provide. If the voice is displeased with you, it can interrupt your rest during a respite, causing you to regain 2 fewer Recoveries than usual.
  mtime: 1755604162548
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Voice in Your Head
  ctime: 1755517607243
  description: You occasionally hear a voice in your head, giving you orders or offering advice. You don’t know who the voice is or why it comes to you, but when you’ve followed the advice, it’s usually proved to be sound
  id: f931efab-f549-4c17-878f-cdb08cc5f1b0
  benefit: The Director tells you when you hear the voice. The voice seems to be aware of your surroundings, and its advice is usually vague but helpful. Someday its motivations might be different from your own, but for now, the voice seems keen on making sure you survive.
e5607444-59d0-4ebf-9dae-1e93edf3f7e3:
  __typeName: CharacterComplication
  drawback: With no other inheritance, you accumulated debts. The first time your Wealth exceeds 1, you lose 1 Wealth.
  mtime: 1755604140197
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Strange Inheritance
  ctime: 1755517404891
  description: Your siblings each inherited money or land, but you received a strange, seemingly useless trinket—along with the advice that maybe you weren’t cut out for an ordinary, peaceful life.
  id: e5607444-59d0-4ebf-9dae-1e93edf3f7e3
  benefit: "You have a somewhat inoperative 2nd-echelon trinket of the Director’s choice (see Treasures in Chapter 13: Rewards). This trinket functions only while the total of your level plus your Victories is 5 or higher. You don’t learn what the trinket’s powers are until the first time it becomes operative."
a7fb8984-ecf4-4799-a14b-dc6cf9c02ec5:
  __typeName: CharacterComplication
  drawback: At the start of a new game session, the party doesn’t earn a hero token for your character.
  mtime: 1755517490210
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Thrill Seeker
  ctime: 1755517490210
  description: You live for danger. Whether in battle or mundane peril, you can transcend your usual limits—and once you’ve tasted that excitement, you want more.
  id: a7fb8984-ecf4-4799-a14b-dc6cf9c02ec5
  benefit: Each time your party reaches 2, 4, and 6 Victories, you earn the party a hero token.
0390abe4-3d6a-423b-ae05-c58e153c41c7:
  __typeName: CharacterComplication
  drawback: |-
    You can’t imagine ever being wrong on the topic of your obsession. Whenever you make a test to recall lore using your chosen skill, the Director makes the test in secret. Instead of informing you whether you’re right or wrong, they provide you with correct information if you succeeded and false information if you failed.

    Study Lore
    Item Prerequisite: None
    Project Source: A significant source of information on the topic of your
    obsession, such as a major library or a world-renowned sage
    Project Roll Characteristic: Reason
    Project Goal: 120, 150, 180
    Each time you complete this project, your knowledge of your chosen
    field expands, and the bonus to tests provided by your chosen skill
    increases by 1.
  mtime: 1765799439208
  modifierInfo:
    __typeName: ClassLevel
    features:
    - __typeName: CharacterSkillChoice
      categories:
        lore: true
      name: Benefit
      guid: 27de7c61-3fb5-457a-ab22-8ed742d538ed
      description: Choose a Skill from the Lore Skill Group
      source: Feat
  name: Consuming Interest
  ctime: 1755513150702
  description: 'Ever since you were a kid, you’ve been obsessed with a certain topic. During your travels, you spend your free time gleaning all the information you can on that obsession. You might not be the world’s leading expert quite yet, but people should certainly trust your opinion on the topic. '
  id: 0390abe4-3d6a-423b-ae05-c58e153c41c7
  benefit: "You have one skill of your choice from the lore skill group, and you can use the Study Lore project (see below) up to three times for that skill. Each time you use the project, you must use a different project source, and the project goal increases. (See Chapter 12: Downtime Projects.)"
9fb4ce0e-c4ee-4f96-aa42-432645183da9:
  __typeName: CharacterComplication
  drawback: Whenever you make a saving throw to end the frightened condition, you roll a d10 twice and take the lower roll.
  mtime: 1768220506058
  modifierInfo:
