      data: |+
        Wode Elf Green Seer	Level 1 Platoon Hexer
        Fey, Humanoid, Wode Elf	EV 6
        <b>Stamina</b> 20
        <b>Speed </b>7	<b>Size</b> 1M / <b>Stability</b> 0
        <b>Free Strike</b> 3
        Might 0	Agility +1	Reason 0	Intuition +2	Presence +1
        <b>The Forest's Embrace</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 10 	<b>Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	5 damage
        %E2%98%85	<b>12%E2%80%9316</b>	7 damage; I<1 restrained (save ends)
        %E2%9C%B8	<b>17</b>	9 damage; I<2 restrained (save ends)
        <b>Effect</b> A creature restrained by this ability can't search for hidden creatures until the condition ends.

        <b>The Natural Cycle</b> (Maneuver) %E2%97%86 2d10 + 2 %E2%97%86 3 Malice
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 10	<b>Target</b> 2 creatures
        %E2%9C%A6	<b>%E2%89%A411</b>	2 damage
        %E2%98%85	<b>12%E2%80%9316</b>	4 damage; P<1 weakened (save ends)
        %E2%9C%B8	<b>17</b>	6 damage; P<1 bleeding (save ends); the target has a double bane on strikes (save ends)
        <b>Effect</b> The green seer causes lichen to grow upon each target.

        <b>Foreseen Punishment</b> (Free Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 5	<b>Target</b> Triggering creature
        <b>Trigger</b> A creature uses a triggered action targeting the green seer or an ally within distance.
        <b>Effect</b> The green seer makes a free strike against the target.

        <b>Masking Glamor</b>
        The green seer immediately hides at the end of their turn while in cover or concealment, even if they are observed.

