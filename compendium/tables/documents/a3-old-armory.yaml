  __typeName: TextStorage
  sections:
    eZK: |
      **0 Respites**
    eRC: |
      ???
    few: |+
      ???


    u: |
      |{#The hero finds two Black Ash Darts hidden in the room.}
    s: |
      |{#The hero stumbles upon a Black Ash Dart in the corner.}
    gf: |+
      ## Webbing

    q: |
      |Find the Loot: Reason or Intuition Test
    o: |
      One hero who actively looks through the remains of the armory for loot can make an easy Reason or Intuition test. See [item:Black Ash Dart] and [item:Black Ash].
    m: |+
      ## Loot

    kr: |+
      ## Ending the Encounter

    eTE: |
      [[encounter:A3 Heroes's Cup Spindlegoth 4]]
    edW: |
      [[encounter:A3 0 Respites Spindlegoth 3]]
    ZM: |2

    jo: |+
      The goblins use hit-and-run tactics, falling from the ceiling, attacking, and then retreating to the ceilings. They make liberal use of the Goblin Mode Malice feature. The spindlegoths pursue any prey who touches the floor and they attempt to keep them there. The spindlegoths don't leave the room.


    Y: |+
      This, and all following encounters, change depending on if the Heroes or [Queen Bargnot] has the [item:Cup of Iulius]. See [Goblin Replacements] for more information.

    W: |
      * For four heroes, remove two spindlegoths.
    X: |+
      * For three heroes, remove one spindlegoth, one goblin underboss,and four goblin spinecleavers.



    U: |
      If this encounter has more or fewer than five heroes, make the following adjustments:
    V: |
      * For six heroes, add one group of two goblin warriors.
    S: |+
      |5|Three [spindlegoth]s|

    edg: |
      [[encounter:A3 1 or 2 Respites Spindlegoth 5 or 6]]
    Q: |
      |3|One [goblin underboss] (captain) Four [goblin spinecleaver]s (minion squad)|
    R: |
      |4|Three [goblin warrior]s|
    O: |
      |1|One [goblin underboss] (captain) Four [goblin spinecleaver]s (minion squad)|
    P: |
      |2|One [goblin underboss] (captain) Four [goblin spinecleaver]s (minion squad)|
    M: |
      **A3 Groups**
    N: |
      |**Group**|**Creature**|
    K: |
      # Encounter A3
    L: |+
      The heroes battle Jagged Edge soldiers in the armory of Castle Andreas.

    I: |
