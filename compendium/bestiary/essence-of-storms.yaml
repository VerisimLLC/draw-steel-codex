        <b>Keywords</b> Magic, Melee, Ranged
        <b>Distance</b> Melee 1 or Ranged 5	<b>Target</b> 1 creature or object
        <b>Trigger</b> The essence takes damage from the target.
        <b>Effect</b> The essence deals 5 lightning damage to the target.

        <b>Fickle and Free</b>
        The essence can't be restrained, slowed, or knocked prone, and they ignore difficult terrain.

