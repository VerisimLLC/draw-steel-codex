      data: |+
        Radenwight Ratcrobat	Level 1 Platoon Harrier
        Humanoid, Radenwight	EV 6
        <b>Stamina</b> 30
        <b>Speed</b> 7 (climb)	<b>Size</b> 1S / <b>Stability</b> 0
        <b>Free Strike</b> 3
        Might -1	Agility +2	Reason +0	Intuition +0	Presence +1
        <b>En Garde!</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1	<b>Target</b> Two creatures or objects
        %E2%9C%A6	%E2%89%A411	4 damage
        %E2%98%85	12%E2%80%9316	6 damage
        %E2%9C%B8	17+	8 damage
        <b>Effect</b> The ratcrobat can shift up to 2 squares after striking the first target, then can shift 1 square after striking the second target.

        <b>Over Here, Thanks</b> (Maneuver)
        <b>Keywords</b> Melee
        <b>Distance</b> Melee 1	<b>Target</b> One enemy
        <b>Effect </b>Slide 3; the ratcrobat can then shift into any of the squares the target left.

        <b>Ready Rodent </b>(Triggered Action)
        <b>Keywords</b> Melee, Weapon
        <b>Distance</b> Melee 1	<b>Target</b> One creature
        <b>Trigger</b> An ally deals damage to the target.
        <b>Effect</b> The ratcrobat makes a free strike against the target.

        <b>Gymratstics</b>
        The ratcrobat has an edge on strikes against larger creatures.

