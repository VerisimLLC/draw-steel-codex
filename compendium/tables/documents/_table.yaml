  content: |+
    # Encounter D4

    The heroes must save [Violet] from a profane ritual in the Delian Tomb.

    [[setting:Number of Heroes]]

    [[encounter:d4]]

    [[/activateobjects d4zone.AreaTemplate activate|Show Hero Start Area]] [[/activateobjects d4zone.AreaTemplate deactivate|Hide Hero Start Area]]


    **D4 Groups**
    |**Group**|**Creatures**|
    |1|One [bugbear channeler] (Vorgosh)|
    |2|Two [goblin warrior]s|
    |3|Two [goblin warrior]s|
    |4|One [goblin warrior] (captain), Four [goblin spinecleaver]s (minion squad)|
    |5|One [goblin warrior] (captain), Four [goblin spinecleaver]s (minion squad)|

    **Encounter Adjustments**
    If this encounter has more or fewer than five heroes, make the following adjustments:
    * For six heroes, add two goblin warriors as their own group.
    * For four heroes, remove one group of two goblin warriors.
    * For three heroes, remove one group of two goblin warriors and one goblin warrior and the four spinecleavers captained by the goblin warrior.


    ## Stair Ward

    The magic ward that covers the stairs makes the floor in this room immune to all damage and indestructible.

    When a creature touches the ward, any forced movement currently affecting them ends as if they had hit a wall, they take 3 lightning damage, and they are teleported up to 5 squares away into an unoccupied space of your choice that doesn't include the ward (typically a place that is far from where the creature would like to be).

    The ward can be overcome with the [Amulet of the Delian Order]. If the ward is lifted, the heroes can enter the second level of the Delian Tomb.

    ## Violet

    While Violet, a civilian, is in the room and the channeler is alive and performing the ritual, Violet canʼt regain Stamina, her speed is 0, and she loses 2 Stamina at the end of each round once combat starts. If her Stamina drops to 0 in this way, she dies and the ward to the stairs is destroyed in a brilliant crackle of lighting.

    A hero who can reach Violet can free her as a maneuver. A hero carrying Violet who has a Might score of 1 or lower is slowed while they carry her. Removing Violet from the room or defeating the channeler ends the effects on her.

    The goblins avoid harming Violet, since they want the ritual to kill her. While under the effect of the ritual, she is considered a goblin and their ally for the purposes of the goblins' abilities and Malice features.


    ## Tactics

    Depending on how the heroes approach from area D3, they might catch the goblins surprised.

    As the heroes engage, Vorgosh the channeler bellows, “The Cup of Iulius shall make the legions of Queen Bargnot strong!” and resumes chanting. On her turn, she uses Blistering Element if the heroes are clustered or Shadow Drag if they're spread apart to pull targets toward her or onto the ward. If she's grabbing someone, she throws them onto the ward. She uses Twist Shape on any creature who approaches or 
    tries to free Violet.

    The spinecleavers run into the fray and attempt to push the heroes onto the ward or toward the channeler.

    Each warrior attacks a different target to prevent the heroes from reaching Violet or Vorgosh.

    ## Ending the Encounter

    The goblins fight until the channeler falls and then flee—at which point encounter is over. If the heroes save Violet, they earn 1 Victory each.

    [[/awardvp 1|Award Heroes 1 Victory]]

  description: Encounter D4
