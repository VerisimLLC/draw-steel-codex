description: Part 1 Rewards
content: |-
  # Part 1 Rewards

  The heroes earn the following rewards for completing this part of the adventure.

  [[image:rewards]]

  ## Renown

  Since you have saved [Violet], legend of your deeds spreads through Broadhurst. You gain 1 Renown each.

  ## Title: Violet’s Savior
  The hero who cuts [Violet] free and escorts her from the room where she was held to stop the ritual or deals damage that reduces Vorgosh to 0 Stamina earns the [title:Violet's Savior] title.

  ## Follower: Ashleigh

  [Ashleigh] becomes an artisan follower for the heroes, offering her services as a blacksmith to them for free. She doesn’t count against the limited number of followers a hero can have based on their Renown. See the [Ashleigh Follower Card] for details. Artisan followers are useful for crafting projects.
