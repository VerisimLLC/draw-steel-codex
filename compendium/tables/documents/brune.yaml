  # Brune

  [[image]]

  *The Butcher. He is gruff and rude, and gives no useful information about the town or most anything else.*
  {
  Secret: See [B8. Butcher]
  Brune is in league with the Forsaken Wraiths. He gives them some of the meat he butchers and sells it to them at night whenever they come by. Lately, Brune has become even greedier and offered the bandits smoked meat from the smokehouse in exchange for more gold. To steal bits of meat from the smokehouse, Brune threatened Saberna, the woman who tends to the meat smoking. Some folks have noticed their meat comes back smaller after being smoked and complained to the reeve about it.

  Brune is gruff and rude. He tells the heroes to “buy some meat or retreat.” If they start asking questions, he rolls his eyes and mocks them, giving no useful information about the town or most anything else they ask.}


