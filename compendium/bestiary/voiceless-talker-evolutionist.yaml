      data: |
        Voiceless Talker Evolutionist	Level 6 Leader
        Horror, Voiceless Talker	EV 32
        <b>Stamina</b> 180	<b>Immunity</b> psychic 8
        <b>Speed</b> 5 (teleport, hover)	<b>Size</b> 1M /<b> Stability</b> 2
        <b>Free Strike</b> 7
        Might +0	Agility +3	Reason +4	Intuition +1	Presence +2
        <b>Psionic Intrusion</b> (Action) %E2%97%86 2d10 + 4%E2%97%86 Signature
        <b>Keywords</b> Melee, Psionic, Ranged, Strike
        <b>Distance</b> Melee 1 or Ranged 5<b>	Target</b> Two creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	11 psychic damage; R<2 slowed (save ends)
        %E2%98%85	<b>12-16</b>	16 psychic damage; R<3 slowed (save ends)
        %E2%9C%B8	<b>17</b>	19 psychic damage; R<4 slowed (save ends)

        <b>Carpe Quadratum</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Self	<b>Target</b> Self
        <b>Effect</b> The evolutionist teleports, swapping places with one creature within 5.

        <b>Adaptability</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Trigger</b> The evolutionist takes typed damage.
        <b>Effect</b> The evolutionist gains immunity 5 to the triggering type of damage until the start of their next turn.

        <b>End Effect</b>
        At the end of their turn, the evolutionist can take 10 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Witness Evolutionary Superiority</b>
        The evolutionist has the first listed trait of every ally minion in the encounter.

        <b>Show Me Who You Are</b> (Villain Action 1)
        <b>Keywords</b> Area, Psionic
        <b>Distance</b> 5 burst<b>	Target</b> All enemies
        <b>Effect</b> Each target makes an <b>Intuition test.</b>
        %E2%9C%B8	<b>%E2%89%A411</b>	Target uses a Signature action against the nearest enemy within distance.
        %E2%98%85	<b>12-16</b>	Target makes a Free Strike against the nearest enemy within distance.
        %E2%9C%A6	<b>17</b>	Frightened (save ends).

        <b>Release the Thralls </b>(Villain Action 2)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 5	<b>Target</b> Special
        <b>Effect</b> The evolutionist teleports 8 minions of level 4 or lower into unoccupied squares within distance. All eight minions can be from any monster type but must share the same name.

        <b>Brainstorm</b> (Villain Action 3) %E2%97%86 2d10 + 4
        <b>Keywords</b> Area, Psionic
        <b>Distance</b> 3 burst<b>	Target</b> All enemies in the burst
        %E2%9C%A6	<b>%E2%89%A411</b>	7 lightning damage
        %E2%98%85	<b>12-16</b>	12 lightning damage
        %E2%9C%B8	<b>17</b>	15 lightning damage
        <b>Effect</b> The evolutionist is surrounded by a psionic electrical storm until the end of the encounter. The area within 5 of them is considered difficult terrain for enemies. An enemy who enters an affected square for the first time on their turn or starts their turn in it takes 8 lightning damage.
        Lord Syuul
        Chief Design Architect of his nation's body banks, the synliroi Lord Syuul (see-YOU-ull) seeks more material for his experiments. His spies, informants, and allies are always on the lookout for subjects with unique hereditary traits the Interlace might extract.
        A Lord Above
        Lord Syuul, who belongs to an ancient and respected noble house, often leaves his estate without his typical retinue to slow him down. His house would prefer he not do this, so they always send a covert squad of bodyguards to track his movements. Confronting Lord Syuul guarantees incurring the ire of the rest of his house.
        Syuul's recent experiments have focused on isolating the traits that allow humans to resist supernatural phenomena. Thus far, these attempts have been unsuccessful. Not to be deterred, Lord Syuul has placed his assistant in charge of the day-to-day operations of the body banks, while Syuul himself ventures forth to observe the surface world and plunder its diversity.
        Lord Syuul's Languages
        Lord Syuul uses Mindspeech and Variac.

        Lord Syuul's Malice	Malice Features
        At the start of Lord Syuul's turn, you can spend malice to activate one of the following features.
        <b>Guise</b> %E2%97%86 3 Malice
        Lord Syuul projects a psionic image over his body, making him unable to be identified as an enemy until the end of his next turn.

        <b>Solo Action</b> %E2%97%86 5 Malice
        Lord Syuul can take an additional action on his turn. Lore Syuul can use this feature even if he is dazed.

        <b>Do It For Me</b> %E2%97%86 5 Malice
        Lord Syuul psionically plunders the mind of all creatures within 2 of him. Each creature makes a <b>Reason test.</b>
        %E2%9C%B8	<b>%E2%89%A411</b>	13 psychic damage; makes a signature attack against a creature Lord Syuul chooses.
        %E2%98%85	<b>12-16</b>	10 psychic damage; makes a free strike against a creature Lord Syuul chooses.
        %E2%9C%A6	<b>17</b>	No Effect.

        <b>Overpower</b> %E2%97%86 7 Malice
        Lord Syuul sends out a psionic burst to completely overpower his greatest threats. He makes a <b>Reason Test</b> (2d10 + 4).
        %E2%9C%A6	<b>%E2%89%A411</b>	Lord Syuul gains damage weakness 5.
        %E2%98%85	<b>12-16</b>	Lord Syuul gains damage immunity 2.
        %E2%9C%B8	<b>17</b>	Lord Syuul gains damage immunity 5.
        He can repeat this reason test once per round as a maneuver, replacing the previous Overpower effect.
        However, any hero who has at least one psionic ability can use their maneuver to push back on this effect with a <b>Reason Test</b> of their own, replacing the previous Overpower effect.
        %E2%9C%A6	<b>%E2%89%A411</b>	Lord Syuul gains damage immunity 5.
        %E2%98%85	<b>12-16</b>	Lord Syuul gains damage immunity 2.
        %E2%9C%B8	<b>17</b>	Lord Syuul gains damage weakness 5.
        The Overpower effect lasts until the end of the encounter.
