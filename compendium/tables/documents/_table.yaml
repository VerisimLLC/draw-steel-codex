    sections:
      x: If [Mikael] is cured of lycanthropy by the heroes, he gives [Tansy] (see [B11. Furrier]) the items needed to create a [item:Color Cloak - Red], which they both gift to the heroes as thanks for stopping Saera.
      v: |+
        If [Oleq] escapes with his life and isn’t cursed, he and [Yerris] thank the heroes then go to find their sheep.

      t: |+
        If defeated, the players may click on [Saera]'s token to collect the Werewolf Remains listed.

      r: |+
        If the heroes kill [Saera], her remains can be used in the Find a Cure downtime project to craft a cure to lycanthropy. One completion of the project uses all the viable material from the remains and crafts three cures. The cure can be used on [Mikael] (see [B10. Carpenter]), [Oleq], or any heroes who became cursed with lycanthropy by the werewolf.

      o: |+
        [Saera]’s lair contains 1 pound of seagrass growing on the walls. [item:Seagrass] is used to make [item:Growth Potion]s. The players may move their token adjacent to the seagrass and click on it to collect the seagrass.

      p: |+
        ## Wolf Den Aftermath

      m: |+
        [[//awardvp 1|Award Victories]]

      n: |+
        ## Loot

      k: |+
        End Combat once the battle is over.

      l: |+
        If the heroes win the day, they earn 1 Victory each.

      i: |+
        When [Saera] has only 30 Stamina remaining, she attempts to flee, getting away if she leaves the cave.

      j: |+
        ## Ending the Encounter

      g: |+
