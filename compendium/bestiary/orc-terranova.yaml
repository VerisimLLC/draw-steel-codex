        <b>Stamina</b> 30
        <b>Speed</b> 6 (burrow)	<b>Size</b> 1M /<b> Stability</b> 2
        <b>Free Strike</b> 4
        Might +1	Agility +1	Reason 0	Intuition +1	Presence +2
        <b>Earth Pillar</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 10<b>	Target</b> 3 creatures touching the ground
        %E2%9C%A6	<b>%E2%89%A411</b>	6 damage; A<0 prone can't stand (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	9 damage; A<1 prone can't stand (save ends)
        %E2%9C%B8	<b>17</b>	12 damage; prone A<2 and can't stand (save ends)
        <b>Effect</b> The ground beneath each target rises 1 square.

        <b>Sinkhole</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 3 Malice
        <b>Keywords</b> Melee, Weapon
        <b>Distance</b> 3 Burst<b>	Target</b> All enemies
        %E2%9C%A6	<b>%E2%89%A411</b>	4 damage; M<0 restrained (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	7 damage; M<1 restrained (save ends)
        %E2%9C%B8	<b>17</b>	10 damage; M<2 restrained (save ends)
        <b>Effect</b> The affected area is considered difficult terrain.

        <b>Seismic Step</b>
        The terranova ignores difficult terrain. The terranovadoesn't need line of effect totarget creatures touching the ground with abilities.

        <b>Relentless</b>
        If the terranova's Stamina drops to 0, they can take a free strike before dying. If the target is reduced to 0 Stamina or killed by the strike, the terranova lives and their Stamina is reduced to 1 instead.
