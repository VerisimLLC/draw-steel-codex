      description: Choose one skill from the interpersonal skill group. (*Quick Build:* Lead)
      source: Noble Culture Feature
  name: Noble
  category: upbringing
  description: 'Your hero grew up among leaders who rule over others and play the games of politics to maintain power. Many families are nobles by birthright, but some cultures have noble titles earned through deeds or popularity. Whatever the case, heroes with this background understand why the whispered words in the right ear can sometimes be more powerful than any army. '
  id: b778e944-2650-464c-9773-305f65cca665
  ctime: 1730730257075
788c28f1-06bb-4a18-94d9-b58ba8d9af88:
  __typeName: CultureAspect
  mtime: 1756162984367
  modifierInfo:
    __typeName: ClassLevel
    features:
    - __typeName: CharacterSkillChoice
      categories:
        lore: true
      name: Academic Skill
      guid: ed9d9ac6-9a6e-4ad3-a7b0-2ee1aa1bea6e
      description: Choose one Skill from the lore skill group. (*Quick Build:* History)
      source: Academic Culture Feature
  name: Academic
  category: upbringing
  description: Your hero was raised by people who collect, study, and share books and other records. Some academics focus on one area of study, such as a college for wizards dedicated to the study of magic, or a church that teaches the word of one deity. People in an academic culture learn how to wield the power that is knowledge.
  id: 788c28f1-06bb-4a18-94d9-b58ba8d9af88
  ctime: 1730729901180
023d4580-acbc-4955-b623-518308dd3890:
  __typeName: CultureAspect
  mtime: 1756163918725
  modifierInfo:
    __typeName: ClassLevel
    features:
    - __typeName: CharacterSkillChoice
      categories:
        intrigue: true
        interpersonal: true
      name: Bureaucratic Skill
      description: Choose one Skill from the intrigue or interpersonal skill groups. (*Quick Build:* Persuade)
      guid: ba5569ea-2457-4fbe-9a15-144b246d005b
      source: Bureaucratic Culture Feature
  name: Bureaucratic
  category: organization
  description: "Bureaucratic cultures are steeped in official leadership and formally recorded laws. Members of such a culture are often ranked in power according to those laws, with a small group of people holding the power to rule according to birthright, popular vote, or some other official and measurable standard. Many bureaucratic communities have one person at the top, though others might be ruled by a council. A trade guild with a guildmaster, treasurer, secretary, and a charter of rules and regulations for membership; a feudal lord who rules over a group of knights who in turn rule over peasants working the land; and a militaristic society with ranks and rules that its people must abide are all examples of bureaucratic cultures. \n\nThose who thrive in bureaucratic cultures don’t simply follow the rules. They know how to use those rules to their advantage, either bending, changing, or reinterpreting policy to advance their own interests. Schmoozing with those who make the laws is often key to this approach. Others in a bureaucratic culture might specialize in operating outside the strict regulations that govern the culture without getting caught. "
  id: 023d4580-acbc-4955-b623-518308dd3890
  ctime: 1730729805115
2ef328d9-8635-4f45-9d61-3d4296d847e0:
  __typeName: CultureAspect
  mtime: 1756162970718
  modifierInfo:
    __typeName: ClassLevel
    features:
    - __typeName: CharacterSkillChoice
      categories:
        exploration: true
      source: Labor Culture Feature
      description: 'Choose either the Blacksmithing skill (from the crafting skill group), the Handle Animals skill (from the interpersonal group), or a skill from the exploration group. (*Quick Build:* Lift) '
      guid: a5020c32-f419-463c-af44-4ded451d882e
      name: Labor Skill
      individualSkills:
        50ca6145-2d22-4496-a355-c7b2df2cf0de: true
