    # D3. Hall of the Brave

    > * “A painted red skull glows on the ground, throbbing with an angry light.”
    > * “A dozen stone coffins lie tucked against the east and west walls of this room.”
    > * “To the north, a statue of a proud human warrior holding a spear is built against the wall. To the side of it, an inscription reads, ‘Once this fails, the battle is lost.’ A sinister, muffled chanting comes from the wall behind the statue.”

    {**Secret:** The north wall holds a secret door that leads to area D4.
    **Secret:** The goblins have used necromancy magic to raise the dead in this chamber as guardians against intruders. Six ghouls, four skeletons, and two zombies emerge from the coffins and attack when a creature who isn’t a goblin interacts with one of the coffins, damages the sigil, or moves halfway or farther into the room.}

