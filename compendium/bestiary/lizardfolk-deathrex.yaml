      data: |
        Lizardfolk Deathrex	Level 1 Leader
        Humanoid, Lizardfolk	EV 12
        <b>Stamina</b> 80
        <b>Speed</b> 5 (climb, swim)	<b>Size</b> 2 /<b> Stability</b> 2
        <b>Free Strike</b> 4
        Might +3	Agility +2	Reason 0	Intuition +1	Presence +2
        <b>Ripper Spear</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 3<b>	Target</b> Two creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	7 damage; pull 1; A<1 bleeding (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	10 damage; pull 1; A<2 bleeding (save ends)
        %E2%9C%B8	<b>17</b>	13 damage; pull 2; A<3 bleeding (save ends)
        <b>1 Malice</b> One target that is adjacent to the deathrex is grabbed by the deathrex's mouth.

        <b>Death Roll</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 3 Malice
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> 1 grabbed creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	8 damage; M<1 dazed (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	12 damage; M<2 dazed (save ends)
        %E2%9C%B8	<b>17</b>	15 damage; M<3 dazed (save ends)
        <b>Effect</b> The target is released from the grab and slides 5.

        <b>Trundle</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The deathrex moves up to their speed. The deathrex can make a free strike on each creature that makes an opportunity attack against them during this movement.

        <b>Swat The Fly</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Trigger</b> The target moves or shifts away from the deathrex.
        <b>Distance</b> Melee 1<b>	Target</b> 1 adjacent creature or object
        <b>Effect</b> Slide 5.

        <b>Snack Attack</b> (Villain Action 1)
        <b>Keywords</b> Area
        <b>Distance</b> Self and 10 burst<b>	Target</b> Self and all allies in the burst
        <b>Effect</b> Each target moves up to their speed and makes a free strike. A target receives temporary Stamina equal to the amount of damage they dealt during this action.

        <b>Shed Some Skin </b>(Villain Action 2)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The deathrex shifts up to their speed, leaving behind a skin shed duplicate in the space that they started in. The duplicate has 10 Stamina, has no villain actions, shares the rest of the deathrex's characteristics, and takes their turn at the same time as the deathrex.

        <b>Thresher Thrasher</b> (Villain Action 3)
        <b>Keywords</b> Area
        <b>Distance</b> Self and 10 burst<b>	Target</b> Self and all allies in the burst
        <b>Effect</b> Each target moves up to their speed. Until the end of the encounter, when a creature enters or starts their turn adjacent to a target, the target can make a free strike against them.

        <b>Rex Reptilian Escape</b>
        While the deathrex still has a tail, whenever the deathrex is inflicted with an EoT or save ends effect, the deathrex can lose their tail to immediately end the effect and shift 2.
