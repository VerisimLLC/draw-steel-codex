description: New Player Welcome
content: |
  # Welcome to the Delian Tomb

  This is the Start Here adventure for *Draw Steel*. 
  To begin, you need a hero. You can create one now, or chose one of the Pregenerated Heroes included with the Adventure. These should be included in the [Inn of Beginnings], and you can ask your Director to assign one to you.
  Your hero is a person motivated to fight forces of evil to protect the innocent, but each hero has their own personal reason for doing so. You don’t have to be a pure beacon of good. Heroes have flaws and are complex, just like people in the real world. But your hero should be someone who isn’t afraid to battle monsters for altruistic reasons.

  The hero you create will be roleplayed by you. Often when referring to your hero, the rules use second-person pronouns (you/your) for shorthand, making a distinction between you and your hero only when that distinction is important.

  Check p.30 of [Draw Steel Heroes], the "Making A Hero" chapter for detailed character creation information.

  :<>[[/createcharacter; closedocuments|Create Hero]]

  Keep your Rules Reference handy ([Draw Steel Rules Reference v1.02]) during play.
  If you have time before your session, you may also go through the Starter Rules: [Delian Tomb Starter Rules v1.02]

  [[image]]
