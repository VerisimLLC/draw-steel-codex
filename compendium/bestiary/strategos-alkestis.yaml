    import:
      type: mcdm
      data: |+
        Strategos Alkestis	Level 10 Leader
        Humanoid, War Dog	EV 48
        <b>Stamina</b> 260
        <b>Speed</b> 5	<b>Size</b> 1M /<b> Stability</b> 2
        <b>Free Strike</b> 10
        Might +4	Agility +4	Reason +5	Intuition +5	Presence +5
        <b>Houndgun and Houndblade</b> (Action) %E2%97%86 2d10 + 5%E2%97%86 Signature
        <b>Keywords</b> Attack, Melee, Ranged, Weapon
        <b>Distance</b> Melee 1 or Ranged 10<b>	Target</b> Two creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	15 damage; M<4 bleeding (save ends)
        %E2%98%85	<b>12-16</b>	21 damage; M<5 bleeding (save ends)
        %E2%9C%B8	<b>17</b>	25 damage; M<6 bleeding (save ends)
        <b>Effect</b> Each target loses 1d3 Recoveries.
        <b>2 Malice</b> Each ally adjacent to a bleeding enemy makes a free strike.

        <b>Focus Fire</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 15	<b>Target</b> One creature or object
        <b>Effect</b> Until the start of Alkestis' next turn, the target can't reduce incoming damage dealt to them.

        <b>Artillery Enfilade</b> (Triggered Action) %E2%97%86 2d10 + 5 %E2%97%86 2 Malice
        <b>Keywords</b> Area, Ranged, Weapon
        <b>Distance</b> 7 x 3 line within 10<b>	Target</b> All creatures and objects
        <b>Trigger </b>An ally dies within 10 of Alkestis.
        %E2%9C%A6	<b>%E2%89%A411</b>	8 damage; A<4 slowed (save ends)
        %E2%98%85	<b>12-16</b>	13 damage; A<5 slowed (save ends)
        %E2%9C%B8	<b>17</b>	16 damage; A<6 slowed (save ends)
        <b>Effect</b> The affected area becomes difficult terrain until the start of the next round.

        <b>End Effect</b>
        At the end of her turn, Alkestis can take 20 damage to end one save ends effect affecting her. This damage can't be reduced in any way.

        <b>Tactical Brilliance</b>
        At the start of Alkestis' turn, the Director gains 2 malice. The Director also gains 1 malice whenever a war dog gets a tier-3 result on a power roll.

        <b>Fog of War</b> (Villain Action 1)
        <b>Keywords</b> -
        <b>Distance</b> Special<b>	Target</b> All allies
        <b>Effect</b> Each target gains a double edge on their next power roll, disappears, and reappears anywhere on the encounter map further than 3 squares away from all enemies.

        <b>Send in the Second Wave </b>(Villain Action 2)
        <b>Keywords</b> --
        <b>Distance</b> Ranged 15<b>	Target</b> Special
        <b>Effect</b> For each war dog that has died this combat, Alkestis summons a 3rd Echelon <b>War Dog Shriketrooper</b> into an unoccupied square within distance.

        <b>The Silver Wolf's Final Stratagem</b> (Villain Action 3)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 5 burst<b>	Target</b> Special
        <b>Effect</b> Each enemy within distance becomes <b>I<4</b> dazed, <b>M<4</b> restrained, and <b>A<4</b> cannot use triggered actions until the start of the next round. Until the end of the encounter, Alkestis and each ally within distance has damage immunity 3 and deals an additional 5 damage on strikes.

