        <b>Warp Perceptions</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 10	<b>Target</b> One creature
        %E2%9C%A6	%E2%89%A411	4 psychic damage
        %E2%98%85	12%E2%80%9316	5 psychic damage; P<1 weakened (save ends)
        %E2%9C%B8	17+	7 psychic damage; P<2 weakened (save ends)
        <b>Effect </b>If the target makes a strike while weakened this way, the bendrak can choose a second target within distance for the strike, then evenly divides any damage from the strike between the two targets.

        <b>Vanish</b> (Maneuver) %E2%97%86 1 Malice
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 10	<b>Target</b> Self or one ally
        <b>Effect</b> The target immediately becomes hidden, regardless of whether they have cover or concealment.

        <b>Lethe</b>
        While winded, the bendrak has an edge on strikes, and strikes have an edge against them.

        <b>Soulsight</b>
        Each creature within 2 of the bendrak can't be hidden from them.

