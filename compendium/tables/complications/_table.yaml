  name: Hawk Rider
  ctime: 1755515260324
  description: "You travel with a giant hawk who you stole from the Hawklords (see Vasloria in Chapter 1: The Basics). You might once have been a Hawklord yourself, or perhaps you escaped their captivity. Having a giant hawk companion comes with its share of inconveniences and dangers, but those are a small price to pay for the freedom of the open sky."
  id: 514cfcd6-1ea1-493c-85b5-afdd5d2e6fe5
  benefit: "As long as you are not in a building or other structure, you can spend 1 uninterrupted minute to summon your giant hawk (see the Humans entry in Draw Steel: Monsters), which acts as your mount. You can dismiss the hawk at any time (no action required). The hawk won’t go inside buildings, dungeons, or other structures, and it won’t accept anyone but you as a rider. If the hawk takes damage or dies, you can restore them to full Stamina as a respite activity."
65905eb7-75b0-41e6-8cb8-59d7b30774b4:
  __typeName: CharacterComplication
  drawback: Whenever you spend 1 or more destiny points, you take 1d10 psychic damage that can’t be reduced in any way, and the cult that seeks you becomes aware of your location.
  mtime: 1755603685879
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Chosen One
  ctime: 1755513150620
  description: Perhaps the stars marked you out at birth, or maybe your name appears in an ancient prophecy. In any case, a sinister cult has decided that you’re important to their plans—though you don’t particularly like the fate those plans have in store for you
  id: 65905eb7-75b0-41e6-8cb8-59d7b30774b4
  benefit: You have 3 destiny points. Whenever you spend your Heroic Resource for your class, you can spend 1 or more destiny points instead. Each time you earn a Victory, you regain 1 destiny point.
3940c7c5-c1b3-4eff-977f-9fde1668879f:
