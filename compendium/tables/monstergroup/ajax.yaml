  name: Nexus Jewel
  range: 1
  description: |-
    Until the end of the round, Ajax chooses one of the following environments he has previously visited and overlays that environment
    on top of the encounter map, temporarily merging multiple realities.

    Incredibly High Above the Ground: The winds whip and bluster.
    Any creature who can’t fly takes a -3 penalty to stability, and forced movement effects gain a +3 bonus to their distance against such creatures.

    Swamp: The ground is difficult terrain for enemies. Any creature who starts and ends their turn in the same space is restrained (save ends).

    Volcanic Canyon: The air is stiflingly hot. Each enemy takes 5 fire damage for each square they enter.
