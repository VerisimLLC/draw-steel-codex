d6087000-e75a-4a20-94fa-733729944dea:
  __typeName: CharacterComplication
  drawback: The faction that invaded your homeland wants you captured or dead. Any of their agents or sympathizers attempt to harm you if they recognize you, as the Director determines.
  mtime: 1755604009799
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Refugee
  ctime: 1755516644058
  description: A hostile army—perhaps the forces of Ajax, the Iron Saint—conquered your homeland. Your family escaped, but you can’t return home until your oppressors are defeated once and for all.
  id: d6087000-e75a-4a20-94fa-733729944dea
  benefit: When your family fled your homeland, they left their most valuable asset behind. Work with the Director to determine whether this asset is a trinket or leveled treasure, several points of Wealth, the project source to create a treasure, or the like. This asset is in the hands of the invaders but can be won back as the Director determines.
0970c4eb-e50e-40fa-a619-70a663c8e046:
  __typeName: CharacterComplication
  drawback: |-
    Visions of your dead sibling haunt you at night. Whenever you take a respite, make an Intuition test that can’t make use of any
    skill. On a tier 1 or tier 2 outcome, you regain 1 fewer Recoveries than usual when you finish the respite.
  mtime: 1755604116280
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Sibling’s Shield
  ctime: 1755517177076
  description: You were tasked with delivering a ceremonial shield to your older sibling, a celebrated warrior, for their years of service. When you arrived at their homestead, you found them dead on their doorstep with their own sword lodged in their back. To find out who did this to them—and why—you decided to step into their shoes. It will take a while to match up to your sibling’s legacy, though.
  id: 0970c4eb-e50e-40fa-a619-70a663c8e046
  benefit: While you wear your sibling’s shield on your back, you can’t be flanked.
