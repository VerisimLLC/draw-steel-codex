ctime: 1759768339205
textStorage:
  __typeName: TextStorage
  sections:
    WU: |2

    dE: |+
      > * Each mirror has 5 Stamina and is immune to poison and psychic damage.

    Xz: |2

    Yz: |+
      When you are ready, [[/rollinitiative -22 5 0 26 |Draw Steel!]]

    x: "[[//awardvp 1|Award Victories]]"
    v: |+
      [End Combat] When the heroes have defeated the glass spiders, either by defeating them or breaking the mirrors before they appear, they gain 1 Victory each.

    t: |+
      # Ending the Encounter

    r: |+
      The spiders move to target creatures attempting to escape up the stairs or harm the mirrors in the room first, using Web to restrain their foes. When they have plenty of Malice to spare, the spiders use Trample or Burst of Glass, attempting to harm as many heroes as possible.

    p: |+
      ## Tactics

    Wn: |
      [[encounter:indigo]] 
    k: |+
      |{The hero learns all the bullet points from Globes, Spiders, and Mirrors, and all their power rolls against the spiders and mirrors have an edge.}

    eQ: |+
      Once an object is targetable, your players will see them as target options for their abilities that can target objects. You may want to disable the mirrors from being targetable until the players have discovered that targeting them is an option.

    i: |
      |{#The hero learns nothing from this test.}
    j: |
      |{#The hero learns the first two bullet points from Globes, Spiders, and Mirrors.} 
    g: |2+
       Observing the interaction between the globes, spiders, and mirrors can provide information on how they work. If the players don't figure it out on their own, a hero can make a moderate Reason test to try and gain this knowledge:


    h: |
      |Learning the Connection: Reason Test
    Wb: |
      [[encounter:green]] 
    f: |+
      ## Learning the Connection

    c: |+
      > * The connections between the globes, spiders, and mirrors are detailed here:

    a: |+
      The goods stored in this area contain the marks and stamps of various merchants and craftspeople, including several crates of leather, which are meant to be delivered to [Harim] (See Broadhurst, [B12. Cobbler])


    b: |+
      ## Globes, Spiders, and Mirrors

    eH: |+
      ## Object Targeting

    eo: |+
      :<>[[/activateobjects globe.targetable activate|Make Globes Targetable]][[/activateobjects globe.targetable deactivate|Make Globes NOT Targetable]]

    WX: |
      [[/activateobjects yellowglobe deactivate|Hide Yellow Globe]] [[/activateobjects yellowglobe activate|Show Yellow Globe]]
    WT: |
      ???query numheroes < 5
    dD: |+
      > * If a mirror is smashed when its companion globe is still in globe form, that globe cannot turn into a spider.

    Z: |+
      ## Supplies

    Ww: |
      [[/activateobjects violetglobe deactivate|Hide Violet Globe]] [[/activateobjects violetglobe activate|Show Violet Globe]]
    V: |+
      > * For three heroes, only the red and orange glass spiders appear at the start of the encounter. Each glass spider in the encounter has 40 Stamina 

    S: |+
      ## Encounter Adjustments

    T: |+
      If this encounter has four or three heroes, make the following adjustments:

    Q: |+
      ## Glass Spider Attack

    R: |2+
       Intruders who disturb anything in the room or attempt to climb the stairs cause the red, orange, and yellow globes to turn into glass spiders who attack:

    O: |+
      **Content Warning: Spiders**

    P: |+
      *If descriptions of spiders make you or any of your players uncomfortable, you can make the glass spiders in this part of the adventure instead be glass warriors made of sharp shards. Feel free to change anything that would make the game more fun for your players and yourself.*

    M: |+
      **Secret:** The globes of light can become magic guards that battle intruders.

    Wk: |+
      [[/activateobjects blueglobe deactivate|Hide Blue Globe]] [[/activateobjects blueglobe activate|Show Blue Globe]]

    K: |
      > * “The room is littered with a variety of objects. Bricks of stone, mortar, trowels, food supplies, ale kegs, arcane components, and more. Some of the supplies are covered with tarps, while others are exposed.”
    L: |+
      > * “Seven sheets cover seven different objects hanging on the wall around the room.”

    I: |
      > * “The tower is definitely bigger on the inside, at least 90 feet in  diameter. Seven globes of light, one for each color of the rainbow, light the room in a dizzying display of colors. The door you entered seals closed, blending into the wall and leaving no means to exit.”
    WH: |
      ???query numheroes < 5
    G: |+
      ## Ground Floor

    H: |+
      When all the heroes enter the ground floor of the tower, the opening they passed through disappears, leaving a solid wall behind them and no way to leave.

    E: |
      > * **Illumination:** The walls magically emanate light that illuminates all areas of the tower.
