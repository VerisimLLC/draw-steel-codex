        %E2%98%85	<b>12%E2%80%9316</b>	3 damage; I<1 sneak is concealed from the target (save ends)
        %E2%9C%B8	<b>17</b>	4 damage; I<2 sneak is concealed from the target (save ends)
        <b>Effect</b> The sneak shifts up to their speed and hides after using this ability.

        <b>Carving Dagger</b> (Action)%E2%97%86 2d10 + 2
        <b>Keywords</b> Ranged, Strike, Weapon
        <b>Distance</b> Ranged 8<b>Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	7 damage; M<0 bleeding (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	11 damage; M<1 bleeding (save ends)
        %E2%9C%B8	<b>17</b>	14 damage; M<2 bleeding (save ends)
        <b>Effect</b> The target can't hide from the sneak or their allies while bleeding from this ability.

        <b>Throw</b> (Maneuver)
        <b>Keywords</b> Attack, Melee
        <b>Distance</b> Melee 1<b>	Target</b> 1 creature or object grabbed by the sneak
        <b>Effect</b> Vertical push 4. An ally target doesn't take damage from being force moved.

        <b>Catcher</b> (Free Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Melee 1<b>	Target</b> 1 size 1 creature or object
        <b>Trigger</b> The target is force moved into a square adjacent to the sneak.
        <b>Effect</b> The target is grabbed by the sneak.

        <b>Clever Trick</b> (Triggered Action) %E2%97%86 1 Malice
        <b>Keywords</b> -
        <b>Distance</b> Special<b>	Target</b> 1 enemy
        <b>Trigger</b> A target attacks the sneak.
        <b>Effect</b> The sneak chooses an enemy within distance of the attack. The attack targets that enemy instead.



