__typeName: Title
effect: |-
  Choose one of the following benefits:

  Always in Twos: A creature who benefits from your Aid Attack maneuver also gains a surge.

  Nature Guide: When you make a Reason test to identify an animal or plant and get a tier 1 or 2 result, you can reroll the rest and must use the new result.

  One with the Wilderness: While you are outdoors and not in a settlement, you can’t be surprised.
prerequisite: You were invited to join the Coursers and accepted.
