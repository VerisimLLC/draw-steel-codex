  The woman who approaches the heroes is [Ashleigh], Broadhurst’s blacksmith. She asks the heroes for help rescuing her daughter [Violet]. Should the heroes need some persuading to help a mother in need, [Ashleigh] promises to craft them any weapons or armor they find the plans and materials for. When the heroes agree, [Ashleigh] begins leading them out of the village and into the Silver Wood, and provides the following information along the way:


  > * “Violet and I were out looking for merchants bringing iron to Broadhurst. The delivery was late, and we thought they might’ve gotten lost. Happens.”
  > * “We were passing by an old tomb in the Silver Wood. Some old place from long before my mother’s mother’s time. We never go in. People say it’s haunted! As we passed by, a band of goblins came out of nowhere and grabbed my girl!”
  > * “I fought tooth and nail, but I saw them drag her into the tomb. But I can’t swing swords. I just make ’em. The goblins gave me this gash on my head and left me for dead.”
  > * “When the coast was clear I ran to find help. We’ve got to get my Violet back!”
  > * “Those folks who turned me down—they’re part of the Gilded Hand. Those mercenaries came here from across Dalrath after stopping some cult. But no one can afford their help, so I don’t know why they’re here.”

  The heroes can take the time to ask [Ashleigh] about [Violet]. If asked, she tells them [Violet] is 18 years old and has been her apprentice and assistant from the time she was able to hold a hammer. If asked about [Violet]’s personality, [Ashleigh] says that her daughter is kind but has a short temper.

  Once the players agree to help, and set out, you can proceed to the [Goblin Guardians] map.

  You can show your players a scene for the transition and roleplay with [Ashleigh] segment, to hide the map transition and give them something to look at while you finish setting up the [Goblin Guardians] map. If 'Show Below UI' is checked, the players will still see their character panel, action log, and chat.:<>[[scene]]
