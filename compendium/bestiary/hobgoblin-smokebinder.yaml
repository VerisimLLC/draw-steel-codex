        <b>Effect</b> If the smokebinder had an edge on the power roll, the target cannot communicate with anyone until the end of their next turn.

        <b>Smoke Bomb</b> (Maneuver) %E2%97%86 3 Malice
        <b>Keywords</b> Area, Magic, Melee
        <b>Distance</b> 3 Burst	<b>Target</b> All enemies in the burst
        <b>Effect</b> Each target makes a <b>Might test.</b>
        %E2%9C%B8	<b>%E2%89%A411</b>	11 damage; target has a double bane on their next power roll
        %E2%98%85	<b>12%E2%80%9316</b>	9 damage; target has a bane on their next power roll
        %E2%9C%A6	<b>17</b>	5 damage

        <b>Essence of Smoke</b>
        The smokebinder can move through other creatures and objects at normal speed. The smokebinder automatically hides at the end of their turn if they didn't take any damage since their last turn.

        <b>Infernal Ichor</b>
        If the smokebinder's Stamina drops to 0, they spray burning blood. Each creature within 1 of the smokebinder takes 3 fire damage.

