  [[encounter]]

  When you are ready, [Draw Steel!]

  ## Tactics

  If combat breaks out in this room, Thurston and the raiders start fighting, with Thurston taking on the hero with the highest Stamina while the raiders spread out to fight as many heroes as possible.

  ## Ending the Encounter

  [End Combat] When Thurston is reduced to 0 Stamina, the raiders flee unless other [reinforcements have arrived. Otherwise, all bandits fight to the death. If [the heroes win the battle, they earn 1 Victory each, or 2 Victories each if they also defeat the reinforcements.

  [[/awardvp 1|Award Victories]]

