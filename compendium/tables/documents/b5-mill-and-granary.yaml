content: "# B5. Mill and Granary\n\n> * “A water mill with a large, slow-turning wheel sits at the edge of the Dunn River next to a squat wooden building that is raised several feet off the ground by stone pillars.”\n> * “A man and woman in simple clothing walk between the buildings and greet you with a smile as you approach, ‘Hey, strangers!’”\n\n\n[Robin and Sarah], the millers, greet everyone with kindness. Both are in constant motion, ensuring that grain from the farms is milled and taken to the granary. Sarah does most of the talking for the duo, though her husband chimes in whenever she forgets a detail.\n\n\n## Stolen Grain\n\nIf the heroes ask about any trouble in the area or about the stolen grain, Sarah shares the following information:\n\n> * “A few weeks back, it seemed like grain kept disappearing from the granary. We keep it locked, so at first we thought there might be some other explanation.”\n> * “Robin was working late one night and came out to find someone crawling out from under the granary with a sack!”\n> * “They ran off toward the edge of the Silver Wood, near the woodcutter. But the thief was fast and Robin didn’t get a good look in the dark.”\n> * “Turns out the burglar had cut a door in the floor and was sneaking in that way!”\n\n\n[Robin and Sarah] are happy to let the heroes look around. There’s nothing suspicious in the mill.\n\n## Granary Clues\n\nIf the heroes search the granary for clues, the most obvious clue is the door that’s been made in the floor. A hero who examines the floor can make an easy Reason test.\n\n|Find the Door Clue: Reason Test\n|{#The door was cut into the floor by someone proficient with a small saw. While examining the door, it breaks, and Robin asks the heroes to please leave the granary immediately before disturbing anything else.}\n|{#The door was cut into the floor by someone proficient with a small saw.}\n|{#The door was cut into the floor by someone proficient with a small saw. The hero knows that the only place in town likely to have such an item is the woodcutter or carpenter.}\n\n\nIf a hero searches through the grain in the granary for clues, they can make a moderate Intuition test.\n\n|Find a Clue: Intuition Test\n|{#The hero finds nothing.}\n|{#The hero finds an open penknife that fell to the ground with a carved “P” on the handle. Unfortunately, they find it with their body and take 1d3 damage.}\n|{#The hero finds an open penknife that fell to the ground with a carved “P” on the handle.}\n\n\n \n"
