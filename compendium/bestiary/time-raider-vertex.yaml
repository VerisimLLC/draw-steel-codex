        %E2%9C%B8	17+	9 damage; 4 psychic damage
        <b>Effect</b> Power rolls made against the target have an edge until the start of the vertex's next turn.

        <b>Split Space</b> (Action)%E2%97%86 5 Malice
        <b>Keywords</b> Area, Psionic, Ranged
        <b>Distance</b> 2 cube within 10	<b>Target</b> Special
        <b>Effect</b> A portal fills the area, leading to a location the vertex has experienced (in person or otherwise) on any plane of existence. Each creature who touches the portal is instantly teleported to the nearest unoccupied square at the chosen location. The portal lasts until the vertex dies, uses this ability again, dismisses the portal (no action required), or is transported by the portal.

        <b>Invigorated March</b> (Maneuver)
        <b>Keywords</b> Area, Psionic
        <b>Distance</b> 4 burst	<b>Target</b> All allies in the burst
        <b>Effect</b> Each target shifts up to half their speed.

        <b>Foresight </b>
        The vertex doesn't have a bane on strikes against concealed creatures.



