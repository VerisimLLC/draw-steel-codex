        <b>Noxious Bite</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	7 poison damage
        %E2%98%85	<b>12%E2%80%9316</b>	10 poison damage
        %E2%9C%B8	<b>17</b>	13 poison damage
        <b>Effect</b> This ability has an edge against targets that the basilisk has previously dealt poison damage to.

        <b>Petrifying Eye Beams </b>(Maneuver) %E2%97%86 2d10 + 2
        <b>Keywords</b> Area, Magic, Ranged
        <b>Distance</b> 5 x 2 line within 1<b>Target</b> Special
        %E2%9C%A6	<b>%E2%89%A411</b>	M<0 Restrained (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	M<1 Restrained (save ends)
        %E2%9C%B8	<b>17</b>	Slowed (save ends) or M<2 Restrained (save ends)
        <b>Effect</b> The basilisk targets the first unobstructed creature in each column of the area. An already slowed target has -1 to resisting the potency. Each target magically begins to turn to stone. A creature restrained by this ability or a creature adjacent to them can use an action to cut the encroaching stone from their body, taking 8 damage which can't be reduced in any way and ending the effect.
        A target that ends two consecutive turns restrained by this ability is petrified until they are cured (see Alchemical Ingredients).

        <b>Poison Fumes</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 5 Malice
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 3 cube within 1<b>Target</b> All creatures in the cube
        %E2%9C%A6	<b>%E2%89%A411</b>	4 poison damage; M<0 weakened (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	6 poison damage; M<1 weakened and slowed (save ends)
        %E2%9C%B8	<b>17</b>	9 poison damage; M<2 weakened and slowed (save ends)

        <b>Lash Out</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Trigger</b> The basilisk takes melee damage.
        <b>Distance</b> 1 burst<b>Target</b> All enemies in the burst
        <b>Effect</b> Each target takes 5 damage and is <b>A<2</b> bleeding (save ends).

        <b>Calcifying Presence</b>
        The area within 3 squares of the basilisk is considered difficult terrain for enemies.



