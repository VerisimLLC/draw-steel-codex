description: D13. A Moment's Reprieve
content: |
  # D13. A Moment’s Reprieve

  > * “This corridor diverges in two directions: there is a single door to the south, and a grand set of double doors to the west.”
  > * “The double doors have a pair of armored knights carved into them, and a big heavy lock in the middle.”

  {Secret: The double doors are locked and trapped.}

  ## Locked Doors
  The double doors are magic and can’t be damaged or destroyed. They can be unlocked with the silver key from the control panel in [D12. Kill Room]. The trap does not trigger if opened in this way. Alternatively, the lock can be picked with a moderate Agility test.

  |Pick the Lock: Agility Test
  |{#The hero fails to unlock the door and triggers the trap.}
  |{#The hero unlocks the door, but triggers the trap in the process.}
  |{#The hero unlocks the door without triggering the trap.}


  If the trap is triggered, the helmets of the two knights expel a fire that fills this area. Each creature caught in the blast must make an Agility test.
  |Avoid the Fire Trap: Agility Test
  |{#The creature takes 15 fire damage.}
  |{#The creature takes 12 fire damage.} 
  |{#The creature takes 9 fire damage.}

  If the heroes fail to unlock the door, it jams, and the only way to open it is to double back and search for the key.


  # After the Hand
  If the [Gilded Hand] has already been here, the door is unlocked.


  # What’s Next?
  Beyond the double doors lies the chamber that holds the [Cup of Iulius]. This chamber is quite different depending on whether the heroes arrive before or after the Gilded Hand. Use [D14.1 Cup Room Untouched] if the [Gilded Hand] hasn’t claimed the cup already. Use [D14.2 Cup Room Raided] if the mercenaries have the cup.
