  updateid: cca3f352-ef0d-4b3f-b48d-8a9251b99377
  mtime: 1768581433648
  content: "# Encounter D14.1	\nThe heroes face the undead guardians of the [Cup of Iulius].\n\n[[encounter: Encounter D14A]]\n\n**D14.1 Groups**\n|Group	|Creatures|\n|1	|Dame Cornelia|\n|2	|One zombie (captain), Four decrepit skeletons (minion squad)|\n|3	|One zombie (captain), Four decrepit skeletons (minion squad)|\n|4	|One zombie (captain), Four decrepit skeletons (minion squad)|\n|5	|Two soulwights|\n|6	|Two soulwights|\n\n \n**Encounter Adjustments**\nIf this encounter has more or fewer than five heroes, make the following adjustments:\n* For six heroes, add two soulwights.\n* For four heroes, remove two soulwights.\n* For three heroes, remove all four soulwights.\n\n\n## Braziers\n\nEach time a creature touches a heavy iron brazier or starts their turn touching it, they take 2 fire damage.\n\n\n## Stairs\n\nIf a creature is force moved down the stairs, they end their movement prone.\n\n\n## Tactics\n\nDame Cornelia, the soulwights, and the zombies aim to hold the line at the top of the stairs, using forced movement and the Knockback\nmaneuver to push heroes down the stairs and give the skeletons plenty of space to make ranged strikes.\n\n\n## Ending the Encounter\n\nWhen Dame Cornelia is destroyed or if the heroes grab the [Cup of Iulius] and leave the chamber, the remaining undead in this room crumble to dust and the heroes earn 1 Victory each.\n[[/awardvp 1|Award Heroes 1 Victory]]\n\n\n"
  description: Encounter D14.1
