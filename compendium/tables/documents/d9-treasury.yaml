description: D9. Treasury
content: |
  # D9. Treasury


  > * “A large mural depicting Delian knights locked in combat with giants and ogres dominates the northernmost wall of this room.”
  > * “The west and east walls are lined with trophies from some of their more extraordinary escapades, including a thorn dragon head, a fire giant finger, and a basilisk tongue.”
  > * “Among the trophies, a shiny double-sided axe is mounted on the wall, with a small plaque on it that reads ‘Heelcutter.’”
  > * “Below the mural, there is a large stone plinth with a jeweled golden chalice atop it.”

  {Secret: This room was built to dissuade tomb raiders. It’s intentionally meant to look like the final room of the tomb, with various treasures placed here to slake their greed. However, the mural conceals a secret door that only opens if the Delian Knight Commander Ring is placed in the chalice.} 


  ## Magic Ward

  The walls, floor, and ceiling of this room can’t be damaged or destroyed, thanks to a magic ward.


  ## Loot

  The axe mounted on the wall is [Heelcutter], a giantslaying axe (see Treasure in Handouts). There are also two vials of fire giant blood, and a recipe in Caelian detailing how to make a [Giant's-Blood Flame] (see Treasure in Handouts).


  ## The End?

  A hero who attempts to remove the chalice finds it is affixed to the plinth. If a hero has researched the Delian Tomb or has the History or Magic skill, they can tell that this chalice is not the [Cup of Iulius].
  Inspecting the cup reveals there is small, circular divot inside, large enough to hold a piece of jewelry like a ring. If the [Delian Knight Commander's Ring] is placed in the chalice, the mural wall lifts to reveal the stairs down to the third level of the tomb (see [Tomb Third Level]). The ring can be retrieved once the wall ascends.


  ## Second Level Cleared

  If the heroes clear the way to the treasury and then head back to Broadhurst, the [Gilded Hand] (see [Another Meeting With the Hand] and [B1. Feather Bed Inn]) speaks to them about it, provided the mercenaries are still in town.
