        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect </b>The zephyr moves up to their speed through the air<b>.</b> They must end this movement on solid ground or immediately fall prone.

        <b>Like the Wind</b>
        All of the zephyr's movement is considered shifting.

        <b>Otherworldly Grace</b>
        At the start of their turn, the zephyr can turn the duration of one save ends effect they suffer from into EoT.



