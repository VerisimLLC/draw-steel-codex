        Field of Growth	Level 5 Elite Controller
        Elemental	EV 28
        <b>Stamina</b> 120	<b>Immunity</b> poison 5
        <b>Speed</b> 8 (climb)	<b>Size</b> 3 /<b> Stability</b> 2
        <b>	Free Strike</b> 6
