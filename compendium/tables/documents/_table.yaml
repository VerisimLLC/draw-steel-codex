    sections:
      Y: |+
        A hero who wants to know more about the creature [Mikael] is describing can make an easy Reason test.


      W: |
        If the heroes ask to see [Mikael]’s wound, he tells them that it already healed and quite quickly.
      U: |+
        > * “I think you need to do something about that thing before it tears a villager’s head off.”


      S: |
        > * “While I was cutting down a tree, I heard a howl. A huge wolf was upon me! I ran screaming. That thing came after me, even bit my leg twice, but I eventually lost it.”
      t: |+
        If a hero has enough Renown to gain a follower and doesn’t have one after ending [Mikael]’s curse, they can recruit him as an artisan. If he is recruited, give the players the Mikael Follower.

      q: |
        ## Follower: Mikael
      O: |
        > * “I went out into the forest to collect some wood. Normally, I get it from [Vaughn], but he was too scared to go out there because of bandits to the north. So instead, I followed the Dunn River south to avoid any unsavory types.”
      M: |+
        If the heroes ask [Mikael] about the creature who attacked him, he shares his tale:


      n: |+
        If the heroes wish to hunt the werewolf, they can follow the Dunn River south into the Silver Wood until they find the [Wolf Den].

      K: |+
        ## Mysterious Attack

      E: |
        > * “Cheerful whistling and the rhythmic sound of a saw blade cutting back and forth through wood hits your ears as you come upon a small house.”
      I: "[Mikael] the carpenter is friendly when he sees the heroes, putting down his saw, introducing himself, and thanking them for their deeds done to help the community.\n \n\n"
      C: |+
        # B10. Carpenter


      G: |+
        > * “In front of the house, a smiling man works a blade across a piece of timber balanced between two sawhorses.”


      h: |+
        |{#As Tier 2, and the hero knows that creatures with a strong sense of self (who have a high Presence score) have a better chance of resisting a werewolf’s curse from their bite.}


      e: |
        |{#As Tier 1, except the hero realizes that Mikael is cursed with the same affliction through the werewolf’s bite.}
      w: |
        [[follower:Mikael]]
      c: |
        |{#The hero knows that Mikael speaks of a werewolf—a human cursed to turn into a wolf creature whenever the moon is full or when provoked with violence. (What they don’t know is that Mikael has been cursed with the same affliction.)}
      Q: |
        > * “I had to go a decent distance to find birches mature enough for making strong buildings and furniture. It took me until nightfall, but the moon was full and providing plenty of light when I came upon a nice copse outside a cave on the riverbank.”
      a: |
        |Recall Wolf Lore: Reason Test
      k: |
        If the heroes wish to cure [Mikael] of his curse, they can undertake the Find a Cure downtime project. But first they need the remains of a werewolf. [Mikael] reacts with shock if told he’s cursed to become a werewolf and asks the heroes to help him find a way to end the curse.
