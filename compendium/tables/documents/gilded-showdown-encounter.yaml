content: "# Gilded Showdown\n\nThe heroes are attacked by members of the [Gilded Hand]. \nThis encounter takes place on the [Gilded Showdown Map].\n\n[[/spawn Mara 5 8|Spawn Mara]] [[/spawn Gorek 1 6 |Spawn Gorek]] [[/spawn \"Boddorf Buckfeather\" 3 6|Spawn Boddorf Buckfeather]]\n\n**Encounter Adjustments**\nIf this encounter has four or three heroes, make the following adjustments:\n\n* For four heroes, remove Boddorff Buckfeather from the start of the encounter.\n* For three heroes, remove Boddorff Buckfeather and reduce Gorek's Stamina to 80 and Maraʼs Stamina to 40.\n\n\n## Targon Appears\nIf the heroes recruited [Illwyth] as a retainer, [Targon] appears at the start of the second round of combat on any edge of the map or rooftop that you choose. He keeps his distance, using Dual Targeting Shot and paying the extra Malice cost to give his allies additional free strikes.\n\n\n[[/spawn Targon 10 5|Spawn Targon]]\n\n\n## Well\n\nThe well at the center of the town is 4 squares deep and has less than 1 square of water in it.\n\n\n## Tactics\n\nAt the start of the encounter, each member of the Gilded Hand picks a rival for their Rivalry trait who has a class that closely matches their own. For example, Boddorff Buckfeather would pick a conduit, but if none is available, he might pick a censor or troubadour.\n\nGorek wades into the fray against his rival, with Boddorff close behind to provide support and maximize his Stalwart Guardian trait. Mara uses The Earth Devours to target as many creatures as she can. If she can't target at least two heroes with the ability, she uses The Writhing Green instead. She also uses Jaws of the Void to stay out of melee combat.\n\nWhen the rivals have plenty of Malice to spend, they use Coordinated Takedown.\n\n\n## Ending the Encounter\n\nThe encounter ends when only one mercenary has Stamina above 0. That mercenary immediately tries to flee. If the heroes give chase, that mercenary surrenders. The heroes earn 1 Victory each for winning the day.\n\n[[/awardvp 1|Award Heroes 1 Victory]]\n\nReturn to [Gilded Showdown] for more aftermath information. "
description: Gilded Showdown Encounter
