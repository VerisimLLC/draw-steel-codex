  textStorage:
    __typeName: TextStorage
    sections:
      ar: |+
        [[encounter:A2 1 Respite]]

      ax: |+
        [[encounter:A2 2 Respites]]



      x: |+
        [[//awardvp 2|Award heroes 2 Victories]]





      v: |+
        The goblins fight until only two goblins remain, who flee and leave the encounter and castle. The memorial ivies are aggressive until they are destroyed. The heroes earn 2 Victories each.

      t: |+
        ## Ending the Encounter

      r: |+
        [[/spawn Targon -8 4|Spawn Targon]]


      IZ: |
        [[/activateobjects a2_a4_teleporter activate|Enable Teleporter]] [[/activateobjects a2_a4_teleporter deactivate|Disable Teleporter]]
        }
      p: |
        He stays behind the goblins and uses ranged abilities. When he is winded, he attempts to flee.
      m: |+
        ## Round 2: Targon Appears

      n: |
        If [Targon] of the [Gilded Hand] brought [Queen Bargnot] the [item:Cup of Iulius], he appears in the barracks at the start of the second round of combat.
      G: |
        > * “Ivy crawls up the edges of the room, with some patches creeping and shifting up the walls.”
      ah: |2

      R: |
        |1|One [bugbear commander] (Cravard)|
      j: |
        Cravard commands assassins to sneak up behind the backline heroes, and barks at the heroes to run or surrender.
      al: |+
        [[encounter:A2 0 Respites]]

      h: |
        The goblins duck and weave between the pillars and climb every vertical surface they can grasp to surround and suppress the heroes.
      aj: |
        **0 Respites**
      f: |+
        ## Tactics

      c: |
        The cursespitters are standing on pillars that are ready to topple over. A goblin can use their maneuver while adjacent to the base of the pillar to activate its triggered action, whether or not the cursespitter has left their position on top.
      d: |+
        The ivy in this room reaches the ceiling and is sturdy enough to climb without a test. If the memorial ivy remains motionless, it's indistinguishable from regular ivy. While a creature is climbing a memorial ivy, the memorial ivy is considered to be climbing the creature as well.


      a: |+
        * For three heroes, remove two goblin assassins and two goblin cursespitters.

      b: |+
        ## Broken Pillars

      aL: |+
        [[setting:Number of Heroes]]

      af: |
        ### If Queen Bargnot Has the Cup of Iulius
      au: |
        **2 Respites**
      l: |+
        The goblins' main goal is to wear down the heroes before they reach Queen Bargnot, but any goblins who have been transformed by the Cup of Iulius also want to show off their newfound power. They feel inspired and encouraged to finally stand toe-to-toe with the heroes.


      OZ: |+
        [[/activateobjects a2_start.AreaTemplate activate|Show Hero Start Area]][[/activateobjects a2_start.AreaTemplate deactivate|Hide Hero Start Area]]


      aY: |+
        [[encounter:A2 Heroes's Cup]]

      Y: |
        * For six heroes, add one group of one goblin assassin and one goblin cursespitter.
      Z: |
        * For four heroes, remove one goblin assassin and one goblin cursespitter.
      W: |
        **Encounter Adjustments**
      X: |
        If this encounter has more or fewer than five heroes, make the following adjustments:
      U: |
        |4|One [goblin assassin], one [goblin cursespitter]|
      V: |+
        |5|Four [memorial ivies](memorial ivy) (minion squad), Four [memorial ivies](memorial ivy (minion squad)|

      S: |
        |2|One [goblin assassin], one [goblin cursespitter]|
      T: |
        |3|One [goblin assassin], one [goblin cursespitter]|
      Q: |
        |**Group**|**Creatures**|
      aF: |+
        This, and all following encounters, change depending on if the Heroes or [Queen Bargnot] has the [item:Cup of Iulius]. See [Goblin Replacements] for more information.

      O: |+
        The heroes battle Jagged Edge soldiers in the great hall of Castle Andreas.

      P: |
        **A2 Groups**
      M: |+
        Any goblins who retreated from [A1. Courtyard Barricade] are here as well, but are reduced to 1 Stamina.


      N: |+
        # Encounter A2

      K: |
        Three goblin assassins and a bugbear commander named Cravard are ready to greet intruders with violence. Three goblin cursespitters each stand at the top of a broken pillar. Amid the ivy along the wall, eight
      L: |+
        memorial ivies writhe and hiss.

      I: |
        {***Secret:** Removing the planks reveals an entrance into area [A4. Overgrown Library] if the heroes can climb up into it.*
      J: |+
        ## Goblins

      aR: |+
        ### The Heroes Have The Cup of Iulius

      H: |+
        > * “A hole in the ceiling to the right is covered by planks of wood.”

      E: |
        > * “Bedrolls line the back wall underneath a huge fresco depicting human warriors in combat with demons.”
      F: |
        > * “Stone steps along the left wall lead to the floor above.”
      C: |
        > * “Goblins sup and spar with each other in the remains of the keep’s great hall.”
      D: |
        > * “Weathered stone pillars hold up the roof. Several pillars no longer touch the ceiling.”
      ao: |
        **1 Respite**
      B: |+
        # A2. Great Hall Barracks

