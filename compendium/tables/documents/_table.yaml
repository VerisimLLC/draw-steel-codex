  mtime: 1761486783926
  content: |+
    # Arixx Nest

    An arixx, a burrowing, acid-spewing insect the size of a horse, has attacked [Orson] the charcoal burner and stolen his amulet (see [B9. Charcoal Burner]). The creature has grown braver and just attacked the [Ellery] farm on edge of town, killing several pigs. The quest begins when the heroes arrive at the farm.


    ## Arrival

    When the heroes arrive at the site of the most recent arixx attack, they find a scene of violent carnage in a goat pasture.


    > * “An exhausted woman pokes at a half-eaten pig carcass with a stick. She drops the stick to toss a severed pig head into a roaring bonfire.”
    > * “The torn-up pasture contains many holes and furrows, and the place is littered with partially eaten pigs.”
    > * “Many of the pig remains have wounds with missing skin and are dissolved down to the bone.”


    ## Ellery

    [Ellery], the farmer who works these fields, is salvaging what pieces of pork she can and burning the rest. The recent attack on her property left her terrified, and she’s happy to tell the heroes what occurred if they ask:


    > * “My gods, it was like nothing I’ve ever seen. I’ve been telling that reeve I heard rumbling and she doesn’t do anything.” ([Reeve Rosamund])
    > * “Anyway, it was in the night, the rumble got loud and the pigs started squealing. I looked out the door and saw the biggest bug I’ve ever seen!”
    > * “Huge jaws. Spitting something that burned. After that thing filled its belly, it dug into the ground, leaving that tunnel.”
    > * “I’m worried it might come back. Please say you’re going down there after it?”


    [Ellery] begs the heroes to go after the monster that killed her pigs, promising them free bacon for as long as she lives if they kill it.


    Proceed to the [Following the Arixx's Trail] montage test.

