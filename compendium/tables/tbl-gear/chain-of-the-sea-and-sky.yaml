  guid: 7f3b17d8-423e-40f8-b176-aeb11505a831
  description: While you wear this armor, you gain a +6 bonus to Stamina, you can automatically swim at full speed while moving, and you can breathe underwater for up to 1 hour. Returning to the surface to breathe air again for any length of time reset’s the armor’s water- breathing benefit.
