  name: Guilty Conscience
  ctime: 1755515146736
  description: The world is in trouble—and it’s partly your fault. Maybe you helped a villain rise to power or inadvertently released a demon from imprisonment. Now it’s your mission to repair the damage you caused.
  id: 707dd4a3-72b3-4852-b5e7-54932e6141b9
  benefit: You’re determined to stay alive so you can set things right. When your Stamina reaches the negative of your winded value, you can use a free triggered action to spend a Recovery.
3a60bf9d-db9f-46d0-bdb0-afabddba0fd4:
  __typeName: CharacterComplication
  drawback: Whenever you obtain a tier 1 outcome on a test and don’t spend a hero token to reroll, you take a bane on the next test you make.
  mtime: 1755603908306
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Lucky
  ctime: 1755515914389
  description: You’ve always had a lucky streak. When you leave things in the hands of fate, you succeed more than you fail. But luck is fickle—and when you don’t trust it, it deserts you.
  id: 3a60bf9d-db9f-46d0-bdb0-afabddba0fd4
  benefit: When you spend a hero token to succeed on a saving throw or to reroll a test, roll a d10. On a 6 or higher, you gain the benefit but don’t spend the hero token.
514cfcd6-1ea1-493c-85b5-afdd5d2e6fe5:
  __typeName: CharacterComplication
  drawback: People aware of the origin of your mount are afraid to interact with you, since they worry the Hawklords will come after them by association. You take a bane on any test made to influence anyone who knows of the Hawklords and who has observed you with your giant hawk. Such people might also report you to the Hawklords, who come looking for you at the Director’s discretion.
  mtime: 1765961504156
  modifierInfo:
    __typeName: ClassLevel
    features:
    - __typeName: CharacterFeature
      description: "As long as you are not in a building or other structure, you can spend 1 uninterrupted minute to summon your giant hawk (see the Humans entry in Draw Steel: Monsters), which acts as your mount. Youcan dismiss the hawk at any time (no action required). The hawk won’t go inside buildings, dungeons, or other structures, and it won’t acceptanyone but you as a rider. If the hawk takes damage or dies, you can restore them to full Stamina as a respite activity."
      modifiers:
