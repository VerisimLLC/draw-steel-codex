    import:
      type: mcdm
      data: |+
        Rival Tactician	Level 10 Elite Artillery
        Humanoid, Rival	EV 48
        <b>Stamina</b> 220
        <b>Speed</b> 5	<b>Size</b> 1M /<b> Stability</b> 2
        <b>Free Strike</b> 10
        Might +5	Agility +2	Reason +4	Intuition +0	Presence +3
        <b>Forward Assault</b> (Action) %E2%97%86 2d10 + 5 %E2%97%86 Signature
        <b>Keywords</b> Ranged, Strike, Weapon
        <b>Distance</b> Ranged 10<b>	Target</b> Two creatures or objects
        %E2%9C%A6	%E2%89%A411	15 damage
        %E2%98%85	12%E2%80%9316	21 damage; A<4 prone can't stand (EoT)
        %E2%9C%B8	17	25 damage; prone and A<5 can't stand (EoT)
        <b>5 Malice</b> Two allies within distance can move up to their speed and use a signature action with a double edge.

        <b>Guardian from Afar</b> (Action) %E2%97%86 2d10 + 5 %E2%97%86 3 Malice
        <b>Keywords</b> Area, Ranged, Weapon
        <b>Distance</b> 3 cube within 10<b>	Target</b> One creature in the cube
        %E2%9C%A6	%E2%89%A411	10 damage; M<3 weakened (save ends)
        %E2%98%85	12%E2%80%9316	16 damage; M<4 weakened (save ends)
        %E2%9C%B8	17	20 damage; M<5 weakened (save ends)
        <b>Effect</b> Each ally in the cube regains 10 Stamina.

        <b>Battlefield Control </b>(Triggered Action)
        <b>Keywords</b> Ranged
        <b>Distance</b> Ranged 10<b>	Target</b> 1 enemy
        <b>Trigger</b> The target moves.
        <b>Effect</b> At any point during the movement, the tactician and one ally within distance use a signature action against the target.

        <b>Rivalry</b>
        The tactician selects one creature within line of effect at the start of an encounter. Both the tactician and the creature can add a 1d3 to all power rolls made against each other.
        Rival Talent	Level 10 Elite Hexer
        Humanoid, Rival	EV 48
        <b>Stamina</b> 220
        <b>Speed</b> 5	<b>Size</b> 1M /<b> Stability</b> 2
        <b>Free Strike</b> 10
        Might +0	Agility +0	Reason +5	Intuition +0	Presence +1
        <b>Override</b> (Action) %E2%97%86 2d10 + 5 %E2%97%86 Signature
        <b>Keywords</b> Psionic, Ranged, Strike, Telekinesis
        <b>Distance</b> Ranged 10<b>	Target</b> Two creatures or objects
        %E2%9C%A6	%E2%89%A411	15 psychic damage
        %E2%98%85	12%E2%80%9316	20 psychic damage
        %E2%9C%B8	17	24 psychic damage
        <b>4 Malice</b> Each target moves up to their speed and makes a free strike against an enemy of the talent's choice. The target can't be moved in a way that puts them in harm's way except for opportunity attacks.

        <b>Steal Time</b> (Maneuver) %E2%97%86 2d10 + 5 %E2%97%86 3 Malice
        <b>Keywords</b> Chronopathy, Psionic, Ranged
        <b>Distance</b> Ranged 10<b>	Target</b> 1 creature or object
        %E2%9C%A6	%E2%89%A411	R<3 slowed (save ends)
        %E2%98%85	12%E2%80%9316	R<4 restrained (save ends)
        %E2%9C%B8	17	R<5 restrained (save ends)
        <b>Effect</b> One ally within distance can use an additional action on their turn until the start of the talent's next turn.

        <b>Psionic Retribution </b>(Triggered Action)%E2%97%86 2 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Trigger</b> A creature damages the talent.
        <b>Effect</b> The talent halves the damage and shifts 2. The triggering creature takes half the damage they dealt in psychic damage and is pushed 5.

        <b>Rivalry</b>
        The talent selects one creature within line of effect at the start of an encounter. Both the talent and the creature can add a 1d3 to all power rolls made against each other.



