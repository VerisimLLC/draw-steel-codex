        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 5<b>	Target</b> 2 allies
        <b>Effect</b> Each target is teleported to an unoccupied square adjacent to the palinode. Then, the palinode and each target gain 5 temporary Stamina.

        <b>Otherworldly Grace</b>
        At the start of their turn, the palinode can turn the duration of one save ends effect they suffer from into EoT.

