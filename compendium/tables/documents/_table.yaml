  content: |-
    # Arixx Lair

    The heroes arrive at the arixx lair, and the creature attacks when disturbed. The arixx lair has a ceiling that is 4 squares high and uses the Arixx Lair map.


    > * “The tunnel ends in a large chamber, which is littered with bones and half-eaten, rotting carcasses of animals, intermingled with humanoid remains.”
    > * “At the far end of the chamber, a pile of debris obscures the chamber wall. Glints of metal and other objects are strewn within the debris.”
    > * “The ribs of several bovine carcasses line sections of the wall. Corpses of other creatures are impaled on the ribs.”

    {If the heroes achieve a total success on their montage test, the arixx is out in the open and not hidden. Add: }
    > * “A giant insect, like a horse-sized praying mantis, clacks their mandibles with excitement as you enter the cave.”
    {Secret: The floor is weakened in several places.}

    {
    # Arixx Encounter

    The heroes face an arixx beneath the ground.

    [[encounter]]

    **Arixx Nest Groups**
    |Group|Creatures|
    |1|Arixx (First Turn)|
    |2|Arixx (Second Turn)|

    **Encounter Adjustments**

    If this encounter has four or three heroes, make the following adjustments:

    * For four heroes, the arixx has 120 Stamina.
    * For three heroes, the arixx has 80 Stamina and can't use the Solo Action Malice feature.


    ## Weakened Floor

    A creature who moves onto a weakened square falls into a 4-square- deep pit. Climbing the walls of the pit doesn't require a test.
    *The Map Pins contain buttons to automatically open the pits.*
    *See [Pit 1], [Pit 2], [Pit 3], [Pit 4], [Pit 5], [Pit 6].*

    ## Tactics
    The arixx starts combat by targeting as many creatures as possible with Claw Swing and remains on the surface to use Acid Spew. Then the arixx attempts to grab the nearest creature and take them underground with the Dig Maneuver to feast upon them. The arixx reemerges at the end of the second round, using Sinkhole. During the third round of combat, the arixx moves into position to use Acid and Claws.

    When they aren't burrowed, the arixx uses Malice to use Solo Action and Dirt Devil or Geyser to gain extra actions on their turn, targeting hard-to-reach foes.


    ## Ending the Encounter

    The arixx fights until reduced to 0 Stamina, and the heroes earn 2 Victories each.


    [[/awardvp 2|Give Heroes 2 Victories]]


    If the heroes leave the nest, the arixx doesn't pursue them, wanting to defend their home


    ## Loot

    A search of the nest after the arixx is defeated reveals various bits of useless trash as well as [Orson]’s [Amulet of the Delian Order].

    Title: [Monster Bane]
    The hero who reduces the arixx to 0 Stamina earns the [Monster Bane] title (see Titles in Handouts).


    ## Arixx Nest Aftermath

    If the heroes defeat the arixx, they earn the thanks of [Ellery], who not only delivers on the promise of bacon for life, she also gives them an old journal in Kalliak with a vial of red honey her grandmother gave to her. The journal is a project source for [Buzz Balm] (see Treasure in Handouts), and the vial is 4 ounces of demon honey.

    With the [Amulet of the Delian Order] in hand, the heroes can now enter the second level of the [Delian Tomb], as [Orson] (see [B9. Charcoal Burner]) can explain to them.


    }
