  description: Tavern Brawl
  content: "# Tavern Brawl\n\nDwarf merchants cause a scene in the tavern of the Feather Bed Inn (see [Dwarf Merchants] in [B1. Feather Bed Inn]). This event can occur for any of the following reasons:\n * The heroes negotiate with [Murkik] for his stone on [Dunquat]’s behalf and his interest reaches 0.\n * The heroes get caught stealing the merchants’ stone from the stables (see [B14. Stables and Carriage House]).\n * The heroes don’t solve the dispute with [Dunquat] and the merchants and finish five respites during the adventure (see [Respite Tracker]). The next time they are in the inn, [Dunquat] is confronting the merchants and the conflict turns violent as [Murkik] lashes out at her. [Dunquat] calls out to the heroes for help, causing [Murkik] to attack them whether the heroes plan to defend [Dunquat] or not. [Dunquat] flees as [Murkik] focuses on the more dangerous foes.\n\n This encounter uses the [Tavern Brawl Map]. \n[Murkik] is a dwarf stonewhisperer accompanied by one dwarf warden and three dwarf trappers.\n\n# Combat\n\n The heroes battle dwarf merchants at the tavern in the Feather Bed Inn.\n\n[[setting:Number of Heroes]]\n\n[[encounter]]\n\nWhen you are ready, [Draw Steel!]\n\n**Tavern Brawl Groups**\n|Group|Creatures|\n|1|One dwarf stone whisperer|\n|2|One dwarf warden|\n|3|One dwarf trapper|\n|4|One dwarf trapper|\n|5|One dwarf trapper|\n\n**Encounter Adjustments**\nIf this encounter has more or fewer than five heroes, make the following adjustments:\n\n* For six heroes, add one dwarf warden.\n* For four heroes, remove one dwarf trapper.\n* For three heroes, remove two dwarf trappers.\n\n\n## Tactics\n\n The dwarves are out for blood, but they know better than to kill anyone. If a hero would die in this encounter, they fall unconscious instead.\n \nMurkik uses Stone Wave and Tile Slide to keep the heroes away from him and separated while shouting orders to the other dwarves and reminding them not to kill anyone. The warden corners the toughest melee combatant they can reach and attempts to separate them from the others. The trappers split up, concentrating on restraining as many heroes as possible with their Steam-Powered Snare ability. If the heroes are positioned in a line, the dwarves use Snaring Line.\n\n## Aftermath and Rewards\n\nEnd Combat once the battle is over by right clicking the combat orb.\n\nThe dwarves fight until [Murkik] falls, then surrenders. The heroes earn 1 Victory each.\n\n If Murkik survives the encounter and the heroes are victorious, he apologizes and comes clean about why he’s asking for [Dunquat]’s [Quantum Satchel]. He then asks the heroes to rescue his friends from Vurkor (see [Mage Tower]).\n\n If the heroes fail to win the day, [Murkik] leaves them bloodied on the ground. [Dunquat], either because she is there or hears news of the brawl, trades her [Quantum Satchel] along with the original fee for the stone to get the merchants to leave town and prevent further violence.\n\n[[/awardvp 1|Award Victories]]"
  mtime: 1775160963922
