      data: |
        Zombie	Level 1 Horde Brute
        Undead	EV 3
        **Stamina** 20	**Immunity** corruption 1, poison 1
        **Speed** 5	**Size** 1M /** Stability** 1
        **Free Strike** 2
        Might +2	Agility +1	Reason -5	Intuition -2	Presence +1
        **Clobber and Clutch** (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        **Keywords** Melee, Strike, Weapon
        **Distance** Melee 1	**Target** One creature or object
        %E2%9C%A6	%E2%89%A411	4 damage
        %E2%98%85	12%E2%80%9316	6 damage
        %E2%9C%B8	17+	7 damage; grabbed
        **Effect** A target who starts their turn grabbed by the zombie takes 2 corruption damage. If a creature takes 5 or more corruption damage this way, they become insatiably hungry for flesh. The target must complete the Find a Cure project to end this effect.
        **Zombie Dust** (Maneuver) %E2%97%86 2d10 + 2 %E2%97%86 3 Malice
        **Keywords** Area, Melee
        **Distance** 2 burst	**Target** Each enemy in the burst
        **Effect** The zombie falls prone, expelling a wave of rot and dust.
        %E2%9C%A6	%E2%89%A411	2 corruption damage
        %E2%98%85	12%E2%80%9316	3 corruption damage; M<1 weakened (save ends)
        %E2%9C%B8	17+	4 corruption damage; M<2 dazed (save ends)
        **Endless Knight**
        The first time the zombie is reduced to Stamina 0 by damage that isn't fire damage or holy damage and their body isn't destroyed, they regain their full Stamina and fall prone.
