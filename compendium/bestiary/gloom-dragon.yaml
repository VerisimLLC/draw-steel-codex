    import:
      type: mcdm
      data: |+
        Gloom Dragon	Level 4 Solo
        Dragon, Elemental	EV 60
        <b>Stamina</b> 350	<b>Immunity</b> psychic 5
        <b>Speed</b> 8 (fly, hover)	<b>Size</b> 4 /<b> Stability</b> 2
        <b>Free Strike</b> 6
        Might +2	Agility +4	Reason +1	Intuition +3	Presence +4
        <b>Solo Monster</b>
        <b>Solo Turns</b> The dragon takes up to two turns each round. They can't take turns consecutively.
        <b>End Effect</b> At the end of their turn, the dragon can take 10 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Gloaming Wyrmscale Aura</b>
        The dragon's scales emit a 4 aura of dark fog. An enemy who starts their turn in the affected area takes 2 psychic damage. The dragon feeds on their victims' fears, dealing an additional 3 psychic damage on abilities while at least one enemy is in their aura.

        <b>Breath of Brume</b> (Action) %E2%97%86 2d10 + 4 %E2%97%86 Signature
        <b>Keywords</b> Area, Magic, Ranged
        <b>Distance</b> 4 cube within 10<b>	Target</b> All enemies and objects
        <b>Effect </b>Each target makes an <b>Agility test</b>.
        %E2%9C%B8	%E2%89%A411	14 cold damage; dragonsealed (save ends)
        %E2%98%85	12%E2%80%9316	11 cold damage; dragonsealed (save ends)
        %E2%9C%A6	17	6 cold damage
        <b>Effect</b> The affected area becomes an area of magical darkness. The dragon ignores concealment granted by the darkness. A creature dragonsealed by the dragon has psychic weakness 3 and cold weakness 3 until the condition ends.

        <b>Phantom Tail Swing</b> (Action) %E2%97%86 2d10 + 4
        <b>Keywords</b> Charge, Magic, Melee, Strike
        <b>Distance</b> Melee 3<b>	Target</b> Two creatures or objects
        %E2%9C%A6	%E2%89%A411	10 psychic damage; pull 2
        %E2%98%85	12%E2%80%9316	15 psychic damage; pull 4
        %E2%9C%B8	17	18 psychic damage; pull 6
        <b>2 Malice</b> The pull becomes a vertical slide.

        <b>Visions in the Dark</b> (Maneuver) %E2%97%86 5 Malice
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 10 burst <b>	Target</b> All dragonsealed enemies
        <b>Effect</b> Each target takes 3 psychic damage and is <b>I<3</b> compelled to immediately make a free strike against one of their allies within range as they hallucinate a threat.

        <b>Shadow Skulk </b>(Free Maneuver)
        Once per turn, the dragon shifts up to their speed and leaves behind a 4 cube area of magical darkness. The dragon ignores concealment granted by the darkness. An enemy that ends their turn in the affected area is <b>I<3</b> frightened of the dragon.

        <b>Shroud</b> (Triggered Action) %E2%97%86 1 Malice
        <b>Keywords</b> Area, Magic
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Trigger</b> The dragon takes damage.
        <b>Effect</b> The dragon reduces the damage by 2 for each enemy in their aura.

        <b>Encroaching Darkness</b> (Free Triggered Action) %E2%97%86 1 Malice
        <b>Keywords</b> -
        <b>Distance</b> Ranged 10<b>	Target</b> Special
        <b>Trigger</b> A creature moves.
        <b>Effect</b> The dragon moves two cubes of magical darkness up to 10.

        <b>Gloom Dragon's Domain</b>
        If the encounter map is a location the dragon has occupied for 1 week or more, illusory magic drenches the air such that even the scenery emanates malice. Each creature other than the dragon in the affected area has a -2 on saving throws made to end the frightened condition. A frightened enemy in the affected area takes an additional 3 psychic damage whenever they take damage.

        <b>Enveloping Umbrage</b> (Villain Action 1) %E2%97%86 2d10 + 4
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 5 burst<b>	Target</b> All enemies
        %E2%9C%A6	%E2%89%A411	Pull 2; I<2 frightened (EoT)
        %E2%98%85	12%E2%80%9316	Push 4; I<3 frightened (save ends)
        %E2%9C%B8	17	Push 6; I<4 frightened (save ends)

        <b>Pall of Nightmares </b>(Villain Action 2)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 10 burst<b>	Target</b> All dragonsealed enemies
        %E2%9C%A6	%E2%89%A411	6 psychic damage
        %E2%98%85	12%E2%80%9316	11 psychic damage
        %E2%9C%B8	17	14 psychic damage
        <b>Effect</b> The targets are <b>I<3 </b>dazed as they are assaulted by their hallucinations.

        <b>Absence of All Light</b> (Villain Action 3)
        <b>Keywords</b> -
        <b>Distance</b> Special<b>	Target</b> Self
        <b>Effect</b> The dragon disappears and then reappears anywhere on the encounter map, along with three hallucinatory versions of them at other points on the encounter map (the director determines which one is real). Then, the dragon and each hallucination immediately uses Breath of Brume.
        Each hallucination has 1 Stamina and shares the dragon's speed and turn. Once per round, the dragon can instantly trade places with a duplicate before or after using an ability.

