  # Harim

  [[image]]

  *Harim the cobbler is exhausted. As the only cobbler in town, they work long hours to keep everyone’s feet covered and safe. The cobbler tends to keep answers short and gets exasperated with longer conversations and people who don’t cut to the point, but they are grateful if the heroes offer help.*
