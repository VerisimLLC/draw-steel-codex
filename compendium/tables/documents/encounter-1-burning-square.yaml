textStorage:
  __typeName: TextStorage
  sections:
    GD: |+
      > * “Several buildings in the village square are burning! Good thing there’s a well with multiple buckets right here.”


    YQ: |
      |4 |One [goblin underboss] (captain), Four [goblin spinecleaver]s (minion squad)|
    NKs: |+
      ## Queen Bargnot has the Cup of Iulius[[encounter:Burning Square QB]]

    qZ: |+
      When the heroes enter the square, the blacksmith, butcher, and cobbler shops are on fire.

    NKX: |2

    yw: |+
      The goblins fight until the heroes outnumber them two to one, and then they flee. If two or fewer buildings collapsed during the fight, the heroes earn 1 Victory each.

    yq: |
      Four snipers attempt to burn buildings and the remaining snipers each attack a different target, prioritizing those furthest from the melee. The cursespitters also fight at range, using Eye of Surlach to weaken foes on
    yu: |+
      ## Ending the Encounter

    ys: |+
      the front line.


    gU: |
      If this encounter has more or fewer than five heroes, make the following adjustments:
    yk: |+
      ## Well

    yi: |+
      |The creature takes 3 fire damage.

    QM: |
      |**Group**| **Creatures**|
    NKe: |+
      ## The Heroes have the Cup of Iulius

    kW: |
      * For four heroes, remove two goblin warriors.
    NKH: |+
      [[/activateobjects e1_start.AreaTemplate activate|Show Hero Start Area]][[/activateobjects e1_start.AreaTemplate deactivate|Hide Hero Start Area]]

    cS: |+
      |6 |Two [goblin cursespitter]s|

    UO: |
      |2 |Two [goblin warrior]s|
    JG: |+
      > * “Each calls out a different battle cry in a chaotic chorus that effectively amounts to, ‘Bring us the cup or we’ll burn this village to the ground!’”


    yg: |
      |The creature takes 7 fire damage.
    xe: |
      When a building collapses, each creature within 2 squares of it must make an Agility test:
    vc: |+
      At the end of each round, roll 1d6 for each burning building and add 1 to the result for the number of rounds the building has been burning, including the current round. On a total of 6 or higher, the building collapses.

    sa: |+
      Each round when the goblin snipers take their turn, four of the snipers all target the same building of your choice, lighting it on fire. If fewer than four goblin snipers remain, they can't target a building.

    FC: |
      > * “Outside, the air is thick with smoke and the scent of burning timber.”
    yy: "[[//awardvp 1|Award Heroes 1 Victory]]"
    DAZ: |2

    oY: |+
      ## Buildings on Fire

    DA: |2

    HE: |+
      **If the heroes have the Cup of Iulius, add:**

    ym: |+
      ## Tactics

    yo: |+
      The underboss, the spinecleavers, and warriors move to surround the heroes, attempting to keep them away from the well and burning buildings. They focus fire on any heroes who grab buckets. Once the heroes are surrounded, the goblins use Malice to activate Tiny Stabs to maximize damage.

    NKQ: |+
      [[setting:Number of Heroes]]

    LI: |
      > * “A crew of very capable goblins moves about the square, systematically burning buildings.”
    NK: |+
      The heroes must fight Jagged Edge invaders and fires in the village square of Broadhurst.

    OL: |
      **Burning Square Groups**
    aR: |
      |5 |Eight [goblin sniper]s (minion squad)|
    EB: |
      > * “Your respite ends as you hear screams coming from the village square.”
    yl: |+
      The well at the center of the town is 4 squares deep and has less than 1 square of water in it.


    ub: |+
      A hero adjacent to the well can use a free maneuver to pull up a bucket of water. A hero holding a bucket of water can hurl it at a burning building up to 10 squares away to douse the flames as a maneuver.

    yj: |+
      When a building collapses, the ground it occupies becomes difficult terrain. For the rest of this encounter, when a creature enters a square of this difficult terrain for the first time on a turn or starts their turn there, they take 1 fire damage.


    iV: |
      * For six heroes, add two goblin warriors.
    NKl: |+
      [[encounter:Burning Square]]

    mX: |+
      * For three heroes, remove two goblin warriors and one group of a goblin underboss and four goblin spinecleavers.



    eT: |
      **Encounter Adjustments**
    SN: |
      |1 |Two [goblin warrior]s|
    wd: |+
      [[/r 1d6|Roll 1D6]]

    WP: |
      |3 |One [goblin underboss] (captain), Four [goblin spinecleaver]s (minion squad)|
    MJ: |+
      > * “These aren’t the same foes you fought in the Delian Tomb—they’re muscled, agile, and dangerous.”



    KH: |+
      **If the goblins have the Cup of Iulius, add:**

    C: |
      # Encounter 1: Burning Square
    yh: |
      |The creature takes 5 fire damage.
    IF: |
      > * “A group of goblins carrying weapons and torches runs about the square.”
    yf: |
      |Collapsing Building: Agility Test
