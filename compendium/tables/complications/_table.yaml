  benefit: 'As a maneuver, you take the form of a specific animal of size 1T. You retain all your other statistics aside from your size, but you can’t talk or use actions, and the only maneuvers you can use are Escape Grab, Hide, and Stand Up. Based on the animal you can turn into, you might be able to burrow or fly, or to automatically climb or swim at full speed while moving. If your animal form doesn’t provide such additional movement, you have a +2 bonus to speed. Unless you use this benefit again, you return to your true form at the start of your next turn. '
51c650a6-2147-4b55-9e25-20e5cf3b301a:
  __typeName: CharacterComplication
  drawback: 'The pirates holding the other pieces of the map would very much like to get their hands on your piece, and have no qualms about killing you to get it. Furthermore, the pirate treasure is said to be cursed or haunted. '
  mtime: 1755603951215
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Pirate
  ctime: 1755516294911
  description: You have a piratical past (and maybe a piratical present and future as well). Though you’re not well-known ashore, other pirates have a way of recognizing their own.
  id: 51c650a6-2147-4b55-9e25-20e5cf3b301a
  benefit: When interacting with pirates or pirate hunters, you treat your Renown as 2 higher than usual. Additionally, you hold a piece of a pirate map, with a handful of other pirates in different locations holding the other pieces. With all the pieces, you’d know the location of a fabulous pirate treasure.
58e0e6fa-5235-4513-879c-3242610bf046:
  __typeName: CharacterComplication
  drawback: If any NPC from your homeland recognizes you, whether in your homeland or elsewhere, they attempt to harm you at the Director’s discretion.
  mtime: 1765804292778
  modifierInfo:
    __typeName: ClassLevel
    features:
    - __typeName: CharacterLanguageChoice
      guid: 0a0584d5-c030-4574-9474-5106797e041a
      source: Feat
  name: Exile
  ctime: 1755514046621
  description: Whether you’re a convicted criminal, a noble stripped of their title, or a person who made one too many enemies, you’ve been cast forth from your homeland, never to return. At least not until you’re strong enough to set things right.
  id: 58e0e6fa-5235-4513-879c-3242610bf046
  benefit: "You know one extant language of your choice (see Languages in Orden in Chapter 4: Background)."
79382c35-8523-42de-ad4c-f616ff3cfb48:
  __typeName: CharacterComplication
  drawback: Whenever you make a test in combat and incur a consequence, you ignore that consequence. Instead, you and each ally adjacent to you fall prone.
  mtime: 1755624051728
  modifierInfo:
    __typeName: ClassLevel
    features: []
  name: Curse of Misfortune
  ctime: 1755513612455
  description: You should have never pissed off that mage! Maybe they deserved your ire, or maybe you were just being a bully. But whatever the case, they cursed you before skipping town. Now, in moments of pressure that require great skill, you have a tendency to choke, falling and flailing in such a dramatic fashion that you take everyone else with you.
  id: 79382c35-8523-42de-ad4c-f616ff3cfb48
  benefit: Whenever you make a test in combat and incur a consequence, you ignore that consequence. Instead, you and each ally adjacent to you fall prone.
a904a4f8-5950-4133-8929-ea7e858cbc51:
  __typeName: CharacterComplication
  drawback: All those who learn of you running out on your commitment think less of you and spread nasty rumors about you.Your Renown can’t ever be more than your level - 1.
