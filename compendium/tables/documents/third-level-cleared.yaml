content: |
  # Third Level Cleared
  When the heroes finish exploring the third level of the Delian Tomb, they should either have the [Cup of Iulius] or they should know where to find it—in the ruins of [Castle Andreas]. See [Part 3: The Jagged Edge] for continuing the adventure.


  ## Title: Delian Delver

  If a hero survives exploring every level of the Delian Tomb, they gain the [Delian Delver] title (see Titles in Handouts).
