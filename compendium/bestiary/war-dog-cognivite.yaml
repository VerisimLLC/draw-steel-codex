        <b>Keywords</b> Area, Psionic
        <b>Distance</b> 5 burst	<b>Target</b> Each enemy in the burst
        <b>Effect </b>The cognivite chooses an ally within 10 squares, then chooses whether each target is taunted by the ally or the ally has :shield::shield: whenever they're attacked by a target until the start of the cognivite's next turn.

        <b>Loyalty Collar</b>
        When the cognivite dies, they explode, dealing 1d6 damage to each adjacent enemy.

